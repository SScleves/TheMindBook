araldsson admits he cannot conclusively rule out sleight of hand but notes no credible evidence of fakery in half a century of demonstrations, freely filmed. Talbot also reports witnesses seeing Sai Baba vanish and reappear a hundred yards away — suggesting to him that bodies are holographic projections. (Ch 5, Ch 8)\n\n**Q: What is Therese Neumann\u0027s inedia and how was it verified, per the book?**\nA: The Bavarian stigmatist gave up food and water entirely in 1927 and reportedly consumed nothing for the next thirty-five years. That year the bishop of Regensburg sent a commission: from July 14 to 29, four Franciscan nursing sisters under Dr. Seidl watched her day and night, measuring even her mouth-rinsing water — she never dehydrated, kept constant weight (regaining even the nearly nine pounds of blood lost in her weekly stigmata bleedings), and the observers were completely convinced. Talbot argues this implies she regularly materialized the water and nutrients keeping her alive, since the body can rarely survive even a week without water. (Ch 5)\n\n**Q: What was Tart\u0027s mutual hypnosis experiment?**\nA: Charles Tart had two graduate students, Anne and Bill — both deep-trance subjects and skilled hypnotists — hypnotize each other; opening their eyes, they jointly experienced a beach of unearthly beauty with champagne-like seas and crystalline glowing rocks, talked to each other inside the shared world while silent to Tart, and later found they had shared details for which no verbal stimuli existed on the tapes. The realness eventually frightened them into stopping, and Bill gave up hypnosis entirely. Talbot presents it as a perfect example of a holographic reality: a fully sensory 3-D construct created out of interconnectedness and sustained by consciousness. (Ch 5)\n\n**Q: What is remote viewing and who established it, per Talbot?**\nA: Physicists Harold Puthoff and Russell Targ at Stanford Research Institute found just about everyone they tested could accurately describe what a distant person was seeing simply by relaxing and reporting mental images — duplicated by dozens of labs, and working even with no human observer at the target. Jahn himself, receiving for a colleague in Paris, saw a knight in armor; the sender stood before a building ornamented with exactly such statuary. Bohm\u0027s reading is that remote viewing is \"inverse psychokinesis\" — a resonance of meanings from object to mind rather than mind to object. (Ch 5, Ch 7)\n\n**Q: What is the Tom and the invisible daughter story meant to show?**\nA: A hypnotist told Tom his teenage daughter Laura would be invisible on waking; with Laura standing directly before him, Tom looked through her and then correctly identified — and read the inscription on — a watch the hypnotist pressed against her back, information unknown to everyone present. Talbot, who witnessed it, argues perception is not based solely on the five senses: Tom may have received the information telepathically from the hypnotist\u0027s mind. He extends this to propose that normal waking consciousness is itself a kind of hypnosis (noting hypnosis produces no unusual EEG patterns) and consensus reality a collectively constructed reality-field. (Ch 5)\n\n**Q: How does Talbot explain poltergeists?**\nA: As unconscious psychokinesis centered on a focal person rather than a place — the view he says many parapsychologists hold, and one he accepts from experience: his own childhood home hosted a poltergeist that followed him to college, tracked his moods, showered gravel and polished stones, and once dropped cold spaghetti on his chest in a sealed New York apartment; in 1976 he watched a piece of brown drift glass pop into existence in midair. He pairs this with Watson\u0027s Indonesian case of Alin, the resented half-sister around whom salt poured from midair and a table bucked and flipped, and Owen\u0027s survey of materializing objects in poltergeist cases dating from A.D. 530. (Ch 5)\n\n**Q: What is the \"laws of physics as habits\" claim?**\nA: Following Peat and the holographic idea, Talbot argues matter and physical law are constantly born anew out of the implicate order, so repetition of pattern is a \"material neurosis\" — chairs and tables are habits in the flux, and even physical laws are deeply ingrained programs (vast whirlpools of inertial power, like Shainberg\u0027s thought vortices) that can be suspended under special circumstances. Bohm\u0027s own proposed mechanism for PK is a noncausal \"resonance of meanings\" between mind and material system, requiring a \"super\" nonlocality deeper than ordinary quantum nonlocality. The through-line Talbot names: the deeper and more emotionally charged our beliefs, the greater the changes we can make in body and reality. (Ch 5)\n\n## Time\n\n**Q: What is retrocognition and what is the star case?**\nA: Retrocognition is \"the ability of certain individuals to shift the focus of their attention and literally gaze back into the past.\" The star case is Polish clairvoyant Stefan Ossowiecki, who from a fragment of petrified foot saw an Egyptian prince\u0027s daughter and could \"fast-forward\" her life like a movie; tested by ethnologist Stanislaw Poniatowski with provenance-concealed stone tools, he repeatedly identified age, culture, and origin, and gave over one hundred initially implausible details later proved correct — complex Magdalenian hairstyles and Stone Age oil lamps among them. Talbot\u0027s frame: the past re-enfolds into Bohm\u0027s implicate order, where mind and the record of the past \"are, in a manner of speaking, already neighbors.\" (Ch 7)\n\n**Q: What is psychic archaeology, per the book?**\nA: Talbot claims that \"for three-quarters of a century psychic archaeology has been a reality\" (quoting Schwartz): Toronto professor Norman Emerson\u0027s psychic informant George McMullen paced out an Iroquois longhouse on bare ground that excavation confirmed six months later, and Emerson told Canada\u0027s leading archaeologists in 1973 the work deserved \"first priority\"; archaeologist Clarence Weiant credited a psychic with his famous Tres Zapotes find; Croiset and Garrett produced similar psychometry results for Tenhaeff, Valkhoff, and LeShan. (Ch 7)\n\n**Q: What laboratory evidence for precognition does Talbot cite?**\nA: The Rhines\u0027 card-guessing at odds of three million to one against chance; Helmut Schmidt\u0027s random-event machine results at one billion to one over sixty thousand trials; Maimonides Dream Laboratory subjects dreaming of paintings chosen the next day (one dreamed a patient escaping through an archway the night before Van Gogh\u0027s Hospital Corridor at St. Remy was drawn); Hella Hammid describing the \"black iron triangle\" (a squeaking swing) Puthoff would visit before the target was even selected; Jahn and Dunne\u0027s 62 percent accuracy over 334 formal trials; and Croiset\u0027s chair tests — in the 1969 Eisenbud study he described, from Utrecht, the Denver man who would sit in a randomly chosen seat seventeen days later, correct in every detail but three-quarters of an inch of height. (Ch 7)\n\n**Q: Is the future fixed, according to the book?**\nA: No — Talbot argues it is \"substantive enough for us to perceive it, but malleable enough to be susceptible to change.\" Loye pictures multiple parallel holographic futures between which we make \"hololeaps\" when acting on premonitions; Bohm says coming events cast \"shadows... deep in the implicate order\"; Swann and the kahunas speak of \"crystallizing possibilities,\" with great world events crystallized furthest in advance. The nineteen documented Titanic premonitions (some heeded, some not) and Cox\u0027s finding that significantly fewer people rode trains on accident days are his evidence that we constantly precognize and can choose. (Ch 7)\n\n**Q: What did Whitton\u0027s between-life regression research find?**\nA: Toronto psychiatry professor Joel Whitton\u0027s roughly thirty hypnotic subjects reported numerous past lives (some twenty to twenty-five), a light-filled between-life realm without time or space, and a hyperhonest \"metaconscious\" state in which they had planned their next life\u0027s important events — one woman had planned her own rape at thirty-seven to transform her \"entire soul complexion,\" and a man had chosen kidney disease as self-punishment with a healing encounter prearranged. Corroborating details include a Canadian with a childhood British accent who recalled dying as a British WWII pilot, and a subject who produced authentic Old Norse and extinct Sassanid Pahlavi script. Talbot explicitly notes the evidence does not prove reincarnation and the book does not argue that it does. (Ch 7)\n\n**Q: What is Stevenson\u0027s birthmark evidence?**\nA: University of Virginia psychiatrist Ian Stevenson, in thirty-plus years of studying thousands of children who spontaneously remember apparent past lives (typically talking about them between ages two and four, with verifiable names and places), found injuries carrying over as birthmarks: a boy murdered by throat-slitting bore a long reddish mark across his neck, and another who shot himself had two marks aligned along the bullet\u0027s entry and exit trajectory, sometimes confirmed against hospital or autopsy records. Stevenson infers a nonphysical \"template\" body carrying wound imprints between lives — which Talbot links to Tiller\u0027s holographic energy-field template. Stevenson found no evidence of retributive karma or an external judge: \"we are the makers of our own souls.\" (Ch 7)\n\n**Q: What is retroactive psychokinesis?**\nA: In the Schmidt–Schlitz work announced at the 1988 Parapsychological Association convention, volunteers listening to prerecorded cassettes of random tone sequences tried to lengthen the pleasing sounds — and the original recordings, examined afterward, contained significantly more pleasing sound than probability allowed, as if subjects had \"reached back through time\" to influence the randomization that had already occurred. Regular meditators exerted a greater effect than non-meditators, suggesting to Talbot that contact with the unconscious is the key to the reality-structuring psyche. (Ch 7)\n\n**Q: What is the Moberly–Jourdain Versailles case?**\nA: On August 10, 1901, Anne Moberly and Eleanor Jourdain — principal and vice principal of St. Hugh\u0027s College, Oxford — walking in the garden of the Petit Trianon saw a shimmering pass over the landscape, after which everyone wore eighteenth-century dress; they saw an aristocratic lady painting whom they later concluded was Marie Antoinette on the day of the sacking of the Tuileries, and when the vision vanished their path was blocked by an old stone wall. Talbot stresses they did not merely view the past but walked into it, and that publishing risked their academic reputations for no benefit. He groups it with a 1955 sighting in the same garden and Buterbaugh\u0027s view of a Nebraska campus as it was fifty years earlier. (Ch 7)\n\n**Q: What did Wambach\u0027s regressions and Snow\u0027s future progressions find?**\nA: Helen Wambach\u0027s group hypnotic regressions of thousands of subjects were strikingly anti-fantasy: over 90 percent recalled lives as peasants, laborers, and food gatherers, under 10 percent aristocrats, none famous — and details tracked history, such as three-pronged forks before 1790 and four-pronged after. Her future-progression project, completed by Chet Snow with 2,500 participants, found nearly all agreed Earth\u0027s future population had decreased dramatically, and reports split into four future types: sterile space-station dwellers, harmonious \"New Agers,\" bleak hi-tech urbanites, and post-disaster survivors. Snow\u0027s holographic reading, like Loye\u0027s, is that several potential \"holoverses\" are forming and humanity is choosing among them en masse. (Ch 7)\n\n## NDEs, OBEs \u0026 other realities\n\n**Q: What is the Maria tennis-shoe case and why does it matter?**\nA: Maria, a Seattle coronary patient, went into cardiac arrest and later told skeptical social worker Kimberly Clark she had floated out of her body, \"thought herself\" outside the hospital, and ended up \"eyeball to shoelace\" with an old tennis shoe on a third-floor ledge — noting the little toe worn through the fabric and the lace stuck under the heel. Clark could only see the shoe by pressing against a narrow window and could only confirm the details after retrieving it; the perspective required floating right outside at close range. It matters as veridical evidence — Clark: \"It was very concrete evidence for me\" — that OBE perception can be accurate about things the physical senses could not access. (Ch 8)\n\n**Q: What was Sabom\u0027s controlled comparison of cardiac patients?**\nA: Emory cardiologist Michael Sabom compared 32 cardiac patients who reported OBEs during heart attacks with 25 who had not: of the non-experiencers asked to imagine their resuscitations, 20 made major mistakes; of the experiencers, 26 gave correct general descriptions, 6 gave highly detailed accurate ones, and 1 gave a blow-by-blow account so accurate Sabom was stunned. He became an ardent believer: \"The out-of-body hypothesis simply seems to fit best with the data at hand.\" (Ch 8)\n\n**Q: Why does Talbot argue NDEs are not hallucinations?**\nA: Five converging facts he cites: NDEs occur worldwide; studies show no relationship to age, sex, race, religion, education, income, or church attendance; the core experience is cross-culturally consistent (Osis and Haraldsson\u0027s comparison of nearly nine hundred deathbed visions in India and the US found the same core, though Americans saw a Christian figure and Indians a Hindu one); perception during NDEs can be veridical, even in the blind (Kubler-Ross\u0027s blind patients described clothing colors and jewelry); and NDEs occur in patients with flat EEGs, whereas hallucinations register on an EEG. A 1981 Gallup poll put American NDEers at eight million — about one in twenty adults. (Ch 8)\n\n**Q: What is the life review and why does Ring call it holographic?**\nA: The panoramic, instantaneous replay of one\u0027s entire life in complete sensory detail — \"like climbing right inside a movie of your life... Total, total recall. And it all happens in an instant\" — including every thought and the felt emotions of everyone one affected (one woman relived snatching a toy and felt her sister\u0027s loss). Judgment is self-judgment only; the beings of light never condemn. Ring calls it \"a holographic phenomenon par excellence\" — three-dimensional, wraparound, an aleph-like moment containing all moments — and per Moody and others, many NDEers themselves use the word \"holographic.\" (Ch 8)\n\n**Q: What do the beings of light teach, per the NDE reports Talbot collects?**\nA: Two values above all: love — compassion as \"the barometer of grace,\" with the recurring question \"Did you do it out of love?\" — and knowledge, one of the few things \"you will be able to take with you after you have died.\" Their appearance (Christian personage, Hindu deity) is sculpted by the experiencer\u0027s beliefs; Whitton\u0027s subjects said the between-life counselors were entities who had completed their incarnations, while Monroe found their ultimate identity unknown. Moody\u0027s conclusion, as Talbot reports it: we live in a universe far more benevolent than we realize. (Ch 8)\n\n**Q: How common are OBEs, and what does the second body turn out to be?**\nA: Surveys Talbot cites: Bourguignon found OBE traditions in 437 of 488 world societies (89 percent); student polls by Green and Irwin ran 19–34 percent, averaging out to roughly one in five people (other studies say one in ten); and Gabbard, Twemlow, and Jones found 85 percent of 339 OBEers called the experience pleasant. The \"second body\" is not a fixed phantom double but a hologram sculpted by beliefs — naked or clothed, ball of light, cloud, or no form at all; Monroe holds our core form is a \"vibrational pattern [comprised] of many interacting and resonating frequencies.\" (Ch 8)\n\n**Q: What does Talbot actually conclude about UFOs?**\nA: That probably no single explanation covers the phenomenon, but UFOs are best understood as omnijective — real yet mind-shaped holographic phenomena — not extraterrestrial spacecraft: there are too many sightings, the occupants are implausibly humanoid, they don\u0027t behave like visitors or like physical objects (radar-tracked right-angle turns, shape-shifting, vanishing; Vallee: \"It is the behavior of an image, or a holographic projection\"). He entertains Grosso\u0027s and Jung\u0027s collective-unconscious projections and Vallee\u0027s and Raschke\u0027s extradimensional intelligence, and suggests both at once — collective belief may open a \"doorway\" through which such intelligences appear, with our minds sculpting their appearance and the \"medical examinations\" possibly symbolic probings of our subtle anatomy. (Ch 8)\n\n**Q: What are the Zeitoun apparitions and how does the book read them?**\nA: From 1968 to 1971, glowing three-dimensional figures of Mary, Joseph, and the Christ Child appeared weekly on the dome of a Coptic church in a Cairo suburb — heralded by flashes of light, coalescing from amorphous luminosity, accompanied by doves \"formed of pure light,\" seen by hundreds of thousands and extensively photographed, waning to luminous fog as interest waned. Grosso says witnesses sound like they are \"describing some sort of holographic projection\" and reads such visions as psychic projections of a collective unconscious disturbed by modern threats; Rogo adds that a 1925 prophecy-dream may have built a forty-year \"psychic blueprint\" of the Virgin in the church. (Ch 8)\n\n**Q: What does the book say lucid dreams are?**\nA: Physicist Fred Alan Wolf\u0027s view (1987 Association for the Study of Dreams talk) is that all dreams are internal holograms: ordinary dreams are less-vivid virtual images made of diverging waves, while lucid dreams are \"real images\" formed by converging waves whose viewer is bathed in and contained by the scene — hence their eerie vividness. Wolf postulates lucid dreams (perhaps all dreams) are actually visits to parallel universes — \"smaller holograms within the... cosmic hologram\" — and calls the skill \"parallel universe awareness.\" (Intro, Ch 3)\n\n## Traditions \u0026 the ancient world\n\n**Q: How do ancient traditions prefigure the implicate/explicate order, per Talbot?**\nA: He argues virtually all of them do: the Tibetan void is the birthplace of all things pouring out in \"boundless flux,\" with only the void real; the Hindu Brahman is the formless illusion-maker behind maya, with consciousness more fundamental than matter; the Zohar notes the Hebrew verb baro, \"to create,\" implies creating an illusion; a Dogon elder says \"To draw up and then return what one had drawn — that is the life of the world\"; and Douglas Sharon calls a vital essence underlying visible forms probably the central concept of shamanism everywhere. (Ch 9)\n\n**Q: What are Indra\u0027s net and Fa-Tsang\u0027s demonstration?**\nA: The Avatamsaka Sutra likens the universe to a network of pearls over the god Indra\u0027s palace, arranged so that looking at one shows all others reflected in it — each object \"involves every other object and, in fact, is everything else.\" When Empress Wu couldn\u0027t grasp it, the seventh-century Hua-yen founder Fa-Tsang hung a candle in a room full of mirrors (the One to the many) and placed a polished crystal at the center reflecting everything (the many to the One) — and like Bohm with the holomovement, he stressed his static model missed the cosmos\u0027s constant movement. (Ch 9)\n\n**Q: What is the macrocosm/microcosm lineage — and the Leibniz \"full circle\"?**\nA: The twelfth-century Sufis said \"the macrocosm is the microcosm,\" Hermes Trismegistus taught \"the without is like the within of things,\" the alchemists distilled it into \"As above, so below,\" and the idea runs through Anaximenes, Pythagoras, Heraclitus, Plato, Philo, and Maimonides — with Black Elk\u0027s \"Anywhere is the center of the world\" and Empedocles\u0027 circle \"whose center is everywhere\" as further echoes. Talbot\u0027s full-circle point: Leibniz, arguably influenced by Hua-yen Buddhism, proposed whole-reflecting monads and also gave the world integral calculus — the very mathematics that enabled Gabor to invent the hologram. (Ch 9)\n\n**Q: What do the kahunas, Tibetan tantrics, and Sufis say about thought creating destiny?**\nA: The kahunas hold that the aumakua (high self) sees the crystallized future and weaves destiny from thought forms made of kino mea, \"shadowy body stuff\" that also templates the physical body; the Tibetan tantrics say every mental act produces waves of tsal, the collective tsal of all beings animating the universe, with Kargyupa monks spending up to seven years perfecting visualization; the Persian Sufis\u0027 alam almithal forms idea-images on the adjacent template plane, governed by the heart chakra (himma). Talbot lines these up with Cayce\u0027s \"thought is the builder\" and the Buddha\u0027s \"We are what we think,\" and judges the idea \"not so farfetched. It even seems probable\" in a holographic universe. (Ch 7)\n\n**Q: Who was Swedenborg and why does the book care?**\nA: The Swedish polymath (born 1688) — \"the Leonardo da Vinci of his era\" — whose trances took him out-of-body to \"heaven\"; his veridical feats included relaying to the queen of Sweden information only she and her dead brother knew, and locating a widow\u0027s secret desk compartment (the incident that prompted Kant\u0027s Dreams of a Spirit-Seer). His nearly twenty volumes describe the tunnel, beings of light, the life review (\"the opening of the Book of Lives\"), knowledge as nourishment, and dense picture-language \"portrayals\" in a \"wave-substance.\" Theologian George Dole notes Swedenborg\u0027s universe is sustained by two wavelike inflows — \"we can view ourselves as interference patterns... we are where the waves meet\" — a striking anticipation of the hologram, per Talbot. (Ch 8)\n\n**Q: What is the dreamtime, and how does the book end with it?**\nA: The Australian aborigines\u0027 transcendent reality, visited by shamans in trance and nearly identical to Western afterlife descriptions (per Thero) — a dimension without time, space, or boundaries requiring \"survival in infinity\"; aborigines hold that the true source of mind is there, that the whole world once was dreamtime, and that the earth will return to it. Talbot speculates that as we learn to manipulate Jahn and Dunne\u0027s \"interface between consciousness and its environment,\" reality may become plastic again, and the rising tide of NDEs, visions, and encounters exists to teach us to handle it. The book\u0027s final line: \"We are, as the aborigines say, just learning how to survive in infinity.\" (Ch 8, Ch 9)\n\n## People\n\n**Q: How do Pribram\u0027s and Bohm\u0027s routes to the hologram differ?**\nA: Pribram, a Stanford neurophysiologist and author of Languages of the Brain, got there from the failures of standard brain theory: Lashley\u0027s inextinguishable rat memories and his own monkey studies drove him to distributed memory, and a mid-1960s article on holograms supplied the mechanism (first holographic-brain article, 1966). Bohm, a University of London physicist and Einstein protégé, got there from the failures of standard quantum theory: plasmas behaving like organisms, dissatisfaction with Bohr\u0027s \"complete\" theory, his 1952 quantum potential, and the ink-in-glycerine device led him to the implicate order (Wholeness and the Implicate Order, 1980). Talbot stresses they arrived independently, from opposite directions, and welds them together at the end of chapter 2: the brain is a hologram enfolded in a holographic universe. (Intro, Ch 1, Ch 2)\n\n**Q: Why does Talbot dwell on Bohm\u0027s and Pribram\u0027s courage?**\nA: He argues their character adds weight to the hypothesis: Bohm refused to testify against Oppenheimer before McCarthy\u0027s committee in 1951, lost his Princeton job, and never taught in the US again; Pribram, as a young neurosurgeon in Jacksonville and then at Yale, refused to allow lobotomies during the era when Moniz\u0027s procedure won a Nobel Prize and Walter Freeman boasted lobotomies \"made good American citizens\" of misfits — a stance that nearly cost Pribram his job. Backing so controversial an idea with their reputations, Talbot argues, was not the easy path. (Intro)\n\n**Q: Who is Stanislav Grof and what did his research find?**\nA: A psychiatric researcher (Prague, then the Maryland Psychiatric Research Center and Johns Hopkins) who personally guided over three thousand LSD sessions and studied two thousand more: patients reported womb memories with embryological detail exceeding their education, ancestral and racial memories (an uneducated patient detailing Egyptian embalming), identification with animals, and in the Ladislav case a telepathic message from a discarnate son verified by a phone call to Kromeriz. Grof concluded existing paradigms need \"drastic revision\" and only a holographic model can explain such transpersonal experiences; his and Christina Grof\u0027s drug-free \"holotropic therapy\" (breathing, music, bodywork) produces equally spectacular reports. (Intro, Ch 3)\n\n**Q: Who are Jahn and Dunne, and how does their theory differ from Bohm\u0027s?**\nA: Robert Jahn, dean emeritus of Princeton\u0027s engineering school, founded the PEAR lab in 1979 after a student\u0027s PK experiment provoked him; with clinical psychologist Brenda Dunne he accumulated REG and pinball data showing small but statistically significant PK in the majority of volunteers, with stable individual \"signatures.\" Their theory holds that consciousness itself has a wave/particle duality and that reality results from the interface of consciousness\u0027s wavelike aspect with matter\u0027s wave patterns — and, unlike Bohm, they believe subatomic particles lack distinct reality until consciousness enters the picture (\"we are indeed creating reality by any reasonable definition of the term,\" Jahn says). Talbot notes they explicitly do not identify with the holographic model, though Dunne offers the metaphor of an individual consciousness as a laser intersecting a pattern in the cosmic hologram. (Intro, Ch 5)\n\n**Q: Who is Kenneth Ring and what is his position?**\nA: A University of Connecticut psychologist, president of the International Association for Near-Death Studies, and one of the first to apply statistical analysis to NDEs (Life at Death, 1980). He proposed in 1980 that NDEs — and death itself — are \"really nothing more than\" the shifting of consciousness from one level of the hologram of reality to another; he reads the afterlife realm as built of interacting \"thought structures\" forming patterns like interference waves, argues UFO encounters are imaginal experiences akin to NDEs, and concludes from rising NDE numbers that we may be witnessing \"the shamanizing of modern humanity\" — an evolutionary thrust toward higher consciousness. (Intro, Ch 8, Ch 9)\n\n**Q: What does Talbot claim about himself?**\nA: That he grew up in a psychic family and experienced the phenomena firsthand: a poltergeist that followed him from childhood through college and materialized stones, coins, and once mid-air drift glass; vivid precognitive dreams; spontaneous aura sight from age seventeen (he sees the crown chakra); a teenage OBE in which he located a neighbor\u0027s lost library book; and the 1975 \"umbrella incident,\" in which he and a professor — minutes after discussing Castaneda\u0027s two-equally-real-realities claim — watched a stranger\u0027s green umbrella crackle, flicker, and transform into a gnarled stick, their written accounts matching exactly. He concedes such experiences can only be viewed as anecdotal evidence, but says for him they are the most compelling proof of all. (Intro, Ch 5, Ch 6, Ch 8)\n\n## Critical \u0026 meta\n\n**Q: What does the book admit is controversial or unproven?**\nA: Talbot concedes in the Introduction that the holographic model is highly controversial, not accepted by a majority of scientists, and still \"an idea in the making\" — a mosaic of viewpoints not yet integrated — so calling it a \"model\" or \"theory\" is loose usage, and Bohm and Pribram themselves do not embrace all the views and conclusions in the book. Later he flags further limits: his own experiences are anecdotal; the reincarnation evidence \"does not prove that reincarnation exists\"; iridology and reflexology are \"not experimentally vindicated\"; and structures psychics find in the energy field may be partly created by their own beliefs. (Intro, Ch 4, Ch 6, Ch 7)\n\n**Q: What do the named skeptics in the book say?**\nA: Neuropsychologist Frank Wood: \"there are precious few experimental findings for which holography is the necessary, or even preferable, explanation.\" Yale physicist Lee Smolin does not find Bohm\u0027s theory \"very compelling, physically,\" and Abner Shimony admits he doesn\u0027t understand it and wonders how literally to take the metaphor — while still crediting Bohm\u0027s courage. Talbot also reports Pribram\u0027s counter (a book in press with over 500 supporting references) and Bohm\u0027s defense that theories like superstrings won\u0027t be testable for decades either. (Ch 1, Ch 2)\n\n**Q: How does Talbot explain science\u0027s resistance to the paranormal?**\nA: As prejudice and belief-addiction rather than objectivity: scientists share everyone\u0027s cultural prejudices, and Yale surgeon Bernie Siegel\u0027s observation — people are addicted to their beliefs and act like addicts when challenged — is generalized by Talbot (\"We are addicted to our beliefs... the powerful opium of our dogmas\"). His exhibits: a famous skeptical physicist who assured him an experiment showed \"no evidence of any psychic functioning whatsoever\" when its results were striking, and Irvin Child\u0027s American Psychologist finding that the Maimonides ESP dream work was ignored and so \"severely distorted\" in print that its importance was obscured. (Intro)\n\n**Q: What restructuring of science does the final chapter call for?**\nA: Three components: accept the existence of psychic and spiritual phenomena (Harman: grant face validity to experiences reported \"through the ages and across cultures\"); broaden what counts as evidence so mass anecdotal testimony about important matters isn\u0027t dismissed (Stevenson: \"better to learn what is probable about important matters than to be certain about trivial ones\"); and replace detached objectivity with participation, on the model of Harner drinking ayahuasca rather than taking notes. Talbot adds the fashionability double standard — the unproven Big Bang is accepted while equally compelling NDE claims would be attacked — and, citing Weiss\u0027s deluge of secretly believing psychiatrists and a survey in which 58 percent of 228 psychiatrists called psychic phenomena important, says what\u0027s needed is \"the parapsychological equivalent of a Rosa Parks.\" (Ch 9)\n\n**Q: What is the book\u0027s final answer to who is dreaming the hologram?**\nA: That the question is meaningless: the Tibetan Book of the Dead, the Vedas, and Christianity all cast reality as a dream or divine thought, but in a holographic universe the part is the whole, so asking whether God or the collective consciousness of all things is the dreamer collapses — Wheeler\u0027s self-reference cosmology, in which we create the particles and they create us. Talbot gives the last word on this to the Kalahari Bushmen: \"The dream is dreaming itself.\" (Ch 8)\n"}]}],"built":"20 <script>
const DATA = JSON.parse(document.getElementById('data').textContent);
const docsById = {};
DATA.books.forEach(b => b.docs.forEach(d => { d.book = b; docsById[d.id] = d; }));
document.getElementById('built').textContent = 'built ' + DATA.built;

/* ---------- tiny markdown renderer ---------- */
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function inline(s) {
  return s
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*\n]+)\*/g, '<em>$1</em>')
    .replace(/\[([^\]]+)\]\(([^)]+\.md)\)/g, '<a class="int" data-doc="$2">$1</a>')
    .replace(/\[([^\]]+\.md)\]/g, '<a class="int" data-doc="$1">$1</a>');
}
function md(src) {
  const out = []; let list = null, quote = false;
  const closeList = () => { if (list) { out.push('</' + list + '>'); list = null; } };
  const closeQuote = () => { if (quote) { out.push('</blockquote>'); quote = false; } };
  for (const raw of src.split(/\r?\n/)) {
    const line = raw.replace(/\s+$/, '');
    let m;
    if (!line.trim()) { closeList(); closeQuote(); continue; }
    if ((m = line.match(/^(#{1,4})\s+(.*)$/))) { closeList(); closeQuote(); out.push('<h' + m[1].length + '>' + inline(esc(m[2])) + '</h' + m[1].length + '>'); continue; }
    if (/^---+$/.test(line.trim())) { closeList(); closeQuote(); out.push('<hr>'); continue; }
    if ((m = line.match(/^\s*[-*]\s+(.*)$/))) { closeQuote(); if (list !== 'ul') { closeList(); out.push('<ul>'); list = 'ul'; } out.push('<li>' + inline(esc(m[1])) + '</li>'); continue; }
    if ((m = line.match(/^\s*\d+\.\s+(.*)$/))) { closeQuote(); if (list !== 'ol') { closeList(); out.push('<ol>'); list = 'ol'; } out.push('<li>' + inline(esc(m[1])) + '</li>'); continue; }
    if ((m = line.match(/^>\s?(.*)$/))) { closeList(); if (!quote) { out.push('<blockquote>'); quote = true; } out.push('<p>' + inline(esc(m[1])) + '</p>'); continue; }
    closeList(); closeQuote(); out.push('<p>' + inline(esc(line)) + '</p>');
  }
  closeList(); closeQuote();
  return out.join('\n');
}

/* ---------- navigation ---------- */
function docLabel(d) {
  if (d.type === 'map') return 'Book map';
  if (d.type === 'glossary') return 'Glossary & people';
  if (d.type === 'qa') return 'Q&A';
  if (d.chapter !== null && d.chapter !== undefined) {
    return (d.chapter === '0' ? 'Intro' : 'Ch ' + d.chapter) + ' — ' + d.title.replace(/^"|"$/g, '');
  }
  return d.title;
}
function buildNav() {
  const nav = document.getElementById('nav'); nav.innerHTML = '';
  DATA.books.forEach(b => {
    const div = document.createElement('div'); div.className = 'book';
    const bt = document.createElement('div'); bt.className = 'bt'; bt.textContent = b.title; div.appendChild(bt);
    const ba = document.createElement('div'); ba.className = 'ba';
    ba.textContent = b.author + (b.year ? ' · ' + b.year : ''); div.appendChild(ba);
    const ul = document.createElement('ul'); ul.className = 'doclist';
    const order = d => d.type === 'map' ? 0 : d.type === 'glossary' ? 90 : d.type === 'qa' ? 91 : 10 + Number(d.chapter || 0);
    [...b.docs].sort((x, y) => order(x) - order(y)).forEach(d => {
      const li = document.createElement('li');
      li.textContent = docLabel(d);
      if (d.type !== 'chapter') li.classList.add('aux');
      li.dataset.doc = d.id;
      li.onclick = () => openDoc(d.id);
      ul.appendChild(li);
    });
    div.appendChild(ul);
    bt.onclick = () => { const first = b.docs.find(d => d.type === 'map') || b.docs[0]; openDoc(first.id); };
    nav.appendChild(div);
  });
}

/* ---------- doc view ---------- */
let current = null;
function openDoc(id, highlight) {
  const d = docsById[id]; if (!d) return;
  current = id;
  location.hash = encodeURIComponent(id);
  let html = '<div class="crumb">' + esc(d.book.title) + (d.book.author ? ' · ' + esc(d.book.author) : '') + '</div>';
  html += md(d.body);
  if (d.concepts && d.concepts.length) {
    html += '<div class="chips">' + d.concepts.map(c => '<span class="chip" data-c="' + esc(c) + '">' + esc(c) + '</span>').join('') + '</div>';
  }
  const el = document.getElementById('doc');
  el.innerHTML = html;
  document.querySelectorAll('#nav .doclist li').forEach(li => li.classList.toggle('active', li.dataset.doc === id));
  el.querySelectorAll('a.int').forEach(a => a.onclick = () => {
    const ref = a.dataset.doc.replace(/\.md$/, '');
    const target = ref.includes('/') ? ref : d.book.id + '/' + ref;
    openDoc(target);
  });
  el.querySelectorAll('.chip').forEach(ch => ch.onclick = () => {
    const gl = d.book.docs.find(x => x.type === 'glossary');
    if (gl) openDoc(gl.id, ch.dataset.c.replace(/-/g, ' '));
  });
  window.scrollTo(0, 0);
  if (highlight) {
    const rx = new RegExp('(' + highlight.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'i');
    for (const p of el.querySelectorAll('p, li, h2, h3')) {
      if (rx.test(p.textContent)) {
        p.innerHTML = p.innerHTML.replace(rx, '<mark>$1</mark>');
        p.scrollIntoView({ block: 'center' });
        break;
      }
    }
  }
}

/* ---------- search ---------- */
const q = document.getElementById('q');
q.addEventListener('input', () => {
  const term = q.value.trim();
  if (term.length < 2) { if (current) openDoc(current); return; }
  const needle = term.toLowerCase();
  const hits = [];
  for (const b of DATA.books) for (const d of b.docs) {
    const body = d.body.toLowerCase();
    let idx = body.indexOf(needle), n = 0;
    while (idx !== -1 && n < 3) {
      const s = Math.max(0, idx - 70), e = Math.min(d.body.length, idx + needle.length + 90);
      hits.push({ d, snip: d.body.slice(s, e).replace(/\s+/g, ' ') });
      n++; idx = body.indexOf(needle, idx + needle.length);
    }
    if (hits.length > 60) break;
  }
  const rx = new RegExp('(' + term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  document.getElementById('doc').innerHTML =
    '<div class="sr"><h1>' + hits.length + ' match' + (hits.length === 1 ? '' : 'es') + ' for “' + esc(term) + '”</h1>' +
    hits.map((h, i) => '<div class="hit" data-i="' + i + '"><div class="where">' + esc(h.d.book.title) + ' → ' + esc(docLabel(h.d)) +
      '</div><div class="snip">…' + esc(h.snip).replace(rx, '<mark>$1</mark>') + '…</div></div>').join('') + '</div>';
  document.querySelectorAll('.hit').forEach(el => el.onclick = () => { q.value = ''; openDoc(hits[+el.dataset.i].d.id, term); });
});

/* ---------- boot ---------- */
buildNav();
const start = location.hash ? decodeURIComponent(location.hash.slice(1)) : null;
if (start && docsById[start]) openDoc(start);
else { const b0 = DATA.books[0]; openDoc((b0.docs.find(d => d.type === 'map') || b0.docs[0]).id); }
</script>
