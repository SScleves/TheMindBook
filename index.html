<script id="data" type="application/json">{"books":[{"id":"holographic-universe","title":"The Holographic Universe","author":"Michael Talbot","year":"1991","docs":[{"id":"holographic-universe/00-introduction","file":"00-introduction.md","title":"Introduction","type":"chapter","chapter":"0","concepts":["hologram","holographic-model","holographic-paradigm","holographic-analogy","holographic-metaphor","holographic-theory","quantum-physics","near-death-experience","lucid-dreams","parallel-realities","physics-of-consciousness","synchronicity","telepathy","precognition","psychokinesis","esp","altered-states-of-consciousness","archetypal-experiences","collective-unconscious","prefrontal-lobotomy","limbic-system","plasma-physics","scientific-paradigm","belief-addiction"],"people":["David Bohm","Karl Pribram","Albert Einstein","Kenneth Ring","Stanislav Grof","Fred Alan Wolf","F. David Peat","Alain Aspect","Robert Oppenheimer","Joseph McCarthy","Egas Moniz","Walter Freeman","Robert G. Jahn","Brenda J. Dunne","Irvin L. Child","Bernie S. Siegel","Michael Talbot","T. H. Huxley"],"body":"\n# Introduction\n\n## In one paragraph\nTalbot opens with the hologram of Princess Leia from Star Wars and announces the book\u0027s central idea: some scientists are beginning to believe the universe itself is a kind of giant hologram — that everything from snowflakes to electrons may be ghostly projections from a level of reality literally beyond space and time. The idea\u0027s two main architects, physicist David Bohm and neurophysiologist Karl Pribram, arrived at it independently from opposite directions — Bohm from the failures of standard quantum theory, Pribram from the failures of standard brain theory — and both then found it explained a host of further mysteries, from one-eared sound localization to face recognition. Most staggeringly, the model makes sense of phenomena usually placed outside science altogether: telepathy, precognition, psychokinesis, mystical oneness, near-death experiences, lucid dreams, and synchronicities. Talbot marshals supporting evidence — Pribram\u0027s corroborated neurophysiological predictions, Alain Aspect\u0027s 1982 particle experiment, the Princeton PEAR lab\u0027s evidence that minds can affect machines — while also arguing that science\u0027s resistance to the paranormal stems from human prejudice and an addiction to belief. He closes by noting the \"holographic model\" is not yet a theory in the strict sense, that Bohm and Pribram do not endorse everything in the book, and that no math background is needed to follow the quantum physics ahead.\n\n## Core claims\n- Talbot argues there is evidence that our world and everything in it are \"only ghostly images,\" projections from a level of reality beyond both space and time — the universe as a giant hologram, \"a splendidly detailed illusion.\"\n- The idea\u0027s two main architects are introduced as eminent thinkers: Bohm, a University of London physicist, a protégé of Einstein\u0027s and one of the world\u0027s most respected quantum physicists; Pribram, a neurophysiologist at Stanford University and author of the classic neuropsychological textbook *Languages of the Brain*.\n- Bohm\u0027s view (as Talbot presents it) grew from years of dissatisfaction with standard theories\u0027 inability to explain all the phenomena encountered in quantum physics; Pribram\u0027s grew from the failure of standard brain theories to explain various neurophysiological puzzles. Talbot stresses they arrived at their conclusions independently, from two very different directions.\n- Talbot claims the holographic model explains additional mysteries: why no theory, however comprehensive, can account for all natural phenomena; how people with hearing in only one ear determine a sound\u0027s direction; and how we recognize a face not seen for many years even after it has changed considerably.\n- Talbot\u0027s most sweeping claim: the model helps explain \"virtually all paranormal and mystical experiences\" — telepathy, precognition, mystical feelings of oneness with the universe, and psychokinesis (the mind moving physical objects without touch).\n- Talbot states the model has received dramatic experimental support: numerous neurophysiology studies corroborating Pribram\u0027s predictions about memory and perception, and Aspect\u0027s 1982 experiment showing the web of subatomic particles possesses \"what appears to be an undeniable \u0027holographic\u0027 property.\"\n- Talbot argues the character, past achievements, and demonstrated courage of Bohm and Pribram themselves add weight to the hypothesis — backing so controversial an idea with their reputations was not the easy path.\n- Talbot argues the paranormal itself is evidence for the model: decades of findings suggest the \"sticks-and-stones\" high-school picture of reality is wrong; science has mainly ignored these findings, but the volume of evidence makes that no longer tenable. Paranormal events \"cry out\" for a new scientific paradigm, and mounting paranormal evidence \"actually seems to necessitate\" the holographic model\u0027s existence.\n- Talbot claims science is not prejudice-free: scientists are human, subject to the same religious, philosophical, and cultural prejudices as everyone else, and psychic functioning\u0027s elusiveness in the lab has led many scientists to wrongly conclude it does not exist.\n- Siegel\u0027s view (endorsed by Talbot as containing \"a good deal of truth\") is that people are addicted to their beliefs and act like addicts when someone tries to change them — which is why Western science, after centuries of not believing in the paranormal, will not surrender its addiction lightly.\n- Talbot concedes the holographic model is highly controversial, not accepted by a majority of scientists, and still \"an idea in the making\" — a mosaic of viewpoints not yet integrated into a unified whole — so calling it a \"model\" or \"theory\" is loose usage, and Bohm and Pribram themselves do not embrace all the views and conclusions in the book.\n\n## Concepts\n- **Hologram** — a three-dimensional picture made with the aid of a laser, like the projected image of Princess Leia in Star Wars.\n- **Holographic model (of the universe)** — the idea that the universe is a kind of giant hologram: the world and everything in it are ghostly images/projections from a level of reality beyond our own, literally beyond both space and time.\n- **Holographic paradigm / analogy / metaphor / theory** — alternative labels researchers use for the holographic idea because it is still a mosaic of different viewpoints and evidence not yet integrated into a unified whole; Talbot uses all these expressions interchangeably \"for the sake of diversity\" without implying the idea has strict model/theory status.\n- **Quantum physics** — the branch of physics that studies subatomic particles (electrons, protons, and so on).\n- **Psychokinesis** — the ability of the mind to move physical objects without anyone touching them.\n- **Near-death experiences** — per Kenneth Ring, experiences (like death itself) that are \"really nothing more than\" the shifting of a person\u0027s consciousness from one level of the hologram of reality to another.\n- **Lucid dreams** — unusually vivid dreams in which the dreamer realizes he or she is awake; per Fred Alan Wolf, actually visits to parallel realities.\n- **Physics of consciousness** — Wolf\u0027s term for what the holographic model will ultimately allow us to develop, enabling fuller exploration of other-dimensional levels of existence.\n- **Synchronicities** — coincidences so unusual and so psychologically meaningful they don\u0027t seem to be the result of chance alone; per Peat, \"flaws in the fabric of reality\" revealing that our thought processes are far more intimately connected to the physical world than hitherto suspected.\n- **Prefrontal lobotomy** — Egas Moniz\u0027s 1935 procedure: boring into the skull with a surgical pick and severing the prefrontal cortex from the rest of the brain, making the most troublesome patients docile.\n- **Limbic system** — a region of the brain involved in emotions and behavior, on which Pribram did pioneering work in the 1940s.\n- **Telepathy / precognition / mystical oneness** — listed (without individual definitions) among the elusive phenomena generally categorized outside scientific understanding that the holographic model suddenly made sense of.\n- **Archetypal experiences / collective unconscious / altered states of consciousness** — the unusual phenomena Grof concluded only a holographic model of the brain can explain.\n\n## Experiments, examples \u0026 case studies\n- **Star Wars / Princess Leia hologram (opening illustration)** — Luke Skywalker\u0027s adventure begins when a beam of light shoots out of the robot Artoo Detoo and projects a miniature three-dimensional image of Princess Leia begging for Obi-wan Kenobi\u0027s assistance. Talbot uses it to introduce what a hologram is and to frame the thesis: the universe may be an illusion \"no more or less real\" than that image.\n- **Kenneth Ring, 1980, University of Connecticut** — psychologist (and president of the International Association for Near-Death Studies) proposed that near-death experiences can be explained by the holographic model; he believes NDEs, and death itself, are nothing more than the shifting of a person\u0027s consciousness from one level of the hologram of reality to another. Cited by Talbot as an example of the model shedding light on previously inexplicable phenomena.\n- **Stanislav Grof, 1985, Maryland Psychiatric Research Center / Johns Hopkins** — chief of psychiatric research at the Maryland Psychiatric Research Center and assistant professor of psychiatry at Johns Hopkins University School of Medicine; published a book concluding that existing neurophysiological models of the brain are inadequate and only a holographic model can explain archetypal experiences, encounters with the collective unconscious, and other unusual phenomena in altered states of consciousness.\n- **Fred Alan Wolf, 1987, Association for the Study of Dreams annual meeting, Washington, D.C.** — physicist delivered a talk asserting the holographic model explains lucid dreams; he believes such dreams are actually visits to parallel realities and that the model will ultimately yield a \"physics of consciousness\" for exploring these other-dimensional levels of existence.\n- **F. David Peat, 1987, Queen\u0027s University (Canada)** — physicist; in his book *Synchronicity: The Bridge Between Matter and Mind* asserted that synchronicities can be explained by the holographic model, calling them \"flaws in the fabric of reality\" that reveal our thought processes are much more intimately connected to the physical world than previously suspected.\n- **Pribram\u0027s corroborated predictions (neurophysiology, unspecified studies)** — Talbot states that numerous studies in neurophysiology have corroborated Pribram\u0027s various predictions about the holographic nature of memory and perception; presented as experimental support, details deferred to later in the book.\n- **Alain Aspect, 1982, Institute of Theoretical and Applied Optics, Paris** — a landmark experiment by a research team led by physicist Alain Aspect demonstrated that the web of subatomic particles composing our physical universe — \"the very fabric of reality itself\" — possesses what appears to be an undeniable \"holographic\" property. Cited as dramatic experimental support; to be discussed later in the book.\n- **Pribram\u0027s 1940s limbic-system work and Bohm\u0027s 1950s plasma physics** — early-career achievements cited as credentials: Pribram did pioneering work on the limbic system (brain region involved in emotions and behavior); Bohm\u0027s 1950s plasma physics work is \"considered landmark.\" Talbot offers these accomplishments as weight behind the holographic hypothesis.\n- **Bohm, Oppenheimer, and the McCarthy hearings, 1951** — as a graduate student Bohm did doctoral work with Robert Oppenheimer; when Oppenheimer came under scrutiny of Senator Joseph McCarthy\u0027s Committee on Un-American Activities, Bohm was called to testify against him and refused. He consequently lost his job at Princeton, never taught in the United States again, and moved first to Brazil and then to London. Talbot presents this as evidence of the courage that lends credibility to Bohm\u0027s backing of the holographic idea.\n- **Egas Moniz and the lobotomy era, 1935 onward** — Portuguese neurologist Moniz devised the prefrontal lobotomy (boring into the skull with a surgical pick, severing the prefrontal cortex) as a supposed perfect treatment for mental illness that made troublesome patients docile; by the 1940s it was so popular Moniz won the Nobel Prize. In the 1950s it became a tool, \"like the McCarthy hearings,\" to stamp out cultural undesirables — U.S. surgeon Walter Freeman, its most outspoken American advocate, wrote unashamedly that lobotomies \"made good American citizens\" out of society\u0027s misfits, \"schizophrenics, homosexuals, and radicals.\" Context for Pribram\u0027s stand.\n- **Pribram\u0027s refusal to allow lobotomies (Jacksonville, then Yale)** — as a young neurosurgeon in Jacksonville, Florida, Pribram opposed the accepted medical wisdom of the day and refused to allow any lobotomies in the ward he oversaw; he maintained the controversial stance later at Yale, where his then-radical views very nearly cost him his job. Talbot pairs this with Bohm\u0027s McCarthy episode as a \"test of mettle\" that adds weight to the holographic idea.\n- **Robert G. Jahn and Brenda J. Dunne, 1987, Princeton Engineering Anomalies Research Laboratory, Princeton University** — physicist Jahn and clinical psychologist Dunne announced that after a decade of rigorous experimentation their lab had accumulated \"unequivocal evidence\" that the mind can psychically interact with physical reality — specifically that through mental concentration alone, human beings can affect the way certain kinds of machines operate. Talbot says this finding cannot be accounted for by the standard picture of reality but can be explained by the holographic view.\n- **Talbot\u0027s anecdote of the skeptical physicist** — Talbot asked a well-known physicist (reputed to be skeptical of the paranormal) about a particular parapsychological experiment; the physicist declared with great authority that the results revealed \"no evidence of any psychic functioning whatsoever.\" Talbot accepted the judgment without question, then later examined the results himself and was stunned to find the experiment had produced very striking evidence of psychic ability. Lesson drawn: even well-known scientists have biases and blind spots.\n- **Irvin L. Child on the Maimonides ESP dream experiments** — in a recent article in *American Psychologist*, Yale psychologist Child examined how a well-known series of ESP dream experiments conducted at the Maimonides Medical Center in Brooklyn, New York, had been treated by the scientific establishment. Despite dramatic evidence supportive of ESP, Child found the work almost completely ignored by the scientific community, and in the handful of scientific publications that commented, the research had been so \"severely distorted\" that its importance was completely obscured.\n- **Bernie S. Siegel on belief addiction** — Yale surgeon and author of the best-selling *Love, Medicine, and Miracles*; commenting on resistance to his own unorthodox views on health, Siegel asserts people are addicted to their beliefs, which is why they act like addicts when you try to change a belief. Talbot generalizes this to explain why civilization\u0027s greatest insights are first met with passionate denial and why science resists the paranormal.\n- **Talbot\u0027s psychic family (personal testimony)** — Talbot says he grew up in a psychic family and from an early age experienced firsthand many of the phenomena in the book; he will occasionally relate his own experiences where relevant, acknowledging they can only be viewed as anecdotal evidence, but for him they are the most compelling proof \"that we live in a universe we are only just beginning to fathom.\"\n\n## Key quotes\n- \"some scientists are beginning to believe the universe itself is a kind of giant hologram, a splendidly detailed illusion no more or less real than the image of Princess Leia that starts Luke on his quest.\" — Talbot, opening paragraph, stating the book\u0027s thesis.\n- \"our world and everything in it—from snowflakes to maple trees to falling stars and spinning electrons—are also only ghostly images, projections from a level of reality so beyond our own it is literally beyond both space and time.\" — Talbot, restating the thesis in the second paragraph.\n- \"it helped explain virtually all paranormal and mystical experiences\" — Talbot, on what the growing number of scientists embracing the model quickly realized.\n- \"flaws in the fabric of reality\" — F. David Peat\u0027s characterization of synchronicities, from his 1987 book, as quoted by Talbot.\n- \"the web of subatomic particles that compose our physical universe—the very fabric of reality itself—possesses what appears to be an undeniable \u0027holographic\u0027 property\" — Talbot, describing what Aspect\u0027s 1982 Paris experiment demonstrated.\n- lobotomies \"made good American citizens\" out of society\u0027s misfits, \"schizophrenics, homosexuals, and radicals.\" — surgeon Walter Freeman, quoted by Talbot in the lobotomy-era passage that frames Pribram\u0027s courage.\n- \"no evidence of any psychic functioning whatsoever.\" — the well-known skeptical physicist to Talbot, in the anecdote showing that scientists have biases and blind spots.\n- the research had been so \"severely distorted\" its importance was completely obscured. — Irvin L. Child\u0027s finding (in *American Psychologist*) on how publications treated the Maimonides ESP dream experiments.\n- \"We are addicted to our beliefs and we do act like addicts when someone tries to wrest from us the powerful opium of our dogmas.\" — Talbot, extending Bernie Siegel\u0027s observation on belief addiction.\n- \"for me they have provided the most compelling proof of all that we live in a universe we are only just beginning to fathom\" — Talbot, on his own firsthand psychic experiences from growing up in a psychic family.\n- \"do not mean to imply that the holographic idea has achieved the status of a model or theory in the strictest sense of these terms.\" — Talbot\u0027s caveat on his interchangeable use of paradigm/analogy/metaphor/model/theory.\n\n## Thread\nThe Introduction lays out the whole book in miniature: a two-track origin story (Bohm from quantum physics, Pribram from the brain) converging on one radical picture of reality, which Talbot will then extend through other researchers to cover memory, perception, the paranormal, near-death experiences, dreams, and mysticism. It establishes the book\u0027s evidentiary strategy — lab results (Pribram\u0027s corroborated predictions, Aspect 1982, Jahn and Dunne), the credibility and courage of the originators, and the sheer accumulated weight of paranormal findings — alongside its polemical frame that science\u0027s rejection of the paranormal is prejudice and belief-addiction rather than objectivity. It also sets the reader\u0027s expectations: the model is controversial and unfinished, Bohm and Pribram don\u0027t endorse everything ahead, Talbot will add personal anecdotes, and no scientific background is required.\n\n## Connections\n- Forward references within the book (chapters unnumbered here): Pribram\u0027s neurophysiological findings on memory and perception and Aspect\u0027s 1982 experiment \"will also be discussed in the book\"; the elusiveness of psychic functioning in the lab \"will also be discussed\"; the book will show both how the model accounts for the paranormal and how paranormal evidence necessitates the model; Talbot will occasionally relate his own psychic experiences where relevant.\n- The chapter closes at the boundary of Part I, \"A Remarkable New View of Reality,\" which opens with a T. H. Huxley epigraph about sitting down before fact like a little child.\n- Possible cross-book links (speculative only): the universe-as-\"splendidly detailed illusion\"/projection idea invites comparison with the rendered-reality framing in *The Simulation Hypothesis* (Virk) and the consciousness-first reality model of *My Big TOE* (Campbell); the \"mystical feelings of oneness with the universe\" the model claims to explain echo themes in *The Power of Now* (Tolle); the treatment of scientists\u0027 belief-addiction and the establishment\u0027s dismissal of anomalous evidence resonates with *American Cosmic* (Pasulka).\n"},{"id":"holographic-universe/00-map","file":"00-map.md","title":"The Holographic Universe — Book Map","type":"map","chapter":null,"concepts":[null],"people":[null],"body":"\n# The Holographic Universe — Michael Talbot (1991): Book Map\n\n## The thesis in one page\n\nTalbot\u0027s central claim is that \"some scientists are beginning to believe the universe itself is a kind of giant hologram, a splendidly detailed illusion\" — that our world and everything in it, \"from snowflakes to maple trees to falling stars and spinning electrons,\" are ghostly images, projections from a level of reality literally beyond both space and time. The idea has two architects who, Talbot stresses, arrived at it independently from opposite directions. Physicist David Bohm — a University of London professor, protégé of Einstein, and one of the world\u0027s most respected quantum physicists — came to it from years of dissatisfaction with standard quantum theory\u0027s inability to explain what physics kept finding: interconnectedness in twin particles, plasmas that behave like organisms, nonlocality. His mature formulation holds that visible everyday reality (the \"explicate order\") continuously unfolds out of and enfolds back into a deeper generative level (the \"implicate order\") — a dynamic \"holomovement\" in which everything, including consciousness, is one unbroken whole. Neurophysiologist Karl Pribram, of Stanford, came to it from the failure of standard brain theories: Lashley\u0027s rat experiments showed memory survives no matter what brain tissue is removed, and the hologram\u0027s \"whole in every part\" property gave Pribram the mechanism for a brain that stores memory and processes vision as distributed interference patterns, using the same Fourier mathematics holography uses.\n\nWelded together (as chapter 2 does explicitly), the two halves say: the brain is a hologram enfolded in a holographic universe — our brains mathematically construct objective reality by interpreting frequencies projected from a deeper, dimension-transcending order. What does \"reality as hologram\" claim to explain? Talbot\u0027s list starts modest — why no theory can account for all natural phenomena, how people with hearing in one ear localize sound, how we recognize a long-unseen and changed face — and then makes the book\u0027s most sweeping move: the model \"helped explain virtually all paranormal and mystical experiences,\" including telepathy, precognition, psychokinesis, mystical oneness with the universe, near-death experiences, lucid dreams, and synchronicities. Talbot argues the traffic runs both ways: the model accounts for the paranormal, and the accumulated weight of paranormal evidence \"actually seems to necessitate\" the model. He frames science\u0027s resistance as human prejudice and \"belief addiction\" (Siegel\u0027s phrase) rather than objectivity — while conceding up front that the holographic idea is controversial, unfinished, \"an idea in the making,\" and that Bohm and Pribram themselves do not endorse everything in the book.\n\n## How the argument builds\n\nThe book runs in three parts, and each chapter explicitly hands off to the next; the escalation is deliberate — lab neuroscience → physics → psychology → medicine → miracles → auras → time → space/NDEs/UFOs → ancient traditions and the future.\n\n**Part I — A Remarkable New View of Reality** builds the model itself. Chapter 1 establishes the brain-side half through Pribram\u0027s decades of work (Lashley\u0027s unerasable memories, the DeValoises\u0027 Fourier findings, Pietsch\u0027s shuffled salamander brains) and ends on the pivot that powers the whole book: if the picture of reality in our brains is a hologram, what is it a hologram *of*? — the question that leads Pribram to Bohm. Chapter 2 supplies the cosmos-side half through Bohm\u0027s intellectual biography (plasmas, the quantum potential, the ink-drop-in-glycerine device, the implicate order), backs it with Aspect\u0027s 1982 nonlocality experiment, then explicitly fuses the two: brains construct concrete reality out of a frequency domain that is itself a projection from the implicate order. Its closing lines announce the plan for the rest of the book — exploring the model\u0027s effect on other fields, \"beginning with Part II.\"\n\n**Part II — Mind and Body** cashes the model out in escalating applications. Chapter 3 makes the first cash-out in psychology: collective unconscious, ESP dreams, psychosis as unmanaged glimpses of the implicate, Grof\u0027s transpersonal LSD data, MPD, synchronicity — and flags the next chapter twice via MPD\u0027s per-personality physiological changes. Chapter 4 dissolves the mind/body border (imagery therapy, placebo, multiples switching biological states, hypnotic cure of genetic disease, Lourdes, stigmata), deliberately restricting itself to phenomena that \"do not seem to violate any of the known laws of physics\" — explicitly setting up chapter 5, which crosses that line: psychokinesis in the lab (PEAR), the convulsionaires\u0027 invulnerability, fire immunity, materialization, and whole-reality transformations, ending in the claim that physical laws are habits and consensus reality a collectively sustained \"reality-field.\" Chapter 6 turns from what the mind can do to what it can perceive: the human energy field/aura as a glimpse of the frequency domain, Hunt\u0027s electromyographic measurements, the field as the body\u0027s blueprint (\"its own version of an implicate order\") — and hands off directly to Part III: if even time unfolds out of the implicate, the division into past, present, and future is another construct of the mind.\n\n**Part III — Space and Time** demolishes both coordinates and then closes the circle. Chapter 7 takes time: retrocognition and psychic archaeology (the past persists in the implicate), precognition and its free-will resolution (Loye\u0027s parallel holographic futures and \"hololeaps\"), then reincarnation research (Whitton, Stevenson) as evidence that a \"metaconscious\" stratum of the psyche scripts our lives and even our bodies; it closes promising \"still other shimmerings.\" Chapter 8 takes space: OBEs and NDEs as evidence that consciousness is nonlocal, the afterlife as a thought-built holographic realm differing from ours in degree not kind, then Marian visions and UFOs as \"omnijective\" phenomena — deferring the question of a \"coming confluence between science and the spiritual\" to the close. Chapter 9 answers it by looking backward and forward at once: the model\u0027s two central features (implicate/explicate structure, whole-in-every-part nonlocality) were prefigured in virtually all the world\u0027s mystical and shamanic traditions; science needs restructuring toward participation and acceptance of the psychic; and rising NDEs, Marian visions, and UFO encounters may signal an evolutionary \"shamanizing of modern humanity\" — a return to the plastic, dreamtime-like reality the aborigines say the earth once was. The final line reframes the whole book: \"We are, as the aborigines say, just learning how to survive in infinity.\"\n\n## Chapter index\n\n**[00-introduction.md] — Introduction.** Opens with the Princess Leia hologram and states the thesis: the universe as a giant hologram, with Bohm and Pribram as its independent two-track architects. It argues the model explains \"virtually all paranormal and mystical experiences,\" previews the supporting evidence (Pribram\u0027s corroborated predictions, Aspect 1982, the PEAR lab), and mounts the book\u0027s polemical frame — science\u0027s rejection of the paranormal as prejudice and belief-addiction (the skeptical-physicist anecdote, Child on the ignored Maimonides experiments, Siegel on belief addiction). Its strongest material is the origin-story credentialing: Bohm\u0027s refusal to testify against Oppenheimer, Pribram\u0027s refusal to allow lobotomies. Its role: the whole book in miniature, plus the honest caveats — model-not-theory, Bohm/Pribram don\u0027t endorse everything, Talbot\u0027s own experiences are anecdotal.\n\n**[01-the-brain-as-hologram.md] — Ch 1, The Brain as Hologram.** Traces how Pribram concluded memory is distributed, not localized: Penfield\u0027s engram evidence undone by Lashley\u0027s rat surgeries, Pribram\u0027s own clinical observations, and the mid-1960s hologram article that hit him \"like a thunderbolt.\" Extends the model to vision, memory capacity, recall, recognition, skill transfer, phantom limbs, and the brain-constructed \"world-out-there,\" grounded in Gabor\u0027s Fourier mathematics. Strongest material: Lashley\u0027s unerasable maze memories, Pietsch\u0027s 700 salamander-brain operations, the DeValoises\u0027 1979 finding that visual-cortex cells respond to Fourier translations of patterns. Role: the brain-side pillar, ending on the pivot question — what is reality a hologram *of*? — that leads to Bohm.\n\n**[02-the-cosmos-as-hologram.md] — Ch 2, The Cosmos as Hologram.** Bohm\u0027s intellectual biography, from quantum strangeness (wave-particle duality, the EPR paradox) through plasmas and plasmons, the quantum potential and nonlocality, to the mature implicate/explicate framework and the holomovement — reality as undivided wholeness, consciousness as a subtler form of matter, space as a plenum of energy. Strongest material: the fish-and-two-cameras analogy for twin-particle correlation, the ink-drop-in-glycerine device, and the Aspect 1982 experiment, which Talbot says doesn\u0027t prove Bohm\u0027s model but gives it \"tremendous support.\" Role: the cosmos-side pillar and the explicit weld — the brain as a hologram enfolded in a holographic universe — plus the launch of Part II.\n\n**[03-the-holographic-model-and-psychology.md] — Ch 3, The Holographic Model and Psychology.** Applies the model to anomalous psychology: Jung\u0027s collective unconscious (the solar-phallus patient) explained by implicate interconnectedness; Ullman\u0027s Maimonides ESP-dream results and the wisdom of dreams; psychosis and mania as unmanaged glimpses of the implicate; Wolf\u0027s lucid dreams as \"real-image\" holograms and parallel-universe visits; Grof\u0027s thousands of LSD and holotropic sessions (womb memories, ancestral and racial memories, the Ladislav/Kromeriz case); MPD as holographic fragmentation; and synchronicity, which Davies and Peat now read through nonlocality. Strongest material: the Grof corpus and the per-personality brain-wave changes in multiples. Role: the model\u0027s first big cash-out beyond physics and neuroscience, and the bridge (via MPD physiology) to health.\n\n**[04-i-sing-the-body-holographic.md] — Ch 4, I Sing the Body Holographic.** Argues the mind/body cannot distinguish neural holograms of imagined reality from experienced reality, so images and beliefs produce dramatic, specific physiological change: Simonton\u0027s and Achterberg\u0027s imagery work, the placebo effect (sham angina surgery, the Wright/Krebiozen tragedy, placebo LSD trips), multiples switching allergies, diabetes, and eye color \"as rapidly as the flutter of a deck of cards,\" the belief typology (Schwarz, Dajo, Mohotty), hypnotic cure of the genetic Brocq\u0027s disease, Michelli\u0027s Vatican-documented bone regeneration at Lourdes, and stigmata as \"ejection of psychophysical structures.\" Closes with acupuncture microsystems and hand-pattern diagnostics as the body\u0027s own part-contains-whole evidence. Role: mapping the *range* of mind-over-body, deliberately staying inside known physics to set up chapter 5.\n\n**[05-a-pocketful-of-miracles.md] — Ch 5, A Pocketful of Miracles.** Recasts miracles as latent human psychokinesis: PEAR\u0027s REG and pinball data (small but real PK in most people, with stable \"signatures\"), the San Gennaro blood, the Jansenist convulsionaires\u0027 invulnerability documented by Montgeron, fire immunity from the Camisards to kahuna lava walks, and materialization (Kamro\u0027s blood, Sai Baba, Talbot\u0027s own poltergeist). Explains what PK alone cannot via Grof\u0027s direct intervention in the implicate \"generative matrix\": the laws of physics as habits, consensus reality as a \"reality-field,\" the universe as Tiller\u0027s holodeck. Strongest material: the PEAR corpus and the Saint-Médard documentation. Role: the boldest escalation — from mind-over-body to mind-over-reality — setting up the later treatment of space, time, and self as constructs.\n\n**[06-seeing-holographically.md] — Ch 6, Seeing Holographically.** Since ordinary vision is already a brain-made construction (the blind spot, temporal-lobe editing), aura-seers may be glimpsing the frequency domain: Brennan\u0027s and Dryer\u0027s diagnostic readings, Karagulla\u0027s secret network of doctors with \"higher sense perception,\" Krieger\u0027s therapeutic touch, and Valerie Hunt\u0027s electromyograph measurements (100–1600 cps radiation strongest at the chakra points, the \"chaos holograph pattern\"). Proposes the energy field as the body\u0027s blueprint — illness appears there first — and, via Libet/Feinstein and Hunt\u0027s EMG-before-EEG data, that the mind may reside in the field, not the brain. Strongest material: Hunt\u0027s instrumented work and Karagulla\u0027s hospital-verified \"Diane\" diagnoses. Role: carries the model from healing into perception, and hands Part III its opening premise — linear time as a mental construct.\n\n**[07-time-out-of-mind.md] — Ch 7, Time Out of Mind.** In a holographic universe past and future stay \"recorded\" in the implicate: retrocognition and psychic archaeology (Ossowiecki\u0027s verified Stone Age details, Emerson and McMullen\u0027s longhouse), precognition (Schmidt\u0027s billion-to-one machine results, the Maimonides dream lab, Croiset\u0027s chair tests), and the free-will resolution — Loye\u0027s parallel holographic futures and \"hololeaps,\" Bohm\u0027s \"shadows cast deep in the implicate order,\" the plastic future of the Titanic premonitions. Its second half reads Whitton\u0027s interlife regressions and Stevenson\u0027s birthmark-carryover children as evidence a metaconscious self scripts life and body — echoed by kahuna, Tibetan, Sufi, and Cayce traditions of \"thought as builder\" — then closes with mass future-progressions, retroactive PK, and the Moberly–Jourdain walk into 1789 Versailles. Role: extends nonlocality from space to time and shifts the book\u0027s claim from mind *perceiving* the hologram to mind *authoring* it.\n\n**[08-traveling-in-the-superhologram.md] — Ch 8, Traveling in the Superhologram.** Argues location itself is an illusion, using OBEs (Maria\u0027s tennis shoe, Sabom\u0027s cardiac-patient comparison, Monroe, Tart\u0027s Miss Z) and above all NDEs — worldwide, demographically flat, cross-culturally consistent, veridical even in the blind, occurring on flat EEGs. Reads the NDE\u0027s features (thought-sculpted bodies, the realm of light, the instantaneous holographic life review, \"thought balls\" of total knowledge, life plans and flashforwards) as a shift of consciousness into the frequency-like levels of the hologram, corroborated by Swedenborg, the Sufis\u0027 alam almithal, Sri Yukteswar, Sri Aurobindo, and shamanic dreamtime traditions. Extends the logic to Marian visions and UFOs as \"omnijective\" — real yet mind-created. Role: completes the demolition of space-time and fuses nearly every earlier thread into \"the dream is dreaming itself.\"\n\n**[09-return-to-the-dreamtime.md] — Ch 9, Return to the Dreamtime.** Shows the model is an ancient idea rediscovered: the Tibetan void/nonvoid, Brahman/maya, the Kabbalah\u0027s illusory projection, Indra\u0027s net, Fa-Tsang\u0027s mirrored candle, Black Elk\u0027s \"anywhere is the center of the world\" — with Leibniz\u0027s monads possibly looping Hua-yen intuition forward into the calculus that enabled Gabor\u0027s hologram. Surveys the model\u0027s technical fruits (Zuccarelli\u0027s holophonic sound, Prigogine\u0027s dissipative structures, holographic computing), then argues science needs restructuring: accept psychic and spiritual phenomena, broaden what counts as evidence, replace detached objectivity with participation. Ends speculatively: rising NDEs, Marian visions, and UFO encounters as \"the shamanizing of modern humanity,\" pointing toward a return of the plastic dreamtime. Role: the closing of the circle and the book\u0027s program and prophecy.\n\n## The evidentiary strategy\n\nTalbot builds his case from four recurring kinds of evidence, deliberately braided together:\n\n- **Laboratory experiments and instrumented measurements** — Lashley\u0027s rat surgeries and the DeValoises\u0027 Fourier work (ch 1); Aspect\u0027s 1982 twin-photon experiment (ch 2); the Maimonides dream lab, Schmidt\u0027s random-event machines, Puthoff and Targ\u0027s remote viewing, and PEAR\u0027s REG/pinball trials (chs 3, 5, 7); Achterberg\u0027s cell-specific imagery study and Quinn\u0027s double-blind therapeutic-touch study (chs 4, 6); Hunt\u0027s electromyograph data (ch 6); Schmidt–Schlitz retroactive PK (ch 7). This is the book\u0027s front line: Talbot leads with Bohm\u0027s and Pribram\u0027s credentials and with results he presents as statistically overwhelming (\"an incontrovertible aberration of substantial proportions,\" per Jahn and Dunne).\n- **Clinical cases and physician testimony** — Simonton\u0027s Frank, Mason\u0027s Brocq\u0027s-disease cure, the Vatican-documented Michelli regeneration, Braun\u0027s and Howland\u0027s multiples, Karagulla\u0027s HSP doctors and \"Diane,\" Sabom\u0027s cardiac comparison, Morse\u0027s child NDE study, Whitton\u0027s and Stevenson\u0027s reincarnation files. The book leans on the professional standing of the reporters (JAMA\u0027s praise of Stevenson\u0027s \"painstakingly and unemotionally collected\" data is quoted approvingly).\n- **Historical and religious records** — Penfield\u0027s and Bede\u0027s-era accounts, Montgeron\u0027s four volumes on the Saint-Médard convulsionaires (with Hume and Voltaire as period witnesses), Thurston\u0027s stigmata and inedia cases, San Gennaro, the Camisards, Swedenborg\u0027s twenty volumes, the Tibetan and Egyptian books of the dead, and chapter 9\u0027s whole survey of mystical traditions. Talbot\u0027s framing device here is convergence: many independent witnesses, cultures, and centuries reporting the same structures (\"when many reliable individuals independently report the same kind of phenomena, it is time science takes cognizance of it,\" Karagulla).\n- **Personal anecdote** — Talbot\u0027s psychic family, his poltergeist and its materializations, the umbrella incident, his aura sight and readings with Carol Dryer, his teenage OBE. He flags these himself from the Introduction on: they \"can only be viewed as anecdotal evidence,\" though for him they are \"the most compelling proof of all.\"\n\nThe book is explicit about how it wants this mix weighed. Chapter 9 states the standard outright: mass anecdotal testimony about important matters should count as evidence, quoting Stevenson — \"I believe it is better to learn what is probable about important matters than to be certain about trivial ones\" — and accusing science of a double standard (the unproven Big Bang accepted as fashionable; the NDE realm attacked as unfashionable). And the book carries its own caveats throughout: the holographic idea \"has [not] achieved the status of a model or theory in the strictest sense\" (Introduction); Bohm and Pribram do not embrace all the views and conclusions in the book; Jahn and Dunne do not identify themselves with the holographic model and differ from Bohm \"in several significant ways\" (ch 5); the reincarnation chapters state plainly that \"the evidence does not prove that reincarnation exists, nor is it the intention of this book to make such an argument\" (ch 7); Haraldsson admits he cannot conclusively rule out sleight of hand in the Sai Baba material (ch 5); and chapter 4 keeps its own counterpoints (vitamin C cures scurvy and insulin works for skeptical diabetics — not everything is placebo; not all drug side effects are placebo, consult a physician).\n\n## Reading it critically\n\nThe notes themselves record the following tensions and caveats — the book\u0027s own, and the transcription\u0027s:\n\n- **Contested scientific status, stated in the text.** The Introduction concedes the model is highly controversial, not accepted by a majority of scientists, and \"an idea in the making.\" Chapter 1 reports that most scientists remain unpersuaded by the holographic brain, that rival theories (brain chemicals, electrical fluctuations) also have evidence, and quotes skeptic Frank Wood: \"there are precious few experimental findings for which holography is the necessary, or even preferable, explanation.\" Chapter 2 records that the reaction to Bohm\u0027s 1952 quantum-potential proposal was mainly negative — \"little more than heresy\" — that the Aharonov-Bohm effect is still occasionally disputed in print, that some physicists dismiss the zero-point energy calculation as error, that Lee Smolin does not find Bohm\u0027s theory \"very compelling, physically,\" and that Abner Shimony admits he doesn\u0027t understand it; Bohm himself answers the untestability charge only by pointing at superstring theory\u0027s similar horizon. Aspect\u0027s experiment is expressly framed as support, not proof.\n- **Principals who decline parts of the thesis.** Bohm and Pribram do not endorse everything in the book (Introduction). Jahn and Dunne\u0027s theory \"differs from Bohm\u0027s thinking in several significant ways\" and they do not identify with the holographic model (ch 5). Bohm prefers not to speculate on specific miracles; Pribram insists \"I don\u0027t believe anything goes\"; and Lyall Watson is no longer convinced any current physics, including the holographic idea, explains supernormal abilities (ch 5).\n- **Claims the book itself marks as unproven or self-limiting.** Chapter 7: reincarnation evidence is suggestive, explicitly not proof; the psychiatry textbook it cites acknowledges apparent past-life memories while rejecting rebirth. Chapter 5: once two or more people can create a shared reality, consensus verification fails as a litmus test — Talbot concedes the reality-field thesis \"can never be proved\" and becomes a matter of personal philosophy (Globus admits \"a nice theory postulates existence\" as bias). Chapter 5\u0027s neutrino-mass story remains unresolved (Soviet vs. U.S. laboratory split). Chapter 4: Simonton\u0027s critics note his patients were self-selected fighters; the British-vs-American aspirin discrepancy is left an open question; Phillips\u0027s appearing/disappearing tumors are of unspecified kind; reflexology is \"not experimentally vindicated\" and iridology studies are \"extremely conflicting\" (chs 4, 6).\n- **The participatory-reality caveat cuts against the book\u0027s own witnesses.** Chapter 6 warns that psychics may be partly creating the structures they claim to discover: Brennan\u0027s seven layers grow clearer the more clients understand them, the tantras\u0027 authors perceived only three, and the Sanskrit letters some psychics see in chakras may be structures imposed by ancient Hindu belief. Talbot explicitly says psychic testimony is presented as evidence to be taken seriously, not established scientific fact, and that some claims (e.g., which aura layer produces thought-images) cannot yet be confirmed or denied. Chapter 8 similarly ends with competing, unreconciled readings of UFOs (psychic projection vs. extradimensional intelligence vs. both), Talbot conceding \"probably no single explanation accounts for all aspects,\" and leaving the identity of the beings of light an open question. Chapter 9 files Strieber\u0027s and McKenna\u0027s evolutionary visions as speculation and offers the dreamtime-return scenario \"in the spirit of pure speculation,\" while noting holographic computing remains a refinement of the mechanistic approach.\n- **OCR/transcription gaps flagged in the notes.** Chapter 1: the source scan rendered \"engram\" as \"engrains.\" Chapter 4: the Breznitz soldiers passage is fragmentary in the scan. Chapter 7: the Ossowiecki session date reads \"February 14, 19S5\" (the digit is corrupt — 1935 or 1955); the Evans-Wentz fairy-faith section is cut mid-sentence; and the connecting passage on dream-divination traditions (Pharaoh\u0027s dream, the \"primal ocean\" remark) survives only partially, beginning mid-sentence.\n- **The book\u0027s polemic is a frame, not a finding.** The claims that science\u0027s rejection of the paranormal stems from prejudice and belief-addiction, that a \"parapsychological Rosa Parks\" is needed, and that the Big Bang enjoys a fashionable double standard are Talbot\u0027s arguments about the scientific community, presented as such in the Introduction and chapter 9 — and they sit alongside his acknowledgment that psychic functioning\u0027s elusiveness in the laboratory is real and is part of why scientists doubt it.\n"},{"id":"holographic-universe/01-the-brain-as-hologram","file":"01-the-brain-as-hologram.md","title":"The Brain as Hologram","type":"chapter","chapter":"1","concepts":["hologram","holography","interference-pattern","engram","holographic-brain-model","localized-memory","distributed-memory","laser-coherent-light","whole-in-every-part","virtual-image","world-out-there","phantom-limb","feature-detectors","fourier-transforms","frequency-domain","frequency-analyzer","osmic-frequencies","recognition-holography","interference-holography","associative-memory","photographic-memory","eidetic-memory","transference-of-learned-skills","maya","wave-forms"],"people":["Karl Pribram","Wilder Penfield","Karl Lashley","John von Neumann","Marcel Proust","Pieter van Heerden","Daniel Pollen","Michael Tractenberg","Elizabeth","Georg von Bekesy","Paul Pietsch","Dennis Gabor","Jean B. J. Fourier","Russell DeValois","Karen DeValois","Hermann von Helmholtz","Nikolai Bernstein","Frank Wood","Larry Dossey","Richard Restak","David Bohm"],"body":"\n# Ch 1 — The Brain as Hologram\n\n## In one paragraph\nThe chapter traces how neuroscientist Karl Pribram came to propose that the brain works like a hologram. The puzzle that launched him was where memory is stored: the reigning view held that each memory sits in a specific brain location (an \"engram\"), backed by Penfield\u0027s stimulation experiments, but Karl Lashley\u0027s decades of rat-brain surgery showed memory survives no matter what tissue is removed — implying memory is distributed, not localized. Reading a 1960s Scientific American article on holograms gave Pribram his mechanism: because every fragment of holographic film contains the whole image, every part of the brain could contain the whole memory (he published his first article on the holographic brain in 1966). Pribram then extended the holographic model to vision, memory capacity, recall, recognition, learned-skill transfer, and the way the brain projects internal states into a \"world-out-there,\" and found mathematical grounding in Gabor\u0027s use of Fourier transforms plus experimental support (notably the DeValoises\u0027 1979 work). By the chapter\u0027s end Pribram is left asking what reality itself is a hologram *of* — a question that leads him to physicist David Bohm.\n\n## Core claims\n- Talbot presents Pribram\u0027s central thesis: memory is not localized in specific brain cells but distributed throughout the brain as a whole.\n- Pribram\u0027s view is that the brain physically operates on holographic principles — encoding information as interfering wave forms rather than storing it bit-by-bit or in fixed locations.\n- Talbot argues the \"whole in every part\" property of holograms explains why large portions of brain tissue can be destroyed without erasing specific memories or specific visual abilities.\n- Pribram holds that vision, like memory, is distributed and holographic, which explains the absence of any one-to-one correspondence between an image the eye sees and the brain\u0027s electrical activity.\n- Pribram\u0027s view is that the wavelike interference patterns created by densely packed neurons\u0027 branching electrical signals are the physical substrate giving the brain its holographic properties.\n- Talbot argues the holographic model additionally explains memory\u0027s vast capacity, recall and forgetting, associative memory, recognition of familiar things, photographic memory, transfer of learned skills, phantom-limb sensations, and the projection of inner experience into an external \"world-out-there.\"\n- Pribram\u0027s view (supported by Gabor\u0027s mathematics and the DeValoises\u0027 experiments) is that the brain uses Fourier mathematics — the same math holography uses — to convert sensory images into a language of wave forms.\n- Talbot notes the model remains controversial; most scientists are said to remain unpersuaded, and rival theories (brain chemicals, electrical fluctuations) also have evidence. Pribram counters skeptics by noting he has a book in press with well over 500 references to supporting data.\n- Pribram\u0027s final claim in the chapter is the radical one: taken to its logical conclusion, the model suggests objective reality may not exist as we believe — that what is \"out there\" may be a frequency domain, a \"resonating symphony of wave forms,\" transformed into the familiar world only after entering our senses.\n\n## Concepts\n- **Hologram** — a three-dimensional image produced by splitting a laser into two beams, bouncing one off an object, and recording the interference pattern where the beams recollide on film; re-illuminating the film with laser light reconstructs the 3-D image.\n- **Holography** — the technique/photography of making holograms; made practical only after the invention of the laser.\n- **Interference pattern** — the crisscrossing arrangement of crests and troughs produced when two or more waves (water, light, radio) ripple through each other; the encoded, blur-like image recorded on holographic film.\n- **Engram** — the hypothesized specific memory trace stored at a specific location in the brain cells; no one knew what it was made of (neuron? special molecule?). (OCR in source rendered it \"engrains.\")\n- **Localized vs. distributed memory** — localized: each memory sits in a fixed brain site like a book on a shelf; distributed: each memory is spread throughout the brain as a whole, so no single site holds it.\n- **Whole in every part** — the holographic property that every fragment of (invisible-to-the-eye) holographic film contains all the information of the whole image, so any piece can reconstruct the entire image (though hazier as it shrinks).\n- **Laser / coherent light** — an extremely pure, coherent form of light especially good at creating interference patterns; \"the perfect pebble and the perfect pond.\"\n- **Virtual image** — an image that appears to be located where it is not (like a mirror image); a hologram\u0027s actual location is in the photographic emulsion on the film, not where it seems to hover.\n- **\"World-out-there\"** — the brain\u0027s construction whereby internal neurophysiological processes are perceived as located outside the body (e.g., seeing a person \"out there\" though the image is on the retina; feeling pain \"in the toe\" though it is a brain process).\n- **Phantom limb** — the sensation, felt by some amputees, that a missing limb is still present, with realistic cramps, pains, and tinglings; possibly the holographic memory of the limb still recorded in the brain\u0027s interference patterns.\n- **Feature detectors** — highly specialized visual-cortex cells (from 1960s research) each geared to fire for a specific pattern, e.g., some for horizontal lines, others for vertical lines.\n- **Fourier transforms** — equations (from calculus invented by Jean B. J. Fourier) that convert any pattern into a language of simple waves and convert those wave forms back into the original pattern.\n- **Frequency domain** — Pribram\u0027s speculative notion that what is \"out there\" is really a domain of wave-form frequencies, transformed into the perceived world only after entering the senses.\n- **Frequency analyzer** — a system that decomposes input into its frequency components; Pribram came to view the senses this way.\n- **Osmic frequencies** — the frequencies on which the sense of smell is said to be based.\n- **Recognition holography** — a holographic technique (van Heerden, 1970) using a focusing mirror; a similar second object produces a bright point of light whose sharpness indicates degree of similarity, usable as a mechanical recognition system.\n- **Interference holography** — a technique where an object is viewed through film holding its own image; changed features reflect light differently, revealing simultaneously what has changed and what stayed the same; sensitive enough to detect finger pressure on granite.\n- **Associative memory** — the tendency for one thing to evoke a memory of an associated thing; modeled by recording two objects together on one film so illuminating one reconstructs the image of the other.\n- **Photographic / eidetic memory** — the ability to scan a scene briefly then \"project\" a vivid mental image of it; explained as access to unusually large regions of one\u0027s memory holograms.\n- **Transference of learned skills** — the ability to perform a learned action with a body part never trained for it (e.g., writing your name with your elbow), explained by the brain storing skills as flexible wave forms.\n- **Maya** — the mystics\u0027 term, cited by Pribram, for reality as illusion.\n\n## Experiments, examples \u0026 case studies\n1. **Wilder Penfield (Canadian neurosurgeon, 1920s)** — While operating on conscious epileptic patients (the brain feels no pain once scalp/skull are anesthetized), he electrically stimulated the temporal lobes and patients vividly reexperienced past episodes. Specific cases: one man relived a conversation with friends in South Africa; a boy heard his mother on the telephone and, after several touches of the electrode, could repeat her entire conversation; a woman found herself in her kitchen and could hear her son playing outside. Even when Penfield tried to mislead patients about which area he was stimulating, touching the same spot always evoked the same memory. Talbot says this was taken as convincing evidence that specific memories have specific brain locations (support for the engram theory). In *The Mystery of the Mind* (1975) Penfield concluded everything ever experienced is recorded in the brain, since even trivial memories kept surfacing.\n2. **Karl Lashley at the Yerkes Laboratory of Primate Biology (Orange Park, Florida; ~30 years, Pribram joined 1946)** — Lashley trained rats to perform tasks such as running a maze, then surgically removed various portions of their brains and retested them, aiming to cut out the memory of the maze skill. No matter what portion he removed, he could not eradicate the memories; motor skills were often impaired (clumsy stumbling) but memories remained stubbornly intact even after massive removals. Talbot says this pulled the rug out from under Penfield\u0027s localized-engram findings and pushed Pribram toward the distributed-memory idea. (Pribram helped write up 30 years of this research before leaving for Yale in 1948.)\n3. **Human clinical observations (Pribram\u0027s reasoning at Yale)** — Patients with portions of the brain surgically removed for medical reasons never lost specific memories; removal might make memory generally hazy but never caused selective loss. Accident/head-injury victims never forgot half their family or half a novel. Removing sections of the temporal lobes (central to Penfield\u0027s work) created no memory gaps. Talbot says this solidified Pribram\u0027s conviction that memory is distributed.\n4. **Failure to replicate Penfield in non-epileptics** — Pribram and other researchers could not reproduce Penfield\u0027s memory-evoking stimulation results in non-epileptic brains, and Penfield himself could not duplicate his results in non-epileptic patients. Talbot presents this as further undermining the localized view.\n5. **The hologram demonstration (Scientific American, mid-1960s article)** — Illustrations Talbot uses: dropping one pebble vs. two pebbles in a pond to show interference patterns; a hologram of an apple whose film, cut in half (or into ever-smaller pieces), still reconstructs the whole apple (hazier as pieces shrink). Talbot notes this \"whole in every part\" trait belongs only to film whose image is invisible to the naked eye. Reading this hit Pribram \"like a thunderbolt\" as the mechanism for distributed memory.\n6. **Lashley\u0027s visual-cortex removal in rats** — Removing as much as 90 percent of a rat\u0027s visual cortex still left it able to perform complex visual tasks. Talbot likens it to a movie audience still enjoying a film with 90 percent of the screen missing; it challenged the one-to-one image theory of vision.\n7. **Pribram\u0027s cat optic-nerve experiment** — As much as 98 percent of a cat\u0027s optic nerves could be severed without seriously impairing its ability to perform complex visual tasks. Presented as parallel evidence that vision is distributed/resistant to excision.\n8. **Pribram\u0027s monkey visual experiments (Yale, ~7 years)** — He measured electrical activity in monkeys\u0027 brains while they performed visual tasks. He found no one-to-one correspondence between image and cortical activity, and no discernible pattern even in the sequence in which electrodes fired. He wrote the results were \"incompatible with a view that a photographic-like image becomes projected onto the cortical surface.\" Supports the holographic (not photographic) model of vision.\n9. **Neuron interference-pattern insight** — Observation (not a formal experiment) that neurons have tree-like branches; an electrical message reaching a branch end radiates outward like a ripple in a pond, and densely packed neurons\u0027 ripples constantly crisscross, creating endless interference patterns — Pribram\u0027s proposed physical basis for the brain\u0027s holographic properties (\"The hologram was there all the time in the wave-front nature of brain-cell connectivity... We simply hadn\u0027t had the wit to realize it\").\n10. **John von Neumann\u0027s memory-capacity calculation** — The Hungarian-born physicist/mathematician calculated the brain stores about 2.8 × 10^20 (280 quintillion) bits of information over an average lifetime. Talbot uses it to show how vast a capacity any memory mechanism must explain.\n11. **Holographic storage density** — By changing the angle at which the two lasers strike the film, many images can be recorded on one surface and retrieved by matching the beam angle. Researchers calculated a one-inch-square of film can store the information contained in fifty Bibles. Explains how the brain stores so much in so little space.\n12. **Multiple-image film / recall and forgetting** — A multi-image film tilted in a laser beam makes images appear and disappear in a glittering stream; recalling a memory is like finding the right angle to call up an image, and failing to recall is like not finding the right angle. Analogy for recall and forgetting.\n13. **Proust\u0027s *Swann\u0027s Way* (petite madeleine)** — In the novel, a sip of tea and a bite of the scallop-shaped cake flood the narrator with childhood memories (his aunt gave him tea and madeleines), an association that stirs his memory. Used as a familiar example of associative memory.\n14. **Associative-memory hologram (easy chair and pipe)** — A single laser beam is bounced off two objects at once (an easy chair and a smoking pipe) and their reflected light collides to record one interference pattern; afterward, illuminating the chair alone reconstructs an image of the pipe, and vice versa. Model for how one object evokes the memory of another.\n15. **Recognition holography — Pieter van Heerden (1970 *Nature* article)** — A holographic image is recorded with the laser bounced off a focusing mirror; presenting a second, similar-but-not-identical object produces a bright point of light on the film — brighter and sharper for greater similarity, none if completely dissimilar. With a photocell behind the film it works as a mechanical recognition system. Van Heerden (Polaroid Research Laboratories, Cambridge, Massachusetts) had also proposed his own holographic theory of memory in 1963, but it went relatively unnoticed. Explains fast, reliable recognition of familiar things.\n16. **Interference holography** — An object is viewed through film containing its own image; any feature changed since recording reflects light differently, so the viewer instantly sees both what changed and what stayed the same. So sensitive it detects the pressure of a finger on a block of granite; has practical use in materials-testing. Explains recognizing familiar and unfamiliar features of, e.g., a long-unseen face.\n17. **Photographic/eidetic memory — Daniel Pollen and Michael Tractenberg (Harvard vision researchers, 1972)** — Proposed the holographic theory explains photographic (eidetic) memory. In a study of \"Elizabeth,\" a Harvard art history professor, the mental images she projected were so real that when she \"read\" a projected image of a page from Goethe\u0027s *Faust*, her eyes moved as if reading a real page. They suggested such people access unusually large regions of their memory holograms, while most of us access smaller regions (hence less vivid memory).\n18. **Transference of learned skills (elbow-writing demonstration)** — The reader is invited to trace their first name in the air with their left elbow — easy though never done before. In the \"hard-wired\" view this is puzzling; Pribram says it becomes tractable if the brain converts memories (including learned skills) into interfering wave forms, letting it shift stored information as easily as a pianist transposes a song to another key. Also explains recognizing a face from any angle by \"tumbling\" the internal hologram.\n19. **Georg von Bekesy vibration experiments (Nobel Prize-winning physiologist, late 1960s)** — He placed vibrators on the knees of blindfolded subjects and varied the vibration rates, making subjects feel a point source of vibration jump from one knee to the other and even feel it in the empty space *between* their knees. Showed humans can experience sensation in spatial locations where they have no sense receptors — supporting how interfering wave fronts let the brain localize experience beyond the body (and possibly explaining phantom limbs).\n20. **Phantom-limb phenomenon** — Some amputees feel realistic cramps, pains, and tinglings in a missing limb; Talbot/Pribram suggest this may be the holographic memory of the limb still recorded in the brain\u0027s interference patterns.\n21. **Paul Pietsch\u0027s salamander experiments (Indiana University biologist)** — Initially an ardent disbeliever trying to disprove Pribram. He could remove a salamander\u0027s brain without killing it (it stayed in a stupor, then behaved normally once the brain was restored). Reasoning that if feeding behavior weren\u0027t localized, brain position shouldn\u0027t matter, he flip-flopped the brain\u0027s left and right hemispheres — the salamander resumed normal feeding; he turned another\u0027s brain upside down — it fed normally. In over 700 operations he sliced, flipped, shuffled, subtracted, and even minced the brains, yet behavior always returned to normal once tissue was replaced. This turned Pietsch into a believer, drew a *60 Minutes* segment, and is recounted in his book *Shufflebrain*. Cited as experimental support for the holographic brain.\n22. **Dennis Gabor and the mathematics of holography (theory formulated 1947, later Nobel Prize)** — Gabor conceived holography not with lasers but to improve the primitive electron microscope, using the Fourier calculus (invented by eighteenth-century Frenchman Jean B. J. Fourier). Fourier transforms let him convert a picture into the blur of interference patterns and back again; the \"whole in every part\" trait is a by-product of translating an image into the Fourier language of wave forms.\n23. **Feature-detector research (1960s)** — Showed each visual-cortex cell responds to a different pattern (some fire for horizontal lines, others for vertical), leading many to conclude the brain assembles perception from these specialized detectors. Talbot presents this as the view the DeValoises challenged.\n24. **Russell and Karen DeValois experiments (Berkeley neurophysiologists, 1979)** — Feeling the feature-detector view was only a partial truth, they used Fourier\u0027s equations to convert plaid and checkerboard patterns into simple wave forms, then tested how visual-cortex cells responded. The cells responded not to the original patterns but to the Fourier translations of them — concluding the brain uses Fourier mathematics (the same as holography) to convert images into wave forms. Confirmed by many other labs; convinced Pribram his theory was correct.\n25. **Prior frequency-analyzer findings across the senses** — Over a century before the DeValoises, German physiologist/physicist Hermann von Helmholtz showed the ear is a frequency analyzer; smell is based on \"osmic frequencies\"; Bekesy showed skin is sensitive to vibration frequencies and produced evidence taste may involve frequency analysis (his predictive equations were also of the Fourier genre). Marshaled to show frequency analysis pervades the senses.\n26. **Nikolai Bernstein\u0027s dancer experiments (Russian scientist, 1930s)** — He dressed people in black leotards, painted white dots on their joints (elbows, knees, etc.), and filmed them against black backgrounds doing activities like dancing, walking, jumping, hammering, and typing. Developed film showed only moving white dots; Fourier-analyzing the traced lines converted them into wave forms containing hidden patterns that let him predict a subject\u0027s next movement to within a fraction of an inch. Pribram took this to mean movements are stored in the brain as Fourier wave forms, explaining how we learn complex physical tasks (e.g., riding a bicycle) as a fluid whole rather than bit-by-bit.\n27. **Pribram\u0027s motor-cortex lab finding (by the 1970s)** — Taking his ideas into the lab, Pribram discovered single neurons in the motor cortex respond selectively to a limited bandwidth of frequencies, further supporting his conclusions.\n28. **The Polaroid-photo analogy (thought experiment)** — Pribram\u0027s dilemma dramatized: like photographing people around a table and finding only blurry interference patterns develop — which is the true reality, the observed world or the recorded interference blur? Frames the closing question that leads him to Bohm.\n\n## Key quotes\n- \"It isn\u0027t that the world of appearances is wrong... if you penetrate through and look at the universe with a holographic system, you arrive at a different view, a different reality.\" — Karl Pribram, epigraph (interview in *Psychology Today*), stating the chapter\u0027s thesis.\n- \"It was evident at once that these were not dreams. They were electrical activations of the sequential record of consciousness, a record that had been laid down during the patient\u0027s earlier experience.\" — Wilder Penfield, *The Mystery of the Mind* (1975), on his stimulation results.\n- \"I sometimes feel, in reviewing the evidence on the localization of the memory trace, that the necessary conclusion is that learning just is not possible at all. Nevertheless, in spite of such evidence against it, learning does sometimes occur.\" — Karl Lashley, on his inability to find the engram.\n- \"These experimental results are incompatible with a view that a photographic-like image becomes projected onto the cortical surface.\" — Pribram, on his monkey visual-cortex experiments.\n- \"The hologram was there all the time in the wave-front nature of brain-cell connectivity. We simply hadn\u0027t had the wit to realize it.\" — Pribram, on neurons\u0027 interference patterns as the brain\u0027s holographic substrate.\n- \"there are precious few experimental findings for which holography is the necessary, or even preferable, explanation.\" — neuropsychologist Frank Wood (Bowman Gray School of Medicine), a skeptic.\n- \"many specialists in brain function are attracted to the idea, if for no other reason than the glaring inadequacies of the present orthodox views.\" — Dr. Larry Dossey (former chief of staff, Medical City Dallas Hospital), a sympathizer.\n- \"a hologram is not only possible but, at this moment, represents probably our best \u0027model\u0027 for brain functioning.\" — neurologist Richard Restak (author of the PBS series *The Brain*).\n- Restak on the localized view being \"oversimplistic\" and acting as \"conceptual straitjackets\" — his critique of map-like brain-function theories.\n- Pribram\u0027s closing question — whether reality was \"maya, an illusion, and what was out there was really a vast, resonating symphony of wave forms, a \u0027frequency domain\u0027\" transformed into the world only after entering our senses.\n\n## Thread\nThis chapter builds the brain-side half of the book\u0027s central analogy: it establishes, through Pribram\u0027s decades of work, that the brain plausibly stores and processes information holographically. Its final move is the pivot that powers the whole book — Pribram\u0027s question \"if the picture of reality in our brains is a hologram, what is it a hologram *of*?\" — which drives him to physicist David Bohm and the claim that \"the entire universe was a hologram.\" This sets up the next chapter\u0027s turn to Bohm and the physics side of the holographic paradigm, and seeds the book\u0027s recurring themes of nonlocality, illusion, and paranormal explicability named in the epigraph.\n\n## Connections\n- **Chapter 2 (the Bohm/physics chapter this book advances toward)** — The closing section \"Pribram Encounters Bohm\" explicitly hands off to David Bohm\u0027s claim that the entire universe is a hologram; the brain-as-hologram argument here is the setup for the universe-as-hologram argument that follows.\n- The epigraph\u0027s promise that the holographic view can explain \"paranormal phenomena, synchronicities, the apparently meaningful coincidence of events\" flags material the book returns to in later chapters.\n- Possible cross-book links (speculative):\n  - *The Simulation Hypothesis* (Virk) — Pribram\u0027s \"objective reality... might not even exist\" and the \"frequency domain transformed into the world only after it entered our senses\" loosely echo rendered/computed-reality framings. Speculative only.\n  - *My Big TOE* (Campbell) — the reality-as-information/frequency-domain idea and consciousness constructing the perceived world may rhyme with Campbell\u0027s information-based reality model. Speculative only.\n  - *The Power of Now* (Tolle) — the \"world-out-there\" as a brain-constructed projection loosely touches Tolle\u0027s theme that the perceived world is mind-mediated. Speculative only.\n  - *American Cosmic* (Pasulka) — only tangentially, via the epigraph\u0027s opening toward the paranormal as scientifically explicable. Speculative only.\n"},{"id":"holographic-universe/02-the-cosmos-as-hologram","file":"02-the-cosmos-as-hologram.md","title":"The Cosmos as Hologram","type":"chapter","chapter":"2","concepts":["quanta","wave-particle-duality","observer-created-properties","interconnectedness","epr-paradox","polarization","plasma","plasmons","quantum-potential","nonlocality","infinite-causality","completeness-of-theories","hidden-order","degrees-of-order","implicate-order","explicate-order","enfoldment-and-unfoldment","holomovement","undivided-wholeness","relatively-independent-subtotalities","fragmentation","consciousness-as-subtle-matter","sea-of-energy","plenum","aharonov-bohm-effect","space-time-continuum","superstring-theory","phantom-limb-syndrome","frequency-domain"],"people":["David Bohm","Niels Bohr","Albert Einstein","Boris Podolsky","Nathan Rosen","Nick Herbert","John Stewart Bell","Yakir Aharonov","Alain Aspect","Jean Dalibard","Gerard Roger","Paul Davies","Lee Smolin","Abner Shimony","Roger Penrose","Bernard d\u0027Espagnat","Brian Josephson","Karl Pribram","Georg von Bekesy","John P. Briggs","F. David Peat","William Blake","Abraham Lincoln","John Wilkes Booth"],"body":"\n# Ch 2 — The Cosmos as Hologram\n\n## In one paragraph\nTalbot traces the intellectual biography of physicist David Bohm to show how the second pillar of the holographic model — a holographic *universe*, complementing Pribram\u0027s holographic *brain* — was built. Starting from quantum physics\u0027s strangest findings (particles without dimension, wave-particle shapeshifting, properties that seem to appear only under observation), Bohm was repeatedly struck by evidence of interconnectedness that mainstream physics ignored: the EPR twin-particle puzzle, the organism-like behavior of plasmas, and later the Aharonov-Bohm effect. Dissatisfied with Bohr\u0027s \"complete\" quantum theory, Bohm proposed a subquantum field, the quantum potential, whose nonlocal character dissolves separateness without breaking relativity\u0027s light-speed limit. The ink-in-glycerine device and then the hologram gave him the metaphor to crystallize everything: visible reality is an \"explicate order\" continually unfolding out of and enfolding back into a deeper \"implicate order\" — a dynamic \"holomovement\" in which everything, including consciousness, space, and an unimaginably vast sea of energy, is one unbroken whole. Aspect\u0027s 1982 experiment confirming nonlocal correlation between twin photons gives the model, in Talbot\u0027s words, tremendous support, and the chapter closes by fusing Bohm with Pribram: the brain is a hologram enfolded in a holographic universe.\n\n## Core claims\n- Talbot presents quantum physics as an \"Alice-in-Wonderland realm\": electrons literally possess no dimension, and all subatomic phenomena are \"quanta\" — somethings that are always somehow both wave and particle, the basic stuff of the universe.\n- One interpretation of the evidence (held by physicists such as Nick Herbert, but explicitly *not* by Bohm) is that quanta only manifest as particles when they are being observed; unobserved, an electron is always a wave.\n- Bohr\u0027s view is that if particles only come into existence in the presence of an observer, it is meaningless to speak of their properties as existing before observation — and that twin particles are not separate \"things\" but part of an indivisible system.\n- Einstein, Podolsky, and Rosen (1935) argued that Bohr must be wrong, because his view would require twin particles to communicate instantaneously — faster than light — which no \"reasonable definition\" of reality would permit (the EPR paradox).\n- Bohm\u0027s view is that particles do exist without observers, that a subquantum level awaits discovery, and that a new field there — the quantum potential — explains quantum findings as well as Bohr\u0027s interpretation does, while pervading all space and not diminishing with distance.\n- Bohm argues (in *Causality and Chance in Modern Physics*, 1957) that no theory can be complete because nature may be infinite, and that an effect can have an infinite number of causes; no cause-and-effect relation is ever really separate from the universe as a whole.\n- Bohm\u0027s quantum potential implies the whole organizes the parts (not vice versa), and that at the subquantum level location ceases to exist — all points in space are equal to all other points (\"nonlocality\").\n- Bohm\u0027s mature claim (in *Wholeness and the Implicate Order*, 1980) is that tangible everyday reality is a kind of illusion, like a holographic image; beneath it lies the implicate (enfolded) order, from which our explicate (unfolded) order is continuously projected — a \"holomovement.\"\n- Bohm argues that dividing reality into parts is always an arbitrary abstraction; everything is one unbroken thing, and our habit of fragmenting the world causes problems in science, in our lives, and in society, and may even lead to our extinction.\n- Bohm holds that consciousness is a more subtle form of matter, present in various degrees of enfoldment in all matter; the observer *is* the observed, and even a rock is in some way alive.\n- Bohm takes seriously the calculation that every cubic centimeter of empty space contains more energy than all the matter in the known universe: space is a plenum, not a vacuum, and our universe is only a ripple — a \"pattern of excitation\" — on an infinite sea of energy.\n- The sea of energy is not all the implicate order enfolds: as the foundation that has given birth to everything, it contains at the very least every subatomic particle that has been or will be, and every possible configuration of matter, energy, life, and consciousness — from quasars to the brain of Shakespeare, from the double helix to the forces that control the sizes and shapes of galaxies. Bohm concedes there is no reason to believe the implicate order is the end of things; there may be undreamed-of orders beyond it, \"infinite stages of further development.\"\n- Talbot reports that Aspect\u0027s 1982 experiment does not prove Bohm\u0027s model but provides it with \"tremendous support,\" since it is generally viewed as virtual proof that twin photons are nonlocally connected.\n- Combined, Bohm and Pribram\u0027s theories say (per Talbot): our brains mathematically construct objective reality by interpreting frequencies that are projections from a deeper, dimension-transcending order — the brain is a hologram enfolded in a holographic universe.\n- Pribram\u0027s view is that the objective world \"out there\" is a vast ocean of waves and frequencies which the brain converts into familiar solid objects; a china cup is both cup and interference pattern. Bohm goes further: we even construct space and time.\n\n## Concepts\n- **Quanta** — the plural of quantum; the single category of \"somethings\" that are always somehow both wave and particle, believed to be the basic stuff from which the entire universe is made. One electron is a quantum; the word is also synonymous with \"wave particle.\"\n- **Wave-particle duality** — the chameleonlike ability of an electron (and every subatomic particle, plus light, gamma rays, radio waves, X rays) to manifest as either a compact particle or a blurry wave spread out over space, and to shift back and forth.\n- **Observer-created properties** — the interpretation (Bohr\u0027s, disputed by Bohm) that quanta
