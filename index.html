a beer bottle. (He has written about these experiences in his book *Beyond the Quantum*, and says he accepts the unconscious-PK theory of poltergeists because of them.)\n- **Sathya Sai Baba\u0027s materializations (studied by Erlendur Haraldsson)** — The sixty-four-year-old Indian holy man of Andhra Pradesh plucks lockets, rings, and jewelry out of the air as gifts, materializes endless Indian delicacies and sweets, and pours volumes of vibhuti (sacred ash) from his hands — witnessed by thousands, including scientists and magicians, with no trickery ever detected. Haraldsson (psychologist, University of Iceland) studied him for over ten years, publishing *Modern Miracles: An Investigative Report on Psychic Phenomena Associated with Sathya Sai Baba*; he admits he cannot conclusively rule out sleight of hand but offers strong contrary evidence: (1) materialization on request — asked what a \"double rudraksha\" was, Sai Baba impatiently closed his fist, waved it a second or two, and opened it on an acorn-like double rudraksha (two seeds grown together like a twin orange); when Haraldsson asked to keep it, Sai Baba enclosed it in both hands, blew on it, and returned it capped top and bottom in two golden shields joined by a short golden chain, topped with a golden cross bearing a small ruby and a tiny opening for a neck chain. Indian botanists told Haraldsson they had never even seen a double rudraksha (extremely rare botanical anomaly); a malformed specimen in a Madras shop was priced at the Indian equivalent of almost three hundred dollars; a London goldsmith confirmed the gold was at least twenty-two carats. (2) Materialized delicacies fall from his hands sizzling hot — sometimes too hot to hold; sweet syrups and fragrant oils pour from his hands (even feet) leaving no sticky trace on his skin; he produces rice grains with tiny perfectly carved pictures of Krishna, out-of-season fruits (near-impossible in a region without electricity or refrigeration), and anomalous fruits — apples that peel to reveal an apple on one side and another fruit on the other. (3) Sacred ash pours prodigiously on every walk among the crowds — enough in a single transit of the ashram grounds to fill several drums; Haraldsson and Dr. Karlis Osis (director of research, American Society for Psychical Research) actually saw ash materializing: palm open and downturned, a few quick small circles of the hand, and a grey substance appeared in the air just below the palm — Osis, sitting closer, saw it first appear entirely as granules that crumbled to ash when touched. (4) Not mass hypnosis: Sai Baba freely allows filming of open-air demonstrations and everything still shows up on film; no credible evidence of fakery has ever surfaced; he has produced a continuous flow of objects for half a century, since age fourteen. Haraldsson\u0027s verdict: the demonstrations remind us of \"enormous potentials that may lie dormant somewhere within all human beings.\"\n- **Yogananda\u0027s ascetics** — In *Autobiography of a Yogi*, Paramahansa Yogananda (1893–1952), the first eminent holy man of India to settle permanently in the West, describes meeting several Hindu ascetics who could materialize out-of-season fruits, gold plates, and other objects — cautioning that such siddhis are not always evidence of spiritual evolution: \"The world [is] nothing but an objectivized dream,\" and \"whatever your powerful mind believes very intensely instantly comes to pass.\" Talbot asks whether such individuals tap a little of the enormous sea of cosmic energy Bohm says fills every cubic centimeter of empty space.\n- **Therese Neumann\u0027s inedia (investigated 1927)** — Her inedia began in 1923 when she \"transferred\" a young priest\u0027s throat disease to her own body and subsisted solely on liquids for several years; in 1927 she gave up food and water entirely. The bishop of Regensburg sent a commission: from July 14 to July 29, 1927, under medical doctor Seidl, four Franciscan nursing sisters scrutinized her day and night, measuring and weighing even her mouth-rinsing water. Findings: she never went to the bathroom (one bowel movement after six weeks — examined by a Dr. Reismanns: only a small amount of mucus and bile, no traces of food); no signs of dehydration although the average human expels about four hundred grams (fourteen ounces) of water daily in exhaled air and a like amount through the pores; constant weight — though she lost nearly nine pounds of blood during the weekly opening of her stigmata, her weight returned to normal within a day or two. Seidl and the sisters were completely convinced she had not eaten or drunk for fourteen days — conclusive, Talbot argues, since the body can rarely survive even a week without water. She then ate and drank nothing for the next thirty-five years — implying she regularly materialized both the blood for her stigmata and the water and nutrients keeping her alive. Thurston gives several more examples of stigmatists who went years without eating or drinking.\n- **Bleeding and weeping icons** — Compelling accounts abound of bleeding statues, paintings, icons, and even rocks of historical or religious significance; dozens of stories of weeping Madonnas, with a virtual epidemic of them sweeping Italy in 1953; in India, Sai Baba\u0027s followers showed Haraldsson pictures of the ascetic miraculously exuding sacred ash.\n- **Tia and the vanishing kenari grove (Watson, Indonesia)** — Watson also encountered Tia, a young woman whose power (unlike Alin\u0027s unconscious gift) was consciously controlled — a shaman in the making. He saw her perform miraculous healings and, during a power struggle with the local Moslem religious leader, set the minaret of the local mosque on fire with the power of her mind. Most awesome: stumbling on her trying to communicate something to a little girl in a grove of kenari trees, he watched her frustration turn into an eerie, hypnotic dance — and the entire grove suddenly blinked out of existence: \"One moment Tia danced in a grove of shady kenari; the next she was standing alone in the hard, bright light of the sun.\" Seconds later she made it reappear, and the girl (who clearly shared the experience, rushing to touch the trees) and Tia blinked the grove on and off several times, dancing and giggling, while Watson walked away with his head reeling. Talbot\u0027s category: transformation of the *whole* of reality, not just parts.\n- **Castaneda\u0027s dying-spirit branch (Journey to Ixtlan)** — Don Juan and Castaneda, searching the desert at night for a spirit, come upon a creature like a calf with a wolf\u0027s ears and a bird\u0027s beak, screaming as if dying. Terrified Castaneda tells himself it can\u0027t be real; his vision changes and he sees a fallen tree branch trembling in the wind. Don Juan rebukes him: the branch was a dying spirit while it was alive with power and became a branch when Castaneda doubted — but *both realities were equally real*. This is the incident Talbot and his professor were discussing minutes before the umbrella incident.\n- **The umbrella incident (Talbot, 1975, Michigan State University)** — As a senior, dining with a professor and discussing Castaneda\u0027s two-equally-real-realities claim, Talbot strolled with her afterward on a clear summer night behind a boisterous, apparently drunk group speaking an unrecognizable foreign language — one woman carrying a green umbrella despite a cloudless sky. After swinging it in huge erratic arcs (nearly grazing them) in a performance clearly designed to attract their attention, she held it overhead with both hands and threw it dramatically at their feet. The umbrella then \"flickered\" like a dying lantern flame, emitted a crackling sound like crumpled cellophane, and in a dazzling array of sparkling multicolored light its ends curled up, its color changed, and it reshaped into a gnarled brown-gray stick. Both wrote down their accounts, which matched exactly (the professor said it had \"sizzled\"). The group was long gone before they thought to ask. Talbot connects it to the Castaneda conversation and speculates their emotional fervor caused their unconscious minds to change the hologram of reality — perhaps the psyche (per Ullman\u0027s assertion) is programmed to produce such miracles to give us glimpses of reality\u0027s true nature.\n- **Talbot\u0027s native psychic history** — From adolescence: vivid, detailed precognitive dreams of later events; knowing things about people \"I had no right knowing\"; at seventeen, spontaneous ability to see an energy field or \"aura\" around living things, from whose pattern and colors he can often determine things about a person\u0027s health. He presents himself as born with \"the chemistry necessary to trigger shifts in reality.\"\n- **Sai Baba\u0027s teleportation (per Haraldsson)** — Numerous witnesses report watching Sai Baba snap his fingers and vanish, instantly reappearing a hundred or more yards away — going bilocation (the saintly ability to be in two places at once) one better. Talbot: this suggests bodies are holographic projections that can blink \"off\" in one location and \"on\" in another like an image on a video screen.\n- **Indridi Indridason\u0027s dematerializing body parts (Iceland, 1905)** — Several of Iceland\u0027s leading scientists, investigating the paranormal, chose Indridason — then a country bumpkin with no psychic experience — as a subject; he proved a spectacularly talented medium, entering trance quickly and producing dramatic PK. Most bizarre: while deep in trance, different parts of his body would completely dematerialize — an arm or hand fading out of existence as the astonished scientists watched, rematerializing before he awakened. Talbot: further evidence of the body\u0027s holographic, immaterial nature.\n- **Physicists\u0027 \"schizophrenia\" about quantum reality (Rohrlich, Mermin)** — Quantum theorist Fritz Rohrlich (Syracuse University): most physicists accept the standard interpretation of quantum theory yet \"insist on the reality of quantum systems even when these are not observed.\" N. David Mermin (Cornell) sorts physicists into three categories: a small minority troubled by the philosophical implications; a second group with elaborate reasons for being untroubled that \"miss the point entirely\"; and a third with no explanations who also refuse to say why they aren\u0027t troubled — \"Their position is unassailable.\" Context for why the consciousness-creates-particles question goes unexamined.\n- **Aspirin as a young reality-field (callback)** — Talbot suggests the finding that aspirin helps prevent heart attacks in Americans but not in the British may mark a relatively recent reality-field still in the making — same logic as electrons (old, fixed) vs. anomalons (new, plastic).\n- **Rogo on the historical onset of blood miracles** — Rogo notes accounts of blood miracles began with the fourteenth-century miracle of San Gennaro; none predate it. Talbot reads this as the ability \"flickering into existence\" then — once established as a reality-field, it became easier for others to tap, explaining the many blood miracles since and none before.\n\n## Key quotes\n- \"Miracles happen, not in opposition to Nature, but in opposition to what we know of Nature.\" — St. Augustine, the chapter epigraph.\n- Meaning \"can thus serve as the link or \u0027bridge\u0027 between these two sides of reality.\" — Bohm, on meaning as simultaneously mental and neurophysiological/chemical/physical.\n- \"On this basis, psychokinesis could arise if the mental processes of one or more people were focused on meanings that were in harmony with those guiding the basic processes of the material systems in which this psychokinesis was to be brought about.\" — Bohm, giving his resonance-of-meanings explanation of PK.\n- \"Taken in concert the entire ensemble establishes an incontrovertible aberration of substantial proportions.\" — Jahn and Dunne, summing up the PEAR REG and pinball data.\n- \"It\u0027s like being in a canoe; when it goes where I want, I flow with it.\" — a PEAR volunteer describing the feeling of \"resonance\" with the machine during successful PK.\n- \"My sense of the importance of this topic is much higher than anything else I\u0027ve ever worked on.\" — Jahn, on why he persists despite scientific orthodoxy\u0027s resistance.\n- \"At the twenty-fifth blow the stone upon which I struck, which had been shaken by the preceding efforts, suddenly became loose and fell on the other side of the wall, making an aperture more than half a foot in size.\" — Montgeron, testing on a stone wall the thirty-pound hammer that had just delivered one hundred harmless blows to Jeanne Maulet\u0027s stomach.\n- \"God was forbidden, by order of the King, to work any miracles there.\" — Voltaire, on Louis XV closing the cemetery of Saint-Médard.\n- \"There surely never was so great a number of miracles ascribed to one person as those which were lately said to have been wrought in France upon the tomb of Abbé Paris.\" — David Hume, *Philosophical Essays*.\n- \"I tend to think things like chairs and tables are like that also. They\u0027re a sort of material neurosis, a repetition... chairs and tables are just habits in this flux, but the flux is the reality, even if we tend only to see the habit.\" — Peat, on matter and physical law as the universe\u0027s habits.\n- \"I think we\u0027re into the domain where the interplay of consciousness in the environment is taking place on such a primary scale that we are indeed creating reality by any reasonable definition of the term.\" — Jahn, on consciousness and subatomic particles.\n- \"The world is not necessarily as solid as we perceive it.\" — Grof, who takes materialization and other extreme paranormal phenomena seriously and feels reality is \"cloud-built and pliant to the subtle authority of consciousness\" (Talbot\u0027s phrasing).\n- \"We\u0027ve created it as a vehicle of experience, and we\u0027ve created the laws that govern it. And when we get to the frontiers of our understanding, we can in fact shift the laws so that we\u0027re also creating the physics as we go along.\" — William Tiller, on the universe as holodeck.\n- \"We are perceivers. We are an awareness; we are not objects; we have no solidity. We are boundless.\" — Don Juan (quoted by Talbot in stating his own position).\n- \"Contrary to what everyone knows is so, it may not be the brain that produces consciousness, but rather consciousness that creates the appearance of the brain — matter, space, time and everything else we are pleased to interpret as the physical universe.\" — Keith Floyd, psychologist at Virginia Intermont College.\n\n## Thread\nThis chapter escalates Part II\u0027s mind-over-body argument (placebo, stigmata, faith-driven healing in the previous chapter) beyond the body into the external world: PK in the lab, mass miracles in history, then materialization and whole-reality transformation. It cashes out Bohm\u0027s implicate order and Pribram\u0027s constructed perception into the book\u0027s boldest claim so far — that physical law itself is a habit of the holomovement and consensus reality a collectively sustained \"reality-field,\" a hologram sculpted by consciousness. The pattern Talbot names explicitly — \"the deeper and more emotionally charged our beliefs, the greater the changes we can make in both our bodies and reality itself\" — becomes the through-line, and the closing gallery (bilocation, dematerializing limbs, the holodeck universe) sets up the later chapters\u0027 treatment of even more radical psi, and of space, time, and the self as holographic constructs.\n\n## Connections\n- **Chapter 2** — explicitly referenced: the twin-photon nonlocality (same angle of polarization) that Bohm says is *similar to but not the same as* the \"super\" nonlocality needed for PK and telepathy; also the source of Bohm\u0027s implicate/explicate orders, holomovement, and the \"enormous sea of cosmic energy\" in empty space invoked here.\n- **Chapter 4 (the previous chapter)** — heavy back-references: stigmata (Padre Pio, Therese Neumann), Michelli\u0027s months-long pelvis regeneration, Mohotty\u0027s fire pit watched by the Grosvenors, the aspirin US-vs-British anomaly, Ullman\u0027s assertion that the psyche teaches us in waking life, and \"the pattern that began to take shape in the last chapter\" (belief-charged mind altering body — now extended to reality).\n- **Chapter 1** — implied: Pribram\u0027s holographic brain model underlies Globus\u0027s claim that dreams, ordinary reality, and Castaneda-style separate realities are built by the same holographic mechanisms.\n- **Introduction** — Talbot fulfills the promise made there to relate his own firsthand paranormal experiences (poltergeist, umbrella incident).\n- *Possible cross-book links (speculative only):* Tiller\u0027s \"holodeck\" universe and Jahn/Dunne\u0027s consciousness-created particles resonate with **The Simulation Hypothesis** (Virk) — reality as rendered simulation; the \"integration of all consciousnesses\" creating reality and laws-as-mutable-rules parallels **My Big TOE** (Campbell); Don Juan\u0027s \"we are perceivers... not objects\" has a loose affinity with **The Power of Now** (Tolle) on identity beyond form; the treatment of religious miracle testimony, materialization, and technology-era wonder-workers could be compared with **American Cosmic** (Pasulka).\n"},{"id":"holographic-universe/06-seeing-holographically","file":"06-seeing-holographically.md","title":"Seeing Holographically","type":"chapter","chapter":"6","concepts":["frequency-domain","image-object-domain","human-energy-field","aura","prana","chi","nefish","subtle-bodies","etheric-body","astral-emotional-body","mental-body","causal-intuitive-body","chakras","crown-chakra","blind-spot","higher-sense-perception","therapeutic-touch","etheric-mucus","chaos","strange-attractors","chaos-holograph-pattern","mystical-personalities","anu","paramanu","internal-vision","x-ray-vision","holographic-body-assessment","body-reading","wave-substance","portrayals","forgotten-language","energy-field-as-blueprint","ratchet-effect","participatory-reality","nonlocality","implicate-order","mind-in-the-field","three-dimensional-images-in-the-aura","movies-in-the-aura","synchronicities"],"people":["Itzhak Bentov","Karl Pribram","John White","Stanley Krippner","Herbert Thurston","Therese Neumann","Sai Baba","Hazrat Inayat Khan","Luke the apostle","Barbara Brennan","Elisabeth Kubler-Ross","Bernie Siegel","Carol Dryer","Shafica Karagulla","David K. Henderson","Wilder Penfield","Karl Lashley","Dolores Krieger","Oscar Estebany","Dora Kunz","Janet Quinn","W. Brugh Joy","Michael Crichton","Valerie Hunt","David Bohm","Beatrice Rich","Erich Fromm","Montague Ullman","Emanuel Swedenborg","Ronald Wong Jue","Ernest Pecci","Michael Harner","Richard Gerber","William Tiller","Hiroshi Motoyama","Benjamin Libet","Bertram Feinstein","Jeanne Achterberg","Candace Pert","Michael Talbot"],"body":"\n# Ch 6 — Seeing Holographically\n\n## In one paragraph\nTalbot argues that ordinary vision is already a construction — the brain edits, filters, and fills in what we \"see\" — which raises the question of what real aspects of the world we routinely edit out. Following Pribram, he proposes that mystics and psychics who perceive the human aura are catching glimpses of the frequency domain, the interference-pattern reality behind appearances. He assembles testimony from psychic healers (Brennan, Dryer, Rich), medical professionals with \"higher sense perception\" (Karagulla\u0027s doctors, Krieger, Joy), and Valerie Hunt\u0027s electromyographic measurements to argue that a subtle, information-rich, nonlocal human energy field is real, holographically organized, and detectable. This field, he suggests, is more primary than the physical body — a blueprint or \"implicate order\" of the body from which illness and healing both flow — and it may even be where the mind itself resides, since both Libet/Feinstein\u0027s timing data and Hunt\u0027s EMG-before-EEG findings dethrone the brain as the seat of decision and awareness. The chapter closes by warning that at these subtle levels reality is participatory: the very structures observers find in the field (layers, Sanskrit letters in chakras) may be created by belief.\n\n## Core claims\n- Talbot argues the eye/brain is \"not a faithful camera\": visual input is edited by the temporal lobes before reaching the visual cortex, and some studies suggest less than 50 percent of what we \"see\" is based on information entering our eyes — the rest is pieced together from expectation (and perhaps \"other sources such as reality fields\").\n- Talbot argues that if we see less than half of what is out there, there may be important aspects of reality — beyond even technological reach — that our brains have learned to edit out; per Pribram, mystical experiences are glimpses of the frequency domain.\n- Talbot argues the aura/human energy field is a cross-cultural constant (97 cultures, 97 names) and is visible to individuals with a specially developed capacity — including Talbot himself, who reports seeing it.\n- Talbot argues that talented aura-seers can make strikingly accurate medical and psychological diagnoses from the field, and that some can heal by manipulating it.\n- Talbot argues that Valerie Hunt\u0027s electromyograph research experimentally confirms the field\u0027s existence: it radiates at frequencies averaging 100–1600 cps (sometimes far higher), is strongest at the chakra points, correlates measurably with the colors aura readers report, and yields a rich \"chaos holograph pattern\" from only 3–4 seconds of data.\n- Talbot argues the field is holographic in several ways: it is a frequency phenomenon; its information (like EEG/EKG signals) is distributed globally through the body; every portion of the aura contains aspects of the whole; and it is nonlocal — readable at any distance — until \"plucked out of the frequency domain by human perception.\"\n- Talbot argues the field is not purely electromagnetic but composed of an as-yet-undiscovered, subtler energy — matching ancient Hindu claims of energies \"beyond the atom\" (paramanu) and Bohm\u0027s belief in subtle subquantum energies.\n- Talbot argues that thoughts manifest as three-dimensional images and even moving \"holographic movies\" in the aura, written partly in the symbolic \"forgotten language\" of the unconscious; some occult traditions hold such images are a product of the third, or mental, layer of the aura, but until this can be confirmed or denied we must rely on the experiences of the psychics who see them.\n- Talbot argues the energy field functions as a blueprint that molds the body (the body\u0027s \"own version of an implicate order\"): illness appears in the field weeks or months before the body, which would explain image-induced illness, visualization healing, and even stigmata.\n- Talbot argues (via Tiller) that a \"ratchet effect\" carries patterns from mind level down through subtle levels to physical manifestation — and speculatively, that the universe itself coalesced the same way from a divine pattern \"via a series of holograms.\"\n- Talbot argues that reality at these subtle levels is participatory: psychics may be partly creating the structures (layers, chakra letters) they claim to discover, so we must be cautious about claims of discovered structure in the field.\n- Talbot argues that examining the human energy field leads to precisely the same conclusion Pribram reached about the brain: we have two realities — one in which our bodies are concrete and precisely located in space and time, and one in which our very being exists primarily as a shimmering cloud of energy whose ultimate location in space is ambiguous. This raises the question: if brain and body are just holograms, the densest part of an increasingly subtle continuum of energy fields, what becomes of mind?\n- Talbot argues the mind may not be in the brain at all but in the energy field: Libet/Feinstein showed the unconscious acts before conscious awareness, and Hunt showed the field responds to stimuli before the brain does.\n- Throughout, Talbot presents psychic testimony (including his own experiences) as evidence to be taken seriously, not as established scientific fact — e.g., quoting Karagulla that \"when many reliable individuals independently report the same kind of phenomena, it is time science takes cognizance of it.\"\n\n## Concepts\n- **Frequency domain** — Pribram\u0027s term, originally for the frequencies of the normal sensory world, now used for the interference patterns that compose the implicate order; reality at large is a frequency domain and the brain is a lens converting frequencies into the objective world of appearances. The ordinary world is the \"image-object\" domain.\n- **Blind spot** — the spot in the middle of the retina where the optic nerve connects and there are no photoreceptors; the brain fills in the gap so seamlessly we never notice the hole (demonstrated with the book\u0027s figure 15 star/circle exercise, at about 10 to 15 inches).\n- **Human energy field / aura** — a subtle field of energy around the human body, a halolike envelope of light just beyond normal perception; known as prana in India (sacred writings over 5,000 years old), ch\u0027i in China (since the third millennium B.C., the energy of the acupuncture meridians), and nefish in the Kabbalah (sixth century B.C., an egg-shaped bubble of iridescence around every body).\n- **Subtle bodies / layers** — many psychics say the field has seven main layers, actually three-dimensional energy bodies occupying the same space as the physical body at increasingly larger sizes and lesser densities; commonly the first four are named the etheric body, the astral/emotional body, the mental body, and the causal/intuitive body; the last three are variously named but relate to the soul and higher spiritual functioning.\n- **Etheric body** — the energy body closest in size to the physical body; a kind of energy blueprint involved in guiding and shaping the growth of the physical body.\n- **Chakras** — special energy centers (Sanskrit for \"wheel\") connected to endocrine glands and major nerve centers but extending up into the energy field, looking like spinning vortices of energy when viewed head-on; described in Indian yogic literature.\n- **Crown chakra** — the chakra originating in the uppermost tip of the brain, associated with spiritual awakening; clairvoyants describe it as a little cyclone on top of the head, a few inches to a foot or more tall, growing taller and brighter in joy.\n- **Etheric mucus** — Brennan\u0027s term for the sticky gray residue that drugs such as alcohol, marijuana, and cocaine create in the aura, dulling its healthy colors.\n- **Higher sense perception (HSP)** — Karagulla\u0027s term for the faculty of seeing the human energy field.\n- **Therapeutic touch** — Krieger\u0027s name (chosen to avoid the loaded terms aura and chakra) for the healing method of feeling and manipulating blockages in the human energy field with the hands, learned from Dora Kunz; now taught to thousands of nurses and used in hospitals worldwide.\n- **Chaos / chaos patterns / strange attractors** — chaos is the study of phenomena so haphazard they appear lawless (turbulent smoke, waterfall base, epileptic brain fluctuations, colliding weather fronts); mathematical analysis converts such data into shapes on a computer screen — a straight line if no hidden pattern, a yarn-around-nails spiral shape (\"chaos pattern\" or \"strange attractor\") if hidden regularities exist.\n- **Chaos holograph pattern** — Hunt\u0027s name for the never-repeating but highly dynamic and complex chaos pattern she obtained from the high frequencies of the human energy field.\n- **Mystical personalities** — Hunt\u0027s category for people with energy-field frequencies above 900 cps; unlike psychics (400–800 cps) or trance channelers (narrow 800–900 cps band), mystics possess the wisdom to use information, are aware of cosmic interrelatedness, and are anchored in ordinary reality while extending far beyond — some measured up to 200,000 cps.\n- **Anu / paramanu** — ancient Hindu terms: matter is composed of anu, \"atoms,\" while the subtle vibratory energies of the human energy field exist paramanu, literally \"beyond the atom.\"\n- **Internal vision / X-ray vision** — the clairvoyant ability to adjust vision and look through flesh and bone \"as if they were no more than layers of colored mist,\" seeing organs, glands, bone density, even microscopic structures; Brennan\u0027s term is \"internal vision\"; universal in shamanic traditions.\n- **Holographic Body Assessment** — Jue\u0027s name (reframing Ernest Pecci\u0027s \"body reading\" in holographic-model terms) for psychometrizing a person\u0027s body by laying on hands to read the emotional scripts, core issues, and relationship patterns held in the body\u0027s energy patterns.\n- **Wave-substance / portrayals** — Swedenborg\u0027s terms (nearly three hundred years ago) for the wave he saw around people and the visible thought-images within it.\n- **The forgotten language** — Erich Fromm\u0027s name for the symbolic/metaphoric language of the unconscious found in dreams, myths, fairy tales, and religious visions — and, per Dryer, in some holographic movies in the aura.\n- **Energy field as blueprint** — the idea that the physical body is just one more level of density in the field, a hologram coalesced out of the aura\u0027s interference patterns; since illness can appear in the field weeks or months before the body, the field may be more primary — \"the body\u0027s own version of an implicate order.\"\n- **Ratchet (\"rachet\") effect** — Tiller\u0027s mechanism by which thought-generated patterns at the mind level of nature manifest downward, first at the etheric level and ultimately at the physical level as disease (or, cosmologically, as the material universe itself).\n- **Participatory reality** — the quantum-physics tenet that we are not discovering reality but participating in its creation; at subtle levels this becomes more pronounced, so structures \"found\" in the energy field (layers, Sanskrit letters) may have been created by observers\u0027 beliefs. Talbot notes the ratchet/template processes do not depend on the fields being stratified into rigidly defined layers — they would work even if the subtle fields are a smooth continuum.\n\n## Experiments, examples \u0026 case studies\n- **Talbot\u0027s misspelled No Parking sign (personal anecdote)** — Talbot stared transfixed at an ordinary No Parking sign until his friend exclaimed it was misspelled; as he watched, the wrong letter \"changed\" into an e. Both had unconsciously edited the sign into correctness. Talbot says this first showed him the eye/brain \"is not a faithful camera, but tinkers with the world before it gives it to us.\"\n- **Pribram\u0027s early vision studies (monkeys)** — Pribram found that visual information a monkey receives via its optic nerves does not travel directly to the visual cortex but is first filtered through other brain areas; numerous studies show the same in humans, where the temporal lobes edit and modify visual information. Some studies suggest less than 50 percent of what we \"see\" is based on information entering the eyes. Shows the brain, not the eye, sees.\n- **Everyday editing examples** — not noticing a close friend has shaved his mustache; one\u0027s house looking strangely different after a vacation. We respond to what we think is there, not what is there.\n- **Blind spot demonstration (figure 15)** — close the left eye, stare at the circle in the middle of a grid with the right eye, and move the page (about 10–15 inches) until the star vanishes on the blind spot; then close the right eye and stare at the star until the circle vanishes — the grid lines remain intact because the brain fills in what it thinks should be there. Shows the brain \"reweaves the tapestry of our visual reality\" without our awareness.\n- **Perception beyond human range (technology examples)** — spiderwebs look drab white to us but are brightly colored (hence alluring) to the ultraviolet-sensitive eyes of insects; fluorescent lamps flicker on and off just too fast for humans to discern, but the strobelike effect is visible to honeybees, who must see every flower while flying at speed over a meadow. Shows real features of the world escape our senses entirely.\n- **White \u0026 Krippner, Future Science** — writer John White and parapsychologist Stanley Krippner list 97 different cultures that refer to the aura under 97 different names. Talbot uses this to show the concept\u0027s cross-cultural universality (alongside prana, ch\u0027i, nefish, and halo iconography in Christian, Chinese, Japanese, Tibetan, and Egyptian traditions).\n- **Luminous saints** — Thurston devotes an entire chapter of his book on miracles to luminous phenomena associated with Catholic saints; both Neumann and Sai Baba are reported to have had occasionally visible auras; the Sufi mystic Hazrat Inayat Khan (d. 1927) is said to have sometimes given off so much light that people could actually read by it. Supports the claim that a very spiritual person\u0027s aura can become visible to normal perception.\n- **Talbot\u0027s own aura sight (personal)** — his ability arose spontaneously; the first time he saw the mist of light around his arm he thought his sleeve had caught fire. He clearly sees only the crown chakra — a whirlwind a few inches to a foot-plus tall that grows taller/brighter in joy and \"bobs and sways like a candle flame\" when people dance; he wonders if this is what the apostle Luke described as the tongues of fire at Pentecost. He sees aura colors only occasionally.\n- **Barbara Brennan\u0027s background** — began as an atmospherics physicist working for NASA at the Goddard Space Flight Center, later a counselor; as a child she could walk blindfolded through the woods avoiding trees by sensing their energy fields with her hands; several years into counseling she began seeing halos of colored light around people\u0027s heads and developed the ability into healing.\n- **Brennan: uterus diagnosis case** — Brennan told a woman there was something abnormal about her uterus; the woman confirmed her doctor had found the same problem, which had already caused one miscarriage, and several physicians had recommended a hysterectomy. Brennan advised a month off with self-care; a month later the woman\u0027s physician confirmed the uterus had returned to normal, and a year later she gave birth to a healthy baby boy.\n- **Brennan: broken coccyx case** — Brennan saw that a man\u0027s sexual performance problems traced to a coccyx (tailbone) broken when he was twelve; the still out-of-place coccyx was pressing on his spinal column, causing the dysfunction.\n- **Brennan: disease and drug signatures in the aura** — early cancer looks gray-blue, turning black as it progresses; white spots appear in the black, and if they sparkle and look like they\u0027re erupting from a volcano, the cancer has metastasized. Alcohol, marijuana, and cocaine create \"etheric mucus\"; in one case she told a startled client which nostril he habitually used to snort cocaine because the field over that side of his face was always gray with it. Prescription drugs often cause dark areas over the liver; chemotherapy \"clogs\" the entire field; she has seen auric traces of supposedly harmless radiopaque dye (used to diagnose spinal injuries) a full ten years after injection.\n- **Brennan: psychological signatures** — a psychopathic personality has a top-heavy aura; a masochistic personality\u0027s field is coarse, dense, and more gray than blue; a rigid personality\u0027s field is also coarse and grayish with most energy concentrated on the aura\u0027s outer edge.\n- **Brennan: healing and endorsements** — she says illness can be caused by tears, blockages, and imbalances in the aura, and manipulating these with her hands and her own field enhances healing. Elisabeth Kubler-Ross calls her \"probably one of the best spiritual healers in the Western Hemisphere\"; Bernie Siegel says her work \"is mind opening\" and fits his experience.\n- **Brennan: long-distance aura reading** — she can read a person\u0027s aura at a distance of many miles; her longest reading so far was during a telephone conversation between New York City and Italy. Talbot presents this as evidence the field \"exists everywhere and is nonlocal until it is plucked out of the frequency domain by human perception.\" Her book is Hands of Light.\n- **Carol Dryer\u0027s practice** — Los Angeles \"human energy field consultant\"; has seen auras as long as she can remember (got in trouble as a child for revealing intimate details about her parents\u0027 friends); over five thousand clients in a decade and a half, including celebrities (Tina Turner, Madonna, Rosanna Arquette, Judy Collins, Valerie Harper, Linda Gray) plus physicists, journalists, archaeologists, lawyers, and politicians; has assisted police and consults for psychologists, psychiatrists, and medical doctors.\n- **Dryer\u0027s mode of seeing** — gives long-distance readings but prefers the same room; sees the field as well with eyes closed as open and usually keeps them closed to concentrate — yet it is \"always in front of me as if I\u0027m looking at a movie or a play... more real and more brightly colored\" than the room. She does not see stratified layers or often even the physical outline; when she sees the etheric it is because it contains leaks or rips (\"like a ripped blanket or a torn curtain\") from trauma, injury, illness, or devastating experience. She experiences layers as changing textures and intensities — like ocean water of different temperatures washing by — her vision \"telescoping through various levels and dimensions.\" Like Brennan she can diagnose illnesses from the aura, and when she chooses she can adjust her vision and see the chakras; her special skill, though, is the eerily accurate status report on a person\u0027s emotional, psychological, and spiritual being.\n- **Dryer: fields as fingerprints** — she perceives kaleidoscopic clouds of color, complex images, glistening shapes, gossamer mists; shallow people have shallow, humdrum auras, complex people complex ones; \"A person\u0027s energy field is as individual as their fingerprint. I\u0027ve never really seen any two that look alike.\"\n- **Talbot\u0027s first reading with Dryer (personal)** — as virtual strangers, she described specific, detailed assessments of his talents, vulnerabilities, and personality dynamics that not even close friends knew; some clients liken a session with her to six months of psychotherapy. Talbot also spoke with or heard session recordings of over two dozen of her clients, who almost without exception found her equally accurate.\n- **Shafica Karagulla\u0027s investigation of HSP doctors** — neurologist/psychiatrist (M.D. from the American University of Beirut; psychiatry under Sir David K. Henderson at the Royal Edinburgh Hospital; three and a half years as research associate to Wilder Penfield, whose memory studies launched Lashley and Pribram). Began a skeptic, became a believer after confirming aura-seers\u0027 diagnostic accuracy; coined \"higher sense perception\" and in the 1960s sought doctors with the ability.\n- **Karagulla: the cornered doctor** — one reluctant doctor kept putting her off, so she booked an appointment as a patient and challenged him to diagnose her by HSP alone (\"All right, stay where you are. Don\u0027t tell me anything.\"). He scanned her body and described her health, including an internal condition that would eventually require surgery — a condition she had secretly already diagnosed. He was \"correct in every detail.\"\n- **Karagulla: the hidden network (Breakthrough to Creativity)** — she met doctor after doctor with the gift: famous surgeons, Cornell University professors of medicine, heads of hospital departments, Mayo Clinic physicians (identified by first name only). Unknown to each other and thinking themselves alone and peculiar, they invariably described an \"energy field\" or \"moving web of frequency\" around and interpenetrating the body; some saw chakras without knowing the term, describing \"vortices of energy at certain points along the spine, connected with or influencing the endocrine system.\" Almost all kept it secret to protect their reputations. Karagulla concludes science should take cognizance when many reliable individuals independently report the same phenomena.\n- **Dolores Krieger and Oscar Estebany** — Krieger, professor of nursing at NYU, joined a study of the well-known Hungarian healer Estebany and found he could raise hemoglobin levels in ill patients simply by manipulating their fields. She then studied prana, chakras, and the aura, apprenticed under clairvoyant Dora Kunz, learned to feel and heal blockages by hand, and created \"therapeutic touch.\" Her first class was the NYU master\u0027s course \"Frontiers in Nursing: The Actualization of Potential for Therapeutic Field Interaction\"; she has since taught the technique to thousands of nurses and it is used in hospitals around the world.\n- **Janet Quinn\u0027s double-blind therapeutic touch study** — Quinn (associate professor and assistant director of nursing research, University of South Carolina at Columbia) had nurses trained in therapeutic touch pass their hands over one group of heart patients, and untrained nurses mimic the motions over another group. Anxiety levels dropped 17 percent in authentically treated patients after only five minutes; no change in the \"fake\" treatment group. The study was the lead story in the Science Times section of the March 26, 1985, New York Times.\n- **W. Brugh Joy\u0027s discovery (1972)** — USC heart and lung specialist (graduate of Johns Hopkins and the Mayo Clinic) was examining a healthy male in his early twenties when his hand passed over the solar plexus and he sensed \"something that felt like a warm cloud\" radiating three to four feet from the body, cylinder-shaped, about four inches in diameter. He found all his patients had palpable cylinderlike radiations at various body points; only on reading an ancient Hindu book did he realize he had rediscovered the chakras. He thinks the holographic model best explains the field, believes the ability to see auras is latent in all of us, and now mostly teaches others to sense the field.\n- **Michael Crichton learns to see the field** — the bestselling author (The Andromeda Strain, Sphere; director of Coma and The First Great Train Robbery), who holds a medical degree from Harvard University Medical School, describes in his autobiography Travels how he learned to feel and eventually see the human energy field studying under Joy and other teachers: \"There isn\u0027t any delusion. It is absolutely clear that this body energy is a genuine phenomenon of some kind.\"\n- **Valerie Hunt\u0027s EMG confirmation of the field** — physical therapist and UCLA professor of kinesiology; over twenty years developed an experimental confirmation using the electromyograph (normally measures muscle electricity). She got interested after meeting a dancer who said she used her own energy field to help her dance; made EMGs of the dancer\u0027s muscles while dancing and studied healers\u0027 effects on patients\u0027 muscle electricity. Baseline biology: brain electrical activity runs 0–100 cps (mostly 0–30), muscles up to about 225 cps, heart to about 250 cps. Hunt\u0027s electrodes picked up an additional field radiating from the body — subtler and smaller in amplitude, averaging 100–1600 cps and sometimes higher, strongest not at brain/heart/muscle but in the areas associated with the chakras. \"The results were so exciting that I simply was not able to sleep that night.\"\n- **Hunt: color/frequency correlation with aura readers** — whenever an aura reader saw a particular color in someone\u0027s field, the electromyograph picked up a specific frequency pattern Hunt learned to associate with that color, visible on an oscilloscope (e.g., confirming \"blue\" instrumentally). In one experiment she tested eight aura readers simultaneously against the oscilloscope and each other: \"It was the same right down the line.\"\n- **Hunt: talent-frequency bands** — people focused mainly on the material world have field frequencies in the lower range, near the body\u0027s 250-cps biological ceiling; psychics and healers also show roughly 400–800 cps; trance channelers skip the \"psychic\" band entirely and operate in a narrow 800–900 cps band (\"They don\u0027t have any psychic breadth at all... they literally are almost out of it\"); mystical personalities run above 900 cps. Using a modified electromyogram (a normal one detects only up to 20,000 cps) she has recorded individuals with frequencies as high as 200,000 cps — which Talbot notes echoes mystical traditions\u0027 talk of spiritually advanced people having a \"higher vibration.\"\n- **Hunt: the chaos analysis** — field data on the oscilloscope fluctuated constantly (clumps, waning, patchiness); suspecting hidden order, Hunt worked with a mathematician. Four seconds of EKG data → straight line; same amount of EEG data → straight line; EMG → slightly swollen line, still no chaos pattern; even the field\u0027s lower frequencies → straight line. But the field\u0027s very high frequencies produced \"the most dynamic chaos pattern you ever saw\" — never repeating, so dynamic and complex she named it a \"chaos holograph pattern.\" She believes it was the first true chaos pattern found in a major electrobiological system: researchers later found chaos patterns in EEGs but needed many minutes of data from numerous electrodes, whereas Hunt got hers from three to four seconds of data from one electrode — suggesting the field is far richer in information and more complexly organized than the brain\u0027s electrical activity.\n- **Hunt: holographic distribution of body electricity** — EEG activity is strongest in the brain but a reading can be taken from an electrode on the toe; an EKG can be picked up in the little finger (stronger and higher amplitude at the heart, but same frequency and pattern everywhere). Every portion of the \"holographic field reality\" of the aura contains aspects of the whole field, yet portions are not identical — the differing amplitudes keep the field dynamic and flowing rather than a static hologram.\n- **What the field is made of** — Hunt does not believe it is purely electromagnetic: \"much more complex and without doubt composed of an as yet undiscovered energy.\" Psychics almost universally describe it as higher-frequency than normal matter-energy; ancient Hindu literature says matter is made of anu (\"atoms\") and the field\u0027s energies exist paramanu (\"beyond the atom\"). Bohm likewise believes in many subtle subquantum energies unknown to science; he doesn\u0027t know whether the field exists but says attention reaching the implicate order\u0027s subtler levels should \"see more than we ordinarily see.\" Bohm also notes we don\u0027t know what any field is (\"What is an electric field? We don\u0027t know\") — as with electrons, we can only describe behavior, so the energy field will ultimately be defined by how it behaves.\n- **Beatrice Rich: silver objects case** — Rich (whose powers appeared in childhood — objects occasionally moved on their own in her presence; began as an artist, became a full-time psychic; covered in New York magazine, World Tennis, New York Woman) once saw silver spoons, silver plates, and similar objects circling around a man\u0027s head; she finally told him and learned he was in the import/export business trading in exactly those objects. The experience \"changed her perceptions forever.\"\n- **Dryer: the Idaho potato case** — during a reading Dryer saw a bunch of potatoes whirling around a woman\u0027s head; dumbfounded, she asked if potatoes had special meaning; the woman laughed and handed over her business card — she was from the Idaho Potato Board \"or something like that.\"\n- **Dryer: the sculptor\u0027s mud case** — Dryer saw a wispy, holographiclike layer of mud clinging to an impeccably groomed woman\u0027s hands and arms; the woman explained she was a sculptor and had that morning tried a new medium that clung to her arms and hands exactly as described. Shows aura images can appear as ghostly extensions of the body itself.\n- **Talbot\u0027s werewolf image (personal)** — while deep in thought about a werewolf novel he was writing, Talbot saw a translucent werewolf body formed around his own — individual hairs in the fur, canine nails protruding from the wolfish hand encasing his own — a purely visual phenomenon. Dryer, his house guest, walked in and immediately said \"Oh my, you must be thinking about your werewolf novel because you\u0027ve become a werewolf\"; comparing notes, they were seeing the same features, and the image slowly faded as his thoughts strayed from the novel. Shows prominent thoughts forming verifiable three-dimensional images in the field.\n- **Rich: movies in the aura** — she often sees a small transparent movie behind a client\u0027s head or shoulders showing things they do in life — their offices, what their bosses look like, what has happened over the last six months. In one case she described a home with masks and flutes on the wall; the client denied it, then realized: \"Oh, that\u0027s my summer home.\"\n- **Dryer: three-dimensional movies** — usually in color but sometimes brown or tintype-like; stories can take five minutes to an hour to unfold and are incredibly detailed (how many plants in a room, leaves per plant, bricks in a wall). When she chooses an image it expands to fill the room — \"sometimes I feel I can step right into it... as if I\u0027m in a three-dimensional movie, a holographic movie, with the person.\"\n- **Talbot\u0027s toy-closet incident (personal)** — at age five Talbot spent hours meticulously organizing his toys in a closet and admonished his mother not to touch anything; in his first reading Dryer described this incident in detail (chuckling as she watched it \"unfold like a movie\" in his field), along with many other events of his life.\n- **Dryer: the unconscious\u0027s picture-show** — some of her holographic movies are written in the symbolic language of the unconscious (Fromm\u0027s \"forgotten language\" of dreams, myths, fairy tales, religious visions); she peels back the waking self and reads the river of unconscious imagery, which is why \"Jungian psychologists love me.\" Her verification method: a misinterpreted image \"doesn\u0027t go away. It just stays in the energy field,\" but once the person has been told everything they need to know it dissolves and disappears — she thinks the client\u0027s own unconscious chooses what to show her (like Ullman, she believes the psyche tries to teach the conscious self what it needs to grow). Talbot\u0027s own reading felt like being told a dream he had not yet dreamed. He wonders if this density of information is why Hunt\u0027s aura data produced such a pronounced chaos pattern.\n- **Emanuel Swedenborg\u0027s portrayals** — nearly three hundred years ago the Swedish mystic reported seeing a \"wave-substance\" around people in which thoughts were visible as images he called \"portrayals\": \"I could see solid concepts of thought as though they were surrounded by a kind of wave...\"; thinking about a known person, \"his image appeared... but all around, like something flowing in waves, was everything I had known and thought about him from boyhood.\" Shows the images-in-aura phenomenon is not new.\n- **Ronald Wong Jue\u0027s Holographic Body Assessment** — California clinical psychologist, former president of the Association for Transpersonal Psychology, talented clairvoyant; finds an individual\u0027s history contained in the body\u0027s inherent \"energy patterns\" (\"The body is a kind of microcosm, a universe unto itself\"). Instead of seeing movies in the field, he conjures them in his mind\u0027s eye by laying hands on the person — psychometrizing the body — to quickly determine emotional scripts, core issues, and relationship patterns; used clinically to facilitate therapy and taught in seminars. Learned from psychiatrist colleague Ernest Pecci, who called it \"body reading\"; Jue renamed it via the holographic model.\n- **Karagulla\u0027s \"Diane\": intestinal blockage case** — Diane, head of a corporation with X-ray vision (\"For me as a psychiatrist to be meeting somebody who was reported to be able to \u0027see\u0027 right through me was a shattering reversal of my usual procedures,\" Karagulla wrote). In on-the-spot testing Diane described a woman\u0027s field as \"wilted\" and \"broken into fragments,\" then looked inside and saw an intestinal blockage near her spleen — surprising because the woman had none of the usual symptoms. X-rays revealed a blockage in the precise area, and three days later the woman had surgery to remove the life-threatening obstruction.\n- **Diane: hospital outpatient tests** — Karagulla had Diane diagnose random patients at a large New York hospital\u0027s outpatient clinic, checking against records. For one unknown woman, Diane reported: pituitary gland missing, pancreas apparently not functioning properly, breasts affected but now missing, not enough energy through the spine from the waist down, trouble with her legs. Records showed: pituitary surgically removed, hormones affecting the pancreas, double mastectomy for cancer, back operation to decompress the spinal cord and relieve leg pain, nerve damage making bladder-emptying difficult. In case after case Diane described internal organs, glands present or absent, even bone density/brittleness; Karagulla concluded her physical observations \"correlated with amazing accuracy with the medical diagnoses.\"\n- **Brennan\u0027s internal vision** — has accurately diagnosed bone fractures, fibroid tumors, and cancer; often tells an organ\u0027s condition by color (healthy liver dark red; jaundiced liver sickly yellow-brown; a chemotherapy patient\u0027s liver usually green-brown); can adjust focus down to microscopic structures such as viruses and individual blood cells.\n- **Talbot\u0027s spleen incident (personal)** — Talbot had spleen trouble and did daily healing visualizations; impatient at the lack of overnight results, he mentally scolded his spleen in private. Days later, without being told of the problem, Dryer immediately described what was wrong with his spleen, then paused, confused: \"Your spleen\u0027s very upset about something... Have you been yelling at your spleen?\" She warned that the spleen had become ill because it thought it was doing what he wanted (unconscious wrong directions), and now the scolding had confused it further: \"Never, never get angry at your body or your internal organs... Only send them positive messages.\" Talbot takes this as evidence both of internal vision and that organs may possess their own rudimentary intelligence — recalling Pert\u0027s assertion that she no longer knows where the brain leaves off and the body begins; if the body is holographic, the consciousness of the whole may be contained in all its parts.\n- **Shamanic internal vision** — among the Araucanian Indians of Chile and the Argentine pampas, a newly initiated shaman is taught to pray specifically for internal vision, essential for the shaman\u0027s diagnostic/healing role; Australian shamans call it the \"strong eye\" or \"seeing with the heart\"; the Jivaro Indians of the forested eastern slopes of the Ecuadorian Andes acquire it by drinking an extract of the jungle vine ayahuasca, believed to bestow psychic abilities — anthropologist Michael Harner (New School for Social Research) says it lets the Jivaro shaman \"see into the body of the patient as though it were glass.\" The ability to \"see\" an illness — literally or as a metaphorical hologram (e.g., a demonic, repulsive creature in or near the body) — is universal in shamanic traditions.\n- **Richard Gerber on the etheric template** — Detroit physician, twelve years investigating medical implications of subtle energy fields: \"The etheric body is a holographic energy template that guides the growth and development of the physical body.\" He holds that each body is template for the denser one below (physical ← etheric ← astral/emotional ← mental...), so healing at the mental level \"is stronger and produces longer lasting results than healing from either the astral or etheric levels.\"\n- **William Tiller\u0027s ratchet effect and cosmology** — the physicist argues thoughts generate patterns at the mind level of nature; illness manifests downward via the \"rachet effect\" — first etheric, then physical, \"where we see it openly as disease.\" Recurrent illness happens because medicine treats only the physical level; cures \"will not be permanent because we have not altered the basic hologram at the mind and spiritual levels.\" He further speculates the universe itself began as a subtle energy field: God\u0027s divine pattern acted like an image in an energy field, molding ever less subtle cosmic levels \"on down the line via a series of holograms\" until it coalesced into a hologram of a physical universe — making each human a universe in miniature. Talbot links this to miracles, and to synchronicities: emotionally powerful thoughts (crisis, transformation) may be potent enough to manifest as coincidences in physical reality.\n- **Illness-in-field-first / stigmata explanation** — because illness can appear in the energy field weeks and even months before the body, many psychics believe disease originates there; this may explain Achterberg\u0027s and Siegel\u0027s findings that patients \"image\" their illnesses months before manifestation (unconscious imaging programming the body via the field), why imagery and visualization can heal, and how faith and meditation on religious images could impress the field until stigmatists grow nail-like fleshy protuberances from their hands.\n- **Participatory structure: Brennan\u0027s layers and the tantras** — Brennan frankly notes that the more a client understands the differences between the layers, the clearer and more distinct their field\u0027s layers become; her structure is \"but one system.\" The authors of the tantras (Hindu yogic texts of the fourth through sixth centuries A.D.) perceived only three layers. Talbot argues observers\u0027 beliefs may help mold the field\u0027s structure.\n- **Motoyama\u0027s mother and the Sanskrit letter yam** — Japanese clinical psychologist Hiroshi Motoyama, who developed a technique for measuring the electrical presence of the chakras, got interested because his clairvoyant mother saw them clearly — but was puzzled for years by what looked like an inverted sailboat in her heart chakra. Motoyama\u0027s research revealed it was the Sanskrit letter yam, which the ancient Hindus perceived in the heart chakra. Some psychics (e.g., Dryer) also see Sanskrit letters in the chakras; others don\u0027t — Talbot\u0027s only explanation is that those who do are tuning into holographic structures imposed on the field long ago by ancient Hindu belief, showing observer-created structures can be remarkably long-lived.\n- **Libet \u0026 Feinstein\u0027s timing experiments (Mount Zion Hospital, San Francisco)** — the neurophysiologists measured how long a touch stimulus on a patient\u0027s skin took to reach the brain as an electrical signal: the brain registered it 0.0001 second after it occurred; the patient pressed a response button 0.1 second after the stimulus; but conscious awareness of stimulus or button-press came only after almost 0.5 second. The decision was made by the unconscious; the brain created \"the comforting delusion\" of conscious control — none of the patients realized their unconscious had acted first. Some researchers wonder if free will is an illusion. Later studies showed the brain starts generating movement signals one and a half seconds before we \"decide\" to move a muscle such as lifting a finger.\n- **Hunt: the field responds before the brain** — taking simultaneous EMG (field) and EEG (brain) readings, Hunt found that a loud sound or bright light registers on the field\u0027s EMG before it ever shows up on the EEG. Her conclusion: \"I think we have way overrated the brain as the active ingredient... It\u0027s just a real good computer... The mind\u0027s not in the brain. It\u0027s in that damn field.\"\n- **Dryer: reading reactions from the field** — she keeps her eyes closed and watches clients\u0027 fields instead of faces: \"As I speak I can see the colors change in their energy field... if their field becomes foggy I know they\u0027re not understanding what I\u0027m telling them.\" Another sign the field responds before conscious registration.\n\n## Key quotes\n- \"These fields are holograms which change in time (and are) outside the reach of our normal senses. This is what clairvoyants perceive as colorful egg-shaped halos or auras surrounding our physical bodies.\" — Itzhak Bentov, Stalking the Wild Pendulum, the chapter epigraph.\n- \"The eyes may be visual organs, but it is the brain that sees.\" — Talbot, summing up the vision-editing research at the chapter\u0027s opening.\n- \"Mystical experience makes sense when one can provide the mathematical formulas that take one back and forth between the ordinary world, or \u0027image-object\u0027 domain, and the \u0027frequency\u0027 domain.\" — Pribram, on what mystics glimpse.\n- \"From the point of view of the holographic universe, these events [the aura and the healing forces required to manipulate its energies] emerge from frequencies that transcend time and space; they don\u0027t have to be transmitted. They are potentially simultaneous and everywhere.\" — Brennan, framing her abilities in Pribram\u0027s model.\n- \"When many reliable individuals independently report the same kind of phenomena, it is time science takes cognizance of it.\" — Karagulla, concluding her report on doctors with HSP.\n- \"There isn\u0027t any delusion. It is absolutely clear that this body energy is a genuine phenomenon of some kind.\" — Michael Crichton in Travels, after learning to perceive the field under Brugh Joy and other teachers.\n- \"The results were so exciting that I simply was not able to sleep that night. The scientific model I had subscribed to throughout my life just couldn\u0027t explain these findings.\" — Valerie Hunt, on first detecting the field\u0027s 100–1600 cps radiation with the electromyograph.\n- \"The pattern is never a repeatable one, but it\u0027s so dynamic and complex, I call it a chaos holograph pattern.\" — Hunt, on the chaos analysis of high-frequency field data.\n- \"The implicate order has many levels of subtlety. If our attention can go to those levels of subtlety, then we should be able to see more than we ordinarily see.\" — Bohm, commenting on the possibility of the human energy field.\n- \"The aura not only represents, but also contains, the whole.\" — Brennan, on the field\u0027s holographic distribution of personal information.\n- \"The etheric body is a holographic energy template that guides the growth and development of the physical body.\" — Richard Gerber, on the field-as-blueprint idea.\n- \"The mind\u0027s not in the brain. It\u0027s in that damn field.\" — Hunt, after finding the field\u0027s EMG responds to stimuli before the brain\u0027s EEG.\n\n## Thread\nThis chapter carries the holographic model from healing (the mind-body chapters preceding it) into perception itself: if the brain is a lens converting the frequency domain into appearances, then aura-seers are people whose lens admits more of the frequency domain — and the energy field they report becomes the \"implicate order of the body,\" the blueprint level that explains the previous chapter\u0027s healing miracles, imagery effects, and stigmata. It also plants two escalations the book will build on: mind may reside in the field rather than the brain (so awareness may not be confined to the body — \"as we will see, there is considerable evidence to support this idea\"), and reality at subtle levels is participatory, co-created by belief. The closing paragraph explicitly hands off to the next chapter: if Bohm is right that even time unfolds out of the implicate order, the division into past, present, and future is another construct of the mind — the subject of Part III, \"Space and Time.\"\n\n## Connections\n- **Ch 1 (Pribram / the brain as hologram)** — the frequency-domain/image-object framework, Pribram\u0027s monkey vision studies, and the Lashley–Pribram memory lineage (via Penfield, Karagulla\u0027s mentor) all trace back to the book\u0027s opening chapter.\n- **Ch 2 (Bohm / the implicate order)** — Bohm\u0027s implicate order, his dictum that there is no disorder \"only orders of indefinitely high degree\" (recalled in the chaos section), his subtle subquantum energies, and \"we don\u0027t even know what electrons are\" (\"as we saw in an earlier chapter\").\n- **Ch 5 (previous chapter, mind-body healing/miracles)** — explicitly referenced: \"In the last chapter we explored the possibility that the body is not a solid construct, but is itself a kind of holographic image\"; also Achterberg\u0027s and Siegel\u0027s imaging findings, stigmatists, Pert\u0027s brain/body remark, Thurston\u0027s miracles book, Neumann and Sai Baba, and \"the miracles we examined in the previous chapter.\" Ullman\u0027s view of the psyche teaching the conscious self (from an earlier chapter) recurs in Dryer\u0027s practice.\n- **Ch 7 (next chapter, Part III)** — set up directly: the linear division of time into past/present/future as a construct of mind, and evidence bearing on it.\n- **Possible cross-book links (speculative only)**: Virk\u0027s *The Simulation Hypothesis* — the field-as-blueprint/\"template rendering the body\" idea rhymes with rendered-world arguments; Campbell\u0027s *My Big TOE* — consciousness as primary and reality as an information field echoes Hunt\u0027s \"mind\u0027s not in the brain\" and Tiller\u0027s mind-level patterns; Tolle\u0027s *The Power of Now* — the closing claim that linear time is a mental construct parallels Tolle\u0027s treatment of psychological time; Pasulka\u0027s *American Cosmic* — the participatory-reality theme (belief shaping what observers find) loosely parallels her interest in how belief structures experience of anomalous phenomena.\n"},{"id":"holographic-universe/07-time-out-of-mind","file":"07-time-out-of-mind.md","title":"Time Out of Mind","type":"chapter","chapter":"7","concepts":["implicate-order","retrocognition","psychometry","psychic-archaeology","holographic-record-of-the-past","multiple-image-hologram","white-light-hologram","nonlocality-of-the-past","natures-memory","fairy-faith","precognition","precognitive-dreams","precognitive-remote-viewing","chair-tests","hololeaps","parallel-holographic-universes","crystallizing-possibilities","reincarnation","past-life-regression","metaconsciousness","interlife","soul-mates","retributive-karma","template-body","birthmark-carryover","tondi","aumakua","kino-mea","shadowy-body-stuff","tsal","sadhanas","alam-almithal","hadarat","himma","thought-as-builder","creative-visualization","futureshaping","retroactive-psychokinesis","future-life-progression","mass-dreams-of-the-future","planetary-commission","time-slips"],"people":["Larry Dossey","Stefan Ossowiecki","Stanislaw Poniatowski","Norman Emerson","George McMullen","W. H. C. Tenhaeff","Marius Valkhoff","Gerard Croiset","Lawrence LeShan","Eileen Garrett","Clarence W. Weiant","Stephan A. Schwartz","David Bohm","Rich (psychic)","W. Y. Evans-Wentz","John Davies","J. B. Rhine","Louisa Rhine","Helmut Schmidt","Montague Ullman","Stanley Krippner","Charles Honorton","Harold Puthoff","Russell Targ","Hella Hammid","Robert Jahn","Brenda Dunne","Jule Eisenbud","Karlis Osis","J. Fahler","Arthur Osborn","Irene Muza","David Loye","Cordero","Ingo Swann","George Washington","Joel Whitton","William Cox","Ian Stevenson","William Tiller","Edgar Cayce","Paramahansa Yogananda","Buddha","Iamblichus","Rabbi Steinsaltz","Shakti Gawain","Louise L. Hay","Jane Roberts","Jean Houston","Mary Orser","Richard A. Zarro","Edgar Mitchell","Helen Wambach","Chet Snow","Marilyn Schlitz","Anne Moberly","Eleanor Jourdain","Gardner Murphy","Buterbaugh","Marie Antoinette"],"body":"\n# Ch 7 — Time Out of Mind\n\n## In one paragraph\nTalbot argues that in a holographic universe linear time is not fundamental: past and future both remain \"recorded\" in the implicate order and are therefore accessible to consciousness. He opens with evidence for retrocognition — clairvoyants such as Ossowiecki and McMullen reading the past from artifacts and sites with archaeologically verified accuracy — and interprets it through Bohm\u0027s idea that the past does not cease to exist but re-enfolds into the implicate, where mind and the record of the past are \"neighbors.\" He then surveys precognition (card-guessing, dream labs, remote viewing, Croiset\u0027s chair tests) and resolves the free-will paradox with Loye\u0027s picture of multiple parallel holographic futures between which we make \"hololeaps,\" and Bohm\u0027s parallel view that premonitions perceive tendencies already implicate in the present. The chapter\u0027s second half turns to reincarnation research (Whitton, Stevenson, Wambach) as evidence that a deep, \"metaconscious\" stratum of the psyche actively scripts our destiny — even our bodies — an idea Talbot finds echoed in kahuna, Tibetan tantric, Sufi, and other traditions of \"thought as builder.\" He closes with three further time anomalies: mass hypnotic progressions into four alternative futures, retroactive psychokinesis on the past, and apparent physical \"walks\" into past scenes such as the Moberly–Jourdain Versailles episode.\n\n## Core claims\n- Talbot argues the past is not lost but persists in the implicate order — Bohm\u0027s \"cosmic storehouse\" — and retrocognition is a shift of attention that accesses it; since consciousness also has its source in the implicate, mind and the record of the past \"are, in a manner of speaking, already neighbors.\"\n- Talbot claims retrocognition \"has been confirmed repeatedly by researchers\" and, citing Schwartz, that psychic archaeology has been \"a reality\" for three-quarters of a century.\n- Talbot argues the retrocognitive experience is hologram-like in two ways: the accessed scenes are fully three-dimensional, and the record is nonlocal — accessible at the site or many miles away, like information in a hologram.\n- Talbot argues the multiple-image \"white light\" hologram is a metaphor for time itself: the whole activity is always recorded, and the viewer\u0027s changing perspective creates the illusion of unfolding in time.\n- Following Evans-Wentz, Talbot suggests some \"fairy\" sightings are afterimages of past events — \"Nature\u0027s mental records\" — and that belief determines whether such abilities manifest (the Manx \"education\" remark).\n- Talbot claims an \"enormous body of evidence\" proves at least some future events are as easy to see as past ones (Rhine, Schmidt, dream-lab, remote-viewing, chair-test results).\n- Talbot argues the future is neither frozen nor nonexistent but \"substantive enough for us to perceive it, but malleable enough to be susceptible to change\" — Loye\u0027s many jostling holographic futures and \"hololeaps,\" Bohm\u0027s \"shadows cast deep in the implicate order,\" Swann\u0027s and the kahunas\u0027 \"crystallizing possibilities.\" Precognized disasters that were avoided (Titanic cases) show the future is plastic, so free will survives.\n- Talbot presents Whitton\u0027s and Stevenson\u0027s reincarnation data as suggestive (explicitly not proof — \"The evidence does not prove that reincarnation exists, nor is it the intention of this book to make such an argument\") that a deeply unconscious part of us plans our life circumstances, chooses our companions, and even shapes our physical body via a nonphysical \"template\" body.\n- Talbot argues, via Stevenson, that there is no \"retributive karma\" or external judge — \"we are the makers of our own souls\" — and that moral character, not material circumstance, carries between lives.\n- Talbot claims the idea that thought creates destiny recurs across shamanic, Hawaiian, Tibetan, Sufi, biblical, kabbalistic, and modern self-help sources, and asks whether this ubiquity signals \"something all human beings intuitively know is true\"; in a holographic universe he judges it \"not so farfetched. It even seems probable.\"\n- Talbot argues (via Schmidt–Schlitz) that mind may even alter the past retroactively, and (via the Versailles cases) that under some conditions people may physically walk into past scenes — conclusions he frames as possibilities \"we may have to become accustomed\" to, since in a holographic universe time is an illusion.\n\n## Concepts\n- **Implicate order (as home of time)** — Epigraph from Larry Dossey (*Recovering the Soul*): the implicate order is the \"home\" of the mind and of all things, an atemporal plenum where \"moments are not strung together serially like beads on a string.\" Bohm: the flow of time is a constant series of unfoldings and enfoldings; as the present enfolds into the past it returns to the cosmic storehouse of the implicate.\n- **Retrocognition** — \"the ability of certain individuals to shift the focus of their attention and literally gaze back into the past.\"\n- **Psychometry** — handling an object (a bone fragment, a flint, a petrified foot) to tune into scenes from its past; Ossowiecki\u0027s, McMullen\u0027s, and Croiset\u0027s working method.\n- **Multiple-image / white-light hologram (metaphor for the past)** — successive images of an activity recorded like frames of a movie; a \"white light\" hologram is visible to the naked eye without laser light, and walking past it yields a 3-D motion picture. The entire activity is always in the film; the viewer\u0027s changing perspective creates the illusion of transience.\n- **Nonlocality of the past** — the record of the past is not stored at any one location; like holographic information it can be accessed from any point in the space-time framework.\n- **Nature\u0027s memory** — Evans-Wentz\u0027s theory: \"some indefinable psychic element in the earth\u0027s atmosphere upon which all human and physical actions or phenomena are photographed or impressed,\" viewable by normal persons \"like moving pictures.\"\n- **Precognition** — perceiving future events before they occur; demonstrated in \"literally hundreds of studies\" per Talbot.\n- **Chair tests** — Croiset\u0027s protocol: an experimenter randomly picks a chair from the seating plan of an upcoming unreserved-seating public event (any city in the world); without knowing hall, city, or event, Croiset describes the person who will sit there.\n- **Hololeaps** — Loye\u0027s term for intra-holographic leaps between parallel holographic universes; each hologram\u0027s future is fixed, but by leaping between holograms when acting on a premonition we change \"the\" future — the leaps provide \"our true capacity for both insight and freedom.\"\n- **Crystallizing possibilities** — Ingo Swann\u0027s phrase for the composition of the future; the kahunas likewise saw the future as fluid but \"crystallizing,\" with great world events and major personal events (marriage, accidents, death) crystallized furthest in advance. Cordero expresses the same thought with a different image: the future as a hurricane beginning to form and gather momentum, becoming more concrete and unavoidable as it approaches.\n- **Metaconsciousness** — Whitton\u0027s term for the intensely conscientious state of the between-life realm: acute self-awareness, heightened moral/ethical sense, no capacity to rationalize away faults, total honesty with oneself.\n- **Interlife / between-life realm** — a \"dazzling, light-filled realm\" with \"no such thing as time or space as we know it,\" where subjects plan the important events and circumstances of their next life.\n- **Retributive karma** — cosmic punishment for sins; Stevenson found no compelling evidence of it — no external judge shifting us between lives \"according to our deserts.\"\n- **Template body / extended body** — Stevenson\u0027s inferred intermediate nonphysical body carrying attributes (wound imprints) between lives, acting \"as a template for the production on a new physical body of birthmarks and deformities\"; echoes Tiller\u0027s holographic energy-field template of the physical body.\n- **Tondi** — the Batak (Indonesia) soul, which reincarnates and can reproduce both behavior and physical attributes of the former self; everything a person experiences is determined by it.\n- **Aumakua (\"high self\")** — kahuna term for the unconscious portion of a person that sees the crystallized parts of the future and weaves one\u0027s destiny from thought forms.\n- **Kino mea (\"shadowy body stuff\")** — the kahunas\u0027 subtle energetic substance of thoughts; hopes, fears, and imaginings become thought forms — \"rough strands from which the high self weaves our future\" — and also a template on which the physical body is molded (basis of miraculous healing).\n- **Tsal** — the Tibetan tantric \"stuff\" of thoughts; every mental action produces waves of it, and the whole universe is created and animated by the collective tsal of all beings. The average mind functions \"like a small puddle isolated from the great ocean.\"\n- **Sadhanas** — Tibetan tantric visualization exercises for consciously creating with tsal; Kargyupa monks spent up to seven years in solitude perfecting visualization.\n- **Alam almithal** — the twelfth-century Persian Sufis\u0027 subtle matter of thought, which forms into idea-images on the adjacent template plane of being, determining the course of one\u0027s life.\n- **Hadarat** — the Sufi series of subtler planes of being; the plane directly adjacent to ours is a template reality.\n- **Himma (heart chakra)** — for the Sufis, the agent responsible for forming idea-images; controlling it is the prerequisite for controlling one\u0027s destiny.\n- **Thought as builder** — Edgar Cayce\u0027s trance dictum (\"thought is the builder\"): thoughts are tangible things, a finer form of matter; thinking is like a spider constantly spinning its web, every moment creating the images and patterns that give the future energy and shape.\n- **Retroactive psychokinesis** — the Schmidt–Schlitz finding that subjects appear able to \"reach back through time\" and influence already-recorded random processes.\n- **Future-life progression** — Wambach\u0027s hypnotic technique of progressing subjects to future lives and specified future time periods.\n\n## Experiments, examples \u0026 case studies\n- **Stefan Ossowiecki — the petrified foot vision (dated \"February 14, 19S5\" in the OCR text; the digit is corrupt — 1935 or 1955)** — The Russian-born Polish clairvoyant, \"one of the century\u0027s most gifted,\" handled a fragment of a petrified human foot; the room became ghostly and transparent and he saw a palace courtyard and a pretty olive-skinned Egyptian woman — gold jewelry at neck, wrists, ankles; white translucent dress; black braided hair under a
