coalesce into particles only when observed, so a particle\u0027s properties cannot be said to exist before observation.\n- **Polarization** — the spatial orientation of a photon\u0027s wavelike aspect as it travels away from its point of origin; twin photons always measure to identical angles of polarization.\n- **EPR paradox** — Einstein, Podolsky, and Rosen\u0027s 1935 argument that Bohr\u0027s view forces twin particles into instantaneous (faster-than-light) communication, which special relativity forbids; therefore Bohr had to be wrong.\n- **Plasma** — a gas containing a high density of electrons and positive ions (positively charged atoms), in which electrons stop behaving like individuals and act as part of a larger interconnected whole.\n- **Plasmons** — Bohm\u0027s name for the collective movements of oceans of electrons in metals, whose seemingly haphazard individual motions produce highly organized overall effects; their discovery established his reputation.\n- **Quantum potential** — Bohm\u0027s proposed new field at the subquantum level: like gravity it pervades all of space, but unlike gravitational or magnetic fields its influence does not diminish with distance — subtle but equally powerful everywhere.\n- **Nonlocality** — the property, implied by the quantum potential, that at the subquantum level location ceases to exist: all points in space become equal to all other points, and it is meaningless to speak of anything as separate from anything else. Bohm\u0027s holographic order later explains why: saying every part of a piece of holographic film contains all the information possessed by the whole is really just another way of saying the information is distributed nonlocally — so a universe organized on holographic principles would also be expected to have nonlocal properties.\n- **Infinite causality** — Bohm\u0027s view that an effect can have an infinite number of causes (the Lincoln example), so no single cause-and-effect relationship is ever really separate from the universe as a whole.\n- **Hidden (enfolded) order / degrees of order** — Bohm\u0027s realization that there are different degrees of order, perhaps endless hierarchies of it; things that appear disordered may have order of an \"indefinitely high degree\" (mathematicians cannot even prove randomness). Order can be manifest (explicit) or hidden (implicit), as with the ink drop in glycerine.\n- **Implicate order** — the deeper, enfolded level of reality, a vast and more primary level that gives birth to all objects and appearances of our physical world the way holographic film gives birth to a hologram.\n- **Explicate order** — our own level of existence, the unfolded and perceptible order; the hologram projected from the film.\n- **Enfoldment and unfoldment** — the countless exchanges between the two orders; an electron is an ensemble enfolded throughout the whole of space, and its apparent motion or detection is a continuous series of unfoldments and enfoldments (like the ink drop unfolding from the glycerine). The constant, flowing exchange between the orders also explains how quanta shapeshift from one kind of particle to another: one particle (say an electron) enfolds back into the implicate order while another (a photon) unfolds and takes its place.\n- **Holomovement** — Bohm\u0027s preferred term for the universe, since \"hologram\" suggests a static image and does not convey the dynamic, ever-active enfoldings and unfoldings that create our universe moment by moment.\n- **Undivided wholeness** — because everything is made of the seamless holographic fabric of the implicate order, viewing the universe as composed of \"parts\" is as meaningless as viewing geysers in a fountain as separate from the water; ultimately even the implicate and explicate orders blend into each other.\n- **Relatively independent subtotalities** — Bohm\u0027s term for what we usually call \"things\": aspects of the holomovement that possess unique qualities (like whirlpools in a river) yet cannot be truly divided from the whole.\n- **Fragmentation** — our almost universal tendency to break the world into parts and ignore dynamic interconnectedness, which Bohm believes underlies problems in science, our lives, and society.\n- **Consciousness as a more subtle form of matter** — Bohm\u0027s proposal that the basis of the mind-matter relationship lies in the implicate order; consciousness is present in various degrees of enfoldment in all matter, and something \"mindlike\" exists already in the electron.\n- **Sea of energy / plenum** — the finding that every cubic centimeter of empty space contains more energy than all matter in the known universe; Bohm holds that space is full (a plenum, not a vacuum) and is the ground of all existence, our universe being a mere \"pattern of excitation\" on it.\n- **Aharonov-Bohm effect** — the discovery that under the right circumstances an electron can \"feel\" the presence of a magnetic field in a region where there is zero probability of finding the electron; a nonlocal effect, still occasionally disputed despite numerous confirmations.\n- **Space-time continuum** — Einstein\u0027s general-relativity insight that space and time are not separate but part of a larger whole; Bohm takes it \"a giant step further\": everything in the universe is part of a continuum.\n- **Superstring theory** — cited by Bohm as an example of a physics theory that will probably not be testable for several decades, in defense against the charge that his own theory is untestable.\n- **Phantom limb syndrome** — invoked from Pribram\u0027s work: the felt solidity of the world (fine china, beach sand) is \"really just elaborate versions\" of it — brain-constructed sensation.\n- **Frequency domain** — Pribram\u0027s picture of what is \"out there\": a vast ocean of waves and frequencies that the brain converts into concrete-seeming objects.\n\n## Experiments, examples \u0026 case studies\n- **Bohm\u0027s dripless tea kettle (boyhood, Wilkes-Barre, Pennsylvania)** — as a boy Bohm invented a dripless tea kettle; his businessman father urged him to profit from it, but on learning the first step was a door-to-door test-market survey, Bohm\u0027s interest in business waned. Talbot uses it to show his early inventive curiosity, which turned to quantum physics at Pennsylvania State College in the 1930s.\n- **The dimensionless electron** — physicists found that although an electron sometimes behaves as a compact particle, it literally possesses no dimension: trying to measure the width of an electron is an impossible task. Talbot\u0027s point: an electron \"is simply not an object as we know it.\"\n- **Electron fired at a television screen** — shooting an electron at the screen of a switched-off TV produces a tiny point of light where it strikes the phosphorescent coating; the single point of impact reveals the particlelike side of its nature.\n- **The two-slit behavior of wavelike electrons** — an electron can dissolve into a blurry cloud of energy and behave as a wave: fired at a barrier with two slits, it can go through both slits simultaneously, and wavelike electrons colliding create interference patterns. Shows the wave side of the duality.\n- **The \"quantum bowling ball\" thought illustration (fig. 7)** — Talbot\u0027s analogy for observation-dependence: a bowling ball rolled down a talcum-powdered lane traces a single line while watched, but during a blink it leaves \"a broad wavy strip, like the undulating swath of a desert snake.\" This is comparable to what physicists found: quanta appear to coalesce into particles only when observed.\n- **Nick Herbert\u0027s \"quantum soup\" and Midas analogy** — physicist Nick Herbert, a supporter of the observation-dependence interpretation, imagines that behind his back the world is \"a radically ambiguous and ceaselessly flowing quantum soup\" which his glance freezes back into ordinary reality; we are like King Midas, who never felt silk because everything he touched turned to gold — we never experience true quantum texture because \"everything we touch turns to matter.\"\n- **Positronium decay and twin photons** — the unstable positronium atom (an electron plus a positron, its antiparticle) self-annihilates and decays into two photons traveling in opposite directions; quantum physics says that no matter how far apart they travel, measurement will always find identical angles of polarization. (Talbot\u0027s footnote: positronium decay was not the actual process EPR used — it is chosen because it is easy to visualize.)\n- **The EPR thought experiment (Einstein, Podolsky, Rosen, 1935)** — in the paper \"Can Quantum-Mechanical Description of Physical Reality Be Considered Complete?\" they argued: produce twin particles, let them separate a significant distance, measure both polarizations at precisely the same moment; if identical (as predicted) and if Bohr is right that properties don\u0027t exist until measured, the photons must be communicating instantaneously — impossible under special relativity. Therefore Bohr had to be wrong. Bohr\u0027s counter: twin particles are not independent things but an indivisible system, so no communication is needed. Most physicists sided with Bohr — partly because quantum theory was so successful at prediction, and because the experiment couldn\u0027t yet be technically performed.\n- **Bohm\u0027s plasma work (Lawrence Berkeley Radiation Laboratory, before his 1943 Berkeley doctorate)** — Bohm\u0027s landmark work on plasmas found that electrons in a plasma stop behaving like individuals: their individual motions look random, yet vast numbers produce surprisingly well-organized effects, and the plasma constantly regenerates itself and encloses impurities in a wall the way an organism encases a foreign substance in a cyst. Bohm later remarked he frequently had the impression the electron sea was \"alive.\" Talbot: a striking example of quantum interconnectedness.\n- **Electrons in metals and the discovery of plasmons (Princeton, from 1947)** — as an assistant professor Bohm extended the Berkeley research to electrons in metals; again haphazard individual movements produced highly organized overall effects — entire oceans of particles each behaving as if it knew what untold trillions of others were doing. He named these collective movements plasmons; the discovery established his reputation.\n- **The Bohm–Einstein conversations (Princeton)** — after three years teaching quantum theory, Bohm wrote a textbook to improve his understanding, sent copies to Bohr (no answer) and Einstein. Einstein initiated a six-month series of spirited conversations, saying he had never seen quantum theory presented so clearly, yet both agreed the theory predicted phenomena admirably but gave no real way of conceiving the basic structure of the world; Bohr\u0027s claim that the theory was complete grated on both. *Quantum Theory* (1951) was hailed as a classic — but Bohm no longer gave the subject his full allegiance.\n- **The quantum potential proposal (published 1952)** — assuming particles exist without observers and that a subquantum level exists, Bohm found that simply proposing a new field there (the quantum potential, pervading all space, influence undiminished by distance) explained quantum findings as well as Bohr could. Reaction was mainly negative — dismissals out of hand and passionate attacks, virtually all resting on philosophical differences; Bohm\u0027s alternative was treated as \"little more than heresy.\"\n- **The bullet that killed Lincoln (from *Causality and Chance in Modern Physics*, 1957)** — asked what caused Lincoln\u0027s death, one might say the bullet in John Wilkes Booth\u0027s gun; but a complete list of causes would include everything leading to the gun\u0027s development, all factors that made Booth want to kill Lincoln, even every step of human evolution that produced a hand capable of holding a gun. Bohm\u0027s point: effects have infinitely many causes, and no cause-effect relation is separate from the whole. In the same book he argued no theory can be complete because nature may be infinite.\n- **The ballet analogy for plasma electrons** — Bohm\u0027s explanation via the quantum potential of how plasma electrons (and other specialized states such as superconductivity) behave as wholes: the whole system undergoes \"a co-ordinated movement more like a ballet dance than like a crowd of unorganized people\" — closer to the organized unity of a living being than to parts of a machine assembled together.\n- **The fish and the two television cameras (fig. 8)** — Bohm\u0027s analogy for twin-particle correlation without faster-than-light signaling: two cameras, one on an aquarium\u0027s front and one on its side, feed two monitors; a viewer who has never seen a fish or aquarium might think there are two fish that mysteriously communicate, since each turn of one is matched by the other. In fact, at the deeper level of reality (the aquarium) the two fish are one and the same. This, says Bohm, is precisely what happens with the two photons from positronium decay: apparent separateness masks a deeper unity, and since the quantum potential permeates all of space, all particles are nonlocally interconnected.\n- **John Stewart Bell\u0027s proof (CERN, 1964)** — Bell, a theoretical physicist at CERN (a center for peaceful atomic research near Geneva), was impressed by Bohm\u0027s 1952 paper (\"His idea was to complete quantum mechanics by saying there are certain variables in addition to those which everybody knew about\"). Realizing Bohm\u0027s theory implied nonlocality, he wondered whether it could be tested; on a 1964 sabbatical he produced an elegant mathematical proof showing how. The catch: to exclude normal communication between the particles, all operations had to happen within a few thousand-millionths of a second — beyond available technology.\n- **The Aharonov-Bohm effect (Bristol University, late 1950s)** — after his run-in with McCarthyism, Bohm became a research fellow at Bristol, where with research student Yakir Aharonov he found that under the right circumstances an electron can \"feel\" a magnetic field located in a region where there is zero probability of finding the electron. Many physicists initially disbelieved it, and despite confirmation in numerous experiments, papers occasionally still appear arguing it doesn\u0027t exist. Talbot casts Bohm as the voice noting the emperor has no clothes.\n- **The ink-drop-in-glycerine device (seen on a BBC television program, 1960s)** — a jar with a large rotating cylinder, the narrow gap filled with glycerine, a drop of ink floating motionless in it. Turning the handle spreads the ink until it seems to disappear; turning it back makes the faint tracing collapse into a droplet again (fig. 9). Bohm: this struck him as very relevant to order — the spread-out ink had a \"hidden\" (nonmanifest) order revealed on reconstitution, showing that \"new notions of order must be involved.\" It became his first model of enfolded versus manifest order.\n- **The hologram as master metaphor (papers early 1970s; *Wholeness and the Implicate Order*, 1980)** — soon after the glycerine device Bohm hit on the hologram: interference patterns on holographic film also look disordered to the naked eye yet enfold a hidden order, just as a plasma\u0027s order is enfolded in seemingly random electron behavior. He became convinced the universe itself employs holographic principles — a giant, flowing hologram — and distilled the mature theory in the 1980 book.\n- **The geyser/fountain image** — electrons and all particles are no more substantive or permanent than the form a geyser of water takes gushing from a fountain: sustained by constant influx from the implicate order, and when \"destroyed\" merely enfolded back into the deeper order. Also used later for wholeness: geysers are not separate from the water.\n- **The jeweler and the gem** — Bohm\u0027s account of the observer\u0027s role: both wave and particle aspects are always enfolded in a quantum\u0027s ensemble; the way an observer interacts determines which aspect unfolds — no more mysterious than the way a jeweler manipulates a gem determining which facets become visible.\n- **Hand, lamplight, dog** — Talbot\u0027s direct-address illustration of undivided wholeness: look at your hand, the light from your lamp, the dog at your feet — you are not merely made of the same things, \"You are the same thing. One thing. Unbroken.\"\n- **Eddies and whirlpools in a river** — Bohm\u0027s caution that wholeness does not mean undifferentiated mass: eddies look separate and have individual characteristics (size, rate, direction of rotation), but it is impossible to determine where a whirlpool ends and the river begins. Hence \"relatively independent subtotalities\" instead of \"things.\"\n- **Fragmentation in life and society** — Bohm\u0027s examples of harmful part-thinking: believing we can extract the earth\u0027s valuable parts without affecting the whole; treating parts of the body without concern for the whole; tackling crime, poverty, and drug addiction without addressing society as a whole. He argues this fragmenting habit may even lead to our extinction.\n- **The mindlike electron and the living rock** — Bohm holds that consciousness is present in degrees of enfoldment in all matter (perhaps why plasmas seem lifelike); dividing the universe into living and nonliving is meaningless — even a rock is in some way alive, with life and intelligence present in matter, \"energy,\" \"space,\" \"time,\" and \"the fabric of the entire universe.\"\n- **Andromeda in the thumbnail; Cleopatra meeting Caesar** — the flip side of enfoldment: as every portion of a hologram contains the whole image, every portion of the universe enfolds the whole. If we knew how to access it we could find the Andromeda galaxy in the thumbnail of our left hand, or Cleopatra meeting Caesar for the first time — the whole past and implications for the whole future are enfolded in each small region of space and time; every cell, leaf, raindrop, and dust mote enfolds the cosmos. Talbot ties this to Blake\u0027s \"To see a World in a Grain of Sand.\"\n- **The zero-point energy calculation** — per current physics, every region of space is awash with fields of waves of varying lengths, each with at least some energy; calculating the minimum energy a wave can possess shows every cubic centimeter of empty space contains more energy than the total energy of all matter in the known universe (the section title renders this as \"the energy of a trillion atomic bombs in every cubic centimeter of space\"). Some physicists dismiss the calculation as error; Bohm takes it as a glimpse of the implicate order\u0027s hidden vastness — physicists ignore it like fish unaware of the water they swim in.\n- **The cooled crystal analogy** — a crystal cooled to absolute zero lets a stream of electrons pass through without scattering; raising the temperature makes flaws lose their \"transparency\" and scatter electrons. From an electron\u0027s viewpoint the flaws would look like pieces of \"matter\" floating in nothingness, but both flaws and \"nothingness\" are part of the same fabric — the deeper order of the crystal. Likewise matter does not exist independently of space: the universe is a ripple, a \"pattern of excitation,\" on the cosmic sea of energy.\n- **Interference patterns everywhere** — Talbot\u0027s first piece of experimental support for a holographic universe: even disregarding the implicate sea of energy, space is filled with light and other electromagnetic waves that constantly crisscross and interfere with one another, and since all particles are also waves, physical objects and everything else we perceive in reality are composed of interference patterns — \"a fact that has undeniable holographic implications.\"\n- **The Aspect experiment (Alain Aspect, Jean Dalibard, and Gerard Roger, Institute of Optics, University of Paris, 1982)** — in the 1970s technology finally allowed Bell\u0027s two-particle experiment; several researchers tried with promising but inconclusive results. In 1982 Aspect\u0027s team succeeded: they produced twin photons by heating calcium atoms with lasers, sent each photon in opposite directions through 6.5 meters of pipe and through special filters directing them to one of two possible polarization analyzers; each filter switched between analyzers in 10 billionths of a second — about 30 billionths of a second less than light needs to cross the 13 meters separating the photon sets — ruling out communication by any known physical process. Each photon still correlated its polarization angle with its twin. So either the light-speed ban was violated or the photons were nonlocally connected; since most physicists reject faster-than-light processes, the experiment is generally viewed as virtual proof of nonlocal connection. Physicist Paul Davies (University of Newcastle upon Tyne) adds that since all particles continually interact and separate, nonlocality \"is therefore a general property of nature.\" Talbot: this doesn\u0027t prove Bohm\u0027s model, but gives it tremendous support.\n- **Bohm on testability** — Bohm does not believe any theory, including his own, is correct absolutely — all are approximations, \"finite maps\" of infinite, indivisible territory — but he is confident future techniques will allow his ideas to be tested; when criticized, he notes theories like superstring theory will probably not be testable for decades.\n- **The physics community\u0027s verdict** — Yale physicist Lee Smolin does not find Bohm\u0027s theory \"very compelling, physically.\" Boston University\u0027s Abner Shimony admits he doesn\u0027t understand the theory and wonders how literally to take the metaphor, yet calls Bohm courageous, daring, imaginative, and credits him with bringing the questions to the forefront instead of leaving them swept under the rug. Sympathizers include Roger Penrose of Oxford (creator of the modern theory of the black hole), Bernard d\u0027Espagnat of the University of Paris (a leading authority on the conceptual foundations of quantum theory), and Cambridge\u0027s Brian Josephson (1973 Nobel Prize in physics), who believes the implicate order may someday lead to including God or Mind within science — an idea he supports.\n- **The Pribram synthesis: china cups and beach sand** — combining Bohm with Pribram: the brain mathematically constructs objective reality by interpreting frequencies projected from a deeper order beyond space and time. Pribram: \"The kind of mathematical process that Bekesy simulated with his vibrators is basic to how our brains construct our image of a world out there\" — the smoothness of fine china and the feel of beach sand are elaborate versions of the phantom limb syndrome. A china cup has two aspects: filtered through the brain\u0027s lens it is a cup; without the lens, an interference pattern. Asked which is real, Pribram answers \"Both are real to me, or, if you want to say, neither of them are real.\" We too can be seen as bodies in space or as blurs of interference patterns enfolded in the cosmic hologram — and Bohm thinks the second view may be the more correct, though even \"holographic brain looking at holographic universe\" is an abstraction: we are not looking at the hologram, we are part of it. Bohm\u0027s furthest conclusion: we even construct space and time.\n\n## Key quotes\n- \"It is a theory which is so intuitively satisfying that many people have felt that if the universe is not the way Bohm describes it, it ought to be.\" — John P. Briggs and F. David Peat, *Looking Glass Universe*, the chapter\u0027s epigraph.\n- \"Likewise humans can never experience the true texture of quantum reality, because everything we touch turns to matter.\" — Nick Herbert, comparing us to Midas after describing the unobserved world as \"a radically ambiguous and ceaselessly flowing quantum soup.\"\n- \"Electrons are not scattered because, through the action of the quantum potential, the whole system is undergoing a co-ordinated movement more like a ballet dance than like a crowd of unorganized people.\" — Bohm, on plasma/superconductivity wholeness; he adds such quantum wholeness \"is closer to the organized unity of functioning of the parts of a living being than it is to the kind of unity that is obtained by putting together the parts of a machine.\"\n- \"Then in 1952 I saw Bohm\u0027s paper. His idea was to complete quantum mechanics by saying there are certain variables in addition to those which everybody knew about. That impressed me very much.\" — John Stewart Bell, on what set him toward his proof.\n- \"In the long run it is far more dangerous to adhere to illusion than to face what the actual fact is.\" — Bohm, in a later interview, summing up the philosophy behind his lonely stands.\n- \"This immediately struck me as very relevant to the question of order, since, when the ink drop was spread out, it still had a \u0027hidden\u0027 (i.e., nonmanifest) order that was revealed when it was reconstituted.\" — Bohm, on the ink-in-glycerine device that led him to \"see that new notions of order must be involved here.\"\n- \"You are the same thing. One thing. Unbroken. One enormous something that has extended its uncountable arms and appendages into all the apparent objects, atoms, restless oceans, and twinkling stars in the cosmos.\" — Talbot, driving home undivided wholeness (hand, lamplight, dog).\n- \"The ability of form to be active is the most characteristic feature of mind, and we have something that is mindlike already with the electron.\" — Bohm, on consciousness as a more subtle form of matter.\n- \"This excitation pattern is relatively autonomous and gives rise to approximately recurrent, stable and separable projections into a three-dimensional explicate order of manifestation.\" — Bohm, describing the universe as a ripple on the cosmic sea of energy.\n- \"To see a World in a Grain of Sand / And a Heaven in a Wild Flower, / Hold Infinity in the palm of your hand / And Eternity in an hour.\" — William Blake\u0027s poem, which Talbot says gains new meaning from every dust mote enfolding the cosmos.\n- \"The nonlocal aspects of quantum systems is therefore a general property of nature.\" — physicist Paul Davies, generalizing from Aspect\u0027s result since all particles continually interact and separate.\n- \"Both are real to me, or, if you want to say, neither of them are real.\" — Pribram, on whether the china cup or its interference pattern is the real one.\n\n## Thread\nChapter 1 built the first half of the holographic model — Pribram\u0027s holographic brain; this chapter builds the second half, Bohm\u0027s holographic universe, and then explicitly welds them together: brains construct concrete reality out of a frequency domain that is itself a projection from the implicate order. It converts the hologram from a neuroscience metaphor into a claim about the cosmos itself, backed by the Aspect experiment\u0027s evidence for nonlocality. The chapter\u0027s closing lines announce the plan for the rest of the book: to explore the effect Bohm and Pribram\u0027s ideas have had on researchers in other fields — starting with Part II, \"Mind and Body.\"\n\n## Connections\n- **Ch 1 (the Pribram/brain chapter)** — directly invoked: Bekesy\u0027s vibrator experiments, the phantom limb syndrome, and interference-pattern perception all return here as the brain half of the Bohm-Pribram synthesis.\n- **Later chapters** — the final paragraph explicitly sets up the remainder of the book: the implications of constructing space and time and the influence of Bohm and Pribram\u0027s ideas on other fields \"will be examined\" going forward, beginning with Part II, \"Mind and Body.\"\n- Possible cross-book links (speculative only): Bohm\u0027s claim that everyday reality is a projection from a deeper informational order loosely parallels the rendered-reality idea in Virk\u0027s *The Simulation Hypothesis*; the implicate order as a vaster, more fundamental substrate with consciousness enfolded in all matter resonates with Campbell\u0027s larger-consciousness-system in *My Big TOE*; \"the whole past... enfolded in each small region of space and time\" and the illusion of separateness could be juxtaposed with Tolle\u0027s treatment of time and presence in *The Power of Now*; Josephson\u0027s openness to God or Mind entering physics touches the science-belief boundary Pasulka explores in *American Cosmic*.\n"},{"id":"holographic-universe/03-the-holographic-model-and-psychology","file":"03-the-holographic-model-and-psychology.md","title":"The Holographic Model and Psychology","type":"chapter","chapter":"3","concepts":["collective-unconscious","archetypes","personal-resonance","implicate-order","explicate-order","undivided-flowing-movement","esp-dreams","dream-wisdom","psychosis-as-implicate-glimpse","lucid-dreams","virtual-image","real-image","parallel-universe-awareness","nonordinary-states-of-consciousness","transpersonal-experiences","transpersonal-psychology","holotropic-states","holotropic-therapy","resonance-in-psychotherapy","vortices-of-thought","multiple-personality-disorder","fragmentation","synchronicity","acausal-connecting-principle","nonlocal-quantum-effects"],"people":["Stanislav Grof","David Bohm","Carl Jung","Robert M. Anderson Jr.","Montague Ullman","Karl Pribram","Fred Alan Wolf","Bekesy","Christina Grof","Abraham Maslow","Edgar A. Levenson","David Shainberg","Frank Putnam","Bennett G. Braun","Carl Alfred Meier","Wolfgang Pauli","Paul Davies","F. David Peat","Albert Einstein","Michael Talbot"],"body":"\n# Ch 3 — The Holographic Model and Psychology\n\n## In one paragraph\nTalbot argues that the holographic model — Bohm\u0027s implicate order plus the interconnectedness it implies — makes sense of a whole family of psychological phenomena that conventional psychology cannot explain. Consciousness itself, per Bohm, exemplifies \"undivided and flowing movement\": thoughts are like ripples and whirlpools in a stream, and deep down \"the consciousness of mankind is one.\" On this basis the chapter reinterprets Jung\u0027s collective unconscious and archetypes, Ullman\u0027s ESP-dream results and the wisdom of dreams, psychotic and manic experience as unmanaged glimpses of the implicate order, Wolf\u0027s theory of lucid dreams as \"real-image\" holograms and visits to parallel universes, and — most dramatically — Grof\u0027s thirty-plus years of LSD and holotropic research, in which patients seemed to access womb memories, ancestral and racial memories, other species\u0027 consciousness, and even other universes. The chapter closes with thought vortices (Shainberg), multiple personality disorder as holographic fragmentation of the self, and Jungian synchronicity, which physicists now take seriously — Davies calls nonlocal quantum effects \"a form of synchronicity,\" and Peat reads synchronicities as \"flaws\" in the fabric of reality revealing that mind and matter are not divided at the deepest level. The upshot, per Talbot: the psyche is \"essentially commensurate with the whole universe\" (Grof\u0027s epigraph), and objective reality is more dreamlike than we suspect.\n\n## Core claims\n- Talbot argues that consciousness is a perfect example of Bohm\u0027s undivided flowing movement: thoughts unfold from a deeper, not precisely definable reality, like ripples, eddies, and whirlpools in a stream — some stable and recurring, some evanescent.\n- Talbot argues that Jung\u0027s collective unconscious, though embraced by untold thousands of psychologists and psychiatrists, has no mechanism in our current understanding of the universe — but the holographic model\u0027s infinite interconnectedness explains it: \"we are beings without borders.\"\n- Anderson\u0027s view is that we aren\u0027t all walking encyclopedias because of \"personal resonance\": like a tuning fork, an individual consciousness can only tap implicate-order information directly relevant to its own memories.\n- Ullman\u0027s view is that ESP dream results evidence Bohm-style interconnectedness, and that the deeper wisdom of dreams — which honestly and repeatedly depict our failings — may be a \"natural transformation of the implicate into the explicate,\" striving to preserve species-connectedness, not just individual welfare. If true, this inverts the traditional psychoanalytic view that dream content ascends from a primitive substratum of the personality.\n- Both Bohm and Pribram have noted that the experiences mystics have reported through the ages — cosmic oneness with the universe, unity with all life — sound very much like descriptions of the implicate order, and suggest mystics may somehow peer beyond ordinary explicate reality and glimpse its deeper, more holographic qualities.\n- Ullman\u0027s view is that psychotics genuinely glimpse the holographic level of reality but cannot order the experience rationally, so their reports are \"tragic parodies\" of mystics\u0027 reports; manic-depressives are even more deeply immersed in it than schizophrenics.\n- Wolf\u0027s view is that all dreams are internal holograms; ordinary dreams are virtual images while lucid dreams are real images (converging waves), which explains their vividness — and lucid dreams (perhaps all dreams) are actually visits to parallel universes, \"smaller holograms within the... cosmic hologram.\"\n- Grof\u0027s view, after thousands of LSD sessions, is that the data \"indicate an urgent need for a drastic revision of the existing paradigms for psychology, psychiatry, medicine, and possibly science in general,\" and that the holographic model — boundaries as illusion, part/whole non-distinction, enfolded space-time, enormous information capacity, composite and multiple-image holograms — is the framework that accounts for transpersonal experiences.\n- Levenson\u0027s view is that all psychoanalytic approaches are \"purely ceremonial\"; therapeutic change actually comes from resonance between therapist and patient calling forth holograms buried in the patient\u0027s psyche, like a laser of the right frequency retrieving an image from a multiple-image hologram.\n- Shainberg\u0027s view is that Bohm\u0027s thoughts-as-vortices should be taken literally: stable thought vortices explain fixed opinions, blocked creativity, feelings of disconnection, and even the nuclear arms race, whereas a child\u0027s open aliveness shows unimpeded unfolding-enfolding consciousness.\n- Talbot argues that MPD is perhaps the ultimate example of Bohmian fragmentation — the psyche splits into smaller wholes, not jagged shards, which itself suggests a holographic process — and that per-personality brain-wave changes (a global brain property) hint that the \"self\" is a hologram the brain can shuttle between like a slide projector.\n- Jung\u0027s view is that synchronicities are not chance but relate to the psychological processes of those who experience them, requiring a new \"acausal connecting principle\"; now that nonlocal connections are established, some physicists are looking again — Davies via nonlocal quantum effects, Peat via the implicate order.\n- Peat\u0027s view is that synchronicities are momentary fissures giving a glimpse of the unitary order under nature; their scarcity in our lives measures how far we have fragmented ourselves from the general field of consciousness. If subjective and objective are ultimately undivided, objective reality is more like a dream — though not an illusion, and individuality is not lost, \"any more than the image of a rose is lost once it is recorded in a piece of holographic film.\"\n\n## Concepts\n- **Collective unconscious** — Jung\u0027s concept of a shared source, common to all people, from which myths, dreams, hallucinations, and religious visions all spring; symbols in patients\u0027 dreams and hallucinations that resemble the world\u0027s great mythologies rather than personal history.\n- **Archetypes** — Jung\u0027s name for images bubbling up from the collective unconscious; he believed them so ancient that it is as if each of us carries \"the memory of a two-million-year-old man\" in the depths of the unconscious mind.\n- **Personal resonance** — Anderson\u0027s term for the selective process by which we can only tap implicate-order information directly relevant to our own memories, likened to a tuning fork resonating only with another fork of similar structure, shape, and size.\n- **Undivided and flowing movement** — Bohm\u0027s characterization of consciousness: a deeper, more fundamental reality out of which thoughts and ideas unfold like ripples, eddies, and whirlpools in a stream.\n- **Lucid dreams** — dreams in which the dreamer keeps full waking consciousness, knows he or she is dreaming, can often control the dream (turn nightmares pleasant, change settings, summon people), and experiences unusual vividness and vitality (eerily solid marble floors, dazzling flowers); researchers believe they may lead to new ways to stimulate personal growth, enhance self-confidence, promote mental and physical health, and facilitate creative problem solving.\n- **Virtual image vs. real image** — a piece of holographic film generates two images: a virtual image apparently behind the film (an illusion, no extension in space, like a mirror image) and a real image that comes to focus in front of the film, formed by converging waves, possessing real extension in space but invisible in empty air unless dust or smoke passes through it.\n- **Parallel universe awareness** — Wolf\u0027s proposed better name for lucid dreaming: parallel universes \"arise as other images in the hologram,\" and dreams are visits to them.\n- **Transpersonal** — Grof\u0027s term for experiences in which consciousness transcends the customary boundaries of the personality.\n- **Transpersonal psychology** — the branch of psychology Grof founded in the late 1960s with like-minded professionals including psychologist and educator Abraham Maslow, to study such phenomena.\n- **Holotropic state of consciousness** — a nonordinary state in which it is possible to access the holographic labyrinth connecting all aspects of existence: one\u0027s biological, psychological, racial, and spiritual history; past, present, and future of the world; other levels of reality.\n- **Holotropic therapy** — the Grofs\u0027 nondrug technique for inducing such states using only rapid and controlled breathing, evocative music, and massage/body work.\n- **Vortices of thought** — Shainberg\u0027s literal reading of Bohm: ideas and opinions as stable vortices that can become cemented in consciousness, dominating behavior and blocking assimilation of new information.\n- **Multiple personality disorder (MPD)** — a syndrome in which two or more distinct personalities inhabit a single body; \"multiples\" often don\u0027t know their condition and experience it as amnesia, confusion, or blackouts; most average eight to thirteen personalities, \"super-multiples\" over a hundred.\n- **Fragmentation** — Bohm\u0027s notion (applied here) that dividing wholeness eventually proves destructive; MPD is presented as its ultimate psychological example.\n- **Synchronicity** — Jung\u0027s term for coincidences so unusual and meaningful they can hardly be chance; the noteworthy class relates to events deep in the psyche and peaks at periods of emotional intensity and transformation.\n- **Acausal connecting principle** — the new principle Jung proposed to account for synchronicities, since psyche-to-world causation was inconceivable classically; nonlocal effects are likewise not cause-and-effect and therefore acausal.\n\n## Experiments, examples \u0026 case studies\n1. **Jung\u0027s solar-phallus patient (1906)** — While making rounds, Jung found a young paranoid schizophrenic staring at the sun and moving his head side to side; the man said he was looking at the sun\u0027s penis, whose side-to-side movement caused the wind to blow. Years later Jung read a translation of a two-thousand-year-old Persian religious text of rituals and invocations designed to bring on visions, one of which said a participant looking at the sun would see a tube hanging from it whose side-to-side movement caused the wind. Since it was extremely unlikely the man had contact with the text, Jung concluded the vision bubbled up from the collective unconscious, not the personal unconscious. Talbot uses this as the founding example the holographic model can finally explain.\n2. **Anderson\u0027s tuning-fork analogy (Robert M. Anderson, Jr., Rensselaer Polytechnic Institute, Troy, New York)** — An illustration, not an experiment: a vibrating tuning fork sets up vibration only in a fork of similar structure, shape, and size; hence \"personal resonance\" limits which of the almost infinite implicate images an individual can access. It explains why enlightened persons glimpsing unitive consciousness centuries ago didn\u0027t write out relativity theory — they weren\u0027t studying physics in a context similar to Einstein\u0027s.\n3. **Maimonides ESP dream experiments — Tamayo\u0027s *Animals* (Ullman, Dream Laboratory, Maimonides Medical Center, Brooklyn; 1960s–70s)** — Typical protocol: a paid volunteer claiming no psychic ability slept in a lab room while a person in another room concentrated on a randomly selected painting, trying to make the volunteer dream its image. Results were sometimes inconclusive, but with Tamayo\u0027s *Animals* (two dogs flashing their teeth, howling over a pile of bones) the subject dreamed of a banquet without enough meat where everyone warily eyed one another while greedily eating their allotted portions. Talbot presents the Maimonides studies as some of the best empirical evidence that in dreams we communicate in ways that cannot presently be explained.\n4. **Maimonides ESP dream experiments — Chagall\u0027s *Paris from a Window*** — Target was a brightly colored painting of a man looking out a window at the Paris skyline, with a cat with a human face, small figures of men flying through the air, and a chair covered with flowers. Over several nights the subject dreamed repeatedly of things French — French architecture, a French policeman\u0027s hat, a man in French attire gazing at \"layers\" of a French village — plus apparent references to the vibrant colors and odd features: bees flying around flowers, and a brightly colored Mardi Gras-type celebration with costumes and masks.\n5. **Ullman\u0027s clinical observation of dream wisdom** — In his psychoanalytic practice Ullman found that even patients who were mean, selfish, arrogant, exploitative, and manipulative while awake — with fragmented, dehumanized relationships — had dreams that invariably depicted their failings honestly, with metaphors designed to prod them gently toward self-awareness. When a patient failed to accept a truth about himself, it surfaced again and again in dreams in different metaphorical guises linked to different past experiences. Ullman reads this self-monitoring as nature striving for species survival and species-connectedness, and suggests dreams may be a bridge from the implicate (an infinite information source) to the explicate.\n6. **Studies of schizophrenic logic (cited by Ullman)** — Studies have shown schizophrenics often treat the converse of any relation as identical to the relation: \"event A follows event B\" equals \"event B follows event A\"; if a man\u0027s head is above his shoulders, his shoulders are also above his head. All points in time are viewed as equal; spatial relations lose meaning — like the image in holographic film, things no longer have precise locations. Ullman reads this, plus schizophrenics\u0027 oceanic oneness feelings, loss of self-other boundaries, belief their thoughts aren\u0027t private and they can read others\u0027 thoughts, and classing things into ever larger subclasses, as expressing the holographic quality of the reality they find themselves in — glimpses of the implicate without the ability to order them rationally.\n7. **Manic-depression as deep holographic involvement (Ullman)** — Whereas the schizophrenic gets only whiffs of the holographic order, the manic is deeply involved and grandiosely identifies with its infinite potential, unable to keep up with the overwhelming flow of thoughts, forced to \"lie, dissemble, and manipulate\" to accommodate his expansive vista — mostly chaos with occasional creative outbursts — then becomes depressed on returning from the \"surreal vacation\" to everyday life. Ullman adds that normal dreamers escape these effects because we leave dream logic behind on waking and possess a natural protective mechanism limiting contact with the implicate.\n8. **Wolf\u0027s lucid-dream talk (physicist Fred Alan Wolf, 1987 annual meeting of the Association for the Study of Dreams, Washington, D.C.)** — Wolf, an occasional lucid dreamer, argued all dreams are internal holograms: ordinary dreams are less-vivid virtual images (diverging waves), but the brain can also generate real images (converging waves), which is what happens in lucid dreaming — a \"viewer\" at the focus is bathed in and contained by the scene, hence \"lucid.\" Like Pribram, Wolf holds the mind creates the illusion of \"out there\" via the processes Bekesy studied; the same processes let lucid dreamers create subjective realities as tangible as objective ones, making him question whether lucid dreams should be considered subjective at all. He postulates lucid dreams (perhaps all dreams) are visits to parallel universes — smaller holograms within the cosmic hologram — and calls the skill \"parallel universe awareness.\"\n9. **Grof\u0027s Prague LSD research (Psychiatric Research Institute, Prague, Czechoslovakia; begun 1950s)** — Investigating clinical/therapeutic uses of LSD, Grof found not the expected recurring stress reaction but a definite continuity across each patient\u0027s sessions: \"a successive unfolding of deeper and deeper levels of the unconscious.\" Serial LSD sessions expedited psychotherapy, shortened treatment time, unearthed traumatic memories that had haunted people for years, and sometimes even cured serious conditions such as schizophrenia — then patients moved beyond their illnesses into areas uncharted by Western psychology.\n10. **Womb-memory experiences under LSD (Grof)** — Patients relived being in the womb. Grof first thought them imagined, but the embryological knowledge in the descriptions often far exceeded the patients\u0027 education: accurate accounts of the mother\u0027s heart sounds, acoustic phenomena in the peritoneal cavity, specific details of placental blood circulation, even cellular and biochemical processes — plus the mother\u0027s important thoughts, feelings, and physical traumas during pregnancy. Grof verified assertions where possible by questioning the mother and others involved. Psychiatrists, psychologists, and biologists in the program (all participating therapists had to undergo several LSD psychotherapy sessions themselves) were similarly astonished at the experiences\u0027 apparent authenticity.\n11. **The prehistoric-reptile patient (Grof)** — A female patient became convinced she had assumed the identity of a female prehistoric reptile, gave a richly detailed account of being encapsuled in that form, and noted that the most sexually arousing part of the male\u0027s anatomy was a patch of colored scales on the side of its head. She had no prior knowledge of such things; a zoologist later confirmed to Grof that in certain reptile species colored head areas do play an important role as sexual-arousal triggers.\n12. **The mother-at-age-three experience (Grof)** — A woman experienced being her own mother at age three, accurately described a frightening event that had befallen her mother then, plus a precise description of the house her mother lived in and the white pinafore she was wearing — all details the mother later confirmed and admitted she had never talked about. Other patients gave equally accurate accounts of events befalling ancestors decades and even centuries before.\n13. **Racial and collective memories under LSD (Grof)** — Individuals of Slavic origin experienced participating in the conquests of Genghis Khan\u0027s Mongolian hordes, dancing in trance with the Kalahari bushmen, undergoing Australian aborigine initiation rites, and dying as Aztec sacrificial victims — with obscure historical facts at odds with the patient\u0027s education, race, and exposure. One uneducated patient gave a richly detailed account of Egyptian embalming and mummification: form and meaning of amulets and sepulchral boxes, materials for fixing the mummy cloth, size and shape of mummy bandages, and other esoteric facets of Egyptian funeral services. Others tuned into Far East cultures, describing what it is like to have a Japanese, Chinese, or Tibetan psyche and relating Taoist or Buddhist teachings.\n14. **The apparently limitless range of LSD experiences (Grof)** — Subjects seemed able to know what it was like to be every animal and even plant on the tree of evolution; to be a blood cell, an atom, a thermonuclear process inside the sun, the consciousness of the entire planet, even of the entire cosmos; to transcend space and time, occasionally relating uncannily accurate precognitive information; and sometimes to encounter nonhuman intelligences — discarnate beings, spirit guides from \"higher planes of consciousness,\" and other suprahuman entities.\n15. **The Ladislav/Kromeriz case (Grof)** — A young man being treated for depression found himself, in one session, in an eerie luminescent dimension crowded with sensed but unseen discarnate beings. A presence communicated telepathically, asking him to contact a couple in the Moravian city of Kromeriz to tell them their son Ladislav was well taken care of and doing all right — giving name, street address, and telephone number. The information meant nothing to Grof or the patient, but Grof, despite fearing colleagues\u0027 jokes, phoned the number and asked for Ladislav; the woman answering began to cry and said their son had passed away three weeks earlier. Talbot presents this as one of the most unnerving pieces of evidence of travel to other levels of reality.\n16. **Maryland Psychiatric Research Center studies (1960s onward)** — Grof moved to the U.S. to a position at the center, which ran controlled studies of LSD\u0027s psychotherapeutic applications — both on individuals with mental disorders and on \"normal\" volunteers: doctors, nurses, painters, musicians, philosophers, scientists, priests, and theologians. The same phenomena recurred again and again — as if LSD gave consciousness access to \"a kind of infinite subway system... that literally connected everything in the universe with everything else.\" After personally guiding over three thousand LSD sessions (each lasting at least five hours) and studying records of more than two thousand colleague-conducted sessions, Grof concluded a drastic paradigm revision is urgently needed.\n17. **Composite holograms as a model of archetypes (Grof)** — Holography can build up a sequence of exposures (e.g., every member of a large family) on one piece of film, yielding a genuinely composite image representing all of them at once — \"an exquisite model\" of archetypal images like the Cosmic Man, Woman, Mother, Father, Lover, Trickster, Fool, or Martyr. If each exposure is taken at a slightly different angle, the film instead yields a series of holographic images that appear to flow into one another — modeling the visionary tendency of countless images to unfold in rapid sequence, each dissolving into the next. Grof also notes a single LSD image can holographically embody a whole personality-constellation (attitude to life, childhood trauma, self-esteem, feelings about parents and marriage), with each small part of the scene containing further floods of data retrievable by free association on minuscule details.\n18. **Holotropic therapy (Stanislav and Christina Grof)** — A nondrug technique using only rapid and controlled breathing, evocative music, and massage/body work to induce holotropic states. Thousands of workshop attendees report experiences every bit as spectacular and emotionally profound as the LSD subjects\u0027 — Grof\u0027s most remarkable discovery, per Talbot, since it shows the phenomena need no drug. Methods detailed in Grof\u0027s book *The Adventure of Self-Discovery*.\n19. **Levenson on therapeutic change (psychiatrist Edgar A. Levenson, New York)** — Observing that transformative change in psychotherapy happens regardless of the therapist\u0027s technique or psychoanalytic approach, Levenson concludes the approaches are purely ceremonial and change comes from resonance: the therapist resonates with something the patient already unconsciously knows, a \"huge, three-dimensional, spatially coded representation of the patient\u0027s experience\" builds up until an \"overload\" when everything falls into place. He models these representations as holograms buried in the psyche, called forth like a same-frequency laser retrieving an image from a multiple-image hologram.\n20. **The Great Red Spot and thought vortices (psychiatrist David Shainberg, associate dean, Postgraduate Psychoanalytic Program, William Alanson White Institute of Psychiatry, New York)** — Studies show vortices are remarkably stable: Jupiter\u0027s Great Red Spot, a gas vortex over 25,000 miles wide, has remained intact since first discovered 300 years ago. Shainberg argues the same stability cements thought vortices (ideas, opinions) in consciousness, dominating behavior, blocking new ideas, causing repetition and disconnection — and may even explain the nuclear arms race as a vortex of greed among people isolated in separate selves. Counter-illustrations: children, who have not had time to form vortices, show open, flexible, \"sparkling aliveness\" (unimpeded unfolding-enfolding); and conversational behavior as a diagnostic — people with set beliefs defend opinions and never change with new information, while the open person explores conversational interactions.\n21. **MPD statistics and symptomatology** — Most multiples average eight to thirteen personalities (super-multiples over a hundred); 97 percent have histories of severe childhood trauma, often monstrous psychological, physical, and sexual abuse — leading researchers to see the disorder as the psyche\u0027s way of parceling out unendurable pain among several personalities. Side effects include depression, anxiety and panic attacks, phobias, heart and respiratory problems, unexplained nausea, migrainelike headaches, and self-mutilation tendencies. Most multiples are diagnosed between ages twenty-eight and thirty-five — a regular-as-clockwork \"coincidence\" suggesting an inner alarm — and multiples reaching their forties undiagnosed frequently report sensing that without help soon, recovery would be lost. Talbot: despite temporary advantages, well-being and perhaps survival still depend on wholeness — Bohm\u0027s claim that fragmentation always eventually proves destructive. Notably, the fragments are not jagged shards but smaller wholes, complete and self-sustaining, related to the original personality\u0027s dynamics — itself suggesting a holographic process.\n22. **Per-personality physiological changes in MPD (Frank Putnam, National Institutes of Health; figure redrawn from Bennett G. Braun\u0027s article in the *American Journal of Clinical Hypnosis*)** — Each of a multiple\u0027s personalities has a different brain-wave pattern — surprising because, as Putnam points out, a person\u0027s brain-wave pattern normally doesn\u0027t change even in extreme emotion. Blood flow patterns, muscle tone, heart rate, posture, and even allergies also change as a multiple shifts selves. Since brain-wave patterns are a global property of the brain, not confined to any neuron group, Talbot suggests the \"self\" may be a hologram, with the brain shuttling slide-projector-like between whole stored personalities (fig. 10 shows brain-wave patterns of four subpersonalities). The physiological implications are deferred to the next chapter.\n23. **Talbot\u0027s Buffalo Bill synchronicity (January 1983)** — While doing push-ups with a game show on TV, Talbot suddenly shouted \"Buffalo Bill!\" — his unconscious had answered the host\u0027s question \"What other name was William Frederick Cody known by?\" though he wasn\u0027t consciously attending. Hours later a friend phoned with a theater-trivia dispute: \"Is it true that John Barrymore\u0027s dying words were, \u0027Aren\u0027t you the illegitimate son of Buffalo Bill?\u0027\" Later that day a *Smithsonian* magazine arrived with a lead article, \"The Last of the Great Scouts Is Back Again\" — about Buffalo Bill. (Talbot couldn\u0027t answer the trivia question and still doesn\u0027t know.) He classes this as a synchronicity meaningful only in its improbability, distinguishing it from the deeper psyche-related kind.\n24. **Jung\u0027s scarab story** — Jung was treating a woman whose staunchly rational approach blocked therapy. After frustrating sessions she reported a dream of a scarab beetle; Jung knew the scarab represented rebirth in Egyptian mythology and suspected her unconscious was announcing a psychological rebirth. Just as he was about to say so, something tapped the window — a gold-green scarab (the only time one ever appeared at Jung\u0027s window). He let it fly into the room while presenting his interpretation; the stunned woman tempered her excessive rationality and her response to therapy improved. Jung noticed such coincidences almost always accompanied emotional intensity and transformation (belief changes, insights, deaths, births, profession changes) and peaked just as a new realization was about to surface.\n25. **Meier\u0027s Wuchang hospital case (Zurich psychiatrist Carl Alfred Meier, longtime Jung associate)** — An American woman surgeon, seriously depressed, traveled from Wuchang, China (where she had headed a mission hospital for twenty years and become an expert in Chinese philosophy) to be treated by Meier. She dreamed of the hospital with one wing destroyed; Meier read it as her losing her sense of self / American identity, advised return to the States, and her depression vanished as predicted. Before departing she made a detailed sketch of the crumbling hospital. Years later the Japanese attacked China and bombed Wuchang Hospital; she sent Meier a *Life* magazine with a double-page photograph of the partially destroyed hospital — identical to her drawing of nine years earlier. Talbot: the dream\u0027s symbolic personal message had spilled beyond her psyche into physical reality.\n26. **Pauli–Jung collaboration and physicists\u0027 reappraisal** — When Jung proposed the acausal connecting principle most physicists dismissed it, though the eminent physicist Wolfgang Pauli thought it important enough to coauthor a book with Jung, *The Interpretation and Nature of the Psyche*. Now that nonlocal connections are established, some physicists are looking again: Paul Davies calls nonlocal quantum effects \"a form of synchronicity\" — correlations between events for which any causal linkage is forbidden.\n27. **Peat\u0027s boss-dinner dream analogy (F. David Peat)** — Thought experiment: dreaming of dinner with your boss, you\u0027re served an unpleasant dish which the waiter says is named \"Your Boss\" — an \"inner\" feeling spilling into the dream\u0027s \"outer\" reality. On waking, the synchronicity is no mystery: there was never any division between inner self and outer dream reality, and the dream objects\u0027 separateness was an illusion produced by the unbroken wholeness of your unconscious mind. If mind and world are undivided in the implicate, the same holds for objective reality — which doesn\u0027t make the universe an illusion (both implicate and explicate create reality) or erase individuality: we are vortices in a river, unique but inseparable from the flow of nature.\n\n## Key quotes\n- \"While the traditional model of psychiatry and psychoanalysis is strictly personalistic and biographical, modern consciousness research has added new levels, realms, and dimensions and shows the human psyche as being essentially commensurate with the whole universe and all of existence.\" — Stanislav Grof, *Beyond the Brain*, the chapter\u0027s epigraph.\n- \"Deep down the consciousness of mankind is one.\" — Bohm, quoted by Talbot on why interconnected consciousness follows from the holographic model.\n- \"Due to personal resonance, relatively few of the almost infinite variety of \u0027images\u0027 in the implicate holographic structure of the universe are available to an individual\u0027s personal consciousness.\" — Anderson, explaining why we aren\u0027t walking encyclopedias.\n- \"An individual can disconnect from all that\u0027s cooperative, meaningful, and loving and still survive, but nations don\u0027t have that luxury.\" — Ullman, on why dream self-monitoring serves the species, not just the individual.\n- Dreams may represent a \"natural transformation of the implicate into the explicate.\" — Ullman\u0027s suggestion for the source of dream wisdom, which would stand the traditional psychoanalytic view of dreams on its ear.\n- \"If there is a \u0027viewer\u0027 where these waves focus, that viewer will be bathed in the scene, and the scene coming to a focus will \u0027contain\u0027 him. In this way the dream experience will appear \u0027lucid.\u0027\" — Wolf, on lucid dreams as real (converging-wave) hologram images.\n- \"I call it parallel universe awareness because I believe that parallel universes arise as other images in the hologram.\" — Wolf, renaming lucid-dream ability.\n- \"There is at present little doubt in my mind that our current understanding of the universe, of the nature of reality, and particularly of human beings, is superficial, incorrect, and incomplete.\" — Grof, concluding from the LSD data after years of conceptual struggle.\n- \"Individuals who have experienced various nonordinary states of consciousness, including well-educated and sophisticated scientists from various disciplines, frequently report that they entered hidden domains of reality that seemed to be authentic and in some sense implicit in, and supraordinated to, everyday reality.\" — Grof, on why Bohm\u0027s enfolded/unfolded orders are directly relevant to unusual states of consciousness.\n- \"Our son is not with us any more; he passed away, we lost him three weeks ago.\" — the Kromeriz mother on the phone to Grof, confirming the telepathically transmitted message about Ladislav.\n- \"It is as though a huge, three-dimensional, spatially coded representation of the patient\u0027s experience develops in the therapy... At some point there is a kind of \u0027overload\u0027 and everything falls into place.\" — Levenson, on resonance as the real engine of therapeutic change.\n- \"These non-local quantum effects are indeed a form of synchronicity in the sense that they establish a connection—more precisely a correlation—between events for which any form of causal linkage is forbidden.\" — physicist Paul Davies, taking Jung\u0027s idea seriously.\n- When we experience a synchronicity, what we are really experiencing \"is the human mind operating, for a moment, in its true order and extending throughout society and nature, moving through orders of increasing subtlety, reaching past the source of mind and matter into creativity itself.\" — Peat, on synchronicities as flaws in the fabric of reality.\n\n## Thread\nHaving established the holographic model in physics and neuroscience (Bohm\u0027s implicate order, Pribram\u0027s holographic brain, the Bekesy-style construction of \"out there\"), this chapter makes the model\u0027s first big cash-out: it claims to explain a raft of anomalous psychology — collective unconscious, ESP dreams, psychosis, lucid dreams, transpersonal LSD experiences, MPD, synchronicity — that conventional science leaves unexplained. Talbot\u0027s closing \"full circle\" states the two-way thesis: consciousness contains the whole of objective reality, and the material universe contains the innermost processes of consciousness. It explicitly sets up the next chapter on health (via MPD\u0027s physiological changes) and promises the nature-of-dreaming/parallel-universe ideas will be explored in greater depth later in the book.\n\n## Connections\n- **Introduction** — the text says the Maimonides ESP dream experiments and the concept of synchronicity were both \"mentioned in the introduction.\"\n- **Part I chapters (Pribram\u0027s brain model and Bohm\u0027s implicate order)** — repeatedly presupposed: \"as Bohm has pointed out,\" \"Like Pribram,\" \"As we have seen\" (virtual image having no more extension than a mirror image), Bekesy\u0027s processes.\n- **Chapter 4 (next chapter, on health)** — explicitly flagged twice: MPD\u0027s per-personality physiological changes \"will be discussed at greater length in the next chapter,\" and the final sentence promises exploration of how holographic connectivity affects our understanding of health.\n- **Later chapters** — Wolf\u0027s parallel-universe view of dreaming: \"This and other similar ideas about the ultimate nature of dreaming will be explored in greater depth later in the book.\"\n- Possible cross-book links (speculative, not in the text): Wolf\u0027s parallel-universe dreams and Peat\u0027s \"reality is dreamlike\" echo the rendered-reality theme of *The Simulation Hypothesis* (Virk); Grof\u0027s consciousness accessing an \"infinite subway\" of all information resembles Campbell\u0027s larger-consciousness-system data access in *My Big TOE*; Shainberg\u0027s frozen thought vortices blocking the flow of the implicate parallels Tolle\u0027s identification with compulsive thought in *The Power of Now*; Grof\u0027s subjects\u0027 encounters with discarnate beings and \"suprahuman entities\" could be compared with the nonhuman-intelligence contact narratives in *American Cosmic* (Pasulka).\n"},{"id":"holographic-universe/04-i-sing-the-body-holographic","file":"04-i-sing-the-body-holographic.md","title":"I Sing the Body Holographic","type":"chapter","chapter":"4","concepts":["holographic-model-of-mind-body","mental-imagery","visualization-therapy","implicate-order","neural-holograms","placebo-effect","double-blind-experiment","placebo-side-effects","multiple-personality-disorder","subpersonalities","parallel-processing","cultural-beliefs","attitude-beliefs","willed-belief","unconscious-beliefs","spiritual-faith","hypnosis","brocqs-disease","stigmata","autosuggestion","ejection-of-psychophysical-structures","psychoneuroimmunology","neuropeptides","acupuncture","meridians","acupuncture-microsystems","auriculotherapy","little-man-in-the-ear","reflexology","iridology","palmistry","dermatoglyphics","ulnar-loop"],"people":["Walt Whitman","O. Carl Simonton","Frank (patient)","Jeanne Achterberg","David Bohm","Breznitz","Charles A. Garfield","Alan Richardson","Larry Dossey","Karl Pribram","Lewis Thomas","David Sobel","Bruno Klopfer","Wright (patient)","Herbert Benson","David P. McCallie Jr.","Harriet Linton","Robert Langs","Richard Alpert (Ram Dass)","Stanislav Grof","Jane Brody","Bennett Braun","Francine Howland","Christy Ludlow","Robert A. Phillips Jr.","Cornelia Wilbur","Sybil Dorsett","Cassandra (multiple)","Celese (subpersonality)","Robert Koch","Jack Schwarz","Mirin Dajo","Hans Naegeli-Osjord","Werner Brunner","Alfred Stelter","Gilbert Grosvenor","Donna Grosvenor","Mohotty","A. A. Mason","Vittorio Michelli","Michel-Marie Salmon","St. Francis of Assisi","D. Scott Rogo","Gemma Galgani","Herbert Thurston","Thomas of Celano","St. Bonaventura","Therese Neumann","Padre Pio","Giovanna Maria Solimani","St. Veronica Giuliani","Alexander P. Dubrov","Veniamin N. Pushkin","St. Teresa of Avila","Marie-Julie Jahenny","Michael Grosso","Candace Pert","Paul Nogier","Terry Oleson","Ralph Alan Dale","Richard Leviton","Herman Weinreb"],"body":"\n# Ch 4 — I Sing the Body Holographic\n\n## In one paragraph\nTalbot argues that if the brain constructs reality as an internal hologram, then the mind/body ultimately cannot distinguish between the neural holograms it uses to experience reality and those it conjures while imagining reality — and therefore mental images, beliefs, and expectations can produce dramatic, specific physiological changes. He builds the case through an escalating catalog: imagery therapy for cancer (Simonton, Achterberg), the placebo effect (sham surgery, Krebiozen, placebo LSD trips), the body-switching feats of multiple personality patients, the belief typology (cultural beliefs, attitudes, will, unconscious beliefs, faith) illustrated by human pincushions like Jack Schwarz and Mirin Dajo, hypnotic cure of the genetic Brocq\u0027s disease, the Lourdes bone regeneration of Vittorio Michelli, and stigmata as mind-generated images \"ejected\" onto the flesh. The chapter\u0027s stated aim is not to catalog mechanisms but to map the *range* of the mind\u0027s control over the body — which extends to the immune system, drug effects, wound healing, tumors, and even our genetic programming. A closing section offers acupuncture microsystems (\"the little man in the ear\"), and hand-pattern diagnostics as evidence that the body itself is holographic — every part containing an image of the whole. Talbot\u0027s two closing messages: we are all \"potential wonderworkers,\" and the elements that build our health-shaping neural holograms are many and subtle (images, hopes, fears, doctors\u0027 attitudes, cultural beliefs, faith).\n\n## Core claims\n- Talbot argues that in a holographically operating brain, the remembered or imagined image of a thing can have as much impact on the senses — and on the body\u0027s physiology — as the thing itself, because real and imagined experiences reduce to \"the same common language of holographically organized wave forms.\"\n- Talbot argues (via Achterberg) that imagery\u0027s physiological effects are not only powerful but extremely specific — down to raising counts of one particular type of white blood cell and not another.\n- Talbot argues (via Bohm) that in the implicate order, as in the brain, imagination and reality are ultimately indistinguishable, so images in the mind manifesting as bodily realities should not surprise us.\n- Talbot argues (via Dossey) that health and illness cannot be truly separated; illness is not an external intruder but part of the unbroken whole of a life, and simply seeing one\u0027s condition in relation to the larger pattern of one\u0027s life (a diary, a videotape) can dissolve it.\n- Talbot argues that the placebo effect shows we possess the power to cure warts, open bronchial tubes, mimic morphine, and melt tumors — but because we are unaware we possess this power, we must be fooled into using it, sometimes with tragic results when belief collapses (Wright/Krebiozen).\n- Talbot raises, without fully answering, the question of whether many drugs work chiefly because we believe in them (Krebiozen, cis-platinum, pre-modern remedies, possibly many over-the-counter medications), while conceding many drugs (vitamin C for scurvy, insulin) work regardless of belief.\n- Talbot argues that Multiple Personality Disorder demonstrates the body is itself a \"multiple image hologram\" that can switch biological states — allergies, drug responses, diabetes, epilepsy, eye color, menstrual cycles — \"as rapidly as the flutter of a deck of cards,\" and that since integrated multiples retain the ability, all of us must have it somewhere in our psyches.\n- Talbot argues that belief operates through distinct strata — cultural beliefs, attitudes, conscious will, unconscious beliefs, and spiritual faith — each offering its own window on the plasticity of the mind/body relationship.\n- Talbot argues that hypnotic cure of Brocq\u0027s disease implies the mind can override even our DNA programming, \"the masterplan.\"\n- Talbot argues that belief, not divine intervention, is the prime mover in at least some so-called miracles (Mohotty, stigmata), citing evidence that stigmata copy art rather than the historical crucifixion.\n- Talbot argues that stigmata — especially nail-like protuberances of flesh — and images appearing on skin and hearts fulfill Dubrov and Pushkin\u0027s criterion of \"ejection of psychophysical structures outside the brain,\" direct evidence of brain holograms.\n- Talbot argues that acupuncture microsystems, reflexology, iridology, and hand-pattern diagnostics suggest the body is holographic: every portion contains information about, or an image of, the whole.\n- Talbot is careful to note that nothing in this chapter seems to violate known laws of physics (with stigmata as a partial exception) — that boundary is reserved for the next chapter.\n\n## Concepts\n- **Neural holograms / holographic imaging** — the brain\u0027s internal holograms; because all experience, real or imagined, is reduced to the same holographically organized wave forms, the brain cannot always distinguish \"out there\" from what it believes to be \"out there\" (hence phantom limbs), and images impact physiology as the thing itself would.\n- **Implicate order (applied to intention)** — Bohm\u0027s deeper, nonlocal level of existence from which the universe springs; \"every action starts from an intention in the implicate order,\" so imagination is already the creation of the form, moving through subtler levels until it manifests in the explicate.\n- **Placebo** — any medical treatment that has no specific action on the body but is given either to humor a patient or as a control in a double-blind experiment; sugar pills and saline are common; even surgery has served as one. On average 35 percent of people receiving a given placebo experience a significant effect.\n- **Double-blind experiment** — a study in which one group receives real treatment and another a fake, and neither researchers nor subjects know who is in which group, so the real treatment\u0027s effects can be assessed accurately.\n- **Multiple Personality Disorder (MPD)** — a condition in which subpersonalities have strong psychological separation, each with own name, age, memories, abilities — often own handwriting, announced gender, cultural/racial background, artistic talents, language fluency, IQ, and different brain-wave patterns — and whose switches produce biological changes.\n- **Parallel processing (Cassandra\u0027s term)** — a multiple\u0027s alternate personalities remaining aware even when not in control of the body, allowing \"thinking\" on many channels at once — e.g., a subpersonality doing healing imagery around the clock.\n- **Cultural beliefs** — beliefs imposed by one\u0027s society that can unconsciously govern the body (Trobriand premarital non-pregnancy, TB death rates falling once the disease lost its mystery).\n- **Beliefs embodied in attitudes** — passive belief expressed as outlook (hostility, fighting spirit, optimism, marital happiness) that correlates with immune strength, disease survival, and mortality.\n- **Beliefs expressed through will** — conscious, \"steely and unswerving\" belief used to sculpt and control the body holographic (Schwarz, Dajo, Mohotty).\n- **Unconscious beliefs** — the most important type of belief; the healing force can be reached by bypassing the conscious mind\u0027s \"thick armor of doubt and skepticism\" via placebo or via hypnosis, which reaches into the psyche like a surgeon altering an internal organ.\n- **Brocq\u0027s disease** — a horribly disfiguring hereditary condition in which the skin develops a thick, horny, reptile-scale covering that cracks and bleeds at the slightest movement; many circus-sideshow \"alligator-skinned people\" were actually sufferers and had short lifespans due to infection risk; incurable until a 1951 hypnosis case.\n- **Stigmata** — spontaneous manifestation of the wounds of the crucifixion, first in St. Francis of Assisi, in hundreds since; always on hands and feet (following art since the eighth century, not Roman wrist-nailing practice), which Talbot presents as evidence they are self-induced/autosuggested.\n- **Ejection of psychophysical structures** — Dubrov and Pushkin\u0027s proposed proof of brain holograms: an instance of the brain projecting an image outside itself; Talbot counts skin images, heart imprints, and nail-like stigmata protuberances as examples.\n- **Psychoneuroimmunology** — a new science studying how the mind (psycho), the nervous system (neuro), and the immune system (immunology) interact.\n- **Neuropeptides** — molecules the brain uses to communicate (\"the brain\u0027s telegrams\"); receptors for them on immune cells imply the immune system is an extension of the brain.\n- **Acupuncture / meridians** — the ancient Chinese art holding that every organ and bone connects to specific surface points (over a thousand, organized in imaginary lines called meridians); stimulating the points can alleviate disease in the connected parts.\n- **Acupuncture microsystems / auriculotherapy** — Nogier\u0027s term for the two smaller acupuncture systems on each ear, whose points connect-the-dots into an anatomical map of a miniature inverted human (\"the little man in the ear\"); Dale has evidence for eighteen such micro-acupuncture holograms across the body.\n- **Reflexology / iridology** — alternative techniques (foot massage accessing all body points; iris examination for diagnosing the body\u0027s condition) that Leviton says may indicate the body\u0027s holographic nature, though neither is experimentally vindicated.\n- **Palmistry / dermatoglyphics** — the 4,500-year-old Indian hand-reading science (per Leviton) and, more scientifically, the study of hand patterns: an ulnar loop fingerprint associates with Alzheimer\u0027s, and 10 common genetic disabilities including Down\u0027s syndrome associate with hand patterns.\n\n## Experiments, examples \u0026 case studies\n- **Frank (61-year-old throat cancer patient) / Dr. O. Carl Simonton, radiation oncologist, Cancer Counseling and Research Center, Dallas** — Frank had an almost always fatal throat cancer, under 5 percent survival odds; weight fallen 130 to 98 pounds, barely able to swallow saliva or breathe; doctors debated whether radiation was even worth the discomfort. Simonton taught him relaxation and mental imagery: three times a day Frank pictured the radiation as millions of tiny bullets of energy bombarding his cells, his cancer cells as weaker and more confused than normal cells, and his white blood cells swarming over dead cancer cells and carrying them to liver and kidneys to be flushed out. He had almost none of radiation\u0027s usual skin/mucous-membrane damage, regained weight and strength, and in two months all signs of cancer were gone. Simonton credits the visualization regimen.\n- **Simonton follow-up study, 159 \"medically incurable\" cancer patients** — expected survival 12 months; four years later 63 were alive, of whom 14 showed no disease, 12 had regressing cancers, 17 stable disease; average survival of the whole group 24.4 months, over twice the national norm. Critics note participants sought Simonton out and thus had extraordinary fighting spirit; still, Simonton founded the Simonton Cancer Center in Pacific Palisades, California, and a survey found imagery the fourth most frequently used alternative cancer treatment.\n- **Achterberg\u0027s neutrophil vs. T-cell imagery study /
