 high square tiara. Information flooded him: daughter of a prince (not a pharaoh), married to a slender man with many small braids framing his face. He could \"fast-forward\" her life like a movie: she died in childbirth; he watched the embalming, funeral procession, and sarcophagus rituals. Talbot uses it as the chapter\u0027s opening image of accessing the past.\n- **Stanislaw Poniatowski\u0027s tests of Ossowiecki (University of Warsaw)** — Poniatowski, \"the most eminent ethnologist in Poland at the time,\" tested him with flints and stone tools (\"lithics\") from archaeological sites worldwide, precertified by experts, provenance concealed. Ossowiecki repeatedly identified age, producing culture, and geographical origin. When his locations disagreed with Poniatowski\u0027s notes, the notes were always wrong. His method: concentrate until room and body became shadowy, then view a \"three-dimensional movie of the past\" he could move around in at will, eyes tracking as if the scenes were physically present; he saw vegetation, people, dwellings. Over the experiments he gave more than one hundred initially implausible details later proved correct: Magdalenian women (Stone Age France, ca. 15,000–10,000 B.C.) had very complex hairstyles — vindicated by later statue finds; Stone Age peoples used oil lamps — vindicated by Dordogne excavations uncovering lamps of the exact size and style he described; detailed drawings of hunted animals, hut styles, and burial customs all later confirmed.\n- **Norman Emerson and George McMullen (University of Toronto)** — Emerson, anthropology professor and founding vice president of the Canadian Archaeological Association, studied truck driver McMullen, who psychometrizes objects or simply visits sites, pacing until oriented, then describes the vanished culture. McMullen paced out the location of an Iroquois longhouse on bare ground; Emerson marked it with survey pegs and six months later uncovered the structure exactly there. Emerson, a converted skeptic, told the 1973 conference of Canada\u0027s leading archaeologists he had received knowledge from a psychic informant \"without any evidence of the conscious use of reasoning,\" said the work opened \"a whole new vista,\" and urged that psychic archaeology research get \"first priority.\"\n- **Tenhaeff and Valkhoff with Gerard Croiset (1960s)** — W. H. C. Tenhaeff (director, Parapsychological Institute, State University of Utrecht) and Marius Valkhoff (dean of arts, University of Witwatersrand, Johannesburg) found the great Dutch psychic Croiset could psychometrize \"even the smallest fragment of bone and accurately describe its past.\"\n- **Lawrence LeShan and Eileen Garrett** — LeShan, a New York clinical psychologist and \"another skeptic-turned-believer,\" ran similar psychometry experiments with the noted American psychic Garrett.\n- **Clarence W. Weiant and Tres Zapotes** — At the 1961 annual meeting of the American Anthropological Association, archaeologist Weiant revealed he would not have made his famous Tres Zapotes discovery — \"universally considered to be one of the most important Middle American archaeological finds ever made\" — without a psychic\u0027s assistance.\n- **Stephan A. Schwartz, *The Secret Vaults of Time*** — Former National Geographic editorial staffer and member of MIT\u0027s Secretary of Defense Discussion Group on Innovation, Technology, and Society; wrote a comprehensive history of clairvoyant–archaeologist partnerships and predicts retrocognition will trigger a scientific shift as profound as Copernicus and Darwin.\n- **Psychic \"Rich\" on three-dimensionality** — The psychic Rich, who also psychometrizes objects, confirms Ossowiecki\u0027s description that the images are as real or more real than the room: \"It\u0027s as if the scene takes over… It\u0027s like being in two places at once.\" Talbot cites this as a hologram-like feature of retrocognition.\n- **Evans-Wentz and the Celtic fairy-faith** — [The OCR file is cut mid-sentence entering this section.] W. Y. Evans-Wentz collected testimony (in *The Fairy-Faith in Celtic Countries*) from dozens of witnesses of fairies at archaeological ruins — burial mounds, standing stones, crumbling sixth-century fortresses: men in Elizabethan dress on hunts, ghostly processions to old forts, bell-ringing in ruined churches, and above all spectral wars — moonlit meadows of men in medieval armor, fens covered with soldiers in colored uniforms; some frays eerily silent, some full din, some heard but not seen. He concluded these were afterimages of past events: \"Nature herself has a memory.\"\n- **John Davies of the Isle of Man** — Elderly witness who, after describing many sightings, said, \"Before education came into the island more people could see the fairies; now very few people can see them.\" Talbot reads this as belief-change atrophying a widespread retrocognitive ability — underscoring \"the enormous power our beliefs have in determining which of our extraordinary potentials we manifest.\"\n- **Phantom armies worldwide** — Reports of phantom soldiers in ancient Hindu costume in India; well-known Hawaiian phantom processions of warriors in feather cloaks with war clubs and torches; spectral armies fighting in ancient Assyrian texts. Shows the \"hologramlike movies of the past\" are not limited to Celtic countries.\n- **The Puys (France) phantom raid, August 4, 1951** — At 4 a.m., two English women vacationing in the seaside village of Puys were awakened by gunfire; village and sea were calm. The British Society for Psychical Research found their chronology exactly mirrored military records of the Allied raid against the Germans at Puys on August 19, 1942 — they had \"heard the sound of a slaughter that had taken place nine years earlier,\" a rare case where historians could identify the replayed event.\n- **J. B. and Louisa Rhine (1930s)** — Volunteers guessed which cards would be randomly drawn from a deck at a success rate better than chance by odds of three million to one.\n- **Helmut Schmidt\u0027s random-event machine (1970s, Boeing Aircraft, Seattle)** — Physicist Schmidt invented a device testing prediction of random subatomic events; in repeated tests with three volunteers and over sixty thousand trials, results were one billion to one against chance.\n- **Maimonides Dream Laboratory (Ullman, Krippner, Honorton)** — Volunteers spent eight consecutive nights at the sleep lab, each night trying to dream about a picture that would be randomly chosen the *next day* and shown to them. Expected: one hit in eight; some subjects scored five of eight. Example: a volunteer dreamed of \"a large concrete building\" with a \"patient\" in a white doctor-like coat escaping, getting \"as far as the archway\"; the next day\u0027s randomly chosen painting was Van Gogh\u0027s *Hospital Corridor at St. Remy* — a lone patient at the end of a bleak massive hallway exiting through a door beneath an archway.\n- **Puthoff and Targ\u0027s precognitive remote viewing (Stanford Research Institute) — Hella Hammid and the black iron triangle** — Subjects could describe locations experimenters would visit in the future, *before the locations had been decided*. Hammid, a photographer and \"unusually talented subject,\" was asked to describe where Puthoff would be a half hour hence: she saw him entering \"a black iron triangle,\" \"bigger than a man,\" with a rhythmic squeak \"about once a second.\" Puthoff had left ten minutes earlier on a half-hour drive around Menlo Park/Palo Alto; only after her report did he draw one of ten sealed envelopes by random number generator — a small park about six miles from the lab, where he found and sat in a children\u0027s swing (the black iron triangle) that squeaked rhythmically.\n- **Jahn and Dunne (Princeton)** — Duplicated the precognitive remote-viewing findings (as did numerous labs worldwide): in 334 formal trials, volunteers produced accurate precognitive information 62 percent of the time.\n- **Croiset\u0027s chair tests — the Eisenbud/Denver case (1969)** — Over twenty-five years, investigators in Europe and America found Croiset almost always gave accurate, detailed descriptions (gender, facial features, dress, occupation, past incidents) of whoever would occupy a randomly chosen unreserved seat. On January 6, 1969, in a study by Dr. Jule Eisenbud (clinical professor of psychiatry, University of Colorado Medical School), Croiset — in Utrecht — described the man who would sit in a chosen chair on January 23, 1969: five feet nine, black hair brushed straight back, gold tooth in his lower jaw, scar on his big toe, worked in science and industry, lab coat sometimes stained by a greenish chemical. The man who sat in the chair (in a Denver auditorium) matched in every detail but one: he was five feet nine and three-quarters.\n- **Hypnosis and precognition — Osis and Fahler (1960s)** — Karlis Osis and hypnotist J. Fahler found hypnotized subjects scored significantly higher on precognition tests than nonhypnotized subjects; other studies confirmed hypnosis enhances ESP. [The file\u0027s connecting passage on dream-divination traditions — including the biblical Pharaoh\u0027s dream of seven fat and seven lean cows, and Talbot\u0027s suggestion that the dreaming self is \"closer to the primal ocean in which past, present, and future become one\" — survives only partially, beginning mid-sentence.]\n- **Irene Muza (from Arthur Osborn\u0027s *The Future Is Now: The Significance of Precognition*)** — The French actress, hypnotized and asked about her future, said: \"My career will be short: I dare not say what my end will be: it will be terrible.\" Experimenters withheld this from her and gave posthypnotic amnesia. Months later her hairdresser accidentally spilled mineral spirits on a lighted stove; her hair and clothing ignited and she died in hospital hours later. Talbot uses her case to pose the frozen-vs.-plastic future question — even foreknowledge could not have caused this particular death.\n- **The Titanic premonitions** — Nineteen documented cases of precognitive glimpses of the sinking: some passengers heeded their premonitions and survived, some ignored their forebodings and drowned, and some experiencers were in neither category. Cited (with foreseen plane crashes avoided, and children moved before floods) as evidence the future \"is not set, but is plastic and can be changed.\"\n- **George Washington\u0027s Civil War vision** — Washington had a precognitive vision of a future civil war somehow involving \"Africa,\" the issue that all men are \"brethren,\" and the word \"Union.\" Together with the many premonitions preceding the Kennedy assassination and the Civil War, it corroborates the kahuna belief that great world events crystallize furthest in advance.\n- **Joel Whitton\u0027s hypnotic regression study (University of Toronto Medical School)** — Psychiatry professor (also degreed in neurobiology, expert in clinical hypnosis) quietly gathered reincarnation-suggestive evidence for decades. Core group of roughly thirty people, truck drivers to computer scientists, believers and nonbelievers; thousands of hours of individual hypnosis recordings. Background stat: over 90 percent of hypnotizable individuals recall apparent past-life memories, a phenomenon acknowledged even by skeptics (the psychiatry textbook *Trauma, Trance and Transformation* warns fledgling hypnotherapists to expect them and notes their healing potential while rejecting rebirth). Broad-stroke agreements among subjects: numerous past lives (some twenty to twenty-five, back to indistinguishable \"caveman existences\"); gender not specific to the soul (many lived at least one opposite-sex life); life\u0027s purpose is to evolve and learn, with multiple existences facilitating this.\n- **Whitton\u0027s Canadian psychologist / British WWII pilot case** — A psychologist born and raised in Canada had an inexplicable British accent as a child, irrational fear of breaking his leg, phobia of air travel, terrible nail-biting, obsessive fascination with torture, and a brief teenage vision of being in a room with a Nazi officer (triggered shortly after operating car pedals in a driving test). Under hypnosis: he had been a British WWII pilot; over Germany bullets hit his plane, one breaking his leg, costing him control of the foot pedals and forcing a crash landing; captured by the Nazis, tortured by having his nails pulled out, died shortly after. Shows past-life memories explaining \"a wide range of seemingly unrelated events\" in a current life.\n- **Whitton\u0027s xenoglossy case** — A thirty-seven-year-old behavioral scientist, reliving a Viking life, shouted words linguistic authorities later identified as Old Norse; regressed to an ancient Persian lifetime, he wrote a spidery Arabic-style script identified by a Near Eastern languages expert as authentic Sassanid Pahlavi, a long-extinct Mesopotamian tongue that flourished A.D. 226–651. Many subjects also had profound psychological/physical healings from unearthed traumatic memories and gave uncannily accurate historical details.\n- **Whitton\u0027s interlife findings** — Regressed between lives, subjects reported a dazzling light-filled realm without time or space, where they planned the next life\u0027s important events in the \"metaconscious\" state — choosing rebirth with people they had wronged to make amends, planning encounters with \"soul mates\" (partners in loving relationships across many lifetimes), scheduling \"accidental\" events for lessons. One man visualized \"a sort of clockwork instrument into which you could insert certain parts in order for specific consequences to follow.\"\n- **The planned rape and the kidney-disease self-punishment** — A woman raped at thirty-seven revealed in metaconsciousness that she had planned the event before incarnating: a tragedy at that age was necessary to change her \"entire soul complexion\" and break through to a deeper, more positive understanding of life. A man with serious life-threatening kidney disease had chosen the illness to punish himself for a past-life transgression — but dying of it was not in his script; he had prearranged to encounter someone/something to remind him and enable healing of guilt and body. After starting sessions with Whitton he had a near-miraculous complete recovery.\n- **Subjects who censored their own futures** — Several of Whitton\u0027s subjects asked for posthypnotic instructions not to remember what they said in trance, so they would not be tempted to tamper with the script their metaconscious selves had written. Talbot notes this also implies the future is only roughly outlined and still changeable.\n- **William Cox\u0027s railroad study** — In a statistical study of 28 serious U.S. railroad accidents, parapsychologist Cox found significantly fewer people took trains on accident days than on the same day in previous weeks — suggesting we constantly unconsciously precognize the future and decide accordingly (some avoiding mishap, some choosing negative experiences for unconscious purposes).\n- **Ian Stevenson\u0027s children (University of Virginia Medical School)** — Psychiatry professor, thirty-plus years interviewing young children who spontaneously remember apparent previous lives; thousands of cases from all over the globe (cases worth considering exceed his staff\u0027s capacity). Children typically start talking about the \"other life\" between ages two and four, remembering dozens of particulars — their name, family and friends\u0027 names, residence, house appearance, occupation, manner of death, even where they hid money and, in murder cases, sometimes who killed them. Memories are often detailed enough for Stevenson to identify the previous personality and verify virtually everything; taken to the former area, children navigate strange neighborhoods effortlessly and identify their former house, belongings, and past-life relatives. Six volumes published to date. Corroborates Whitton: rebirth with known individuals, guided by affection, guilt, or indebtedness; personal responsibility, not chance, arbiters fate; moral conduct, interests, aptitudes, and attitudes persist across lives (criminals drawn back to crime, the kind stay kind) — inner growths matter, not outward trappings. Found no evidence of retributive karma or an external judge.\n- **Stevenson\u0027s birthmark and body-carryover cases** — A person\u0027s previous incarnation can affect the shape and structure of the current body: Burmese children remembering lives as British or American Air Force pilots shot down over Burma in WWII all have fairer hair and complexions than their siblings; distinctive facial features and foot deformities carry over; most numerous are injuries carrying over as scars or birthmarks — a boy murdered by throat-slitting bore a long reddish scarlike mark across his neck; a boy who shot himself in the head had two scarlike birthmarks aligned perfectly along the bullet\u0027s trajectory (entry and exit); a boy had a birthmark like a surgical scar complete with a line of red stitch-like marks exactly where his previous personality had surgery. Hundreds of such cases; a four-volume study in preparation; in some cases hospital/autopsy records of the deceased confirm injuries at the exact birthmark location. Stevenson infers a \"template\" extended body carrying wound imprints between lives; Talbot links this to Tiller\u0027s holographic energy-field template and to the idea that \"we are at heart just images, holographic constructs, created by thought.\" Stevenson adds that our participation is nearly involuntary — \"Levels of mental activity far deeper than those that regulate the digestion of our supper\" govern it. His credibility: publications in the *American Journal of Psychiatry*, *Journal of Nervous and Mental Disease*, *International Journal of Comparative Sociology*; JAMA\u0027s review praised his \"painstakingly and unemotionally collected\" data \"that cannot be ignored.\"\n- **Traditional parallels: Batak and Ojibway** — The Batak of Indonesia: everything one experiences is determined by the tondi, which reincarnates and can reproduce behavior and physical attributes of the former self. The Ojibway: an invisible spirit/soul scripts a person\u0027s life to promote growth; if one dies with lessons incomplete, the spirit body returns in another physical body.\n- **The kahunas: aumakua and kino mea** — The high self sees the crystallized future and creates destiny from thought forms made of kino mea; most people bombard the high self with contradictory plans, wishes, and fears, so their lives look haphazard. Powerful kahunas in open communication with their high selves could help remake a person\u0027s future; frequent deliberate visualization of what one wishes lets people \"make their own future.\" The shadowy body stuff also forms the template of the physical body — attuned kahunas could resculpt another\u0027s shadowy body and thereby the physical body, effecting miraculous healings (a parallel, Talbot notes, to the book\u0027s conclusions on why thoughts and images affect health).\n- **Tibetan tantrics** — Thought-stuff = tsal; the universe is the mind\u0027s product, animated by all beings\u0027 collective tsal; only great yogis consciously use these forces, via repeated visualization of the desired creation; tantric texts are full of sadhanas; Kargyupa monks spent up to seven years sealed in caves or rooms perfecting visualization.\n- **Twelfth-century Persian Sufis** — Subtle matter of thought = alam almithal; humans have a subtle body with chakralike centers; reality divides into subtler planes (Hadarat), the adjacent one a template reality where thought forms into idea-images that determine the course of life; the heart chakra (himma) is the responsible agent, so controlling it is the prerequisite for controlling destiny.\n- **Edgar Cayce and Yogananda** — Cayce, in trance, called thoughts tangible things, a finer form of matter, telling clients \"thought is the builder\" — the thinking process a spider forever spinning its web, each moment creating the patterns that shape the future. Paramahansa Yogananda advised visualizing the desired future and charging it with the \"energy of concentration\": proper visualization \"enables us to materialize thoughts… as experiences in the material realm.\"\n- **Chorus of sources on thought and destiny** — The Buddha (\"We are what we think…\"); the pre-Christian Hindu Brihadaranyaka Upanishad (\"As a man acts, so does he become. As a man\u0027s desire is, so is his destiny\"); the fourth-century Greek philosopher Iamblichus (\"All things in the world of Nature are not controlled by Fate for the soul has a principle of its own\"); the Bible (\"Ask and it will be given you… If ye have faith, nothing shall be impossible unto you\"); Rabbi Steinsaltz in the kabbalistic *Thirteen-Petaled Rose* (\"The destiny of a person is connected with those things he himself creates and does\").\n- **Modern popularizers** — Shakti Gawain\u0027s *Creative Visualization* and Louise L. Hay\u0027s *You Can Heal Your Life* (Hay says she cured herself of cancer by changing her mental patterning; hugely successful workshops); channeled works *A Course in Miracles* and Jane Roberts\u0027s Seth books; Jean Houston (past president, Association for Humanistic Psychology; Director, Foundation for Mind Research, Pomona, NY) in *The Possible Human*, including an exercise called \"Orchestrating the Brain and Entering the Holoverse\"; Mary Orser and Richard A. Zarro\u0027s *Changing Your Destiny* (draws on the holographic model), Zarro also founding Futureshaping Technologies, whose seminar clients include Panasonic and the International Banking and Credit Association.\n- **Edgar Mitchell and the Institute of Noetic Sciences** — The sixth man to walk on the moon founded IONS in 1973 (California) to research such mind powers; current projects include a massive study of the mind\u0027s role in miraculous healings and spontaneous remissions, and of consciousness\u0027s role in creating a positive global future. Mitchell: we create our reality at \"a very deep metaphysical and subconscious level.\"\n- **Helen Wambach\u0027s group regressions** — The late San Francisco psychologist hypnotized groups in small workshops, regressed them to specified time periods, and asked a fixed question list (sex, clothing, occupation, eating utensils, etc.); thousands of subjects over a twenty-nine-year investigation. Anti-fantasy findings: more than 90 percent recalled lives as peasants, laborers, farmers, and primitive food gatherers; under 10 percent aristocrats; none famous. Historical accuracy down to obscure details: subjects in the 1700s described three-pronged dinner forks, but after 1790 mostly four-pronged — correctly tracking the fork\u0027s historical evolution; equally accurate on clothing, footwear, and foods.\n- **Chet Snow, *Mass Dreams of the Future* (future-life progressions)** — Wambach discovered she could also progress people to future lives and began a major future-life-progression project in France and the U.S.; she died before finishing and former colleague psychologist Chet Snow completed and published it. Of 2,500 participants: virtually all agreed Earth\u0027s population had decreased dramatically (many were not even in physical bodies in the specified future periods). Reports split neatly into four future types: (1) a joyless, sterile future of space-station dwellers in silvery suits eating synthetic food; (2) \"New Agers\" living happily and naturally, in harmony, dedicated to learning and spiritual development; (3) \"hi-tech urbanites\" in a bleak mechanical world of underground and domed/bubbled cities; (4) post-disaster survivors after a global (possibly nuclear) catastrophe, living in urban ruins, caves, or isolated farms, wearing plain handsewn (often fur) clothing and hunting for food. Snow\u0027s holographic reading (like Loye\u0027s): several potential futures/\"holoverses\" are forming, and the four scenarios glimpse the futures humanity is creating for itself en masse; he recommends visualizing a positive future rather than building bomb shelters, citing the Planetary Commission — millions worldwide united in prayer and meditation on world peace and healing every December 31, 12:00–1:00 p.m. GMT.\n- **Schmidt and Schlitz — retroactive PK (announced at the 1988 Annual Convention of the Parapsychological Association)** — A computerized randomization process recorded 1,000 sound sequences, each of 100 tones of varying duration, some pleasing, some bursts of noise (expected ~50/50 by probability). Cassette copies were mailed to volunteers, who while listening tried to psychokinetically lengthen the pleasing sounds and shorten the noise. The original sequences, examined afterward, contained significantly longer stretches of pleasing sound than noise — subjects had apparently \"reached back through time\" to affect the randomization that had already produced their prerecorded tapes. A second test with random 100-tone sequences of four notes (subjects willing more high notes than low) again showed a retroactive PK effect. Regular meditators exerted a greater PK effect than non-meditators — suggesting again \"contact with the unconscious is the key to accessing the reality-structuring portions of the psyche.\"\n- **Moberly and Jourdain at Versailles, August 10, 1901** — Anne Moberly (principal) and Eleanor Jourdain (vice principal) of St. Hugh\u0027s College, Oxford, walking through the garden of the Petit Trianon, saw a shimmering pass over the landscape \"not unlike the special effects in a movie\"; afterward everyone wore eighteenth-century costumes and wigs and behaved agitatedly. A repulsive pockmarked man urged them to change direction; past a line of trees they heard music and saw an aristocratic lady painting a watercolor. When the vision vanished, the path they had walked was blocked by an old stone wall. Researching in England, they concluded they had been transported to the day of the sacking of the Tuileries and the massacre of the Swiss Guards (explaining the agitation) and that the painting woman was Marie Antoinette; they wrote a book-length manuscript for the British Society for Psychical Research. Talbot stresses they did not merely view the past but *walked into it*, and that the story risked their academic reputations with no benefit — hard to explain as fabrication.\n- **Other time-slips** — May 1955: a London solicitor and his wife encountered several eighteenth-century figures in the same garden; on another occasion, embassy staff overlooking Versailles watched the garden revert to an earlier period. In the U.S., parapsychologist Gardner Murphy (former president of both the American Psychological Association and the American Society for Psychical Research) investigated a woman identified only as Buterbaugh who looked from her office window at Nebraska Wesleyan University and saw the campus as it was fifty years earlier — bustling streets and sorority houses gone, replaced by an open field and scattered trees \"aflutter in the breeze of a summer long since passed.\"\n\n## Key quotes\n- \"The \u0027home\u0027 of the mind, as of all things, is the implicate order. At this level… there is no linear time.\" — Larry Dossey, *Recovering the Soul*, chapter epigraph.\n- \"The past is active in the present as a kind of implicate order.\" — Bohm, quoted to ground Talbot\u0027s claim that the past re-enfolds rather than ceases to exist.\n- \"It is my conviction that I have received knowledge about archaeological artifacts and archaeological sites from a psychic informant who relates this information to me without any evidence of the conscious use of reasoning.\" — Norman Emerson, 1973 conference of Canada\u0027s leading archaeologists.\n- \"For three-quarters of a century psychic archaeology has been a reality… the time and space framework so crucial to the Grand Material worldview is by no means as absolute a construct as most scientists believe.\" — Stephan A. Schwartz, author of *The Secret Vaults of Time*.\n- \"Nature herself has a memory. There is some indefinable psychic element in the earth\u0027s atmosphere upon which all human and physical actions or phenomena are photographed or impressed.\" — Evans-Wentz, theorizing about fairy sightings at ancient ruins.\n- \"Before education came into the island more people could see the fairies; now very few people can see them.\" — John Davies, elderly Manx witness; Talbot\u0027s evidence that belief gates the ability.\n- \"My career will be short: I dare not say what my end will be: it will be terrible.\" — Irene Muza under hypnosis, months before her fatal accidental burning (recorded in Osborn\u0027s *The Future Is Now*).\n- \"Such holographic entities could also be visualized as parallel worlds, parallel universes.\" — Loye, on the multiple fixed-future holograms between which we make \"hololeaps.\"\n- \"As they used to say, coming events cast their shadows in the present. Their shadows are being cast deep in the implicate order.\" — Bohm, explaining avoided precognized disasters as anticipations of a not-yet-actual future.\n- \"Carefully or haphazardly, we choose our earthly circumstances… Seen objectively from the interlife, every human experience is simply another lesson in the cosmic classroom.\" — Whitton, summing up the \"message of metaconsciousness.\"\n- \"If this world is (in Keats\u0027s phrase) \u0027a vale of soul-making,\u0027 we are the makers of our own souls.\" — Stevenson, on finding no evidence of retributive karma or an external judge.\n- \"It seems to me that the imprint of wounds on the previous personality must be carried between lives on some kind of an extended body which in turn acts as a template for the production on a new physical body of birthmarks and deformities…\" — Stevenson, on his template-body hypothesis.\n- \"We create our own reality because our inner emotional—our subconscious—reality draws us into those situations from which we learn.\" — Edgar Mitchell, founder of the Institute of Noetic Sciences.\n\n## Thread\nThis chapter extends the holographic model from space (the preceding nonlocality material) to time: if the whole is enfolded everywhere in the implicate order, then past and future are enfolded in the present too, and psi phenomena involving time become expected rather than anomalous. It knits together earlier threads Talbot explicitly invokes — Bohm\u0027s unfolding/enfolding and his crystal analogy, Tiller\u0027s holographic energy-field template of the body, the Part II conclusions about thoughts and images shaping health, and the recurring lesson that belief determines which latent abilities manifest. It also escalates the book\u0027s central move: from mind *perceiving* the hologram to mind *authoring* it — individually (metaconscious life-scripts, birthmark carryover) and collectively (mass-created futures). The closing line (\"There are still other shimmerings to cross our landscape, still deeper depths to plumb\") sets up the book\u0027s remaining chapters on yet more radical reality-bending phenomena.\n\n## Connections\n- **Within the book (explicit callbacks in the text):** Bohm\u0027s implicate order, the unfolding/enfolding account of time, and his crystal analogy (the Part I chapters on Bohm\u0027s physics); \"as with so many of the other extraordinary human abilities we have looked at\" — the latent-in-everyone framing from earlier psi chapters; Tiller\u0027s assertion that the human energy field is a holographic template guiding the physical body, and \"our own conclusions as to why thoughts and images have such a powerful impact on health\" (the Part II psychosomatic/healing chapters); the remark that in a holographic universe the psyche\u0027s innermost stuff \"can register as synchronicities in the objective world\" recalls the earlier synchronicity discussion; Puthoff and Targ\u0027s remote viewing continues from the earlier treatment of their SRI work (Ch 6, the nonlocality/space chapter of this same Part III).\n- **Possible cross-book links (speculative only):** Loye\u0027s parallel holographic universes and \"hololeaps,\" and Snow\u0027s mass-selected futures, resonate with the branching-timeline/rendered-reality themes of *The Simulation Hypothesis* (Virk); Whitton\u0027s atemporal interlife, life-planning \"metaconsciousness,\" and learning-oriented reincarnation strongly parallel Campbell\u0027s consciousness-evolution framework in *My Big TOE*; the chapter\u0027s claim that linear time is an illusion generated by consciousness is a natural (if very differently aimed) companion to Tolle\u0027s present-moment teaching in *The Power of Now*; the belief-gated perception of anomalous phenomena (the Manx fairies) loosely echoes Pasulka\u0027s treatment of interpretive frames around anomalous experience in *American Cosmic*.\n"},{"id":"holographic-universe/08-traveling-in-the-superhologram","file":"08-traveling-in-the-superhologram.md","title":"Traveling in the Superhologram","type":"chapter","chapter":"8","concepts":["out-of-body-experience","near-death-experience","nonlocal-consciousness","second-body","phantom-double","holographic-plasticity","frequency-domain","eyeless-sight","three-sixty-degree-vision","thought-forms","thought-balls","life-review","being-of-light","metaconsciousness","vision-of-total-knowledge","personal-flashforward","life-plan","parallel-time-tracks","between-life-state","book-of-lives","wave-substance","imaginal-realm","alam-almithal","land-of-nonwhere","creative-prayer","dreamtime","survival-in-infinity","cities-of-light","halls-of-learning","marian-visions","ufo-phenomenon","collective-unconscious","omnijective-universe","self-reference-cosmology","superhologram","implicate-order"],"people":["Kenneth Ring","Dean Shiels","Erika Bourguignon","Robert Crookall","Celia Green","Erlendur Haraldsson","Harvey Irwin","Glen Gabbard","Stuart Twemlow","Fowler Jones","Michael Talbot","Kimberly Clark","Maria (coronary patient)","Michael B. Sabom","Robert Monroe","Charles Tart","Miss Z","Karlis Osis","Janet Lee Mitchell","Robert Morris","Keith Harary","J. H. M. Whiteman","David Eisenberg","Cesare Lombroso","Rosa Kuleshova","Alex Tanous","Christine Whiting","August Strindberg","Marcel Louis Forhan (Yram)","Raymond A. Moody Jr.","Elisabeth Kubler-Ross","George Gallup Jr.","Carol Zaleski","Plato (soldier Er)","Venerable Bede","Patanjali","Melvin Morse","Elizabeth W. Fenske","Joel Whitton","Stanislav Grof","Joan Halifax","Robert Sullivan","Hazrat Inayat Khan","Emanuel Swedenborg","Immanuel Kant","George F. Dole","Henry Corbin","Sohrawardi","Sri Yukteswar Giri","W. Y. Evans-Wentz","Sri Aurobindo Ghose","E. Nandisvara Nayake Thero","Holger Kalweit","Michael Harner","Brian Josephson","Claiborne Pell","Paul Davies","Candace Pert","David Bohm","Karl Pribram","George Russell","Jim Gordon","Michael Grosso","D. Scott Rogo","Jacques Vallee","Carl Jung","Betty and Barney Hill","Peter Rojcewicz","Whitley Strieber","Carl Raschke","John Wheeler","Edwin Bernbaum","James Hilton","Mircea Eliade","Joseph Campbell","David Loye","Robert Jahn","Brenda Dunne","Sai Baba","Therese Neumann","Valerie Hunt","Bruce Greyson","Phyllis Atwater","Carol Dryer","Constantine","Aldous Huxley","Goethe","D. H. Lawrence","Jack London"],"body":"\n# Ch 8 — Traveling in the Superhologram\n\n## In one paragraph\nHaving argued in the previous chapter that time is a construct, Talbot now argues that space is equally illusory: in a holographic universe location itself is an illusion, and consciousness — like everything else — is ultimately nonlocal. His evidence is the out-of-body experience (OBE) and, above all, the near-death experience (NDE). He marshals surveys, verified veridical cases (Maria\u0027s tennis shoe, Sabom\u0027s cardiac patients), and laboratory work to argue that consciousness can genuinely detach from the body, and then reads the classic features of the NDE — plastic thought-sculpted bodies, the frequency-like realm of light, the instantaneous life review, \"thought balls\" of total knowledge, life plans and personal flashforwards — as exactly what one would expect if dying is a shift of consciousness into the more frequency-like, implicate levels of the hologram. He then shows that mystics (Swedenborg, the Sufis, Sri Yukteswar, Sri Aurobindo) and shamanic cultures worldwide describe the same territory, and extends the same logic to Marian apparitions and UFOs, proposing that such phenomena are \"omnijective\" — neither purely subjective nor objective, but real, mind-created holographic manifestations. The chapter closes with the conclusion that reality at every level is a mass shared dream, a self-reference cosmology in which \"the dream is dreaming itself.\"\n\n## Core claims\n- Talbot argues that space, like time, is a product of our mode of perception; in a holographic universe everything, including consciousness, is nonlocal, which is why consciousness can appear localized in a corner of a room as easily as in the head.\n- Talbot argues that the accumulated evidence for OBEs is \"unequivocal\": under the right circumstances the thinking, perceiving part of us can detach from the body and exist just about anywhere it wants to.\n- Talbot argues the second body of the OBEer is not a fixed \"phantom double\" but a hologram sculpted by beliefs and expectations (naked or clothed, male or female, ball of light, cloud, or no form at all); Monroe holds that \"thought habits\" create our OB forms and that at heart we are a \"vibrational pattern [comprised] of many interacting and resonating frequencies.\"\n- Talbot argues that inaccuracies in otherwise-accurate OB perception (his green-vs-black book lettering) arise because OBEers\u0027 new nonphysical senses are not yet proficient at converting the frequency domain into an accurate hologram of consensus reality; self-limiting beliefs (e.g., that we see only through eyes) further censor these senses — and possibly our physical senses too, as eyeless-sight cases suggest.\n- Talbot argues that OB journeys into the future and past (Tanous, Harary, Strindberg) show that the OB realm is one of Bohm\u0027s subtler levels, closer to the implicate order where past/present/future divisions cease.\n- Talbot argues NDEs are not hallucinations, citing five converging facts: their worldwide spread, the absence of any demographic profile, the cross-cultural consistency of the core experience, veridical perception (including in the blind), and their occurrence in patients with flat EEGs (hallucinations register on an EEG; these did not).\n- Ring believes NDEs are ventures into the more frequency-like aspects of reality, and that the afterlife realm is created by interacting \"thought structures\" that form patterns like interference waves on a holographic plate; Fenske agrees, noting that near death \"thought seems to be light.\"\n- Whitton concludes (from hypnotic between-life regressions) that the shapes of the afterlife dimension are thought-forms: \"There is no experience of existence without thought.\"\n- Talbot argues the life review is \"a holographic phenomenon par excellence\" (Ring\u0027s phrase): three-dimensional, wraparound, instantaneous yet detailed, storing every event, emotion (including the emotions of others one affected) and every thought — an aleph-like moment containing all other moments. Grof and Joan Halifax (a Harvard medical anthropologist and coauthor, with Grof, of The Human Encounter with Death) have also commented on its holographic aspects, and per several researchers, including Moody, many NDEers themselves use the term \"holographic\" when describing it.\n- The beings of light never judge (only self-judgment occurs) and stress two values: love (compassion as \"the barometer of grace\" — \"Did you do it out of love?\") and knowledge (one of the few things \"you will be able to take with you after you have died\"). Moody concludes we live in a universe far more benevolent than we realize.\n- NDE research suggests lives are at least partly planned beforehand (\"it is not your time yet\" implies a life plan, says Ring), with the experiencer participating; personal flashforwards and alternate-history visions support Loye\u0027s proposal of parallel holographic time tracks.\n- Talbot argues this reality and the afterlife differ in degree, not kind: both are hologram-like constructs established (per Jahn and Dunne) by the interaction of consciousness with its environment; ours is simply a \"more frozen\" version — beliefs resculpt our bodies more slowly (stigmata, synchronicities).\n- Talbot argues that mystical and shamanic testimony (Swedenborg, the Sufis\u0027 alam almithal, Sri Yukteswar, Sri Aurobindo, the aboriginal dreamtime) independently corroborates the NDE picture; Kalweit holds that the shaman \"should be considered as a most up-to-date and knowledgeable psychologist.\"\n- Talbot argues that the NDE\u0027s transformative aftereffects (expanded love, spirituality over religion, psychic opening) are, per Moody and Ring, the most compelling evidence that NDEers touch a genuinely spiritual level of reality; Bohm allows that the implicate domain \"could equally well be called Idealism, Spirit, Consciousness.\"\n- Talbot argues that Marian visions and UFOs are \"omnijective\" (his own coinage, paralleling Corbin\u0027s \"imaginal\"): real yet mind-created holographic phenomena — either psychic projections of the collective unconscious (Grosso, Jung), manifestations of an extradimensional nonhuman intelligence (Vallee, Raschke), or both at once, with collective belief possibly opening the \"doorway\" through which such intelligences appear.\n- Talbot concludes that in a holographic universe reality is a mass shared dream with the ontological status of a dream; asking whether God or the collective consciousness of all things dreams it is meaningless, because the part is the whole — a self-reference cosmology (Wheeler): \"The dream is dreaming itself.\"\n\n## Concepts\n- **Out-of-body experience (OBE)** — an experience in which an individual\u0027s conscious awareness appears to detach from the physical body and travel to some other location; typically spontaneous, occurring during sleep, meditation, anesthesia, illness, and traumatic pain.\n- **Nonlocal consciousness** — in a holographic universe location is itself an illusion (as an apple image has no specific location on holographic film), so consciousness possesses no definite location and can appear localized anywhere; Talbot\u0027s analogy is the dreamer, whose consciousness is really in everything in the dream.\n- **Second body / phantom double** — the ghostlike replica body some OBEers find themselves in; recent findings (clothed vs. naked forms, balls of light, clouds, no form) show it is not a permanent energy replica but a hologram that can assume many shapes, sculpted by conscious and unconscious beliefs.\n- **Holographic plasticity** — the tendency of OB/ND forms, landscapes, clothing, and even the mode of entry to the afterlife (tunnel, bridge, road, body of water) to be molded by the thoughts, expectations, and cultural symbols of the experiencer.\n- **Eyeless sight** — the reported ability to see with areas of the body other than the eyes (armpits, nose, earlobe, fingertips); Talbot takes it as evidence the physical body\u0027s sensory limits are themselves a holographic construct of belief.\n- **360-degree vision** — the ability, reported by seasoned OBEers and NDEers, to see in all directions at once while disembodied; initially blocked by the habit of believing one sees only through eyes.\n- **Frequency domain** — Pribram\u0027s realm of pure frequency underlying appearances; the OB/ND realm is described in terms of light, \"higher vibrations,\" and frequencies, suggesting dying shifts consciousness into this more holographic reality.\n- **Thought-forms / interacting thought structures** — Ring\u0027s term for what builds the afterlife\u0027s apparent structure: thought structures combine into patterns like interference waves on a holographic plate, and the images they produce appear real the way an illuminated holographic image does.\n- **Life review** — a panoramic, instantaneous, three-dimensional replay of one\u0027s entire life in complete sensory detail, including every thought and the felt emotions of everyone one interacted with; judgment is self-judgment only.\n- **Being of light** — the compassionate luminous being(s) encountered in the NDE who prompt the life review and teach rather than judge; their outward appearance (Christian figure, Hindu deity) is sculpted by the experiencer\u0027s beliefs.\n- **Thought balls / bundles of thought** — instantaneous, nonlinear chunks of information that burst whole into awareness during ND visions of knowledge (Monroe\u0027s term from the OB state is \"thought balls\"); the same form in which psychic information arrives.\n- **Vision of total knowledge** — the ND experience of having direct access to all knowledge (by asking, by a being\u0027s gesture, or by suddenly \"remembering\" it), almost universally followed by amnesia on return.\n- **Metaconsciousness** — the state of heightened awareness and lucid honesty in self-reflection NDEers enter after arriving in the realm of light.\n- **Life plan** — the finding that lives are sketched out beforehand with the individual\u0027s participation; implied by \"it is not your time yet\" and by NDEers being given the choice to return or stay.\n- **Personal flashforward** — Ring\u0027s term for glimpses of one\u0027s own future shown during the vision of knowledge; some are conditional (\"only if you continue on your current path\"), supporting parallel time tracks.\n- **Parallel time tracks** — Loye\u0027s proposal (referenced from earlier in the book) that several holographic parallel universes exist; supported by conditional flashforwards and the alternate-history-of-Earth vision.\n- **Between-life state** — the realm Whitton\u0027s hypnotized subjects reported between incarnations, with all the classic NDE features; its life review serves to refresh memory for mindfully planning the next life.\n- **Book of Lives** — Swedenborg\u0027s name for the life-review process he watched newly deceased souls undergo (\"the opening of the Book of Lives\"); he added that the record is stored in the nervous system of the spiritual body and evoked by an angel examining the whole body starting with the fingers.\n- **Wave-substance** — Swedenborg\u0027s term for the substrate surrounding a person in which angelic \"portrayals\" could be seen; he believed a wave-substance underlies visible reality.\n- **Alam almithal** — the twelfth-century Persian Sufis\u0027 subtle matter of thought out of which the afterlife realm (\"the country of the hidden Imam\") is created — including space itself (\"nearness,\" \"distances,\" \"far-off\" places).\n- **Imaginal realm** — Corbin\u0027s coinage for a world created by imagination yet ontologically no less real than physical reality — created by the imagination of many people but possessing its own corporeality, forests, mountains, and cities.\n- **Na-Koja-Abad (\"the land of nonwhere\")** — Sohrawardi\u0027s name for the country of the hidden Imam, expressing its nonlocality: instead of searching for spiritual reality \"in the where,\" the \"where\" is in us. Talbot adds that an OBEer may not actually travel anywhere at all, but merely alter the always-illusory hologram of reality so as to have the experience of traveling somewhere — in a holographic universe consciousness is not only already everywhere, it too is nonwhere.\n- **Creative prayer** — the Sufi practice of using visualization to alter and reshape the fabric of one\u0027s destiny, following from imagination being a faculty of perception.\n- **Dreamtime** — the Australian aboriginal realm shamans visit in trance, almost identical (per Thero) to Western afterlife descriptions; a dimension without time, space, or earthly boundaries where one must learn to deal with infinity — hence \"survival in infinity.\"\n- **Cities of light / halls of learning** — the vast, brilliantly luminous, architecturally sublime cities and knowledge-institutions consistently reported by NDEers, yogic adepts, and shamans; some NDEers say the buildings were literally \"built out of knowledge,\" suggesting holograms our minds construct from clouds of pure information.\n- **Omnijective** — Talbot\u0027s 1976 coinage for phenomena that are neither subjective nor objective but both: products of the psyche that are also quite real (UFOs, Marian visions); equivalent to Corbin\u0027s \"imaginal.\"\n- **Self-reference cosmology** — Wheeler\u0027s idea that we create subatomic particles (and hence the universe) while they also create us — each creates the other; Talbot\u0027s frame for the closing question of whose dream reality is.\n\n## Experiments, examples \u0026 case studies\n- **Dean Shiels — cross-cultural OBE survey** — studied 44 non-Western societies; only 3 did not hold a belief in OBEs. Shows OBE belief is near-universal.\n- **Erika Bourguignon (anthropologist) — cross-cultural survey** — examined 488 world societies (roughly 57 percent of all known societies); 437 (89 percent) had at least some OBE tradition.\n- **Robert Crookall (geologist, University of Aberdeen; amateur parapsychologist)** — investigated enough OBE cases to fill nine books on the subject.\n- **Celia Green (director, Institute of Psychophysical Research, Oxford), 1960s surveys** — polled 115 Southampton University students: 19 percent admitted an OBE; 380 Oxford students similarly questioned: 34 percent affirmative.\n- **Haraldsson survey** — of 902 adults, 8 percent had experienced being out of their bodies at least once.\n- **Harvey Irwin (University of New England, Australia), 1980 survey** — 20 percent of 177 students had experienced an OBE. Averaged with the others, roughly one in five people will have an OBE (other studies suggest one in ten).\n- **Gabbard, Twemlow \u0026 Jones, 1980 study of 339 OBE cases** — Dr. Glen Gabbard (Menninger Foundation, Topeka), Dr. Stuart Twemlow (Topeka VA Medical Center), Dr. Fowler Jones (University of Kansas Medical Center): 85 percent described the experience as pleasant, over half joyful. Their psychological-profile work found OBEers normal and extremely well adjusted; at the 1980 American Psychiatric Association meeting they said reassurance and reading may be \"more therapeutic\" than psychiatric treatment, even hinting a yogi might help more than a psychiatrist.\n- **Talbot\u0027s own teenage OBE** — spontaneous; he flew through walls and over treetops, stumbled across a library book a neighbor had lost and told her its location the next day (detailed in his Beyond the Quantum). Later used as a discrepancy example too: the lost book\u0027s title lettering looked bright green out-of-body but was actually black — evidence the new OB senses convert the frequency domain imperfectly.\n- **Kimberly Clark and Maria (Seattle hospital)** — coronary patient Maria had a cardiac arrest, found herself at the ceiling watching resuscitation, \"thought herself\" over the emergency-room driveway, then to the third floor, ending \"eyeball to shoelace\" with an old tennis shoe on a ledge — noting the little toe worn through the fabric and the lace stuck under the heel. Skeptical social worker Clark searched, finally spotted the shoe through a narrow window, and could only confirm the details after retrieving it: the perspective required floating right outside at close range. Clark became a believer.\n- **Michael B. Sabom (cardiologist, Emory University; Atlanta VA staff physician) — controlled comparison** — 32 seasoned cardiac patients who reported OBEs during heart attacks vs. 25 who had not. Non-experiencers describing their imagined resuscitations: 20 made major mistakes, 3 gave correct general descriptions, 2 had no idea. Experiencers: 26 correct general descriptions, 6 highly detailed and accurate, 1 a blow-by-blow account so accurate Sabom was stunned. He became an ardent believer: \"The out-of-body hypothesis simply seems to fit best with the data at hand.\"\n- **Robert Monroe (former radio/TV executive)** — first OBE in the late 1950s; feared insanity, sought medical help, then learned to control the state (\"One was sedation for the rest of my life; the other was to learn something about this state so I could control it\"). Kept a journal; could pass through solid objects, travel instantly by \"thinking\" himself there; friends verified his descriptions of their dress and activity during his invisible visits; occasionally met other disembodied travelers. Books: Journeys Out of the Body and Far Journeys. Found our core form is a \"vibrational pattern [comprised] of many interacting and resonating frequencies\"; says OB perception rests less on \"a reflection of light waves\" and more on \"an impression of radiation.\"\n- **Charles Tart — Miss Z experiment** — the parapsychologist had a skilled OBEer he identifies only as Miss Z correctly identify a five-digit number written on paper that could only be reached if she were floating out-of-body.\n- **Karlis Osis \u0026 Janet Lee Mitchell (American Society for Psychical Research, New York)** — gifted subjects \"flew in\" from around the country and correctly described target images: objects on a table, colored geometric patterns on a free-floating shelf near the ceiling, and optical illusions visible only through a small window in a special device.\n- **Robert Morris (Psychical Research Foundation, Durham, NC) — animal detector** — a kitten belonging to talented OB subject Keith Harary consistently stopped meowing and started purring whenever Harary was invisibly present.\n- **J. H. M. Whiteman (mathematician), The Mystical Life (1961)** — experienced at least two OBEs a month through adult life, recording over two thousand incidents; always felt like a woman trapped in a man\u0027s body and sometimes found himself in female form during separation, also children\u0027s bodies; concluded beliefs, conscious and unconscious, determine the second body\u0027s form.\n- **David Eisenberg, M.D. (Harvard Medical School) — Chinese sisters** — published an account of two school-age sisters in Beijing who can \"see\" well enough with the skin of their armpits to read notes and identify colors.\n- **Cesare Lombroso (Italian neurologist) — blind girl** — studied a blind girl who could see with the tip of her nose and the lobe of her left ear.\n- **Rosa Kuleshova (Soviet Academy of Science, 1960s)** — Russian peasant woman who could see photographs and read newspapers with her fingertips; the Academy pronounced her genuine and ruled out heat-detection: she could read a black-and-white newspaper covered with a sheet of heated glass. Life magazine published an article about her.\n- **Alex Tanous (psychic, Maine) — OB into the future** — in Osis and Mitchell\u0027s fly-in tests he tended to describe target objects placed on the table days later; Talbot reads this as tuning into frequencies encoding the future. Same day, New York psychic Christine Whiting, holding vigil without knowing who would fly in or when, saw Tanous\u0027s apparition clearly and described him wearing brown corduroy pants and a white cotton shirt — the clothing he was wearing in Maine at that moment.\n- **Keith Harary — OB future journeys** — describes moving through \"a black, dark area that ends at some lighted future scene,\" sometimes seeing a silhouette of his future self; when the events later occur, he senses his time-traveling OB self in the scene with him — \"meeting myself \u0027behind\u0027 myself as if I were two beings.\"\n- **August Strindberg — OB into the past (Legends)** — while in a wine shop persuading a young friend not to quit his military career, he cited a shared past incident in a tavern, suddenly \"lost consciousness,\" found himself sitting in that tavern reliving the occurrence, then snapped back to the present. Talbot adds that the previous chapter\u0027s retrocognitive clairvoyants who \"floated\" over historical scenes may also be OB projection into the past.\n- **Historical NDE accounts** — described in the eighth-century Tibetan Book of the Dead and the 2,500-year-old Egyptian Book of the Dead; Plato\u0027s Republic Book X tells of the Greek soldier Er, revived seconds before his funeral pyre was lit, who had left his body through a \"passageway\" to the land of the dead; the Venerable Bede gives a similar account in A History of the English Church and People; Carol Zaleski (Harvard) shows in Otherworld Journeys that medieval literature is filled with NDEs. The life review also appears in the Tibetan and Egyptian books, Plato\u0027s Er account, and the 2,000-year-old yogic writings of Patanjali.\n- **1981 Gallup poll** — eight million adult Americans had experienced an NDE — roughly one person in twenty. Gallup himself: the results \"point toward a super parallel universe of some sort.\"\n- **NDE demographics** — studies show no relationship between NDEs and age, sex, marital status, race, religion/spiritual beliefs, social class, education, income, church attendance, home-community size, or area of residence; the devout are no likelier than nonbelievers.\n- **Osis \u0026 Haraldsson, 1977 deathbed-vision comparison** — compared nearly nine hundred deathbed visions reported to doctors and medical personnel in India and the United States; despite cultural differences (Americans saw the being of light as a Christian personage, Indians as Hindu), the \"core\" experience was substantially the same as Moody\u0027s and Kubler-Ross\u0027s NDEs.\n- **Moody — mismatched plaids case** — a woman left her body during surgery, floated to the waiting room, and saw her daughter wearing mismatched plaids; the maid had dressed the girl hastily and was astounded when the mother, who never physically saw the child that day, commented on it.\n- **The pallbearer case** — an NDEer went to the hospital lobby out-of-body and overheard her brother-in-law tell a friend he would have to cancel a business trip to be a pallbearer; after recovering she reprimanded her astonished brother-in-law for writing her off so quickly.\n- **Kubler-Ross — blind NDEers** — patients blind for years, with no light perception, saw and accurately described their surroundings during NDEs; \"To our amazement, they were able to describe the color and design of clothing and jewelry the people present wore.\"\n- **Two-person NDE — the friend in the tunnel** — a woman moving through the tunnel toward the light passed a friend coming back; he telepathically told her he had died but was being \"sent back.\" She too was sent back, and later learned he had suffered cardiac arrest at approximately the same time as her own experience. Numerous other cases exist of the dying knowing who awaited them beyond before news of that person\u0027s death arrived normally.\n- **Flat-EEG NDEs** — talking, thinking, dreaming, and even hallucinations all register on an EEG; yet many people with flat EEGs have had NDEs — so they cannot have been hallucinations.\n- **Melvin Morse (pediatrician, Seattle) — the seven-year-old drowning victim** — resuscitated profoundly comatose: fixed dilated pupils, no muscle reflexes, no corneal response (Glasgow Coma Score of three — almost no chance of recovery). She recovered fully, recognized Morse, said she had watched him work on her body, had passed through a tunnel into heaven and met \"the Heavenly Father,\" who said it was not her time and — pointing out she would not see her mother again — persuaded her to return.\n- **Morse — ten-year child study (Idaho)** — working for an air transport service carrying patients, he interviewed every child survivor of cardiac arrest at the hospital over ten years; over and over they reported leaving their bodies, watching the doctors, the tunnel, and comfort by luminous beings. After exhausting drug side effects and psychological explanations, he concluded: \"NDEs are real... the soul really does travel.\"\n- **Kenneth Ring (professor of psychology, University of Connecticut), Life at Death (1980)** — one of the first to apply statistical analysis and standardized interviews to NDEs; argues NDEs are ventures into the frequency-like aspects of reality, citing descriptions of the beyond as \"light,\" \"higher vibrations,\" \"frequencies\"; celestial music as \"a combination of vibrations\"; painless brilliance; and collapse of time and space (\"I found myself in a space... where all space and time was negated\").\n- **Elizabeth W. Fenske (clinical psychologist) — 1989 IANDS keynote** — announced she too believes NDEs are journeys into a holographic realm of higher frequencies: in the NDE \"thought seems to be light.\"\n- **The jellyfish/soap-bubble man** — an NDEer emerged from his body \"something like a jellyfish,\" fell lightly to the floor like a soap bubble, then quickly expanded into a ghostly three-dimensional image of a naked man; embarrassed at his nakedness (two women were present), his form yielded to clothing — so meticulously wrought he could make out the seams in the material.\n- **The hands of light** — a man studying his hands in the ND state saw they were \"composed of light with tiny structures in them,\" including \"the delicate whorls of his fingerprints and tubes of light up his arms.\"\n- **Thought-built ND bodies** — people confined to wheelchairs find themselves in healthy bodies that run and dance; amputees invariably have their limbs back; the elderly inhabit youthful bodies; children frequently see themselves as adults.\n- **Joel Whitton — between-life hypnotic regressions** — regressed subjects reported all classic NDE features (tunnel, deceased relatives/\"guides\", light-filled timeless realm, luminous beings, life review); the review\u0027s main purpose was refreshing memory to plan the next life, with the beings assisting noncoercively. Subjects had no body unless thinking (\"if he stopped thinking he was merely a cloud in an endless cloud... as soon as he started to think, he became himself\"); forms began as the last life\u0027s body, then became a hologram-like composite of all past lives with its own unpronounceable name. Failed dreams and aspirations, not just thoughtless acts, caused remorse in the review. One subject, after several withdrawn, depressed incarnations, was urged to plan a life as an amorous, sexually active female for the balanced development of his soul.\n- **The rose-cobra woman (Whitton)** — a subject introduced in the between-life state to a woman who would figure in his next life saw her as a shape half-rose, half-cobra; decoding the symbolism, he realized they had been in love in two other lifetimes and she had twice been responsible for his death — the ND realm giving the psyche\u0027s symbolic language \"objective\" holographic form.\n- **The Arizona housewife — tones and colors** — during an NDE in childbirth she realized \"each person and thing has its own musical tone range as well as its own color range\"; she moved among prismatic rays of light hearing each person\u0027s musical notes harmonize with her own, met individuals manifesting only as clouds of color and sound, and believes these soul-tones are the \"beautiful music\" NDEers report.\n- **360-degree ND vision** — one man, wondering what he looked like, suddenly found himself staring at his own back. Robert Sullivan (amateur NDE researcher, Pennsylvania, specializing in combat NDEs) interviewed a World War II veteran who retained 360-degree vision even after returning to his body: running from a German machine-gun nest he could see ahead while also seeing the gunners trying to draw a bead on him from behind.\n- **Life-review testimony** — \"It\u0027s like climbing right inside a movie of your life... Total, total recall. And it all happens in an instant\"; another was \"actually walking through\" flashbacks fast yet slow enough to take in. Experiencers feel the emotions of everyone they interacted with: one woman relived snatching a toy from her sister in childhood and felt all her sister\u0027s loss and powerlessness. \"Not even your thoughts are lost... Every thought was there.\" An NDEer in 1821 described the faculty as the ability to \"simultaneously comprehend the whole and every part.\"\n- **The boy hit by a car** — guided into the beyond by two people in \"very white\" robes; returned with the message: \"What I learned there is that the most important thing is loving while you are alive.\"\n- **Visions of total knowledge** — one man had only to ask a question (e.g., what would it be like to be an insect?) and the experience was instantly his; another: \"You can think of a question... and immediately know the answer... the light will give you the instantaneous correct answer and make you understand it.\" Some knew everything without asking; others accessed it after a gesture (a wave of the being\u0027s hand); others \"remembered\" it — with near-universal amnesia on return. Information arrived in instantaneous \"chunks\" — \"bundles of thought\" (one NDEer) or Monroe\u0027s \"thought balls.\"\n- **Talbot\u0027s thought-ball anecdote** — meeting a stranger (or sometimes just hearing a name) triggers an instant thought ball of information about the person — psychology, health, scenes from their past — especially for people in crisis; he once instantly knew a woman he had just met was contemplating suicide and some of the reasons, steered the conversation to the psychic, confronted her, and got her to promise professional counseling.\n- **Moody — negotiated returns** — a man who cried on realizing he was dead, afraid his wife couldn\u0027t raise their nephew alone, was allowed to return because he wasn\u0027t asking for himself; a woman who argued she \"hadn\u0027t danced enough yet\" made the being of light laugh heartily and was also permitted to return.\n- **The forced-air heater flashforward** — a child NDEer was told he would marry at twenty-eight and have two children, and was shown his adult self and future children in a room of his future house — with a strange object on the wall his mind could not grasp. Decades later, every prediction fulfilled, he found himself in the very scene and recognized the object as a \"forced-air heater,\" not yet invented at the time of his NDE.\n- **The woman shown Moody\u0027s photograph** — in 1971 (before Life after Life was published) an NDEer was shown a photo of Moody, told his full name, and told she would tell him her experience \"when the time was right.\" Four years later Moody\u0027s family unwittingly moved onto her street; on Halloween his son knocked at her door trick-or-treating, she heard his name and sent for his father, and told Moody her story.\n- **The alternate-history vision (parallel time tracks)** — an NDEer was shown a completely different history of the earth that would have developed had \"certain events\" not occurred around the time of Pythagoras three thousand years ago: a world of peace and harmony \"marked by the absence of religious wars and of a Christ figure.\" Supports Loye\u0027s parallel-universes proposal, as do conditional flashforwards (\"only if you continue on your current path\").\n- **The sixty-two-year-old businessman** — after an NDE during cardiac arrest: \"we are all part of one big, living universe... If we think we can hurt another person or another living thing without hurting ourselves we are sadly mistaken... I look at a forest or a flower or a bird now, and say, \u0027That is me, part of me.\u0027\"\n- **The girl and the wished-for food** — a child NDEer said food appeared whenever she wished for it, but there was no need to eat — underscoring the illusory, hologram-like nature of afterlife reality.\n- **Hazrat Inayat Khan — half-animal beings** — in mystical travels to \"divine realities\" he met beings occasionally appearing half-human, half-animal, and discerned the animal symbolized a quality of the being (a lion\u0027s head for strength, fox features for craft); he theorized this is why ancient cultures such as Egypt gave their afterlife gods animal heads.\n- **Sai Baba and Therese Neumann (callbacks)** — Sai Baba\u0027s materializations suggest we can conjure food by wishing even here; Therese Neumann\u0027s inedia suggests eating may ultimately be as unnecessary for us as for those in the ND realm — this reality and the next differ in degree, not kind.\n- **Emanuel Swedenborg — OB visitor to the afterlife** — born 1688, \"the Leonardo da Vinci of his era\": Sweden\u0027s leading mathematician, nine languages, engraver, politician, astronomer, businessman; built watches and microscopes; wrote on metallurgy, color theory, commerce, economics, physics, chemistry, mining, anatomy; invented airplane and submarine prototypes. In middle age his meditation deepened into trances in which he left his body and visited \"heaven,\" conversing with \"angels\" and \"spirits.\"\n- **Swedenborg\u0027s veridical feats** — the queen of Sweden asked him why her deceased brother had not answered a letter; next day he returned with a message the queen confessed contained information only she and her dead brother knew. He also told a widow where to find a secret compartment in her deceased husband\u0027s desk containing desperately needed documents — an incident so famous it inspired Kant to write Dreams of a Spirit-Seer.\n- **Swedenborg\u0027s afterlife reports** — dark tunnel, welcoming spirits, landscapes beyond earthly beauty where time and space no longer exist, a dazzling light emitting love, beings of light, all-encompassing peace; he watched the newly deceased undergo the life review (\"the opening of the Book of Lives\"), in which a person witnessed \"everything they had ever been or done\" — recorded, he said, in the nervous system of the spiritual body and evoked by an angel examining the body \"beginning with the fingers of each hand, and proceeding through the whole.\" Angelic \"portrayals\" — a picture language so dense each image contains a thousand ideas, visible in the \"wave-substance\" around a person, sometimes lasting hours \"in such a sequential arrangement that one can only marvel\" — are supplemented by an angel speech beyond human understanding. In the spirit world food is unneeded, information taking its place as nourishment; angelic talk coalesces into 3-D symbolic images, especially animals (lambs for love and affection; tigers, bears, wolves, scorpions, snakes, and mice for evil affections). He reported spirits from other planets in heaven, claimed all humans are connected in cosmic unity and each of us is a heaven in miniature, and held heaven is the archetypal source of all earthly forms, with matter flowing \"in by stages\" from the Divine, growing \"coarser and hazier... more viscous and colder.\" Filled almost twenty volumes; on his deathbed, asked if he wished to recant: \"Everything that I have written is as true as you now behold me... After death you will see all.\"\n- **George F. Dole (professor of theology, Swedenborg School of Religion, Newton, Mass.; degrees from Yale, Oxford, Harvard)** — notes Swedenborg\u0027s universe is constantly created and sustained by two wavelike flows (one from heaven, one from our soul): \"We can view ourselves as interference patterns, because the inflow is a wave phenomenon, and we are where the waves meet\" — a striking resemblance to the hologram.\n- **The twelfth-century Persian Sufis — the country of the hidden Imam** — used deep trancelike meditation to visit the \"land where spirits dwell,\" where one has a \"subtle body\" with senses not tied to specific organs; a world created solely from alam almithal (thought), including space itself, yet corporeal, with forests, mountains, and cities, created by the imagination of many people. Henry Corbin (Sorbonne professor of Islamic Religion) coined \"imaginal\" to convey this ontological reality (\"I would undoubtedly have betrayed [the texts\u0027 meaning] had I simply contented myself with the term imaginary\"). The Sufis concluded imagination is a faculty of perception and practiced \"creative prayer\" — visualization to reshape destiny; they marveled that the inner world \"turns out to envelop, surround, or contain that which at first was outer and visible.\" Sohrawardi called the realm Na-Koja-Abad, \"the land of nonwhere.\"\n- **The seven-year-old boy on death** — \"Death is like walking into your mind\" — an NDEer\u0027s expression of the afterlife\u0027s nonlocal place in the psyche.\n- **Sri Yukteswar Giri (Hindu holy man, d. Puri, India, 1936)** — met by Evans-Wentz in the 1920s (\"pleasing presence and high character\"); gifted at passing between this world and the next. Described the afterlife as \"various subtle vibrations of light and color,\" \"hundreds of times larger than the material cosmos,\" with opal lakes, bright seas, rainbow rivers, luminous white snow and rain of many-colored lights; inhabitants materialize any body or food (though \"almost freed from any necessity of eating,\" they \"feast only on the ambrosia of eternally new knowledge\"), see with any body area, communicate by telepathic \"light pictures,\" learn to give \"a divine and equal love to all\" when facing relatives from many incarnations; injuries \"healed at once by mere willing\"; we are \"intelligent and coordinated images of light.\"\n- **Sri Aurobindo Ghose (1872–…, mystic and political activist)** — English-educated prodigy fluent in English, Hindi, Russian, German, French, and Sanskrit; read a case of books a day with verbatim recall; jailed for sedition in India\u0027s nationalist movement; an atheist until he saw a wandering yogi instantaneously heal his brother of a life-threatening illness. Through years of silencing the mind he became \"an explorer of the planes of consciousness,\" finding a realm beyond space and time of \"multicolored infinity of vibrations\" peopled by advanced nonphysical beings who appear to a Christian as a Christian saint and to an Indian as a Hindu one — not to deceive but to be accessible \"to a particular consciousness\"; in truest form they are \"pure vibration\" (he likened form/vibration to wave-particle duality in On Yoga). There information is absorbed \"in great masses\" rather than point-by-point. He said a \"mental screen\" hides \"the veil of matter\"; everything is \"different intensities of luminous vibrations\"; all matter is to some degree conscious (hence psychokinesis is possible); a \"progressive law of fragmentation\" takes over as one descends the vibrational levels; if a single point of the universe were totally unconscious the whole universe would be; he opposed religion in favor of the spiritual universe within (\"flee also from the snare of the thinker, the snare of the theologian and the church-builder\"); physical reality is \"a mass of stable light.\"\n- **E. Nandisvara Nayake Thero (anthropologist) — the dreamtime** — lived with an Australian aboriginal community; the dreamtime, visited by shamans in profound trance, is almost identical to Western afterlife descriptions: the realm of the dead, instant access to all knowledge, no time/space/boundaries — \"survival in infinity.\"\n- **Holger Kalweit (German ethnopsychologist, degrees in psychology and cultural anthropology)** — virtually all shamanic traditions describe this extradimensional realm (life review, teaching spiritual beings, thought-conjured food, beautiful meadows/forests/mountains); the ability to travel to the afterlife realm is the most universal requirement of shamanhood, and NDEs are often the catalyst — the Oglala Sioux, Seneca, Siberian Yakut, South American Guajiro, Zulu, Kenyan Kikuyu, Korean Mudang, Indonesian Mentawai Islanders, and Caribou Eskimo all have traditions of shamans made by life-threatening illness. Shamanic cultures navigate the realm better because psychic reality is daily reality for them; \"the shaman should be considered as a most up-to-date and knowledgeable psychologist.\"\n- **Michael Harner among the Conibo (Peruvian Amazon, 1960–61)** — sent by the American Museum of Natural History for a year-long expedition; told he must drink ayahuasca (the \"soul vine\") to learn the Conibo\u0027s religion. He had an out-of-body journey among the gods and devils of Conibo mythology: demons with grinning crocodilian heads, an \"energy-essence\" rising from his chest toward a dragon-headed ship crewed by Egyptian-style, blue-jay-headed figures, the felt approach of his own death. Winged dragonlike beings emerged from his spine and \"projected\" the \"true\" history of Earth: they created and inhabit all life as a hiding place from an undisclosed enemy in outer space (Harner notes they were \"almost like DNA,\" though in 1961 he knew nothing of DNA). A blind Conibo shaman, hearing the account, smiled: \"Oh, they\u0027re always saying that. But they are only the Masters of Outer Darkness.\" Two Christian missionaries recognized his descriptions as virtually identical to passages in the Book of Revelation, which Harner, an atheist, had never read. Talbot: Old and New Testament prophets\u0027 \"trips to heaven\" may also have been shamanic journeys.\n- **NDE transformations** — NDEers become happier, more optimistic, easygoing, less materialistic; capacity to love expands enormously (aloof husbands become affectionate, workaholics relax, introverts become extroverts); criminals reform; fire-and-brimstone preachers switch to unconditional love. They return convinced of the soul\u0027s immortality and a compassionate, intelligent universe, favoring spirituality over religion, with increased openness to reincarnation and Eastern religions.\n- **Ring\u0027s heavy-equipment driver** — no interest in books before his NDE; had a vision of total knowledge he could not recall, but physics terms surfaced: he blurted \"quantum,\" announced \"Max Planck—you\u0027ll be hearing about him in the near future,\" then fragments of equations. Neither he nor his wife knew the words until he looked them up; he then read voraciously (physics, parapsychology, metaphysics) and enrolled in college as a physics major. His wife\u0027s letter to Ring: he speaks words he has never heard \"in our reality... learns... it in relationship to the \u0027light\u0027 theory... talks about things faster than the speed of light... When [he] picks up a book on physics he already knows the answer and seems to feel more.\"\n- **Bruce Greyson (psychiatrist, University of Michigan; IANDS director of research), 1982** — gave 69 NDEers a questionnaire on psychic aftereffects; found an increase in virtually all psychic and psi-related phenomena assessed.\n- **Phyllis Atwater (Idaho housewife turned NDE researcher after her own NDE)** — interviewed dozens of NDEers with similar findings: \"Telepathy and healing gifts are common. So is \u0027remembering\u0027 the future. Time and space stop, and you live in a future sequence in detail. Then, when the event occurs, you recognize it.\"\n- **1985 Georgetown University symposium (convened by U.S. Senator Claiborne Pell)** — on life beyond biological death. Physicist Paul Davies: \"if mind is pattern rather than substance, then it is capable of many different representations\"; psychoneuroimmunologist Candace Pert: \"perhaps biological information flow cannot just disappear at death and must be transformed into another realm.\" Separately, Nobelist Brian Josephson, a longtime meditator, is likewise convinced there are subtler levels of reality accessible through
