 meditation where one may travel after death.\n- **Who are the beings? (Whitton and Monroe)** — Whitton\u0027s subjects who could answer said the between-life counselors were \"entities who had completed their cycle of incarnations here.\" Monroe, after hundreds of journeys and interviews with fellow OBEers: they \"radiate a warmth of friendliness that evokes complete trust,\" reading thoughts is \"absurdly easy\" for them, \"the entire history of humankind and earth is available to them in the most minute detail,\" and they are \"totally solicitous as to the well-being of the human beings with whom they are associated\" — but their ultimate identity remains unknown. To the question whether a being of light is a reality or just an allegorical phantasm, Talbot answers it is a bit of both: in a holographic universe such images are illusions shaped by the consciousness present, but illusions based, as Pribram says, on something that is there; to speculate further would ignore Sri Aurobindo\u0027s warning against turning spiritual understandings into religious ones, and the question remains open.\n- **Cities of light and halls of learning** — NDEers, yogic adepts, and ayahuasca-using shamans consistently describe vast, brilliantly luminous, architecturally foreign cities (the Sufis named several); Swedenborg described one \"of staggering architectural design... the home and the source of the art itself.\" Whitton\u0027s subjects worked in vast halls of learning with libraries and seminar rooms between lives; NDEers report \"schools,\" \"libraries,\" \"institutions of higher learning\"; eleventh-century Tibetan texts mention learning-cities reachable through \"the hidden depths of the mind\" — Edwin Bernbaum (Sanskrit scholar, UC Berkeley) believes one such legend inspired Hilton\u0027s Shangri-La in Lost Horizon. Moody and Ring report NDEers saying the buildings were literally \"built out of knowledge\" — perhaps encounters with a living cloud of pure knowledge translated by the mind into a building.\n- **Talbot\u0027s university dreams (footnote)** — through high school and college he had vivid recurring flying dreams of attending classes on spiritual subjects (the human energy field, reincarnation) at a beautiful otherworldly university, meeting dead acquaintances and souls about to be reborn; several psychically talented acquaintances report the same — Texas clairvoyant Jim Gordon as a child asked his mother why he had to go to school twice, once by day and once at night in his sleep. Monroe and other researchers hold flying dreams are poorly remembered OBEs, making Talbot wonder whether some of us visit these incorporeal schools while alive.\n- **George Russell (turn-of-the-century Irish seer and talented OBEer)** — described the first \"being of light\" he met in the \"inner world\": a dazzle of light from the heart of a tall figure shaped of \"half-transparent or opalescent air,\" radiant electrical fire centered on the heart, flaming wing-like auras through hair \"like living strands of gold,\" leaving him in \"extraordinary lightness, joyousness, or ecstasy.\"\n- **Knock, Ireland, 1879 — Marian vision** — fourteen people saw three glowing, eerily motionless figures (Mary, Joseph, and St. John the Evangelist — identified because he resembled a statue in a nearby village) standing in a meadow by the local church; witnesses could read the lettering on the book St. John held, but when a woman tried to embrace the Virgin her arms closed on empty air: \"The figures appeared so full and lifelike I could not understand why my hands could not feel what was so plain and distinct to my sight.\"\n- **Zeitoun, Egypt, 1968–71 — Marian apparitions** — began when two Moslem automobile mechanics saw a luminous Mary on the ledge of the central dome of a Coptic church in a poor Cairo suburb; for three years glowing 3-D images of Mary, Joseph, and the Christ Child appeared weekly, sometimes hovering for as long as six hours, moving and waving at crowds. Holographic traits: always heralded by a brilliant flash of light; at first amorphous, slowly coalescing into human shape; accompanied by doves \"formed of pure light\" that soared without flapping; as interest waned the figures waned, ending as clouds of luminous fog. Seen by hundreds of thousands and extensively photographed. Grosso: witnesses sound like they are \"describing some sort of holographic projection.\"\n- **Michael Grosso, The Final Choice** — concludes such visions are not the historical Mary but psychic holographic projections of the collective unconscious; the apocalyptic warnings at Fatima and Lourdes show the collective unconscious is deeply disturbed by modern science\u0027s violent impact on human life and Earth\u0027s ecology — our collective dreams warning us of possible self-destruction.\n- **D. Scott Rogo — the Zeitoun \"psychic blueprint\"** — in 1925, while the Zeitoun church was being built, its philanthropist patron dreamed the Virgin told him she would appear there when it was completed; she did not appear then, but the well-known forty-year-old prophecy may have gradually built \"a psychic \u0027blueprint\u0027 of the Virgin within the church,\" an ever-increasing pool of psychic energy that in 1968 \"became so high-pitched that an image of the Virgin Mary burst into physical reality.\" Talbot has offered a similar explanation in earlier writings.\n- **The case against extraterrestrial UFOs (four arguments)** — (1) too many sightings — thousands of documented encounters, too many for actual interplanetary visits; (2) occupants are implausibly humanoid — breathing our air, unafraid of earthly viruses, adapted to our gravity and the sun\u0027s emissions, showing recognizable facial emotions, speaking our language; (3) they do not behave like visitors — no White House lawn landing; they appear to farmers and stranded motorists, chase jets without attacking, let hundreds see them but make no formal contact; their signature \"medical examinations\" make no sense for a civilization that could get the data without abductions; (4) they do not behave like physical objects — radar-tracked instant ninety-degree turns at enormous speeds that would rip a physical object apart; changing size, shape, and color; vanishing and appearing (their occupants too). Jacques Vallee (astrophysicist, model for LaCombe in Close Encounters of the Third Kind): \"It is the behavior of an image, or a holographic projection.\"\n- **Betty and Barney Hill — the \"interrupted journey\"** — one of the most thoroughly documented UFO abduction cases; it seems an actual alien contact in all ways except one: the UFO commander wore a Nazi uniform — senseless for genuine aliens, but consistent with a psychological, dream-like event containing obvious symbols and flaws in logic.\n- **Surreal UFO cases** — the literature includes UFO entities singing absurd songs or throwing potatoes at witnesses; straightforward abductions that turn into hallucinogenic journeys through Dantesque realities; humanoid aliens shapeshifting into birds, giant insects, and other phantasmagoric creatures.\n- **Carl Jung, 1959** — proposed \"flying saucers\" were a product of the collective human unconscious, a modern myth in the making.\n- **Jacques Vallee, Passport to Magonia (1969)** — UFOs are an old phenomenon in a new guise, resembling elves and gnomes of European folklore, medieval angels, and Native American supernatural beings; the absurd behavior of UFO entities matches elves, fairies, Norse gods, and trickster figures. Beneath the archetypes lies one vast, pulsating, intelligent, timeless something that changes appearance to suit culture and era — the phenomenon on which all myths are based. Later Vallee: \"an alien form of intelligence of incredible complexity is communicating with us symbolically... [it comes from] other dimensions beyond spacetime; from a multiverse which is all around us.\"\n- **Talbot\u0027s \"omnijective\" proposal (1976 article)** — UFOs are hard to categorize because our picture of reality is fundamentally incorrect; since quantum physics links mind and matter, they are products of the collective psyche that are also quite real — neither subjective nor objective but \"omnijective\" (he was unaware Corbin had already coined \"imaginal\" for the same blurred status). Yet they leave physical traces: burnt circles, deep landing impressions, radar tracks, scars and incision marks from their examinations.\n- **Ring\u0027s imaginal-UFO work** — argues UFO encounters are imaginal experiences akin to NDEs and shamanic journeys — evidence reality is a multilayered, mind-generated hologram; laments that shamanism, ufology, NDEs, and psychedelic research are studied by separate disciplines; has recently obtained a grant for a comparative study of UFO experiencers and NDEers.\n- **Peter Rojcewicz (folklorist, Juilliard School, New York)** — concludes UFOs are omnijective; \"There exists a continuum of experiences where reality and imagination imperceptibly flow into each other\" — further evidence of Bohmian unity; folklorists can no longer treat such phenomena simply as beliefs.\n- **Whitley Strieber (author of Communion, famous abductee)** — encounters with UFO beings \"may be our first true quantum discovery in the large-scale world: The very act of observing it may be creating it as a concrete actuality, with sense, definition, and a consciousness of its own\"; also suggests UFO beings may be what \"the force of evolution looks like when it\u0027s applied to a conscious mind,\" and says our universe and the beings\u0027 are \"spinning each other together\" in cosmic communion.\n- **Carl Raschke (Department of Religious Studies, University of Denver)** — in the omnijective cosmos the veridical-vs-hallucinatory question is moot; the real question is what ultimate aim these apparitions serve. He holds UFOs are \"a holographic materialization from a conjugate dimension of the universe,\" an interpretation that \"must take precedence over the psychic projection hypothesis,\" which flounders before the vivid, complex, consistent features abductees describe.\n- **Talbot\u0027s own UFO verdict** — probably no single explanation accounts for all aspects of the phenomenon. The higher vibratory realms no doubt hold countless nonphysical species, and in a holographic universe — where there may be an infinity of realities occupying the same space as our own world — the sheer abundance of sightings ceases to be a sticking point and may instead be evidence of \"just how unfathomably abundant with intelligent life the superhologram is\"; the spaceless, timeless inner cosmos may be as rich with life as the rain forest and the coral reef, even if the physical cosmos proves an ecological Sahara. Our own holographically organized minds may be sculpting the beings\u0027 outward appearance (just as we convert beings of light into religious personages and clouds of pure information into libraries), drawing on our folk memories and mythological unconscious for the symbols — so the notorious \"medical examinations\" may be only symbolic representations: nonphysical intelligences probing not our bodies but the subtle anatomy of our energy selves, or our very souls.\n- **Constantine\u0027s flaming cross and the Angels of Mons** — history records Constantine and his soldiers seeing an enormous flaming cross in the sky (Talbot: a psychic exteriorization of the emotions of the army about to Christianize the pagan world); hundreds of WWI British soldiers at Mons, Belgium, saw an immense apparition of Saint George and a squadron of angels during an initially losing battle — both apparent psychic projections. Talbot adds the explanations may not be exclusive: high-pitched collective belief may open a doorway, a \"psychic niche,\" through which extradimensional intelligences can appear.\n- **John Wheeler — self-reference cosmology** — the University of Texas physicist cautions that though consciousness lets a subatomic particle pop into existence, we are not the sole agents: we create the particles and hence the universe, but they also create us; each creates the other. Talbot: UFO entities may be archetypes in our collective unconscious while we are archetypes in theirs.\n- **Carol Dryer and the spleen (callback)** — her ability to communicate with Talbot\u0027s spleen (upset because he had yelled at it) shows other organs possess their own mentality; psychoneuroimmunologists say the same of immune cells, and Bohm of subatomic particles — so some UFO-type phenomena may be projections of these collective mentalities (Harner\u0027s dragon beings suggesting a visual manifestation of the DNA molecule\u0027s intelligence).\n- **The closing question** — the Tibetan Book of the Dead stresses the dreamlike nature of the afterlife (hence \"dreamtime\"); the Hindu Vedas and yogic texts say the universe is God\u0027s dream; Christianity: we are thoughts in the mind of God (Keats: God\u0027s \"long immortal dream\"). But in a holographic universe asking whether God or the collective consciousness of all things is the dreamer is meaningless — the part is the whole. The Kalahari Bushmen: \"The dream is dreaming itself.\"\n\n## Key quotes\n- \"Access to holographic reality becomes experientially available when one\u0027s consciousness is freed from its dependence on the physical body.\" — Kenneth Ring, Life at Death, the chapter\u0027s epigraph.\n- \"The only way she would have had such a perspective was if she had been floating right outside and at very close range to the tennis shoe. It was very concrete evidence for me.\" — Kimberly Clark on verifying Maria\u0027s OBE.\n- \"There appears to be no plausible explanation for the accuracy of these observations involving the usual physical senses. The out-of-body hypothesis simply seems to fit best with the data at hand.\" — cardiologist Michael Sabom on his cardiac-patient study.\n- \"He had missed the most obvious explanation of all—NDEs are real. He had missed the possibility that the soul really does travel.\" — Melvin Morse on a journal article explaining NDEs as brain tricks.\n- \"I believe that this is a realm that is created by interacting thought structures. These structures or \u0027thought-forms\u0027 combine to form patterns, just as interference waves form patterns on a holographic plate.\" — Kenneth Ring on the afterlife dimension.\n- \"Rene Descartes\u0027 famous dictum, \u0027I think, therefore I am,\u0027 is never more pertinent than in the between-life state. There is no experience of existence without thought.\" — Joel Whitton on his hypnotic subjects.\n- \"It\u0027s like climbing right inside a movie of your life. Every moment from every year of your life is played back in complete sensory detail. Total, total recall. And it all happens in an instant.\" — an NDEer describing the life review.\n- \"Death is like walking into your mind.\" — a seven-year-old NDEer on the nonlocal nature of the afterlife realm.\n- \"Contact with eternity is in the present moment, but it is mediated by thought. It is a matter of attention.\" — David Bohm on what may happen in the death experience.\n- We are \"intelligent and coordinated images of light.\" — Sri Yukteswar Giri on our quintessential nature in the luminous realm.\n- \"It is the behavior of an image, or a holographic projection.\" — Jacques Vallee on how UFOs move and vanish.\n- \"The gates of Pluto must not be unlocked, within is a people of dreams.\" — Orpheus, quoted by Talbot on the spillover of the Land of the Dead into our own realm.\n- \"The dream is dreaming itself.\" — the Kalahari Bushmen, the chapter\u0027s closing line on the self-reference cosmology.\n\n## Thread\nChapter 8 completes Part III\u0027s demolition of space-time as absolute: Chapter 7 argued time is constructed; this chapter argues location is too, using OBEs and NDEs as the experiential evidence that consciousness is nonlocal and that the \"subtler levels\" Bohm posits are literally visitable. It fuses nearly every thread of the book so far — Pribram\u0027s frequency domain, Bohm\u0027s implicate order, Whitton\u0027s between-life research, Grof\u0027s transpersonal realm, Hunt\u0027s energy field, Sai Baba\u0027s materializations, Neumann\u0027s inedia, Jahn and Dunne\u0027s consciousness-environment interaction, Loye\u0027s parallel time tracks — into the claim that this world and the afterlife are hologram-like constructs differing in degree, not kind. Its closing move (Marian visions, UFOs, the omnijective universe, \"who are the beings of light?\") deliberately leaves open questions — including whether NDEers\u0027 induced hunger for physics knowledge anticipates \"some coming confluence between science and the spiritual,\" which Talbot promises to explore \"a little later\" in the book.\n\n## Connections\n- **Ch 7 — Time Out of Mind (explicit)**: the text refers to \"the retrocognitive visions we examined in the last chapter\" (reframed here as OB projection into the past), and carries forward Whitton\u0027s between-life regressions, Loye\u0027s parallel-universe/time-track proposal, and the amoeboid-universe/crystallizing-future imagery invoked in the opening paragraph.\n- **Earlier chapters (Parts I–II, explicit callbacks)**: Bohm\u0027s implicate/explicate orders and Pribram\u0027s frequency domain (the theory chapters); Hunt\u0027s holographic energy-field of consciousness; Tart\u0027s mutual-hypnosis subjects who had no hands until they thought them; Grof\u0027s transpersonal patients and the infinite informational realm; Sai Baba\u0027s materializations and Therese Neumann\u0027s inedia; stigmata and belief resculpting the body; \"beliefs are like addictions\" from the beginning of the book; Tom reading the watch inscription through his daughter\u0027s stomach; remote viewing; Carol Dryer talking to Talbot\u0027s spleen; Jahn and Dunne on consciousness establishing reality.\n- **Forward pointer**: the question of a \"coming confluence between science and the spiritual\" and the ultimate identity of the beings of light is explicitly deferred (\"We will explore this possibility a little later\"), setting up the book\u0027s concluding chapters.\n- **Possible cross-book links (speculative)**: *My Big TOE* (Campbell) — Campbell\u0027s framework grew out of OBE work in Robert Monroe\u0027s orbit, and his \"consciousness is fundamental / reality as data stream\" maps onto Talbot\u0027s frequency-domain reading of OBEs. *The Simulation Hypothesis* (Virk) — the ND realm as thought-rendered environment and \"life review as replay of recorded information\" resonate with Virk\u0027s rendered-world and karma-as-recorded-data ideas. *The Power of Now* (Tolle) — Bohm\u0027s \"contact with eternity is in the present moment... a matter of attention\" is close kin to Tolle\u0027s presence teaching. *American Cosmic* (Pasulka) — this chapter\u0027s omnijective treatment of UFOs as religious/mythic phenomena (Vallee, Strieber, collective-unconscious readings) is essentially the terrain Pasulka studies as a scholar of religion.\n"},{"id":"holographic-universe/09-return-to-the-dreamtime","file":"09-return-to-the-dreamtime.md","title":"Return to the Dreamtime","type":"chapter","chapter":"9","concepts":["dreamtime","implicate-order","explicate-order","void-and-nonvoid","brahman","maya","veiling-and-projecting-powers-of-consciousness","macrocosm-is-microcosm","as-above-so-below","indras-network-of-pearls","monads","holomovement","frequency-domain","holophonic-sound","dissipative-structures","neural-networks","multiplexed-holographic-gratings","optical-memory-with-associative-recall","restructuring-of-science","participatory-science","omnijective-universe","shamanizing-of-modern-humanity","evolutionary-thrust-toward-higher-consciousness","psychonauts","past-life-memories","reincarnation","near-death-experience","out-of-body-experience","ufo-encounters-as-shamanic-initiation","marian-visions","lucid-dreaming","interface-between-consciousness-and-environment","plasticity-of-reality","higher-planes","conceptual-pigeonholes"],"people":["Lame Deer","David Bohm","Karl Pribram","John Blofeld","Milarepa","Robert Sohl","Audrey Carr","John Woodroffe","Leo Schaya","Douglas Sharon","Anaximenes of Miletus","Pythagoras","Heraclitus","Plato","Philo Judaeus","Maimonides","Hermes Trismegistus","William Blake","Black Elk","Empedocles","Fa-Tsang","Empress Wu","Leibniz","Dennis Gabor","Hugo Zuccarelli","Paul McCartney","Peter Gabriel","Vangelis","Ilya Prigogine","Marcus S. Cohen","Dana Z. Anderson","Willis Harman","Brian L. Weiss","Joel Whitton","Ian Stevenson","R. H. Rhine","Louisa Rhine","Robert Monroe","Valerie Hunt","Dubrov","Pushkin","Michael Harner","Kenneth Ring","Michael Grosso","Carl Raschke","Jacques Vallee","Whitley Strieber","Edgar Cayce","Robert Jahn","Brenda Dunne","David Loye","Terence McKenna","Emanuel Swedenborg","Sri Aurobindo"],"body":"\n# Ch 9 — Return to the Dreamtime\n\n## In one paragraph\nIn this closing chapter Talbot asks where the holographic model goes from here — and first shows where the idea has already been. He surveys ancient and traditional systems of thought (Tibetan and Zen Buddhism, Hinduism, Kabbalah, Sufism, Greek philosophy, and shamanic traditions from Hawaii to the Sudan to Australia) and argues that virtually all of them prefigured the model\u0027s two central features: Bohm\u0027s implicate/explicate structure and the nonlocal, whole-in-every-part organization of reality. He then sketches the model\u0027s emerging technical fruits — Zuccarelli\u0027s holophonic sound, Prigogine\u0027s dissipative structures read as the implicate becoming explicate, and holographic computing — before arguing that the model\u0027s deepest claim (that materiality may be an illusion within a vast, sentient nonphysical cosmos) demands a basic restructuring of science: acceptance of psychic and spiritual phenomena, a broader definition of evidence, and a shift from objectivity to participation. Finally, drawing on Ring, Grosso, Strieber, McKenna and others, he speculates that rising NDEs, Marian visions and UFO encounters are signs of an evolutionary thrust toward higher consciousness — a \"shamanizing of modern humanity\" — pointing back toward the plastic, dreamtime-like reality the aborigines say the earth once was and will be again. The book closes with the aboriginal image: we are just learning how to survive in infinity.\n\n## Core claims\n- Talbot argues that the holographic model, though new as a scientific theory, is an ancient idea: several of its aspects were foreshadowed or intuited in \"virtually all of the world\u0027s philosophical and metaphysical traditions.\"\n- Talbot argues that Bohm\u0027s implicate/explicate two-order structure appears independently as the Tibetan void/nonvoid, the Hindu Brahman/maya, the Kabbalistic view of creation as illusory projection of God, and the \"vital essence\" underlying visible forms that Douglas Sharon calls probably the central concept of shamanism everywhere.\n- Talbot argues that the nonlocal, part-contains-the-whole organization of reality was likewise glimpsed by many ancient thinkers — the Sufi \"macrocosm is the microcosm,\" Hermetic \"As above, so below,\" Indra\u0027s net of pearls, Fa-Tsang\u0027s mirrored candle, Black Elk\u0027s \"anywhere is the center of the world.\"\n- Talbot suggests these ancient intuitions may even have fed the hologram\u0027s invention: Leibniz, arguably influenced by Hua-yen Buddhism, proposed monads and gave the world integral calculus — the mathematics that enabled Gabor to invent the hologram. The idea thus \"comes full circle.\"\n- Talbot argues that new discoveries are already flowing from the model: holophonic sound, a possible explanation of dissipative structures as the implicate becoming explicate, and holographically inspired computers — though he stresses the computing advances remain refinements of the mechanistic approach.\n- Talbot argues that science, which has \"repeatedly fallen short of the mark\" in explaining the psychic and spiritual dimensions of human existence, needs a basic restructuring with three components: (1) accepting the existence of psychic and spiritual phenomena; (2) broadening what counts as scientific evidence so mass anecdotal testimony about important matters is not dismissed; (3) replacing detached objectivity with a participatory approach.\n- Talbot argues that fear of ridicule may be as much of a stumbling block as disbelief — many psychiatrists privately believe in reincarnation and psychic phenomena but won\u0027t say so publicly; what is needed is \"the parapsychological equivalent of a Rosa Parks.\"\n- Talbot argues that science applies a double standard: the unproven Big Bang is accepted because it falls into the category of \"fashionable things to believe,\" while equally compelling but unfashionable claims (e.g. that the NDE realm of light is an actual other level of reality) would be attacked.\n- Talbot argues that in a holographic, omnijective universe — where the physicist\u0027s consciousness affects the particle, the doctor\u0027s attitude affects the placebo, the experimenter\u0027s mind affects the machine, and the imaginal spills into physical reality — \"strict objectivity ceases to be possible.\"\n- Talbot argues (following Ring) that NDEs are increasing and transforming people, evidence of \"the shamanizing of modern humanity\" and \"an evolutionary thrust toward higher consciousness for all humanity\"; Marian visions (Grosso) and UFO encounters (Raschke, Vallee, Ring, Strieber) may be parallel signs.\n- Talbot speculates on two purposes of this transformation: to prepare us to safely manipulate an increasingly malleable reality (the return of the dreamtime), and to wake us to the claim of many traditions that humanity\u0027s true home is not the earth but a nonphysical realm of pure spirit.\n- Talbot argues the afterlife realm itself is only a stepping stone — Swedenborg and NDEers describe still higher, more formless planes — and that we are not yet mature enough for that formlessness, which is why life confronts us with only \"small doses of the omnijective\" (UFOs and similar experiences), and why the beings of light say the purpose of life is to learn.\n- Talbot closes with Bohm\u0027s warning that our conceptual pigeonholes are of our own making — \"out there\" is only the indivisible totality, Brahman — and we must be ready to advance \"from soul-state to soul-state,\" as Sri Aurobindo put it, and from illumination to illumination.\n\n## Concepts\n- **Dreamtime** — the transcendent reality that the Australian aborigines regard as the true source of the mind (shamans know consciousness is not in the body); the aborigines also say there was a time when the entire world was dreamtime — a far more plastic, fluid reality — and that the day will come when the earth returns to it.\n- **Implicate and explicate orders** — Bohm\u0027s two basic orders composing the universe; the chapter\u0027s touchstone, matched against each tradition\u0027s version of a hidden generative level and a visible one.\n- **Void and nonvoid** — the Tibetan Buddhist pair: the nonvoid is the reality of visible objects; the void, like the implicate order, is the birthplace of all things, which pour out of it in a \"boundless flux.\" Only the void is real; all forms in the objective world are illusory, existing merely because of the unceasing flux between the two orders. The void is \"subtle,\" \"indivisible,\" \"free from distinguishing characteristics,\" and as a seamless totality cannot be described in words — yet the nonvoid, itself indescribable, still contains \"an infinitely vast complex of universes.\"\n- **Brahman** — the Hindu name for the implicate level of reality: formless, yet the birthplace of all forms in visible reality, which appear out of it and enfold back into it in endless flux; sometimes personified as pure consciousness — consciousness being not only a subtler form of matter but more fundamental than matter, so that matter emerged from consciousness rather than the reverse. Talbot pairs this with Bohm\u0027s remark that the implicate order can just as easily be called spirit.\n- **Maya** — the Hindu term for the transitory, unreal, \"second-generation\" material universe created by veiled consciousness; maya \"severs the united consciousness\" so objects seem separate from the self, and is frequently likened to a web.\n- **Veiling and projecting powers of consciousness** — per the Vedas, the twin powers through which the physical world is brought into being.\n- **Baro (\"to create\")** — the Hebrew verb which, as the Zohar notes, implies the idea of \"creating an illusion\" — the Kabbalistic reflection of creation-as-illusion built into the language of Genesis.\n- **Macrocosm is the microcosm** — the twelfth-century Sufi formula for the nonlocal whole-in-every-part organization of reality; variants include Hermes Trismegistus\u0027s \"the without is like the within of things; the small is like the large,\" the alchemists\u0027 \"As above, so below,\" and the Visvasara Tantra\u0027s \"What is here is elsewhere.\"\n- **Indra\u0027s network of pearls** — the Avatamsaka Sutra\u0027s image of a legendary net of pearls over the palace of the god Indra, \"so arranged that if you look at one, you see all the others reflected in it\" — each object in the world involves every other object and \"is everything else.\"\n- **Monads** — Leibniz\u0027s proposed fundamental entities constituting the universe, each containing a reflection of the whole universe; possibly inspired by his familiarity with Hua-yen Buddhism.\n- **Holomovement** — Bohm\u0027s stress (echoed by Fa-Tsang about his own mirror model) that the universe is not simply a static hologram but is in constant dynamic movement.\n- **Frequency domain** — Pribram\u0027s term, which Talbot equates with what Milarepa called \"the border between mind and matter\"; Talbot also notes reality seems to become \"increasingly frequency-like as one penetrates deeper into the implicate.\"\n- **Holophonic sound** — Zuccarelli\u0027s recording technique creating holograms made of sound instead of light, based on the fact that human ears emit sound (the audio equivalent of the reference laser); it produces sounds more realistic and three-dimensional than stereo and retains its three-dimensionality even through one headphone side.\n- **Dissipative structures** — Prigogine\u0027s name for spontaneously appearing ordered systems (some mixed chemicals develop into more ordered, not more disordered, arrangements); he won a Nobel Prize for unraveling them, and he and others suggest they are evidence of the implicate aspects of reality becoming explicate.\n- **Neural networks** — the recent computing strategy of connecting scores of little computers together to more closely resemble the biological structure of the human brain, instead of building single monolithic machines.\n- **Multiplexed holographic gratings / optical memory** — Cohen\u0027s proposal that processors relying on interfering waves of light through such gratings might better mimic the brain\u0027s neural structure; Anderson showed holographic gratings could build an \"optical memory\" exhibiting associative recall.\n- **Participatory science / participatory approach** — the replacement Talbot calls for of science\u0027s \"enamorment with objectivity\": since the observer\u0027s consciousness affects what is studied, the scientist must become a participant and experiencer; per Harman, \"a willingness to be transformed is an essential characteristic of the participatory scientist.\"\n- **Omnijective universe** — the term used here for the universe as a seamless continuum where mind and reality interpenetrate, in which strict objectivity ceases to be possible; UFO-type encounters are \"small doses of the omnijective.\"\n- **Psychonauts** — Talbot\u0027s speculative future heroes: participatory scientists who travel into the subtler realms themselves rather than merely interviewing NDEers and OBEers.\n- **Shamanizing of modern humanity** — Ring\u0027s conclusion from the transformative effect of NDEs: modern NDEers, like tribal NDEers who become shamans, mutate into more loving, compassionate, more psychic individuals.\n- **Evolutionary thrust toward higher consciousness** — Ring\u0027s answer to why NDEs are increasing: an evolutionary movement affecting all humanity, possibly also expressed in Marian visions and UFO encounters.\n- **Interface between consciousness and its environment** — Jahn and Dunne\u0027s phrase for what we are learning to tinker with; Talbot speculates that as we grow more adept, reality may become malleable again, fulfilling the aboriginal prophecy of a return to the dreamtime.\n- **Conceptual pigeonholes** — Bohm\u0027s warning image: the categories we use to parse the universe are of our own making and do not exist \"out there,\" for \"out there\" is only the indivisible totality; Zen (per Sohl and Carr) likewise identifies confusing reality with the pigeonholes of language as \"the basic ignorance.\"\n\n## Experiments, examples \u0026 case studies\n- **Lame Deer (Lakota shaman), epigraph from *Lame Deer Seeker of Visions*** — Lame Deer says only human beings no longer know why they exist; they have forgotten the secret knowledge of their bodies, senses, and dreams, and bulldoze a \"quick comfortable superhighway\" to \"the big empty hole\" at its end. He says he has seen where it leads in his vision. Talbot uses this to open the chapter\u0027s theme of recovering ancient knowledge.\n- **Tibetan Buddhist void/nonvoid doctrine (via Tibet scholar John Blofeld)** — the void is the birthplace of all things pouring out in \"boundless flux\"; only the void is real, visible forms being illusory. Blofeld: \"everything interpenetrates, and is interpenetrated by, everything else; as with the void, so with the non-void — the part is the whole.\" Talbot presents this as a foreshadowing of Bohm\u0027s implicate/explicate orders.\n- **Milarepa (eleventh-century Tibetan yogin, most renowned Tibetan Buddhist saint)** — taught that we cannot perceive the void directly because our \"inner consciousness\" (unconscious mind) is too \"conditioned\" in its perceptions; this conditioning hides \"the border between mind and matter\" (Talbot\u0027s gloss: the frequency domain) and also causes us to form a body for ourselves in the between-life state. He wrote that \"in the invisible realm of the heavens ... the illusory mind is the great culprit\" and counseled disciples to practice \"perfect seeing and contemplation.\" Talbot says this prefigures Pribram\u0027s thinking.\n- **Zen Buddhism (Robert Sohl and Audrey Carr, *Games Zen Masters Play*)** — Zen\u0027s main objective is to perceive reality\u0027s wholeness; confusing \"the indivisible nature of reality with the conceptual pigeonholes of language is the basic ignorance from which Zen seeks to free us\"; answers lie in \"direct nonconceptual experience,\" not intellectual concepts. Talbot notes the words \"could have been lifted right from one of Bohm\u0027s papers.\"\n- **Hindu cosmogony (Vedas, Svetasvatara Upanishad, Kena Upanishad, Vedic scholar Sir John Woodroffe)** — Brahman as formless implicate source; matter emerging from consciousness; the world as maya. The Svetasvatara Upanishad: \"One should know that Nature is illusion (maya), and that Brahman is the illusion maker.\" The Kena Upanishad: Brahman is an uncanny something \"which changes its form every moment from human shape to a blade of grass.\" Woodroffe: maya splits the united consciousness into multitudinous objects, but \"in the ultimate basis of experience the divergence has gone... in undifferentiated mass, experiencer, experience, and the experienced.\"\n- **Kabbalah (Leo Schaya, Swiss expert on the Kabbalah; the Zohar, thirteenth-century Kabbalistic commentary on the Torah)** — \"the entire creation is an illusory projection of the transcendental aspects of God,\" yet not complete nothingness, \"for every reflection of reality... necessarily possesses something of its cause.\" The Zohar notes the Hebrew verb *baro*, \"to create,\" implies \"creating an illusion.\"\n- **Hawaiian kahunas** — hold that everything in the universe is infinitely interconnected, almost like a web; the shaman sees himself at the center of the web and thus capable of affecting every other part of the universe. Talbot notes maya is also frequently likened to a web in Hindu thought.\n- **Australian aborigines on the source of mind** — believe the true source of mind is in the transcendent reality of the dreamtime; normal people wrongly believe their consciousness is in their bodies, while shamans know otherwise, which is why they can contact subtler levels of reality. Talbot parallels this with Bohm\u0027s view that consciousness always has its source in the implicate.\n- **The Dogon people of the Sudan** — believe the physical world is the product of a deeper, more fundamental level of reality, perpetually flowing out of and streaming back into it. A Dogon elder: \"To draw up and then return what one had drawn — that is the life of the world.\"\n- **Douglas Sharon, *Wizard of the Four Winds: A Shaman\u0027s Story*** — states that probably the central concept of shamanism, wherever found, is that underlying all visible forms there exists a vital essence from which they emerge and by which they are nurtured, to which everything ultimately returns. Talbot: the implicate/explicate idea is in virtually all shamanic traditions.\n- **The macrocosm-microcosm lineage** — the twelfth-century Sufis said \"the macrocosm is the microcosm\" (which Talbot calls an earlier version of Blake\u0027s seeing the world in a grain of sand); the idea was embraced by the Greek philosophers Anaximenes of Miletus, Pythagoras, Heraclitus, and Plato; the ancient Gnostics; the pre-Christian Jewish philosopher Philo Judaeus; and the medieval Jewish philosopher Maimonides.\n- **Hermes Trismegistus and the alchemists** — after a shamanic vision of the subtler levels of reality, the semimythical ancient Egyptian prophet said a main key to knowledge was that \"the without is like the within of things; the small is like the large\"; the medieval alchemists (for whom he became a kind of patron saint) distilled this into \"As above, so below.\" The Hindu Visvasara Tantra states it more crudely: \"What is here is elsewhere.\"\n- **Black Elk\u0027s great vision on Harney Peak** — the Oglala Sioux medicine man, standing on Harney Peak in the Black Hills, \"saw more than I can tell and I understood more than I saw... the shapes of all things in the spirit, and the shape of all shapes as they must live together as one being.\" He understood Harney Peak was the center of the world — but \"Anywhere is the center of the world.\" Talbot pairs this with Empedocles, over twenty-five centuries earlier: \"God is a circle whose center is everywhere, and its circumference nowhere.\"\n- **The Avatamsaka Sutra\u0027s network of pearls** — its author likened the universe to a legendary network of pearls hung over the palace of the god Indra, arranged so that looking at one shows all the others reflected in it; \"each object in the world is not merely itself, but involves every other object and, in fact, is everything else.\"\n- **Fa-Tsang\u0027s candle and crystal demonstration for Empress Wu** — Fa-Tsang, seventh-century founder of the Hua-yen school of Buddhist thought, held the whole cosmos implicit in each of its parts and every point of the cosmos its center; he likened the universe to a multidimensional network of jewels each reflecting all others ad infinitum. When Empress Wu said she did not understand, he suspended a candle in the middle of a room full of mirrors (the relationship of the One to the many), then placed a polished crystal at the center so it reflected everything around it (the relationship of the many to the One). Like Bohm with the holomovement, he stressed his model was static and failed to capture the cosmos\u0027s dynamism and constant movement.\n- **Leibniz, monads, and integral calculus** — the seventeenth-century German mathematician-philosopher appears to have been familiar with the Hua-yen school; some argue that is why he proposed the universe is constituted of \"monads,\" each containing a reflection of the whole. Significantly, Leibniz also gave the world integral calculus — which enabled Dennis Gabor to invent the hologram. Talbot\u0027s point: the ancient intuition may have looped forward into the very invention that inspired the holographic model.\n- **Hugo Zuccarelli\u0027s holophonic sound** — the Argentinian physiologist, drawing on Pribram\u0027s holographic brain model, developed a recording technique creating sound holograms. Basis: human ears actually emit sound; these naturally occurring sounds are the audio equivalent of the \"reference laser\" in holography. Results: a Times of London reporter listening to a recording \"stole a look at the reassuring numbers on my watch,\" heard people approach from behind where there was only wall, and after seven minutes got \"the impression of figures... a multidimensional \u0027picture\u0027 created by sound.\" Listeners move their feet on hearing recorded footsteps in front of them, move their heads at a match being lit too near the face — some reportedly even smelled the match. The recording keeps its three-dimensionality through only one side of a headphone (unlike stereo), and the same holographic principles appear to explain how people deaf in one ear can still locate a sound source without moving their heads. Major recording artists — Paul McCartney, Peter Gabriel, and Vangelis — approached Zuccarelli, but for patent reasons he has not disclosed the full technique. (A footnote offers a sample cassette for fifteen dollars from Interface Press, Box 42211, Los Angeles, California 90042.)\n- **Ilya Prigogine and dissipative structures** — Talbot\u0027s illustration of entropy: drop a stereo off the Empire State Building and it becomes a pile of splintered parts, not a VCR. Yet Prigogine discovered some chemicals, when mixed, develop into a more ordered arrangement; he named these spontaneously appearing ordered systems \"dissipative structures\" and won a Nobel Prize for unraveling their mysteries. Prigogine and others suggest they materialize not from nowhere but indicate a deeper level of order — the implicate becoming explicate. Talbot: if true, this could illuminate how new complexities (attitudes, behavior patterns) pop into consciousness, and even how life appeared on earth several billion years ago.\n- **Holographic computing (Marcus S. Cohen; Dana Z. Anderson)** — in the last half decade or so researchers moved from monolithic machines to \"neural networks\" of scores of connected little computers. Cohen, a computer scientist at New Mexico State University, pointed out that processors relying on interfering light waves passing through \"multiplexed holographic gratings\" might provide an even better analog of the brain\u0027s neural structure; Anderson, a physicist at the University of Colorado, showed holographic gratings could build an \"optical memory\" exhibiting associative recall. Talbot\u0027s caveat: these remain refinements of the mechanistic approach within the material framework.\n- **Willis Harman on accepting psychic phenomena** — president of the Institute of Noetic Sciences and former senior social scientist at Stanford Research Institute International; has written extensively on the need for a basic restructuring of science and considers acceptance of psychic/spiritual phenomena crucial to science and to the survival of human civilization. He asks why we don\u0027t grant face validity to any class of experience reported \"through the ages and across cultures.\"\n- **Brian L. Weiss and the secret believers** — Talbot\u0027s setup: whether or not past-life memories under hypnosis are actual memories of previous lives has yet to be proved, but the human unconscious has a natural propensity for generating at least apparent memories of previous incarnations — a fact the orthodox psychiatric community in general ignores. Weiss is the Florida psychiatrist, Yale School of Medicine graduate, chairman of psychiatry at Mount Sinai Medical Center in Miami. After publishing his best-selling *Many Lives, Many Masters* (1988) — recounting his turn from skeptic to believer in reincarnation after a patient spontaneously talked about past lives under hypnosis — he was deluged with letters and calls from psychiatrists confessing they too are secret believers; some write that they\u0027ve done regression therapy privately for ten to twenty years (\"please don\u0027t tell anyone, but...\"). Weiss: \"I think that is just the tip of the iceberg.\" Talbot\u0027s point: fear of ridicule, not just disbelief, blocks psychic research.\n- **Whitton on reincarnation\u0027s acceptance** — in a recent conversation, when Talbot asked whether reincarnation would ever become an accepted scientific fact, Whitton replied: \"I think it already is. My experience with scientists is that if they\u0027ve read the literature, they believe in reincarnation. The evidence is just so compelling that intellectual assent is virtually natural.\"\n- **Anonymous survey of psychiatrists** — of 228 psychiatrists who responded (many heads of departments and deans of medical schools), after being assured of anonymity, 58 percent said they believed \"an understanding of psychic phenomena\" was important to future graduates of psychiatry; 44 percent admitted believing psychic factors were important in the healing process. Talbot: this bears out Weiss\u0027s and Whitton\u0027s opinions; we need \"the parapsychological equivalent of a Rosa Parks.\"\n- **OBE brain waves vs. Monroe\u0027s accounts (evidence-standards example)** — one of the few scientifically \"valid\" OBE discoveries is that brain waves change when an OBEer exits the body; yet Talbot argues that if accounts like Monroe\u0027s are real, they involve discoveries with as much potential impact on history as Columbus\u0027s discovery of the New World or the invention of the atomic bomb. Likewise, watching a truly talented clairvoyant conveys something more profound than \"the dry statistics of R. H. and Louisa Rhine\" — whose work Talbot says is nonetheless important. Mass anecdotal accounts should count as evidence; he cites Stevenson: \"I believe it is better to learn what is probable about important matters than to be certain about trivial ones.\"\n- **The Big Bang double standard** — most scientists accept without question that the universe began in a single primordial explosion, though no one has proved it; but a near-death psychologist flatly stating that the NDE realm of light is an actual other level of reality would be attacked, despite \"equally compelling reasons.\" Science accepts the probable about fashionable beliefs but not unfashionable ones — a double standard Talbot says must be eliminated.\n- **Valerie Hunt\u0027s alcohol rule** — Hunt discovered her experimental results were affected by the presence of individuals who had been drinking alcohol, and so won\u0027t allow such individuals in her lab while taking measurements. Cited as an early shift to a participatory approach — which Talbot says also appears to be why some laboratories achieve spectacular results in remote-viewing experiments while others fail miserably.\n- **Dubrov and Pushkin\u0027s hypnosis protocol** — the Russian parapsychologists found they have more success duplicating other parapsychologists\u0027 findings if they hypnotize all test subjects present; hypnosis appears to eliminate interference from subjects\u0027 conscious thoughts and beliefs, producing \"cleaner\" results. Talbot suggests such practices, odd as they seem, may become standard operating procedure.\n- **Harner and the ayahuasca (participatory anthropology)** — instead of just observing what happened to the Conibo after they consumed the soul-vine ayahuasca, Harner imbibed the hallucinogen himself; by becoming a participant instead of an observer he learned far more than he could have \"sitting on the sidelines and taking notes.\" Talbot offers him as the model of the transformed, participatory scientist.\n- **Lucid-dream researchers and Monroe\u0027s institute** — lucid-dream researchers are already exploring and reporting back on their own lucid-dream experiences. Monroe (not a scientist in the strictest definition) has developed recordings of special rhythmic sounds he feels facilitate out-of-body experiences, founded the Monroe Institute of Applied Sciences in the Blue Ridge Mountains, and claims to have trained hundreds of individuals to make the same out-of-body journeys he has made. Talbot asks whether these foreshadow a time when \"psychonauts\" become the heroes on the evening news.\n- **Ring on increasing NDEs (*Heading toward Omega*)** — Ring points to compelling evidence that NDEs are on the increase; as tribal NDEers often become shamans, modern NDEers mutate into more loving, compassionate, more psychic individuals. Ring concludes we may be witnessing \"the shamanizing of modern humanity,\" driven by \"an evolutionary thrust toward higher consciousness for all humanity.\"\n- **Grosso, Raschke, Vallee, Ring, and Strieber on parallel phenomena** — Grosso believes the last century\u0027s increase in Marian visions has evolutionary implications; Raschke and Vallee feel the explosion of UFO sightings over the last several decades has evolutionary significance; several investigators including Ring note UFO encounters actually resemble shamanic initiations. Strieber: \"what we\u0027re dealing with is an exponential leap from one species to another... the process of evolution in action.\"\n- **The aboriginal dreamtime prophecy and Edgar Cayce** — the aborigines say there was a time when the entire world was dreamtime, and that the day will come when the earth returns to it. Cayce echoed this: the earth was \"at first merely in the nature of thought-forms or visualization... Then came materiality as such into the earth, through Spirit pushing itself into matter.\" Talbot speculates (\"in the spirit of pure speculation\") that as we learn to manipulate the hologram of reality — Jahn and Dunne\u0027s \"interface between consciousness and its environment\" — reality may become malleable again, and the evolutionary processes may exist to teach us to handle a plastic environment safely.\n- **The Hindu ripple myth and Loye on Eden** — a Hindu myth says human consciousness began as a ripple that decided to leave the ocean of \"consciousness as such, timeless, spaceless, infinite and eternal,\" then forgot it was part of the infinite ocean and felt isolated. Loye has argued that Adam and Eve\u0027s expulsion from the Garden of Eden may be a version of the same myth — an ancient memory of consciousness leaving its home in the implicate. In this view the earth is a playground \"in which one is free to experience all the pleasures of the flesh provided one realizes that one is a holographic projection of a... higher-order spatial dimension.\"\n- **Strieber on UFOs as midwives** — Strieber believes UFOs \"are probably midwifing our birth into the nonphysical world — which is their origin\"; the physical world is \"only a small instant in a much larger context,\" reality unfolds primarily nonphysically, and \"being, as consciousness, probably predates the physical.\"\n- **Terence McKenna\u0027s fifty-thousand-year crisis** — the writer and longtime supporter of the holographic model holds that from the awareness of the soul\u0027s existence to \"the resolution of the apocalyptic potential\" spans roughly fifty thousand years; we are \"in the final historical seconds of that crisis,\" which involves the end of history, our departure from the planet, the triumph over death — \"the freeing of life from the dark chrysalis of matter.\" Talbot files this and Strieber\u0027s view as speculation, but concludes we are \"following some track of spiritual evolution.\"\n- **Swedenborg\u0027s higher heaven and Whitton\u0027s subject on the planes** — Swedenborg said that beyond the heaven he visited was another heaven so brilliant and formless it appeared only as \"a streaming of light.\" One of Whitton\u0027s subjects similarly reports: \"There are many higher planes, and to get back to God... you have to drop your garment each time until your spirit is truly free... each one is lighter and brighter than the one before.\" Talbot\u0027s inference: even the plastic afterlife realm is a mere stepping stone, and reality grows increasingly frequency-like deeper in the implicate.\n- **The coloring-book / LSD analogy and the beings of light** — Talbot says we are still like children needing the security of a coloring book, not ready to draw free-form; plunging into Swedenborg\u0027s streaming light would be like a completely fluid LSD hallucination, and we lack the emotional maturity to handle the monsters our psyches would create there. Perhaps that is why we get only \"small doses of the omnijective\" (UFOs and similar experiences) — and why \"the beings of light tell us again and again that the purpose of life is to learn.\"\n\n## Key quotes\n- \"They stumble along blindly on the road to nowhere — a paved highway which they themselves bulldoze and make smooth so that they can get faster to the big empty hole which they\u0027ll find at the end, waiting to swallow them up.\" — Lame Deer, Lakota shaman, in the chapter epigraph.\n- \"In a universe thus composed, everything interpenetrates, and is interpenetrated by, everything else; as with the void, so with the non-void — the part is the whole.\" — Tibet scholar John Blofeld, on the Tibetan void/nonvoid.\n- \"One should know that Nature is illusion (maya), and that Brahman is the illusion maker. This whole world is pervaded with beings that are parts of him.\" — Svetasvatara Upanishad, cited for the Hindu version of the implicate order.\n- \"To draw up and then return what one had drawn — that is the life of the world.\" — a Dogon elder, describing the physical world\u0027s flow out of and back into a deeper reality.\n- \"Anywhere is the center of the world.\" — Black Elk, after his great vision on Harney Peak.\n- \"God is a circle whose center is everywhere, and its circumference nowhere.\" — Empedocles, over twenty-five centuries before Black Elk, per Talbot.\n- \"In the same way, each object in the world is not merely itself, but involves every other object and, in fact, is everything else.\" — the author of the Avatamsaka Sutra, explaining Indra\u0027s network of pearls.\n- \"Why don\u0027t we assume that any class of experiences or phenomena that have been reported, through the ages and across cultures, has a face validity that cannot be denied?\" — Willis Harman, on the first step of restructuring science.\n- \"I believe it is better to learn what is probable about important matters than to be certain about trivial ones.\" — Stevenson, quoted for broadening what counts as scientific evidence.\n- \"A willingness to be transformed is an essential characteristic of the participatory scientist.\" — Harman, on the shift from observer to experiencer.\n- \"I think that they are probably midwifing our birth into the nonphysical world — which is their origin.\" — Strieber, on why UFOs are here.\n- \"We are, in fact, closing distance with the most profound event a planetary ecology can encounter — the freeing of life from the dark chrysalis of matter.\" — Terence McKenna, on the fifty-thousand-year crisis.\n- \"We are, as the aborigines say, just learning how to survive in infinity.\" — Talbot, the book\u0027s final line.\n\n## Thread\nAs the book\u0027s final chapter, this closes the circle Talbot has been drawing since the opening chapters on Bohm and Pribram: the holographic model is presented not as a novelty but as science\u0027s rediscovery, in its own vocabulary, of what mystical and shamanic traditions have always taught — a two-tiered, nonlocal, whole-in-every-part reality. Talbot leaves the reader with a program (restructure science toward participation and acceptance of the psychic) and a destiny (an evolutionary shamanizing of humanity that may return reality to the plastic dreamtime and eventually carry consciousness beyond the physical altogether). The closing image reframes the entire book as a shaman\u0027s journey: we are \"mere children struggling to become technicians of the sacred,\" dreaming a comfortably solid hologram until we outgrow our conceptual pigeonholes — \"just learning how to survive in infinity.\"\n\n## Connections\n- Ch 1–2 (Bohm and Pribram chapters): the entire chapter is structured around Bohm\u0027s implicate/explicate order, the fish-and-two-television-monitors thought experiment (\"as we have seen\"), the holomovement, Pribram\u0027s frequency domain, and the nonlocal distribution of an image in holographic film — all introduced in Part I.\n- The psychosomatic/placebo material (\"the attitude of a doctor affects whether or not a placebo works\") refers back to the book\u0027s mind-body chapters (Part II).\n- Whitton\u0027s between-life research, past-life memories, and his subject\u0027s report on the higher planes tie back to the reincarnation chapter; Milarepa\u0027s claim that mind forms a body in the between-life state is explicitly paralleled to it.\n- Monroe\u0027s OBE accounts, NDEers and the realm of light (Ring\u0027s work), Swedenborg\u0027s heavens, Harner and the Conibo ayahuasca episode, Valerie Hunt\u0027s energy-field measurements, the Rhines\u0027 statistics, Grosso on Marian visions, and Vallee/Strieber on UFOs all revisit figures and phenomena \"discussed in this book\" in Part III\u0027s earlier chapters; Jahn and Dunne\u0027s experimenter-affects-machine findings are likewise recalled.\n- Possible cross-book links (speculative, not from the text): the \"earth as playground\" for a consciousness that forgot its origin resonates with My Big TOE (Campbell) and its consciousness-first metaphysics; the malleable, simulation-like hologram of reality invites comparison with The Simulation Hypothesis (Virk); Strieber/Vallee\u0027s UFOs-as-transformative-contact anticipates themes in American Cosmic (Pasulka); the call to drop conceptual pigeonholes for direct nonconceptual experience loosely parallels The Power of Now (Tolle).\n"},{"id":"holographic-universe/91-qa","file":"91-qa.md","title":"The Holographic Universe — Q\u0026A","type":"qa","chapter":null,"concepts":[null],"people":[null],"body":"\n# The Holographic Universe — Q\u0026A\n\n## Core ideas\n\n**Q: What is the central thesis of The Holographic Universe?**\nA: Talbot argues that some scientists believe the universe itself is a kind of giant hologram — \"a splendidly detailed illusion\" — in which everything from snowflakes to spinning electrons is a ghostly projection from a level of reality literally beyond both space and time. The idea\u0027s two main architects, physicist David Bohm and neurophysiologist Karl Pribram, arrived at it independently from opposite directions, and Talbot\u0027s most sweeping claim is that the model helps explain \"virtually all paranormal and mystical experiences\" — telepathy, precognition, psychokinesis, mystical oneness, NDEs, lucid dreams, and synchronicities. (Intro)\n\n**Q: What is a hologram, and why does \"whole in every part\" matter so much?**\nA: A hologram is a three-dimensional image made by splitting a laser into two beams, bouncing one off an object, and recording the interference pattern where the beams recollide on film; re-illuminating the film reconstructs the 3-D image. The crucial property is that every fragment of the film contains all the information of the whole image — cut a hologram of an apple in half and each piece still reconstructs the entire apple, only hazier as pieces shrink. This \"whole in every part\" trait is the mechanism Pribram seized on for distributed memory, and it recurs throughout the book as the model of nonlocality, body microsystems, and the ancient part-contains-whole intuition. (Ch 1)\n\n**Q: What is the implicate order?**\nA: The implicate (enfolded) order is Bohm\u0027s proposed deeper level of reality — a vast, more primary level that gives birth to all the objects and appearances of our physical world the way holographic film gives birth to a hologram. Our everyday world is the \"explicate\" (unfolded) order, continuously projected out of and enfolded back into the implicate in countless exchanges. Bohm prefers to call the universe the \"holomovement,\" since \"hologram\" suggests a static image and misses the dynamic enfoldings and unfoldings creating our universe moment by moment. His first model of it was an ink drop in glycerine that spreads into invisibility and then reconstitutes when the cylinder is reversed — a \"hidden\" order revealed. (Ch 2)\n\n**Q: What does nonlocality mean in this book?**\nA: Nonlocality is the property, implied by Bohm\u0027s quantum potential, that at the subquantum level location ceases to exist — all points in space become equal to all other points, so it is meaningless to speak of anything as separate from anything else. Talbot notes that saying every part of holographic film contains the whole image is just another way of saying the information is distributed nonlocally, so a holographic universe would be expected to have nonlocal properties. Bohm\u0027s fish-in-the-aquarium analogy makes the point: two camera views of one fish look like two communicating fish, when at a deeper level they are one thing. (Ch 2)\n\n**Q: What is the frequency domain?**\nA: It is Pribram\u0027s speculative picture of what is really \"out there\": not solid objects but a vast ocean of waves and frequencies — \"a vast, resonating symphony of wave forms\" — which the brain, acting as a lens using Fourier mathematics, converts into the familiar concrete world. In the later chapters Talbot equates it with the interference-pattern reality behind appearances that mystics and aura-seers allegedly glimpse. Pribram\u0027s answer to which is real, the china cup or its interference pattern: \"Both are real to me, or, if you want to say, neither of them are real.\" (Ch 1, Ch 2, Ch 6)\n\n**Q: What is a \"reality-field\"?**\nA: It is Talbot\u0027s own term for a reality collectively constructed and sustained through extrasensory interconnectedness — consensus reality as a mutually shared hologram. He proposes that stable particles like electrons are old, deeply ingrained reality-fields while plastic ones like the anomalon are recent and still inchoate, and that this logic could explain the US-vs-British aspirin anomaly and Rogo\u0027s observation that blood miracles only begin with fourteenth-century San Gennaro. Taken to the limit, everything stable and eternal — laws of physics, the substance of galaxies — would be \"will-o\u0027-the-wisps no more or less real than the props in a giant, mutually shared dream.\" (Ch 5)\n\n**Q: What does Talbot mean by \"omnijective\"?**\nA: \"Omnijective\" is Talbot\u0027s 1976 coinage for phenomena that are neither purely subjective nor purely objective but both — products of the psyche that are also quite real, such as UFOs and Marian visions. He later learned the Sufi scholar Henry Corbin had already coined \"imaginal\" for the same blurred status: a world created by imagination yet ontologically no less real than physical reality. In the final chapter the whole universe becomes omnijective — a seamless continuum where mind and reality interpenetrate and strict objectivity ceases to be possible. (Ch 8, Ch 9)\n\n## The science claims\n\n**Q: What experimental support does Talbot claim for the model in the Introduction?**\nA: Two main items: numerous neurophysiology studies said to corroborate Pribram\u0027s predictions about the holographic nature of memory and perception, and Alain Aspect\u0027s 1982 Paris experiment showing the web of subatomic particles possesses \"what appears to be an undeniable \u0027holographic\u0027 property.\" He adds the Princeton PEAR lab\u0027s 1987 announcement of \"unequivocal evidence\" that minds can affect machines, and argues the character and courage of Bohm and Pribram themselves add weight. (Intro)\n\n**Q: What was the Aspect experiment and what did it show, per the book?**\nA: In 1982 Alain Aspect, Jean Dalibard, and Gerard Roger at the Institute of Optics, University of Paris, produced twin photons by heating calcium atoms with lasers, sent them through 6.5 meters of pipe to filters that switched between polarization analyzers in 10 billionths of a second — about 30 billionths of a second less than light needs to cross the 13 meters separating the photon sets. The photons still correlated their polarization angles, ruling out communication by any known physical process. Talbot reports the result is generally viewed as virtual proof of nonlocal connection; he is careful to say it does not prove Bohm\u0027s model but gives it \"tremendous support.\" (Ch 2)\n\n**Q: What was the engram debate, and what evidence undermined localized memory?**\nA: Penfield\u0027s 1920s stimulation of conscious epileptics\u0027 temporal lobes evoked vivid replayed memories from fixed spots, which was taken as proof each memory has a specific brain location (the \"engram\"). But Karl Lashley spent some thirty years surgically removing portions of trained rats\u0027 brains and could never eradicate the maze memories; patients with brain sections removed never lost specific memories; and neither Pribram nor Penfield himself could replicate the stimulation results in non-epileptics. Talbot reports this convinced Pribram memory is distributed throughout the brain as a whole — and a mid-1960s Scientific American article on holograms gave him the mechanism. (Ch 1)\n\n**Q: What experiment convinced Pribram his Fourier theory of vision was right?**\nA: The 1979 work of Berkeley neurophysiologists Russell and Karen DeValois, who converted plaid and checkerboard patterns into simple wave forms with Fourier\u0027s equations and found visual-cortex cells responded not to the original patterns but to their Fourier translations — implying the brain uses the same mathematics holography uses. Talbot reports the finding was confirmed by many other labs, and sits atop earlier frequency-analysis findings: Helmholtz on the ear, \"osmic frequencies\" for smell, and Bekesy on skin and taste. (Ch 1)\n\n**Q: What were Pietsch\u0027s salamander experiments?**\nA: Indiana University biologist Paul Pietsch, initially trying to disprove Pribram, found he could remove a salamander\u0027s brain, flip its hemispheres, turn it upside down, and even mince it — and in over 700 operations the animal\u0027s feeding behavior always returned to normal once the tissue was replaced. Talbot reports the results turned Pietsch into a believer, drew a 60 Minutes segment, and are recounted in his book Shufflebrain. (Ch 1)\n\n**Q: What did Valerie Hunt claim to measure?**\nA: UCLA kinesiologist Valerie Hunt, using electromyograph electrodes, reported an additional field radiating from the body at frequencies averaging 100–1600 cps (sometimes far higher, up to 200,000 cps in some individuals), strongest at the chakra points rather than at brain, heart, or muscle. She reported instrumental correlation with the colors aura readers see, talent bands (psychics 400–800 cps, trance channelers 800–900, mystics above 900), and a never-repeating \"chaos holograph pattern\" from just 3–4 seconds of data. Her conclusion, as Talbot quotes it: \"The mind\u0027s not in the brain. It\u0027s in that damn field.\" (Ch 6)\n\n**Q: What do the Libet and Feinstein timing experiments show, per Talbot?**\nA: The neurophysiologists found a touch stimulus registered in the brain 0.0001 second after it occurred and patients pressed a response button 0.1 second after — but conscious awareness came only after almost 0.5 second, meaning the decision was made by the unconscious while the brain created \"the comforting delusion\" of conscious control. Later studies showed the brain generates movement signals one and a half seconds before we \"decide\" to move. Talbot pairs this with Hunt\u0027s finding that the energy field\u0027s EMG responds to stimuli before the brain\u0027s EEG, to argue the mind may not be in the brain at all. (Ch 6)\n\n**Q: What new discoveries does Talbot say are already flowing from the model?**\nA: Three: Hugo Zuccarelli\u0027s holophonic sound, which uses the fact that human ears emit sound (an audio \"reference laser\") to make recordings so three-dimensional listeners duck at matches lit near their faces and which stay 3-D through one headphone side; Prigogine\u0027s Nobel-winning dissipative structures, read by Prigogine and others as the implicate becoming explicate; and holographic computing — Cohen\u0027s multiplexed holographic gratings and Anderson\u0027s optical memory with associative recall. Talbot stresses the computing advances remain refinements of the mechanistic approach. (Ch 9)\n\n## Mind \u0026 body\n\n**Q: What is the book\u0027s core mind-body claim, and what imagery evidence backs it?**\nA: Talbot argues that because real and imagined experience reduce to \"the same common language of holographically organized wave forms,\" the body cannot always distinguish them, so mental images produce dramatic and specific physiological effects. Evidence he reports: Simonton\u0027s throat-cancer patient Frank (under 5 percent survival odds, cancer gone in two months with bullet-imagery visualization), Simonton\u0027s 159 \"medically incurable\" patients averaging 24.4 months survival — over twice the national norm; Achterberg\u0027s students who raised neutrophils or T-cells depending on which cell type they imaged; the Soviet athlete study where the 75-percent-visualization group improved most at Lake Placid 1980; and Richardson\u0027s basketball study where visualization-only practice gained 23 percent versus 24 percent for physical practice. (Ch 4)\n\n**Q: What is the Wright/Krebiozen case?**\nA: Wright, a cancer patient with orange-sized tumors reported by psychologist Bruno Klopfer, received one injection of the touted drug Krebiozen and his tumors \"melted like snowballs on a hot stove\"; he relapsed when articles said the drug didn\u0027t work, recovered again after his physician injected plain water billed as a \"new highly concentrated\" version, and died two days after the AMA pronounced Krebiozen worthless. Talbot uses it to argue we possess the power to melt tumors but must be fooled into using it — with tragic results when belief collapses. (Ch 4)\n\n**Q: How strong is the placebo effect, per the book?**\nA: Talbot reports that on average 35 percent of people receiving a placebo experience a significant effect; placebos were 54 percent as effective as aspirin and 56 percent as effective as morphine in double-blind studies; 1950s sham angina surgery (cutting patients open and sewing them up) relieved angina as well as the real operation; subjects given placebos in a supposed LSD study had hours-long \"trips\"; and cis-platinum\u0027s effectiveness fell from about 75 percent to 25–30 percent once its wonder-drug aura faded. He concedes the counterexamples: vitamin C cures scurvy and insulin works for skeptical diabetics. (Ch 4)\n\n**Q: What does multiple personality disorder show about the body, per Talbot?**\nA: That the body is a \"multiple image hologram\" that can switch biological states \"as rapidly as the flutter of a deck of cards\": Braun\u0027s patient was allergic to orange juice in every personality but one; Howland\u0027s patient\u0027s wasp-swollen eye healed within an hour when his \"anesthetic personality\" took over; diabetes, epilepsy, visual acuity, voice patterns, menstrual cycles, and even eye color change with personality, and each personality has a different brain-wave pattern (Putnam). Since integrated multiples retain the ability, Talbot argues it must lie latent in all our psyches — and since brain waves are a global property, the \"self\" may be a hologram the brain shuttles between like a slide projector. (Ch 3, Ch 4)\n\n**Q: What is the Brocq\u0027s disease case and why does Talbot make so much of it?**\nA: In 1951 hypnotherapist A. A. Mason at Queen Victoria Hospital, London, put a sixteen-year-old boy with Brocq\u0027s disease — a hereditary condition covering the skin in thick, cracking reptile-like scales — into deep trance and told him the disease was healing; the scales on his left arm fell off in five days, the arm was normal in ten, and he was symptom-free for at least five years. Because Brocq\u0027s is genetic, Talbot argues this means the mind can override \"the masterplan, our DNA programming itself.\" (Ch 4)\n\n**Q: What is the Vittorio Michelli case?**\nA: Michelli was admitted to the Military Hospital of Verona in 1962 with a malignant sarcoma that completely disintegrated his left hip, leaving his upper leg bone floating in soft tissue; after bathing in the spring at Lourdes he felt heat move through his body, the tumor shrank, and over several years his hip bone completely regenerated — which Talbot reports medicine generally views as impossible. The Vatican\u0027s Medical Commission ruled it a miracle, confirming \"categorically and without doubt\" a bone reconstruction \"of a type unknown in the annals of world medicine.\" Talbot suggests no physical law was violated — rather an unknown natural process, likely triggered by faith accessing very deep levels of the psyche. (Ch 4)\n\n**Q: How does Talbot explain stigmata?**\nA: As self-induced, mind-generated images rather than divine wounds: all stigmatists\u0027 wounds are in the hands and feet because that is how art has depicted the crucifixion since the eighth century, whereas Roman practice was to nail through the wrists; Gemma Galgani\u0027s wounds precisely mirrored her own favorite crucifix; and Thurston argued wounds vary between stigmatists and many sufferers showed hysteria. The nail-like protuberances of St. Francis and Therese Neumann, and the Passion symbols found on St. Veronica Giuliani\u0027s heart at autopsy, fulfill for Talbot the Soviet researchers Dubrov and Pushkin\u0027s criterion — \"ejection of psychophysical structures outside the brain\" as direct evidence of brain holograms. (Ch 4)\n\n**Q: What is the human energy field, and what structure is claimed for it?**\nA: A subtle field around the body — prana in India, ch\u0027i in China, nefish in the Kabbalah, listed under 97 names in 97 cultures by White and Krippner — which Talbot reports is visible to people with a developed capacity, himself included (he sees the crown chakra). Many psychics describe seven layers (etheric, astral/emotional, mental, causal, plus three higher) and chakras connected to endocrine glands; healers like Barbara Brennan claim strikingly accurate diagnoses from it, and Brennan reads auras at distances as far as New York to Italy, which Talbot takes as evidence the field is nonlocal. He warns, though, that the structures may be participatory — partly created by observers\u0027 beliefs, as with the Sanskrit letter yam seen in the heart chakra. (Ch 6)\n\n**Q: What is therapeutic touch and what study supports it?**\nA: NYU nursing professor Dolores Krieger, after finding the healer Oscar Estebany could raise ill patients\u0027 hemoglobin levels by manipulating their fields, learned to feel and heal field blockages under clairvoyant Dora Kunz and named the method \"therapeutic touch\"; she has taught it to thousands of nurses. In Janet Quinn\u0027s double-blind study, heart patients treated by trained nurses showed a 17 percent drop in anxiety after five minutes, while patients receiving mimicked motions from untrained nurses showed no change — the lead story in the New York Times Science Times of March 26, 1985. (Ch 6)\n\n**Q: What evidence suggests the body itself is holographic?**\nA: Talbot cites acupuncture microsystems: Nogier\u0027s 1957 \"little man in the ear\" map (which the Chinese had drawn nearly 4,000 years earlier), Oleson\u0027s blind ear-diagnosis study agreeing with medical diagnoses 75.2 percent of the time, ear acupuncture eliminating drug requirements in 12 of 14 addicts in an average of 5 days, and Dale\u0027s evidence for eighteen micro-acupuncture holograms across the body. He adds hand-pattern findings — 72 percent of Alzheimer\u0027s patients versus 26 percent of controls with the ulnar-loop fingerprint on 8+ fingers, and 10 genetic disabilities associated with hand patterns — as signs every part contains an image of the whole. (Ch 4)\n\n## Psi \u0026 miracles\n\n**Q: What is the San Gennaro blood miracle and what does Talbot conclude about it?**\nA: Twice yearly in Naples a vial of brown crusty substance — allegedly the blood of St. Januarius, beheaded in A.D. 305 — turns to bubbling bright-red liquid when the crowd shouts at it; University of Naples scientists verified spectroscopically in 1902 that it is real blood, and failures to liquefy have preceded disasters like the 1976 earthquake. Talbot concludes the liquefaction is more likely caused by the intense devotion and belief of the witnessing crowd — that is, collective psychokinesis — than by the saint. He adds Rogo\u0027s observation that no blood miracles predate San Gennaro, reading it as a reality-field \"flickering into existence\" in the fourteenth century. (Ch 5)\n\n**Q: Who were the convulsionaires and why do they matter to the argument?**\nA: Jansenist worshipers at the Paris tomb of deacon François de Paris (from 1727) who fell into contagious convulsions and displayed invulnerability: Montgeron documented twenty-year-old Jeanne Maulet taking one hundred blows to the stomach from a thirty-pound hammer that then knocked a hole in a stone wall at the twenty-fifth blow, and a woman arched over a sharp peg unharmed by a repeatedly dropped fifty-pound stone. Witnesses included hostile Church investigators who went away confirming the events, and Hume wrote that never were so many miracles ascribed to one person. For Talbot they pose the inertia problem — where does the deflected energy go? — which pushes him beyond simple PK to Grof\u0027s idea of reprogramming reality\u0027s \"generative matrix\" in the implicate order. (Ch 5)\n\n**Q: What fire-immunity cases does Talbot cite?**\nA: Botanist William Tufts Brigham crossing a Kilauea lava flow with three kahunas, socks burning off his feet while the feet stayed unharmed; convulsionaire Marie Sonnet lying over a blazing fire for half an hour; the Camisard leader Claris preaching unharmed atop his own burning pyre before six hundred witnesses; blacksmith Nathan Coker holding an incandescent shovel to his feet before doctors (New York Herald, 1871); Mohotty walking a twenty-foot pit measured at 1,328 degrees Fahrenheit by a National Geographic team; and Pentecostals holding hands in acetylene flames. Talbot uses fire immunity as the proof case that the laws of physics are suspendable \"habits.\" (Ch 4, Ch 5)\n\n**Q: What does Talbot report about Sathya Sai Baba?**\nA: The Indian holy man reportedly materializes jewelry, sizzling-hot delicacies, out-of-season fruits, and prodigious amounts of sacred ash out of thin air; Icelandic psychologist Erlendur Haraldsson studied him for over ten years, witnessed an on-request materialization of an extremely rare double rudraksha capped in twenty-two-carat gold, and with Karlis Osis actually watched ash appear in the air below Sai Baba\u0027s palm. H
