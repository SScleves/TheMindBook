Jeanne Achterberg, director of research and rehabilitation science, University of Texas Health Science Center, Dallas** — one group of college students was trained to image neutrophils (the major white-blood-cell constituent), another to image T-cells. The neutrophil group significantly increased neutrophils with no T-cell change; the T-cell group significantly increased T-cells with neutrophils unchanged. Shows imagery\u0027s effects are cell-type specific.\n- **Achterberg\u0027s brain-tumor patient (from her book Imagery in Healing)** — a woman admitted comatose and paralyzed with a massive brain tumor; surgery \"debulked\" it but she was sent home to die without radiation or chemotherapy. As her biofeedback therapist Achterberg monitored her; by sixteen months no evidence of cancer, paralysis gone, leg braces and cane discarded, even out dancing. Explanation: only moderately educated, she did not know what \"tumor\" meant or its death sentence, so she did not believe she would die and fought it like any other illness. Illustrates belief as critical to health.\n- **Breznitz\u0027s soldiers (text fragmentary in this scan)** — Breznitz found the stress hormone levels in soldiers\u0027 blood always reflected their *estimates* of how far they had marched, not the actual distance: bodies responding not to reality but to what was imaged as reality.\n- **Soviet athlete imagery study / Dr. Charles A. Garfield, former NASA researcher, president of the Performance Sciences Institute, Berkeley** — world-class Soviet athletes split into four groups: 100% physical training; 75% training/25% visualizing exact desired movements; 50/50; 25% training/75% visualizing. At the 1980 Winter Games in Lake Placid, New York, the fourth group (75% visualization) showed the greatest improvement, then groups three, two, one in that order. Garfield (book: Peak Performance) says the Soviets believe mental images act as precursors of neuromuscular impulses; he believes imagery works because movement is recorded holographically in the brain.\n- **Basketball free-throw study / Alan Richardson, Australian psychologist** — three groups tested on free throws: one practiced twenty minutes a day, one did nothing, one only visualized shooting perfect baskets twenty minutes a day. No-practice group: no improvement. Practice group: +24 percent. Visualization-only group: +23 percent — almost as much as physical practice.\n- **Headache diary study (cited by physician Larry Dossey)** — chronic headache sufferers asked to keep a diary of headache frequency and severity as a first step toward treatment; most found their headaches disappeared once they began the diary.\n- **Epileptic children videotape experiment (cited by Dossey)** — epileptic children and families videotaped interacting; emotional outbursts were often followed by actual seizures. When the children were shown the tapes and saw the emotion-seizure relationship, they became almost seizure-free. Dossey\u0027s reading: seeing illness within the larger pattern of one\u0027s life, as part of an unbroken whole, brings health.\n- **Sham angina surgery (1950s)** — angina pectoris was commonly treated by surgery tying off the mammary artery. Doctors instead cut patients open and simply sewed them back up; sham-surgery patients reported just as much relief as full-surgery patients. The full surgery was itself only a placebo — implying we all carry the ability to control angina.\n- **Placebo statistics** — on average 35 percent of people receiving a placebo experience a significant effect (varying by situation). Conditions responsive to placebo: angina pectoris, migraine, allergies, fever, common cold, acne, asthma, warts, various pains, nausea/seasickness, peptic ulcers, depression and anxiety, rheumatoid and degenerative arthritis, diabetes, radiation sickness, Parkinsonism, multiple sclerosis, cancer.\n- **Purple-dye wart cure / Lewis Thomas, president emeritus, Memorial Sloan-Kettering Cancer Center, New York** — Thomas tells of a physician who regularly rid patients of warts (viral growths) by painting a harmless purple dye on them; folk wart rituals generally are placebos. Thomas: calling it just \"the unconscious at work\" understates it — an unconscious that can orchestrate anti-viral tissue rejection \"is a lot further along than I am.\"\n- **Placebo vs. aspirin and morphine** — in nine double-blind studies placebos were 54 percent as effective as aspirin; in six double-blind studies, 56 percent as effective as morphine. The near-identical ratio against a far stronger drug shows placebo potency scales with expectation.\n- **Delivery-method and pill-color studies** — injections are perceived as more potent than pills, capsules more than tablets; in a study of pills\u0027 suggestive value, people saw yellow or orange pills as mood manipulators (stimulants/depressants), dark red as sedatives, lavender as hallucinogens, white as painkillers.\n- **The accidental asthma placebo / Dr. David Sobel, placebo specialist, Kaiser Hospital, California** — a doctor gave a struggling asthma patient a sample of a \"potent new medicine\"; within minutes, spectacular improvement. At the next attack the doctor knowingly gave a placebo — the patient complained it didn\u0027t fully work. Then a letter from the pharmaceutical company: they had accidentally sent a placebo the first time. The doctor\u0027s unwitting enthusiasm for the first placebo made it work; even subliminal information (attitude, body language) shapes the beliefs that impact health.\n- **Wright and Krebiozen / psychologist Bruno Klopfer (famous reported case)** — Wright had advanced lymph-node cancer; treatments exhausted; orange-sized tumors in neck, armpits, chest, abdomen, groin; two quarts of milky fluid drained from his chest daily. He begged for the new drug Krebiozen; got one injection on a Friday; by Monday he was up walking, tumors \"melted like snowballs on a hot stove\" at half size — faster shrinkage than the strongest X-ray treatments could manage. Ten days after first treatment, discharged apparently cancer-free; having entered needing an oxygen mask, he left well enough to fly his own plane at 12,000 feet. Two months later articles said Krebiozen didn\u0027t work; Wright, rigidly logical, relapsed. His physician announced a (fictitious) \"new highly concentrated\" version and, with elaborate procedure, injected plain water: tumors melted again, chest fluid vanished, two more symptom-free months. Then the AMA announced a nationwide study finding Krebiozen worthless; Wright\u0027s faith shattered, his cancer bloomed anew, and he died two days later.\n- **Cis-platinum** — the chemotherapy agent was touted as a wonder drug and 75 percent of recipients initially benefited; once its use became routine, effectiveness fell to about 25–30 percent — most of the benefit apparently placebo.\n- **Historical treatments and angina reviews / Herbert Benson, Harvard Medical School, with Dr. David P. McCallie, Jr., of Harvard\u0027s Thorndike Laboratory** — most pre-twentieth-century treatments (leeching, lizard\u0027s blood) were useless yet often helped via placebo; Benson and McCallie\u0027s review of angina pectoris treatments over the years found success rates stayed high even for now-discredited remedies. The federal Office of Technology Assessment estimates over 75 percent of current medical treatments lack sufficient scientific scrutiny; Benson believes many over-the-counter medications act primarily as placebos. (Counterpoint kept by Talbot: vitamin C cures scurvy and insulin works for skeptical diabetics — not everything is placebo.)\n- **Placebo LSD trips / Drs. Harriet Linton and Robert Langs, 1962** — subjects were told they were in an LSD study but given a placebo; within half an hour they experienced classic LSD symptoms (loss of control, supposed insight into the meaning of existence), with \"placebo trips\" lasting several hours.\n- **Richard Alpert\u0027s holy men, 1966** — the Harvard psychologist went East seeking holy men to illuminate the LSD experience. One pundit said it was good but not as good as meditation; a Tibetan lama said it only gave him a headache. A wizened holy man over sixty in the Himalayan foothills asked for one of Alpert\u0027s 305-microgram pills, then another and another — 915 micrograms total (Grof\u0027s average study dose was about 200) — and behaved as if nothing had happened, serene all day. Alpert gave up LSD, changed his name to Ram Dass, and converted to mysticism. Real drug, no effect: the inverse of the placebo.\n- **Amphetamine/barbiturate room experiment** — ten subjects per room: in room one, nine got a stimulant amphetamine and one a sleep-producing barbiturate; room two reversed. In each case the odd one out behaved exactly as his companions: the lone barbiturate taker became animated and speedy; the lone amphetamine taker fell asleep.\n- **Ritalin-to-placebo addiction transfer** — a doctor secretly replaced a Ritalin addict\u0027s prescription with sugar pills, sparing him withdrawal — whereupon the man displayed an addiction to the placebo.\n- **Everyday placebos** — even an injection of caffeine won\u0027t keep caffeine-sensitive people awake if they believe it\u0027s a sedative; any antibiotic \"curing\" a cold or viral sore throat is placebo (antibiotics only touch bacteria); in a study of the tranquilizer mephenesin, 10–20 percent of subjects had negative side effects (nausea, itchy rash, heart palpitations) whether given drug or placebo; in a recent chemotherapy study, 30 percent of the placebo control group lost their hair. (Talbot\u0027s footnote: not all drug side effects are placebo — consult a physician for negative reactions.)\n- **The British aspirin mystery** — despite convincing US evidence (and TV commercials) that aspirin cuts heart-attack risk, a six-year study of 5,139 British doctors found no evidence of the effect in England. Talbot asks whether a flaw in someone\u0027s research or \"some kind of massive placebo effect\" is to blame — while advising readers to keep believing in aspirin.\n- **Orange-juice allergy multiple / Dr. Bennett Braun, International Society for the Study of Multiple Personality, Chicago** — documented a patient all of whose subpersonalities were allergic to orange juice except one: drinking it in an allergic personality produced a terrible rash; switching to the nonallergic personality made the rash instantly begin to fade and he could drink freely.\n- **Wasp-sting multiple / Dr. Francine Howland, Yale psychiatrist specializing in multiples** — a patient arrived with an eye swollen completely shut from a wasp sting; the ophthalmologist couldn\u0027t see him for an hour, so Howland had his \"anesthetic personality\" (which feels no pain) take control: pain ended, and by the appointment the swelling was gone and the eye normal — the ophthalmologist sent him home untreated. When the original personality returned, pain and swelling returned; he was treated the next day. The unbriefed ophthalmologist phoned Howland to check he hadn\u0027t imagined the previous day — \"He thought time was playing tricks on him.\"\n- **Multiples\u0027 pharmacological wizardry (Braun and others)** — a drunk multiple can instantly become sober by switching personalities; Braun records 5 milligrams of diazepam sedating one personality while 100 milligrams had little effect on another; adult doses can overdose child subpersonalities who take over; some multiples are hard to anesthetize, with accounts of waking on the operating table when an \"unanesthetizable\" subpersonality takes over.\n- **Personality-linked bodily variation** — scars, burn marks, cysts, and handedness can differ between personalities; visual acuity differs (some multiples carry two or three pairs of glasses); color-blindness and even eye color can change; some women have two or three menstrual periods a month, one per subpersonality\u0027s cycle; speech pathologist Christy Ludlow found each personality\u0027s voice pattern differs — a physiological change beyond even the most accomplished actor; one multiple hospitalized for diabetes showed no symptoms while a nondiabetic personality was in control; epilepsy comes and goes with personality; psychologist Robert A. Phillips, Jr., reports even tumors appearing and disappearing (kind unspecified).\n- **Multiples\u0027 rapid healing and slow aging** — several recorded cases of third-degree burns healing with extraordinary rapidity; Dr. Cornelia Wilbur (therapist of Sybil Dorsett, portrayed in the book Sybil) is convinced multiples age more slowly than other people.\n- **Cassandra\u0027s \"parallel processing\" (symposium account)** — a multiple who attributes her rapid healing to visualization plus round-the-clock parallel processing: her alternates stay aware when not in control, letting her work several term papers at once and \"sleep\" while other personalities cook and clean; a subpersonality named Celese, with thorough knowledge of anatomy and physiology, spends twenty-four hours a day meditating and imaging the body\u0027s well-being. Other multiples make similar claims. Talbot adds: therapy-integrated multiples can still make these switches at will — so the ability must lie in all our psyches.\n- **Trobriand Islands premarital pregnancy** — Trobrianders engage freely in premarital sex with no contraception and seldom abortion, yet premarital pregnancy (strongly frowned upon) is virtually unknown — suggesting unmarried women unconsciously prevent conception via cultural belief. Analogous: infertile couples who conceive shortly after adopting, suggesting an inhibition lifted.\n- **Tuberculosis death rates and Koch, 1882** — 19th-century TB killed tens of thousands amid terrifying mystery; after Dr. Robert Koch discovered in 1882 that a bacterium caused TB and the knowledge spread, death rates fell from 600 to 200 per 100,000 — though an effective drug was nearly half a century away.\n- **The first kidney transplant \"success\" (1950s)** — a Chicago doctor published a seemingly successful kidney transplant; successful transplants followed worldwide. When the first failure came, the doctor discovered his original kidney had actually been rejected from the start — but it didn\u0027t matter: once recipients believed they could survive, they did, and success rates soared.\n- **Attitude studies (rapid-fire list)** — an expectant mother\u0027s attitude toward her baby and pregnancy correlates directly with childbirth complications and the newborn\u0027s medical problems; high scorers on hostility/aggression tests are seven times more likely to die from heart problems; married women have stronger immune systems than separated/divorced women, happily married women stronger still; people with AIDS who display fighting spirit live longer than passive AIDS patients, likewise cancer patients; pessimists get more colds than optimists; stress lowers immune response; the newly widowed have increased illness and disease.\n- **Jack Schwarz, Dutch-born author and lecturer (1970s)** — in studies at the Menninger Foundation, the University of California\u0027s Langley Porter Neuropsychiatric Institute, and others, he stuck mammoth six-inch sailmaker\u0027s needles completely through his arms without bleeding, flinching, or producing beta brain waves (the pain waves); holes closed tightly with no bleeding on removal; he altered brain-wave rhythms at will, held burning cigarettes against his flesh, carried live coals in his hands. He says he learned the control in a Nazi concentration camp to withstand beatings, and believes anyone can learn voluntary control of the body.\n- **Mirin Dajo, 1947** — another Dutchman; at Zurich\u0027s Corso Theater his assistant thrust a fencing foil completely through his body, piercing vital organs, without harm, pain, or blood — just a faint red line. After a spectator\u0027s heart attack he was legally banned from performing. On May 31, 1947, at the Zurich cantonal hospital, before Dr. Hans Naegeli-Osjord, chief of surgery Dr. Werner Brunner, doctors, students and journalists, he repeated it; walked upstairs, foil still through his abdomen, for an X-ray that proved he was genuinely impaled; the foil came out after a full twenty minutes leaving two faint scars. Later tested in Basel, where he let doctors themselves run him through. Naegeli-Osjord related the case to German physicist Alfred Stelter, who reports it in his book Psi-Healing.\n- **Mohotty of Ceylon (1960s) / Gilbert Grosvenor, president of the National Geographic Society, wife Donna, and a Geographic photo team** — as a boy Mohotty promised the divinity Kataragama yearly penance if his father was cleared of a murder charge; the father was cleared. His annual penance: walking through fire and hot coals, piercing his cheeks with skewers, driving skewers into his arms from shoulder to wrist, sinking large hooks deep into his back and dragging an enormous sledge by ropes attached to them. The hooks pulled his back flesh taut with no sign of blood; when removed, no trace of wounds. Photographed and published in the April 1966 National Geographic. Talbot later argues Mohotty\u0027s protection is better explained by his deep belief in divine protection than by Kataragama\u0027s existence.\n- **Indian hook-swinging ritual (Scientific American, 1967)** — annually a chosen villager has two hooks \"large enough to hang a side of beef on\" buried in his back; ropes through the hook-eyes are tied to an ox-cart boom and he is swung in huge arcs over the fields as an offering to fertility gods. Hooks removed: completely unharmed, no blood, literally no sign of punctures.\n- **Hypnosis capabilities (summary of numerous studies)** — deeply hypnotized persons can, like multiples, control allergic reactions, blood flow patterns, and nearsightedness; also heart rate, pain, body temperature; and can will away some kinds of birthmarks.\n- **Brocq\u0027s disease cured by hypnosis / A. A. Mason, hypnotherapist, Queen Victoria Hospital, London, 1951** — a sixteen-year-old boy with an advanced case (thick reptile-scale skin) was referred as a last resort. Mason found him a good hypnotic subject, put him in deep trance and told him the disease was healing. Five days later the scaly layer on his left arm fell off revealing soft healthy flesh; in ten days the arm was completely normal; they worked body area by body area until all scales were gone; symptom-free at least five years (when Mason lost touch). Because Brocq\u0027s is genetic, Talbot argues this means tapping \"the masterplan, our DNA programming itself\" — the mind overriding genetic makeup.\n- **Vittorio Michelli\u0027s Lourdes healing, 1962–1965** — admitted to the Military Hospital of Verona, Italy, with a large cancerous tumor (malignant sarcoma) on his left hip; sent home untreated as hopeless; within ten months the hip completely disintegrated, leaving his upper leg bone floating in a mass of soft tissue (fig. 11, a 1962 X-ray). In a plaster cast he traveled to Lourdes and bathed in the spring — instant sensation of heat moving through his body, then returning appetite and energy. A month later X-rays showed the tumor smaller; doctors documented every step. After the tumor disappeared his bone regenerated — generally viewed by medicine as impossible; within two months he was walking, and over several years the bone completely reconstructed (fig. 12, 1965 X-ray; source: Michel-Marie Salmon, The Extraordinary Cure of Vittorio Michelli). The Vatican\u0027s Medical Commission ruled it a miracle, its report confirming \"categorically and without doubt\" an overwhelming bone reconstruction \"of a type unknown in the annals of world medicine\" (X-rays 1964, 1965, 1968, 1969). Talbot suggests no physical law was violated — rather an unknown natural process, likely triggered by faith accessing very deep levels of the psyche.\n- **Talbot\u0027s Kauai synchronicity (footnote)** — while writing the Michelli passage, Talbot received a letter reporting that a friend in Kauai, Hawaii, whose hip had disintegrated from cancer, had experienced an \"inexplicable\" complete bone regeneration using chemotherapy, extensive meditation, and imagery exercises; reported in Hawaiian newspapers.\n- **Stigmata follow art, not history / D. Scott Rogo, parapsychologist, graduate faculty, John F. Kennedy University, Orinda, California** — from St. Francis of Assisi (the first spontaneous stigmatist, per most church scholars) onward, all stigmatists have wounds in hands and feet; but Roman custom was to nail through the wrists (skeletal remains from Christ\u0027s time bear this out; hand-nails can\u0027t support a hanging body). Wounds appear in the hands because that is how artists have depicted the crucifixion since the eighth century. Gemma Galgani (Italian stigmatist, died 1903): her wounds precisely mirrored the stigmata on her own favorite crucifix.\n- **Thurston\u0027s case for autosuggestion / Herbert Thurston, English priest, The Physical Phenomena of Mysticism (posthumous, 1952)** — stigmata are self-induced because: size/shape/location vary between stigmatists (so no common source in Christ\u0027s actual wounds); stigmatists\u0027 visions show little consistency (products of their own minds, not reenactments); and a surprisingly large percentage of stigmatists suffered from hysteria — signs of a volatile, abnormally emotional psyche rather than an enlightened one. Even some liberal Catholic leaders call stigmata products of \"mystical contemplation.\"\n- **Nail-like protuberances** — St. Francis\u0027s stigmata included flesh formed like bent nail-ends projecting from the flesh (eyewitness biographer Thomas of Celano); St. Bonaventura said the nails were so defined one could slip a finger under them into the wounds; per Celano, pressing the \"nail\" on one side made it instantly project on the other, like a real nail sliding through the hand. Therese Neumann (well-known Bavarian stigmatist, died 1962) had similar hardened-skin nail structures passing completely through hands and feet, examined by several doctors; her wounds opened only periodically and grew a soft membrane-like tissue when they stopped bleeding. Padre Pio (famous Italian stigmatist, died 1968): wounds passing completely through his hands; a side wound so deep doctors feared measuring it. Venerable Giovanna Maria Solimani (18th-century Italian): hand wounds deep enough to stick a key into; like all stigmatists\u0027 wounds, never decayed, infected, or inflamed. St. Veronica Giuliani (18th-century abbess, Citta di Castello, Umbria): a large side wound that would open and close on command.\n- **Dubrov and Pushkin\u0027s criterion / Soviet psychologists Dr. Alexander P. Dubrov and Dr. Veniamin N. Pushkin** — the brain\u0027s frequency-processing abilities alone don\u0027t prove images/thoughts are holographic; proof would be the brain projecting an image outside itself: \"Records of ejection of psychophysical structures outside the brain would provide direct evidence of brain holograms.\"\n- **St. Veronica Giuliani\u0027s heart** — in her last years she became convinced the images of the Passion — a crown of thorns, three nails, a cross, and a sword — were emblazoned on her heart; she drew them and noted their locations. Autopsy found the symbols impressed on her heart exactly as depicted; the two doctors who performed the autopsy signed sworn statements.\n- **St. Teresa of Avila\u0027s heart** — she had a vision of an angel piercing her heart with a sword; after death a deep fissure was found in her heart, now displayed as a relic (sword wound still visible) in Alba de Tormes, Spain.\n- **Marie-Julie Jahenny** — 19th-century French stigmatist who kept seeing a flower image in her mind until a picture of the flower appeared on her breast; it remained there twenty years.\n- **The girl of Bussus-Bus-Suel, 1913** — a twelve-year-old from a village near Abbeville, France, made headlines by consciously commanding images (pictures of dogs, horses) to appear on her arms, legs, and shoulders; she could also produce words — asked a question, the answer would instantly appear on her skin. Talbot: clear \"ejection of psychophysical structures.\"\n- **Michael Grosso on Padre Pio / philosopher, Jersey City State College** — traveled to Italy to study Padre Pio\u0027s stigmata firsthand; concludes Pio \"had an ability to symbolically transform physical reality\" — his level of consciousness made his body permeable to the psychic symbols of the crucifixion wounds, gradually assuming their form.\n- **Candace Pert\u0027s neuropeptide receptors / chief of brain biochemistry, National Institute of Mental Health** — announced at a psychoneuroimmunology conference that immune cells have neuropeptide receptors; neuropeptides were once thought confined to the brain, so this implies the immune system is an extension of the brain; found elsewhere in the body too, Pert admits she can no longer tell where the brain leaves off and the body begins.\n- **Paul Nogier\u0027s auriculotherapy, 1957** — French physician-acupuncturist; his Treatise of Auriculotherapy announced two smaller acupuncture systems on each ear (\"acupuncture microsystems\") whose points map a miniature human inverted like a fetus (fig. 13). Unbeknownst to him the Chinese had discovered the \"little man in the ear\" nearly 4,000 years earlier, but their ear map was published only after Nogier\u0027s claim. (Background: acupuncture has over a thousand points on meridians and has even successfully treated chronic back pain in racehorses.)\n- **Blind ear-diagnosis study / Dr. Terry Oleson, psychobiologist, Pain Management Clinic, UCLA School of Medicine** — increased electrical activity at an ear acupuncture point generally indicates past or present pathology in the corresponding body area. Forty chronic-pain patients were medically examined, then draped in sheets to hide visible problems; an acupuncturist with no knowledge of the results examined only their ears. Ear examinations agreed with established medical diagnoses 75.2 percent of the time.\n- **Oleson\u0027s boating anecdote** — Oleson noticed an abnormally flaky patch of skin in an acquaintance\u0027s ear at the spot corresponding to the heart and suggested a check-up; the next day the man\u0027s doctor found a cardiac problem requiring immediate open-heart surgery.\n- **Ear-acupuncture detox study (Oleson and colleagues)** — electrical stimulation of ear points treats chronic pain, weight problems, hearing loss, and virtually all addictions; in one study of 14 narcotic-addicted individuals, ear acupuncture eliminated the drug requirements of 12 in an average of 5 days with only minimal withdrawal symptoms; clinics in Los Angeles and New York now use it on street addicts. Oleson: the ear works \"through the brain holograph\" because every portion of the body contains the image of the whole.\n- **Dale\u0027s eighteen microsystems / Dr. Ralph Alan Dale, director, Acupuncture Education Center, North Miami Beach, Florida** — after two decades collecting clinical and research data from China, Japan, and Germany, he has evidence of eighteen micro-acupuncture holograms in the body (hands, feet, arms, neck, tongue, even the gums), calling them \"holographic reiterations of the gross anatomy,\" and — echoing Bohm\u0027s every-electron-contains-the-cosmos — hypothesizes every finger and even every cell may contain its own acupuncture microsystem.\n- **Leviton on reflexology, iridology, and palmistry / Richard Leviton, contributing editor, East West magazine** — reflexology and iridology may also indicate the body\u0027s holographic nature, though neither is experimentally vindicated (iridology studies extremely conflicting). He also suspects something to the 4,500-year-old Indian palmistry, based on a profound encounter with an Indian hand reader in Montreal holding a doctorate in the subject from Agra University: \"The holographic paradigm provides palmistry\u0027s more esoteric and controversial claims a context for validation.\"\n- **Ulnar loop and Alzheimer\u0027s / Herman Weinreb, neurologist, New York University** — the ulnar-loop fingerprint pattern occurs more often in Alzheimer\u0027s patients (fig. 14): in a study of 50 Alzheimer\u0027s patients and 50 normal individuals, 72 percent of the Alzheimer\u0027s group had the pattern on at least 8 fingertips versus 26 percent of controls; of those with ulnar loops on all 10 fingertips, 14 were Alzheimer\u0027s sufferers versus only 4 controls.\n- **Dermatoglyphics and genetic screening (West Germany)** — 10 common genetic disabilities including Down\u0027s syndrome are associated with hand patterns; West German doctors analyze parents\u0027 handprints to help decide whether expectant mothers should undergo amniocentesis (a potentially dangerous needle-in-the-womb screening). The Institute of Dermatoglyphics in Hamburg built a computer system with an opto-electric scanner that takes a digitized \"photo\" of a patient\u0027s hand, compares it against 10,000 stored prints and nearly 50 patterns associated with hereditary disabilities, and quickly calculates risk factors.\n\n## Key quotes\n- \"When images are regarded in the holographic manner, their omnipotent influence on physical function logically follows. The image, the behavior, and the physiological concomitants are a unified aspect of the same phenomenon.\" — Jeanne Achterberg, explaining why imagery affects the body.\n- \"Every action starts from an intention in the implicate order. The imagination is already the creation of the form; it already has the intention and the germs of all the movements needed to carry it out.\" — David Bohm, on why mental images manifest physically.\n- \"When our focus is toward a principle of relatedness and oneness, and away from fragmentation and isolation, health ensues.\" — Larry Dossey, on illness as part of an unbroken whole.\n- \"If indeed every part of our body is a reflection of the whole, then there must be all kinds of mechanisms to control what\u0027s going on. Nothing is firm at this point.\" — Karl Pribram, on the unknown mechanisms of holographic body control.\n- \"If my unconscious can figure out how to manipulate the mechanisms needed for getting around that virus, and for deploying all the various cells in the correct order for tissue rejection, then all I have to say is that my unconscious is a lot further along than I am.\" — Lewis Thomas, on placebo wart cures.\n- Tumors had \"melted like snowballs on a hot stove.\" — Bruno Klopfer\u0027s report of Wright\u0027s response to Krebiozen.\n- \"The effectiveness of placebos provides dramatic support for a \u0027holistic\u0027 view of the human organism... the mind and body continually interact and are too closely interwoven to be treated as independent entities.\" — Jane Brody, New York Times.\n- \"A remarkable reconstruction of the iliac bone and cavity has taken place... an unforeseen and even overwhelming bone reconstruction has taken place of a type unknown in the annals of world medicine.\" — the Vatican Medical Commission\u0027s official report on Michelli.\n- \"Records of ejection of psychophysical structures outside the brain would provide direct evidence of brain holograms.\" — Dubrov and Pushkin, stating their proposed proof of the holographic mind.\n- \"He identified with the wounds of the crucifixion and his body became permeable to those psychic symbols, gradually assuming their form.\" — Michael Grosso, on Padre Pio\u0027s stigmata.\n- \"The ear holograph is, logically, connected to the brain holograph which itself is connected to the whole body.\" — Terry Oleson, on why ear acupuncture works.\n- \"A vast similitude interlocks all.\" — Walt Whitman, the chapter\u0027s closing line (its epigraph is also Whitman, from \"Song of Myself\").\n\n## Thread\nThis is the book\u0027s first full application of the holographic model beyond brain science and physics: having established (Part I) that the brain constructs reality holographically and that the universe may be a hologram grounded in Bohm\u0027s implicate order, Talbot now argues the mind/body border dissolves — image, belief, and flesh are one holographic system. The chapter deliberately limits itself to phenomena that, however astounding, \"do not seem to violate any of the known laws of physics,\" explicitly setting up Chapter 5, which will examine things the mind can do that current science cannot explain. It also anchors the recurring book-wide motif of part-contains-whole (microsystems, hand patterns) and of \"images making images — two mirrors reflecting each other infinitely.\"\n\n## Connections\n- Ch 1 — The Brain as Hologram: the chapter leans directly on Part I\u0027s groundwork — \"as has been noted,\" experiences are neurophysiological processes, the brain localizes the internal hologram, and phantom limb sensations show it can\u0027t distinguish \"out there\" from believed \"out there.\"\n- Ch 2 — The Cosmos as Hologram: Bohm\u0027s implicate order is invoked for the intention-to-manifestation chain, and Dale\u0027s every-cell-a-microsystem idea is called \"reminiscent of Bohm\u0027s assertion that every electron in some way contains the cosmos\"; Dossey\u0027s \"patient is as misleading as particle\" plays on the physics of Part I.\n- Ch 3 — The Holographic Model and Psychology: MPD subpersonalities\u0027 differing brain-wave patterns are referenced as already discussed (\"In addition to possessing different brain-wave patterns...\"), Grof\u0027s average LSD dose (~200 micrograms) is cited in the Alpert story, and the closing paragraph recalls the scarab-beetle dream synchronicity.\n- Ch 5 — A Pocketful of Miracles: explicitly set up — \"In the next chapter we will look at some of the things the mind can do that cannot be explained by our current scientific understandings.\"\n- Possible cross-book links (speculative only): the claim that imagination and reality reduce to the same information-language loosely echoes the rendered-reality thesis of The Simulation Hypothesis (Virk) and the consciousness-as-primary framework of My Big TOE (Campbell); the mind-body-illness unity and belief-driven healing themes have a speculative resonance with The Power of Now (Tolle) on the pain-body and presence; the treatment of stigmata, Lourdes, and \"miracles\" as mind-generated but real phenomena parallels American Cosmic (Pasulka) on religious experience and materiality. None of these are referenced in the chapter.\n"},{"id":"holographic-universe/05-a-pocketful-of-miracles","file":"05-a-pocketful-of-miracles.md","title":"A Pocketful of Miracles","type":"chapter","chapter":"5","concepts":["psychokinesis","active-meaning","resonance-of-meanings","super-nonlocality","pk-signatures","random-event-generator","wave-particle-duality-of-consciousness","pauli-effect","gremlin-effect","convulsionaires","jansenism","human-salamanders","fire-immunity","inedia","materialization","dematerialization","bilocation","poltergeist","laws-of-physics-as-habits","material-neurosis","implicate-order","cosmic-motion-picture-projector","reality-fields","remote-viewing","telepathy","inverse-psychokinesis","mutual-hypnosis","psychometry","siddhis","anomalon","neutrino-mass","holodeck","separate-realities","aura","information-organizing-categories"],"people":["Michael Talbot","St. Augustine","San Gennaro","Herbert Thurston","Padre Pio","Therese Neumann","Rogo","David Bohm","Robert G. Jahn","Brenda Dunne","James S. McDonnell III","Wolfgang Pauli","Lyall Watson","Rex Gardner","Venerable Bede","St. Wilfrid","Bothelm","William Tufts Brigham","J. A. K. Combs","Francois de Paris","King Louis XV","King Louis XIV","Louis-Basile Carre de Montgeron","Jeanne Maulet","Abbe Bescherand","Pascal","Voltaire","David Hume","William McDougall","St. Francis of Paula","Marie Sonnet","Gabrielle Moler","Abbe du Chayla","Claris","Jean Cavalier","Bernadette of Lourdes","Dr. Dozous","Nathan Coker","K. R. Wissen","Mohotty","the Grosvenors","Leonard Feinberg","Berthold Schwarz","F. David Peat","Shainberg","Stanislav Grof","Karl Pribram","Gordon Globus","Carlos Castaneda","Don Juan","Fritz Rohrlich","N. David Mermin","Sir William Barrett","Leonid Vasiliev","Harold Puthoff","Russell Targ","Charles Tart","Josephson","Ruth Coggin","Kamro","Alin","Tia","A. R. G. Owen","Sathya Sai Baba","Erlendur Haraldsson","Karlis Osis","Paramahansa Yogananda","William Tiller","Ullman","Keith Floyd","Indridi Indridason","Dr. Seidl","Dr. Reismanns","Michelli"],"body":"\n# Ch 5 — A Pocketful of Miracles\n\n## In one paragraph\nTalbot argues that miracles — from the liquefying blood of San Gennaro to the invulnerability of the eighteenth-century French convulsionaires — are not supernatural interventions but expressions of forces latent in the human mind, chiefly psychokinesis (PK). He builds an escalating case: laboratory evidence (Jahn and Dunne\u0027s PEAR experiments) shows most people can exert small PK effects; historical and eyewitness testimony shows PK-like healing of bones, immunity to torture and fire, and even materialization of blood, salt, jewelry and food out of thin air. To explain feats that PK alone cannot cover (where does the deflected energy go?), he invokes Bohm\u0027s implicate order and Grof\u0027s suggestion that certain states of consciousness can intervene directly in reality\u0027s \"generative matrix,\" reprogramming the \"cosmic motion picture projector\" itself. The laws of physics thereby become habits — deeply ingrained but suspendable programs in the holomovement — and consensus reality becomes a \"reality-field,\" a mutually constructed hologram sustained by the interconnected consciousness of all things, like Tiller\u0027s Star Trek \"holodeck.\" The chapter closes with the most radical evidence — vanishing groves of trees, Talbot\u0027s own \"umbrella incident,\" Sai Baba\u0027s teleportation, Indridason\u0027s dematerializing limbs — implying that even our bodies are holographic projections and that \"virtually anything is possible.\"\n\n## Core claims\n- Talbot argues that nearly all miracles performed by saints and religious wonder-workers have been duplicated by psychics, suggesting miracles are produced by forces deep in the human mind latent in all of us — not by truly supernatural causes. He notes Thurston (priest, author of *The Physical Phenomena of Mysticism*) shared this reluctance to attribute miracles to the supernatural, and that many stigmatists (Padre Pio, Therese Neumann) were also renowned psychics.\n- Talbot suggests the San Gennaro liquefaction is more likely caused by the intense devotion and belief of the witnessing crowd than by the saint himself.\n- Rogo believes PK accounts for the more dramatic aspects of stigmata: ordinary biology can break small vessels for superficial bleeding, but only PK explains the rapid appearance of large wounds.\n- Bohm argues meaning is simultaneously mental and physical — the body responds to meaning just as consciousness does — so meaning is the \"bridge\" between the two sides of reality. He holds that electrons actively use information (mindlike, highly complex entities), so responsiveness to meaning is a property of all matter, and PK could arise when mental processes focus on meanings \"in harmony\" with those guiding the material system. This would be noncausal — a nonlocal \"resonance of meanings,\" requiring a \"super\" nonlocality deeper than ordinary quantum nonlocality (which Bohm believes cannot account for PK or telepathy).\n- Jahn and Dunne believe consciousness, like all physical processes, has a wave/particle duality: particlelike consciousness is localized in the head; wavelike consciousness can produce remote influence effects, one of which is PK. They believe reality itself results from the interface of the wavelike aspects of consciousness with the wave patterns of matter, that PK is an information exchange / resonance rather than a transmitted force, and that concepts (electron, time, consciousness) are only \"information-organizing categories\" with no independent status — all theories being metaphors.\n- Jahn and Dunne\u0027s PEAR data show, they claim, that PK is a small but real ability present in the majority of people, with stable individual \"signatures.\"\n- Jahn and Dunne do not identify themselves with the holographic model (their theory in fact differs from Bohm\u0027s thinking in several significant ways), but they recognize the overlap: Jahn sees \"some commonality\" in the basic reliance on wave mechanical behavior, and Dunne offers the metaphor of an individual consciousness as \"the laser of a particular frequency that intersects with a specific pattern in the cosmic hologram.\"\n- Jahn and Dunne believe (unlike Bohm) that subatomic particles do not possess distinct reality until consciousness enters the picture — physicists may be creating particles rather than discovering them (citing the anomalon and the neutrino-mass story). Jahn: \"we are indeed creating reality by any reasonable definition of the term.\"\n- Talbot argues that Tom\u0027s hypnotic perception of the watch shows our perceptions are not based solely on the five senses — we can tap the senses of others (telepathy, remote viewing) and even reality itself, and consensus reality may be a collectively constructed \"reality-field,\" with normal waking consciousness itself a kind of hypnosis (supporting datum: unlike other altered states of consciousness, hypnosis is associated with no unusual EEG patterns — physiologically, the mental state it most closely resembles is normal waking consciousness).\n- Grof believes certain unusual states of consciousness could mediate direct experience of, and intervention in, the implicate order — modifying phenomena by influencing their generative matrix; this would bypass rules like inertia and explain what PK alone cannot.\n- Talbot (following Peat and the holographic idea) argues the laws of physics are habits — deeply ingrained programs in the holomovement, like Shainberg\u0027s vortices — that can under special circumstances be suspended (fire immunity being the proof case). The deeper and more emotionally charged our beliefs, the greater the changes we can make in body and reality.\n- Bohm privately admits believing the universe is all \"thought\" and reality exists only in what we think, but prefers not to speculate on specific miracles. Pribram believes multiple potential realities exist and consciousness has some latitude in choosing which manifests (\"I don\u0027t believe anything goes\"). Watson goes further: reality is \"in a very large part a construct of the imagination\" (and he is no longer convinced any current physics, including the holographic idea, explains supernormal abilities).\n- Globus thinks the mind constructs concrete reality from the raw material of the implicate, and that an infinite number of potential realities are enfolded there; dreams, ordinary reality, and Castaneda-style \"separate realities\" are constructed by the same holographic brain mechanisms and are fundamentally the same.\n- Josephson (Nobelist) proposes objective reality is produced out of the collective memories of the human race, while anomalous events manifest the individual will.\n- Bohm thinks telepathy and remote viewing are forms of psychokinesis: PK = resonance of meaning from mind to object; telepathy = mind to mind; remote viewing = object to mind (\"inverse psychokinesis\").\n- Jahn and Dunne define consciousness liberally: anything that generates, receives, or utilizes information — animals, viruses, DNA, machines, \"nonliving\" objects — may take part in creating reality. This, Talbot says, would explain psychometry.\n- Talbot argues materializations (blood, salt, objects, nutrients) imply mind can create matter out of nothing; and whole-reality transformations (Tia\u0027s grove, the umbrella incident) suggest miracles involve \"parts\" only because we are programmed to see the world in parts.\n- Tiller believes the universe is a \"holodeck\" created by the integration of all living things: \"we\u0027ve created the laws that govern it... we\u0027re also creating the physics as we go along.\"\n- Talbot proposes stable particles (electrons) are old, deeply ingrained reality-fields, while plastic ones (anomalons) are recent, inchoate reality-fields — which would also explain the aspirin (US vs. British) anomaly and why blood miracles only begin with fourteenth-century San Gennaro (Rogo\u0027s observation). Indeed, if the universe is a holodeck, everything that appears stable and eternal — from the laws of physics to the substance of galaxies — must be viewed as reality-fields, \"will-o\u0027-the-wisps no more or less real than the props in a giant, mutually shared dream\"; all permanence would be illusory and only consciousness eternal, \"the consciousness of the living universe.\"\n- Talbot concedes the alternative — that only anomalous events are reality-fields and the world at large is stable — but argues it can never be proved: once two or more people can create a shared reality, consensus verification fails as a litmus test; it becomes a matter of personal philosophy (Jahn: only interaction-created reality is real; Globus: \"a nice theory postulates existence,\" admitted as bias).\n- Talbot, citing his own experiences, sides with Don Juan: \"We are perceivers... we have no solidity\" — no reality exists above that created by the integration of all consciousnesses; the holographic universe can be sculpted in virtually limitless ways by mind. Bilocation and dematerialization suggest even our bodies are holographic projections. Keith Floyd: it may be consciousness that creates the appearance of the brain, not the reverse.\n\n## Concepts\n- **Psychokinesis (PK)** — the psychic ability to alter physical matter with the mind; the chapter\u0027s prime suspect behind miracles, from the San Gennaro blood to gravity-defying stigmata flows and machine-jinxing.\n- **Active/objective meaning** — Bohm\u0027s idea that meaning is simultaneously mental and physical (a thought is at the same time a neurophysiological, chemical, physical activity); meaning is the link or \"bridge\" between mind and matter, active also in computer chips and subatomic particles.\n- **Quantum wave as information (ship on automatic pilot)** — Bohm\u0027s alternative to the orthodox \"ocean wave pushing a Ping-Pong ball\" view: the quantum wave doesn\u0027t push the electron; like radar guiding a ship on autopilot, it provides information about the environment which the electron uses to maneuver on its own — making the electron mindlike and complex, not a structureless point.\n- **Resonance of meanings / super nonlocality** — Bohm\u0027s proposed mechanism for PK: not a causal force but a nonlocal resonance between the meanings in a mind and those guiding a material system; similar to but deeper than the twin-photon nonlocality of chapter 2 (mere quantum nonlocality can\u0027t account for PK or telepathy).\n- **Random event generator (REG)** — a device using an unpredictable natural process (e.g., radioactive decay) to produce strings of random binary numbers; effectively an automatic coin-flipper producing enormous numbers of flips quickly; PEAR\u0027s main PK instrument.\n- **PK \"signatures\"** — the consistently distinctive, idiosyncratic result patterns each volunteer produced in PEAR experiments, persisting across different experiments (REG and pinball), implying PK ability varies between individuals like any talent but stays stable within one person.\n- **Wave/particle duality of consciousness** — Jahn and Dunne\u0027s postulate: since all known physical processes have wave/particle duality, consciousness does too; particlelike = localized in the head, wavelike = capable of remote influence (PK, remote perception) and of availing itself \"of all of space and time.\"\n- **Pauli effect** — physicists\u0027 joking name for Wolfgang Pauli\u0027s legendary propensity to make laboratory equipment malfunction by mere presence (or even by passing in a train).\n- **Gremlin effect** — the tendency of carefully tested equipment to inexplicably malfunction at absurdly inopportune moments, reported by pilots, aircrew, and military operators; Jahn and Dunne suggest it may be unconscious PK.\n- **Convulsionaires** — the Jansenist worshipers at Abbé Paris\u0027s tomb who fell into contagious trancelike convulsions during which they displayed invulnerability to torture, clairvoyance, eyes-bandaged reading, levitation, and fire immunity.\n- **Human salamanders** — term for fire-immune convulsionaires (from the medieval \"salamander,\" a mythological lizard believed to live in fire); the two most famous were Marie Sonnet and Gabrielle Moler.\n- **Reprogramming the cosmic motion picture projector** — Talbot\u0027s image for Grof\u0027s proposal: beyond moving objects, mind may reach into the implicate order and reprogram the generative matrix that produced the objects, bypassing even rules like inertia.\n- **Laws of physics as habits / material neurosis** — the holographic view that matter and physical law are constantly born anew out of the implicate (like a fountain\u0027s shape from flowing water); Peat calls repetition of pattern a \"material neurosis\" — chairs and tables are habits in the flux, and even physical laws are habits (vast whirlpools of inertial power, like Shainberg\u0027s vortices) that can be suspended.\n- **Reality-field** — Talbot\u0027s term for a reality collectively constructed via extrasensory interconnectedness (as Anne and Bill built their shared ocean world); consensus reality, subatomic particles, laws of physics, and even our bodies may all be reality-fields — older ones (electrons) fixed, newer ones (anomalons) still plastic.\n- **Remote viewing** — Puthoff and Targ\u0027s term for the ability to accurately describe what a distant test subject is seeing, simply by relaxing and reporting mental images; works even with no human observer at the target site.\n- **Inverse psychokinesis** — Bohm\u0027s reading of remote viewing: a resonance of meanings from object to mind — the distant system\u0027s meanings act in the viewer to transmit an image of that system.\n- **Mutual hypnosis** — Tart\u0027s procedure in which two skilled hypnotist-subjects hypnotize each other, deepening rapport until they co-construct a shared, fully sensory hallucinated reality.\n- **Psychometry** — the ability to obtain information about an object\u0027s history simply by touching it; explained if the object is suffused with its own consciousness and connected, via the implicate, to everyone and everything associated with its existence.\n- **Anomalon** — a recently discovered subatomic particle whose properties vary from laboratory to laboratory; Jahn and Dunne cite it as evidence that physicists may create rather than discover particles.\n- **Inedia** — the supernormal ability to live without food (and even water); displayed by Therese Neumann for thirty-five years and by other stigmatists in Thurston\u0027s collection.\n- **Materialization** — the creation of objects (blood, salt, stones, jewelry, ash, food, nutrients, tears) out of thin air; the miracle type that most rocks the conventional worldview.\n- **Poltergeist** — a haunting typified by mysterious sounds and psychokinetic activity rather than apparitions; centering on people rather than places, so many parapsychologists (and Talbot, from personal experience) view them as manifestations of the focal person\u0027s unconscious PK.\n- **Siddhis** — powers such as materialization described by Yogananda; he cautioned they are not always evidence of spiritual evolution: \"whatever your powerful mind believes very intensely instantly comes to pass.\"\n- **Holodeck** — Tiller\u0027s metaphor (from *Star Trek: The Next Generation*): an environment whose occupants can call up and alter any holographic simulation at will; the universe as a holodeck created by the integration of all living things.\n- **Bilocation** — the ability, often associated with saints, to be in two places at once; Sai Baba reportedly goes one better, vanishing and instantly reappearing a hundred or more yards away.\n- **Information-organizing categories** — Jahn and Dunne\u0027s status for all descriptive concepts (electron, wavelength, consciousness, time, frequency): useful organizing tools with no independent existence; all theories, their own included, are only metaphors.\n- **Aura** — the energy field around living things that Talbot says he spontaneously began seeing at seventeen, whose pattern and colors let him determine things about a person\u0027s health.\n\n## Experiments, examples \u0026 case studies\n- **San Gennaro blood miracle (Naples, ongoing)** — Twice yearly (September and May) at the Duomo San Gennaro, a vial of brown crusty substance — allegedly the blood of St. Januarius, beheaded by Diocletian in A.D. 305 and collected as a relic by a serving woman — turns into bubbling bright-red liquid when the crowd shouts at it. In 1902 University of Naples scientists verified spectroscopically (passing light through it) that it is real blood; the fragile reliquary (blood ensconced there since the end of the thirteenth century; first written account of the public miracle, 1389) can\u0027t be opened for further tests. When the blood fails to liquefy it is a bad omen: failures preceded the eruption of Vesuvius, the Napoleonic invasion of Naples, and more recently the worst earthquake in Italian history (1976) and the election of a communist city government in Naples (1978). Talbot\u0027s view: caused not by the saint but by the crowd\u0027s intense devotion and belief — i.e., PK.\n- **Therese Neumann\u0027s gravity-defying blood** — Blood from the stigmata wounds in her feet always flowed toward her toes — as it would have flowed on the cross — regardless of foot position, so when she sat upright in bed it flowed upward against gravity. Witnessed by many, including U.S. servicemen stationed in postwar Germany. Talbot: PK is clearly a factor in phenomena accompanying stigmata.\n- **Bohm\u0027s shadow-in-the-street thought experiment** — Walking at night, a looming shadow read as \"assailant\" triggers imagined activities plus inseparable biological processes (nerve excitation, rapid heartbeat, adrenaline, muscle tensing); read as \"just a shadow,\" a different mental-biological set follows. Shows the body also responds to meaning — meaning is simultaneously mental and physical, the bridge between the two sides of reality.\n- **Computer chip and plasma electrons (Bohm\u0027s examples of active meaning)** — A chip\u0027s information actively determines how currents flow; and the coordinated \"dance\" of electrons in a plasma cannot be explained by waves mechanically pushing particles (Ping-Pong balls on the ocean) — the quantum wave instead informs the electron like radar informs a ship on automatic pilot.\n- **Founding of PEAR (Princeton, 1979)** — Robert G. Jahn, professor of aerospace sciences and dean emeritus of Princeton\u0027s School of Engineering and Applied Science, ex-consultant to NASA and the Department of Defense, author of *Physics of Electric Propulsion*, didn\u0027t believe in the paranormal until a student asked him to oversee her independent-study PK experiment; the results were so provocative he founded the Princeton Engineering Anomalies Research (PEAR) lab in 1979, which has since gathered more PK data than anyone else in the country. PEAR is funded in good part by the McDonnell Foundation (created by James S. McDonnell III of McDonnell Douglas), and the *New York Times Magazine* devoted an article to the work.\n- **PEAR REG experiments (Jahn and Dunne)** — Volunteers sat before a random event generator (randomness from radioactive decay) and concentrated on skewing its heads/tails output. Over hundreds of thousands of trials, concentration alone produced a small but statistically significant effect. Two further findings: the ability was present in the majority of volunteers (most of us have some PK), and each volunteer produced consistently distinctive results — \"signatures.\"\n- **PEAR pinball-machine experiments (Jahn and Dunne)** — A device in a ten-foot-high, six-foot-wide glass-fronted vertical frame lets 9,000 three-quarter-inch marbles cascade around 330 nylon pegs into 19 collecting bins, normally forming a bell-curve distribution. Volunteers willing more balls into the outer bins produced a small but measurable shift over many runs — extending PK from microscopic processes to everyday-scale objects — and the same individual \"signatures\" from the REG work reappeared. Jahn and Dunne: individually the segments might be dismissed as near-chance, but \"taken in concert the entire ensemble establishes an incontrovertible aberration of substantial proportions.\"\n- **The Pauli effect** — Physicist Wolfgang Pauli\u0027s legendary jinxing of equipment: his mere presence would make glass apparatus explode or sensitive instruments crack in half. In one famous incident a physicist wrote that at least Pauli couldn\u0027t be blamed for a complicated apparatus\u0027s mysterious disintegration since he was absent — only to learn Pauli had been passing the laboratory in a train at the precise moment. Jahn and Dunne read this, and the pilots\u0027 \"Gremlin effect,\" as possible unconscious PK.\n- **The \"resonance\" testimony of PEAR volunteers** — The factor most frequently associated with successful PK performance was attaining a feeling of \"resonance\" with the machine; one volunteer described immersion, loss of self-awareness, and \"being in a canoe\" flowing with the device rather than controlling it. Supports Jahn and Dunne\u0027s model of PK as resonance/information exchange, not force.\n- **Philippine psychokinetic surgeon (Lyall Watson)** — Watson (biologist, author of *Supernature*) witnessed a Philippine psychic healer who, without touching patients, held his hand about ten inches over the body and pointed — an incision appearing instantaneously. Once, when the man swept his finger more broadly than usual, Watson received an incision on the back of his own hand and bears the scar to this day. Shows PK operating on larger-scale physical change.\n- **Darmstadt nuns\u0027 pelvic-fracture healing (reported by Rex Gardner, 1983, British Medical Journal)** — Gardner, a physician at Sunderland District General Hospital, England, presented contemporary miracle healings side by side with virtually identical seventh-century cases collected by the Venerable Bede. A Lutheran nun in Darmstadt, Germany, building a chapel, broke through a freshly cemented floor onto a wooden beam; X rays showed a compound pelvic fracture. Rather than weeks in traction, the nuns held an all-night prayer vigil, took her home two days later, and performed a laying on of hands — after which she stood free of pain, achieved full recovery in two weeks, and presented herself to her astonished doctor. Talbot suggests the nuns\u0027 unconscious collective PK did the work (since even Michelli\u0027s miraculous pelvis regeneration took months).\n- **St. Wilfrid and the mason Bothelm (Hexham, seventh century, from Gardner via Bede)** — During construction of the church at Hexham, the mason Bothelm fell from a great height, breaking both arms and legs; as he lay dying, Wilfrid (bishop of Hexham) prayed over him and asked the other workmen to join. \"The breath of life returned\" and he healed rapidly. Talbot wonders whether Wilfrid was catalyst or whether it was the combined unconscious PK of the whole assemblage — since healing came only after the workmen joined.\n- **Kahuna instantaneous bone healing (recorded by William Tufts Brigham)** — Brigham, curator of the Bishop Museum in Honolulu and noted botanist, recorded an incident witnessed by his friend J. A. K. Combs, whose grandmother-in-law was one of the most powerful women kahunas in Hawaii. At a party at her home a guest slipped in beach sand and broke his leg so severely the bone ends pressed visibly against the skin. Refusing hospital, the elderly kahuna knelt, straightened the leg, pushed on the fracture, prayed and meditated several minutes, then announced the healing finished. The man rose, walked — completely healed, leg showing no indication of the break.\n- **The Jansenist miracles at Saint-Médard (Paris, from 1727)** — Jansenism (founded early seventeenth century; puritanical, Dutch-influenced Catholicism) was at odds with Rome and Louis XV, both viewing it as masked Protestantism; Jansenist leaders\u0027 skill at miraculous healings fed its popularity. When the revered deacon François de Paris died May 1, 1727, and was interred at Saint-Médard, worshipers at his tomb reported cures of cancerous tumors, paralysis, deafness, arthritis, rheumatism, ulcerous sores, persistent fevers, prolonged hemorrhaging, and blindness — plus contagious involuntary convulsions that filled the streets with writhing \"convulsionaires.\" Crowds thronged day and night for years, miracles still being reported two decades later; in 1733 public records noted over 3,000 volunteers were needed just to assist the convulsionaires (e.g., protecting female participants\u0027 modesty during seizures). Witnesses came from every social stratum and institution; even Roman Catholic Church investigators with a vested interest in refuting the miracles went away confirming them (the Church later conceded the miracles but attributed them to the devil).\n- **Montgeron\u0027s documentation — Jeanne Maulet** — Louis-Basile Carré de Montgeron, member of the Paris Parliament, witnessed enough to fill four thick volumes, *La Vérité des Miracles* (1737). Twenty-year-old convulsionaire Jeanne Maulet, leaning against a stone wall, took one hundred blows to the stomach from a thirty-pound hammer wielded by \"a very strong man\" from the crowd (convulsionaires asked to be tortured because it relieved the pain of the convulsions). Montgeron then tested the hammer on the wall itself: at the twenty-fifth blow the stone came loose and fell through, leaving an aperture more than half a foot in size.\n- **The arched woman and the fifty-pound stone (Montgeron)** — A convulsionaire bent backward into an arc, her lower back supported on \"the sharp point of a peg,\" had a fifty-pound stone attached to a rope hoisted to \"an extreme height\" and dropped repeatedly onto her stomach. She was unaffected, held her position effortlessly, cried \"Strike harder, harder!\" throughout, and walked away without a mark on her back. Talbot uses this case to pose the inertia problem: where did the deflected energy go?\n- **General convulsionaire invulnerability (Montgeron and others)** — They could not be hurt by metal rods, chains, or timbers; the strongest men could not choke them; some were crucified and showed no wounds afterward; they could not be cut or punctured by knives, swords, or hatchets. In one incident an iron drill\u0027s sharpened point was held against a convulsionaire\u0027s stomach and hammered so violently it seemed it would \"penetrate through to the spine and rupture all the entrails\" — but didn\u0027t; she maintained \"an expression of perfect rapture,\" crying \"Oh, that does me good! Courage, brother; strike twice as hard, if you can!\" Talbot\u0027s PK reading: the convulsionaires may have unconsciously taken control of the chains, timbers, and knives, stopping them at the precise moment of impact (hence no marks or bruises), and the hands of would-be stranglers may have been held in place by PK — they thought they were squeezing flesh but \"were really only flexing in the nothingness.\"\n- **Other convulsionaire talents** — Some became clairvoyant (\"discern hidden things\"); others read with eyes closed and tightly bandaged; levitations were reported — the abbé Bescherand from Montpellier was so \"forcibly lifted into the air\" during convulsions that witnesses could not hold him down.\n- **Intelligentsia and the Jansenist miracles** — Pascal\u0027s niece had a severe eye ulcer vanish within hours via a Jansenist miracle. When Louis XV closed the Saint-Médard cemetery, Voltaire quipped: \"God was forbidden, by order of the King, to work any miracles there.\" Hume, in *Philosophical Essays*, wrote there was never \"so great a number of miracles ascribed to one person,\" many \"immediately proved upon the spot, before judges of unquestioned credit and distinction, in a learned age.\"\n- **McDougall\u0027s collective-PK hypothesis (1920s)** — Harvard psychologist William McDougall suggested religious miracles might result from the collective psychic powers of large numbers of worshipers — anticipating Talbot\u0027s reading that the combined fervor of all present (not one individual) created the Jansenist effects.\n- **St. Francis of Paula\u0027s fire immunity (from Thurston)** — Could hold burning embers unharmed; at his 1519 canonization hearings eight eyewitnesses testified they saw him walk unharmed through the roaring flames of a furnace to repair one of the furnace\u0027s broken walls.\n- **Shadrach, Meshach, and Abednego (Old Testament)** — Refused to worship Nebuchadnezzar\u0027s statue and were thrown into a furnace so \"exceeding hot\" it burned up the men who threw them in; through faith they emerged unscathed — hair unsinged, clothing unharmed, no smell of fire. Talbot notes challenges to faith (like Louis XV\u0027s against the Jansenists) have engendered miracles more than once.\n- **Brigham\u0027s lava walk with three kahunas (Hawaii, near erupting Kilauea)** — Three kahunas promised to demonstrate fire immunity and offered to confer it on Brigham. They chose a 150-foot-wide lava flow cooled enough to bear weight but with patches of incandescence coursing through its surface. After lengthy protective prayers, the oldest kahuna crossed unharmed. Brigham, refusing to remove his boots, was shoved and forced to run across; one boot burned off and his socks caught fire, but his feet were completely unharmed (\"I had a sensation of intense heat on my face and body, but almost no sensation in my feet\"). The kahunas rolled with laughter; Brigham laughed too, \"never so relieved\" in his life.\n- **Marie Sonnet (\"human salamander\")** — In the presence of numerous witnesses including Montgeron, she stretched herself on two chairs over a blazing fire and remained half an hour, neither she nor her clothing showing ill effects. Another time she sat with her feet in a brazier of burning coals: shoes and stockings burned off, feet unharmed.\n- **Gabrielle Moler** — Impervious to sword thrusts and shovel blows; could stick her head into a roaring hearth fire and hold it there uninjured — afterward her clothing was so hot it could barely be touched, yet hair, eyelashes, and eyebrows were never singed. (Talbot\u0027s aside: \"No doubt she was great fun at parties.\")\n- **The Camisards (Cévennes valley, late 1600s)** — Huguenot resistors under Louis XIV\u0027s purge displayed similar invulnerabilities. The prior Abbé du Chayla complained in an official report to Rome that nothing harmed them: musket balls were found flattened between their clothing and skin; hands closed on burning coals were unharmed; wrapped head to toe in oil-soaked cotton and set alight, they did not burn. The Camisard leader Claris climbed a pyre, had it lit before six hundred witnesses, and kept delivering his ecstatic speech as flames rose above his head; when the pyre was consumed he remained unharmed, no mark on hair or clothing. Jean Cavalier, colonel of the French troops sent against them, later exiled to England, wrote *A Cry from the Desert* (1707) on the events. Du Chayla was eventually murdered in a Camisard retaliatory raid — possessing, unlike some of them, no special invulnerability.\n- **Bernadette of Lourdes and the candle (timed by Dr. Dozous)** — In ecstasy, her hand dropped so close to a burning candle that flames licked around her fingers; Dr. Dozous, municipal physician of Lourdes, timed it: a full ten minutes before she came out of trance and removed her hand. Dozous: \"I saw it with my own eyes. But I swear, if anyone had tried to make me believe such a story I would have laughed him to scorn.\"\n- **Nathan Coker, blacksmith (New York Herald, September 7, 1871)** — An elderly Negro blacksmith in Easton, Maryland; before a committee including several doctors he heated an iron shovel to incandescence and held it against the soles of his feet until it cooled, licked the red-hot shovel\u0027s edge, and poured melted lead shot into his mouth, letting it run over teeth and gums until it solidified. Doctors examined him after each feat: no trace of injury.\n- **The Tennessee boy (K. R. Wissen, 1927)** — On a hunting trip in the Tennessee mountains, New York physician K. R. Wissen watched a twelve-year-old boy handle red-hot irons out of a fireplace with impunity; the boy said he discovered the ability by accident, picking up a red-hot horseshoe in his uncle\u0027s blacksmith shop.\n- **Mohotty\u0027s fire pit (the Grosvenors / National Geographic)** — The pit of flaming embers the Grosvenors watched Mohotty walk through was twenty feet long and measured 1,328 degrees Fahrenheit on the National Geographic team\u0027s thermometers. (Referenced back from the previous chapter\u0027s discussion.)\n- **Ceylonese iron-pot ritual (Leonard Feinberg, Atlantic Monthly, May 1959)** — Dr. Feinberg of the University of Illinois reported witnessing a Ceylonese fire-walking ritual in which natives carried red-hot iron pots on their heads unharmed. Talbot: where does the heat energy go while the pot rests against hair and flesh?\n- **Appalachian Pentecostals (Berthold Schwarz, Psychiatric Quarterly)** — Psychiatrist Schwarz reported watching Pentecostals hold their hands in an acetylene flame without harm — one of \"literally hundreds of credible accounts of fire immunity.\"\n- **The anomalon** — A recently discovered subatomic particle whose properties vary from laboratory to laboratory — \"imagine owning a car that had a different color and different features depending on who drove it.\" Jahn and Dunne cite it as evidence that a particle\u0027s reality depends on who finds/creates it.\n- **The neutrino\u0027s changing properties** — Pauli proposed the massless neutrino in the 1930s to solve a radioactivity problem; evidence of its existence came in 1957. When physicists later realized a *massive* neutrino would solve thornier problems, evidence of a small measurable mass duly appeared in 1980 — but only in Soviet laboratories; U.S. laboratories found none, a split persisting through the better part of the 1980s (other labs have now duplicated the Soviet findings; still unresolved). Talbot asks whether the differing properties reflect the changing expectations and cultural biases of the physicists searching.\n- **Tom and the invisible daughter (Talbot\u0027s firsthand account, mid-1970s)** — At a gathering at his father\u0027s house, a professional hypnotist put Tom (a friend of Talbot\u0027s father, meeting the hypnotist for the first time) into deep trance — making him see a giraffe, eat a potato as an apple — then told him his teenage daughter Laura would be invisible on waking. With Laura standing directly before his chair, Tom looked right through her (despite her giggles). The hypnotist, hidden behind Laura, pressed a concealed object against the small of her back; Tom, \"staring directly through Laura\u0027s stomach,\" identified it as a watch and read aloud its inscription — the owner\u0027s name (unknown to everyone present) and message — verified when the watch was passed around. Tom said afterward Laura had been absolutely invisible; he\u0027d have never known he wasn\u0027t perceiving consensus reality. Talbot: Tom\u0027s perception wasn\u0027t coming through his five senses — possibly telepathically from the hypnotist\u0027s mind.\n- **Sir William Barrett\u0027s hypnotized girl** — The British physicist bandaged a hypnotized girl\u0027s eyes, told her she would taste everything he tasted, and stood behind her: salt made her sputter (\"What for are you putting salt in my mouth?\"); sugar — \"That\u0027s better... Sweet\"; then mustard, pepper, ginger, etc., each named and apparently tasted by the girl as he put them in his own mouth.\n- **German hypnosis study, 1950s (cited by Leonid Vasiliev, *Experiments in Distant Influence*)** — The hypnotized subject tasted what the hypnotist tasted, blinked when a light was flashed in the hypnotist\u0027s eyes, sneezed when he sniffed ammonia, heard the ticking of a watch held to his ear, and felt pain when he pricked himself with a needle — all safeguarded against normal sensory cues.\n- **Puthoff and Targ\u0027s remote viewing (Stanford Research Institute, California)** — In a now-famous series, physicists Harold Puthoff and Russell Targ found just about everyone they tested could \"remote-view\" — accurately describe what a distant test subject was seeing — simply by relaxing and describing incoming mental images. Duplicated by dozens of laboratories around the world; probably a widespread latent ability in all of us.\n- **Jahn\u0027s Paris remote viewing (PEAR)** — Jahn served as receiver for a colleague in Paris (a city he has never visited); besides a bustling street he saw an image of a knight in armor — the sender turned out to be standing before a government building ornamented with statuary of historical military figures, one of them a knight in armor.\n- **Unconscious physiological interconnection studies** — An electric shock given to a person in one room registers in the polygraph readings of a person in another room; a light flashed in one subject\u0027s eyes registers in the EEG of a subject isolated in another room; and a test subject\u0027s finger blood volume (measured by plethysmograph, a sensitive autonomic indicator) changes when a \"sender\" in another room encounters a known person\u0027s name in a list of mostly unknown names.\n- **Charles Tart\u0027s mutual hypnosis experiment (UC Davis)** — Tart had two graduate students, Anne and Bill — both able to enter deep trance and both skilled hypnotists — hypnotize each other, reasoning the hypnotist-subject rapport would be strengthened. Opening their eyes mutually hypnotized, everything first looked gray, then gave way to a jointly experienced beach of unearthly beauty: sand sparkling like diamonds, a sea of enormous frothing bubbles glistening like champagne, translucent crystalline rocks pulsing with internal light. They explored together; when they fell silent to Tart, they reported they *were* talking in the shared world — Tart believes some paranormal communication was involved (later they found they\u0027d shared details for which no verbal stimuli existed on the tapes, concluding they must actually have been \"in\" those locales). Across sessions the constructed worlds were as real and fully sensory as waking reality; space was elastic beyond words; they often forgot to sculpt their own bodies, existing as floating faces or heads (Anne: \"I had to kind of conjure up a hand\"). The realness eventually frightened them; they stopped, and Bill gave up hypnosis entirely. Talbot: a perfect example of a holographic reality — a 3-D construct created out of interconnectedness, sustained by consciousness, plastic as thought.\n- **Remote viewing without observers, and sealed boxes** — Experiments show people accurately describe distant locations with no human observers present, and can identify contents of a sealed box randomly selected from a group (contents unknown to anyone) — meaning we can tap not just other people\u0027s senses but reality itself for information.\n- **Kamro\u0027s blood (Gardner report; Ruth Coggin, Pakistan, 1982)** — English physician Ruth Coggin was visited by Kamro, a thirty-five-year-old Pakistani woman eight months pregnant, suffering bleeding and intermittent abdominal pain most of her pregnancy; she refused hospitalization until two days later, when severe bleeding forced emergency admission. Blood loss was \"very heavy,\" feet and abdomen pathologically swollen; after \"another heavy bleed\" Coggin performed a cesarean — copious dark blood flooded out, Kamro had virtually no clotting ability, and \"deep pools of unclotted blood\" filled her bed after a healthy daughter was delivered. Coggin obtained only two pints to transfuse, then resorted to prayer (\"I had seen Jesus heal this condition before and was sure He was going to heal her\"). Kamro stabilized despite hours of continued brisk bleeding; forty-eight hours after the operation her blood began to clot; ten days later she went home with her baby. Coggin — and Gardner after examining the documentation — concluded she lost more than her total blood volume; since humans cannot produce new blood that fast, Talbot draws the \"unsettling conclusion\" that Kamro\u0027s new blood materialized out of thin air.\n- **The Indonesian poltergeist / Alin (Watson, Timor Timur, June 1974)** — Watson, en route to see a *matan do\u0027ok* (Indonesian rainmaking wonder-worker), was diverted by reports of an unusually active *buan* (evil spirit) in a village house occupied by a couple, their two small boys, and the husband\u0027s unmarried younger half-sister Alin — lighter-complexioned, almost Chinese in feature (hence unmarried), treated with indifference, and immediately obvious to Watson as the source of the disturbance. At dinner: the eight-year-old boy screamed as the back of his hand bled — a semicircle of fresh punctures like a human bite but with a diameter larger than the boy\u0027s own (Alin was at the fire opposite); the lamp flame turned blue and flared; a shower of salt poured slowly down over the food until it was inedible, appearing to begin in midair about four feet above the table; loud rapping issued from the table, which wobbled, bucked \"like the lid on a box containing some wild animal,\" and flipped on its side. Watson fled with the family, then returned and searched for trickery — finding none. Classic poltergeist: many parapsychologists hold these are manifestations of the focal person\u0027s unconscious PK.\n- **A. R. G. Owen\u0027s poltergeist survey** — In *Can We Explain the Poltergeist*, Owen (fellow and lecturer in Mathematics at Trinity College, Cambridge) gives numerous examples of objects materializing out of thin air in poltergeist cases dating from A.D. 530 to modern times; small stones, not salt, are the most common materialized objects.\n- **Talbot\u0027s own poltergeist (childhood onward)** — The new house his parents built became the site of an active haunting; the poltergeist followed Talbot to college, its activity tracking his moods (malicious when angry or low, impish when brighter): socks draped over house plants in good moods; objects hurled or broken in dark ones; his mother says pots and pans jumped from the kitchen table to the floor when he was a toddler. Materializations began at age six with inexplicable night showers of gravel on the roof; later it pelted him indoors with small polished stones and beach-worn shards of drift glass, and materialized coins, a necklace, and odder trifles. Usually he saw only aftermaths — e.g., a pile of cold sauceless spaghetti noodles falling on his chest during a nap in his New York apartment, with no open windows/doors, no one in the apartment, no sign of cooking or break-in. In 1976 he watched an actual materialization: a small brown object popped into existence in midair inches below his study ceiling, zoomed down at a sharp angle, and landed at his feet — a piece of brown drift glass, possibly from
